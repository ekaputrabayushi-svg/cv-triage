    <script>
        const originalCards = [
            {
                cat: "Vital Sign Trap",
                q: "Pasien pemuda 25 tahun pasca kecelakaan lalu lintas. Ia tampak sadar penuh, bisa diajak bercanda. Nadi 115 kali/menit, tekanan darah 120/80 mmHg, CRT 2 detik. Keluarga mendesak pulang karena 'tensinya normal'. Parameter tersembunyi apa yang harus Anda cek agar tidak tertipu?",
                a: `<strong>Perhatikan pulse pressure.</strong><br><br>Syok hemoragik awal dapat tetap mempertahankan tekanan sistolik melalui aktivasi simpatis, tetapi diastolik sering naik akibat vasokonstriksi sehingga selisih sistolik-diastolik menyempit. Jadi angka 120 mmHg pada sistolik belum otomatis berarti perfusi aman, apalagi bila ada takikardia dan mekanisme trauma bermakna.<ul><li>Hitung selisih sistolik-diastolik, jangan hanya lihat satu angka tensi.</li><li>Bandingkan dengan nadi, warna kulit, suhu akral, dan keluhan haus atau gelisah.</li><li>Pikirkan perdarahan tersembunyi bila mekanisme trauma mendukung.</li></ul><div class="trick-box"><strong>Workaround:</strong> jangan puas dengan label “tensi normal”; integrasikan pulse pressure, shock index, dan tren pemeriksaan ulang.</div>`
            },
            {
                cat: "Relative Bradycardia",
                q: "Pasien trauma abdomen dengan hipotensi berat justru memiliki nadi 62 kali/menit. Apakah tidak adanya takikardia menyingkirkan syok perdarahan?",
                a: `<strong>Tidak.</strong><br><br>Pada perdarahan tertentu dapat muncul bradikardia relatif karena refleks vagal, terutama pada perdarahan intraabdomen, stimulasi peritoneal, atau fase terminal kompensasi. Karena itu, tidak semua syok hemoragik tampil dengan nadi sangat cepat.<ul><li>Nadi “normal” atau lambat tidak boleh menenangkan bila perfusi buruk.</li><li>Hipotensi + trauma signifikan tetap harus dianggap perdarahan sampai terbukti sebaliknya.</li><li>Periksa sumber perdarahan tersembunyi secara sistematis.</li></ul><div class="trick-box"><strong>Workaround:</strong> bila cerita klinis sangat mendukung, perlakukan sebagai syok perdarahan sambil mencari penjelasan lain, bukan sebaliknya.</div>`
            },
            {
                cat: "Lactate Proxy",
                q: "Di fasilitas tingkat 1 tidak ada laktat darah. Tanda klinis sederhana apa yang dapat membantu menilai hipoperfusi perifer berat?",
                a: `<strong>Mottling, akral dingin, dan pemanjangan CRT.</strong><br><br>Ketiga tanda ini tidak menggantikan laktat, tetapi sangat membantu sebagai proksi bedside untuk perfusi mikrosirkulasi yang buruk. Nilainya paling besar bila dinilai sebagai pola dan tren, bukan pemeriksaan tunggal.<ul><li>Lihat bercak marbling atau mottling di lutut dan tungkai.</li><li>Raba suhu akral, bandingkan dengan batang tubuh.</li><li>Ulangi CRT dengan teknik yang sama agar tren dapat dipercaya.</li></ul><div class="trick-box"><strong>Workaround:</strong> dokumentasikan waktu, lokasi, dan perubahan serial agar klinisi penerima rujukan mendapat gambaran evolusi perfusi.</div>`
            },
            {
                cat: "Fluid Challenge",
                q: "Anda melakukan fluid challenge 500 mL tetapi dihabiskan selama 2 jam. Setelah itu tensi tetap rendah. Apakah pasien otomatis non-responder?",
                a: `<strong>Belum tentu.</strong><br><br>Fluid challenge bertujuan menguji apakah tambahan preload cepat memperbaiki hemodinamik. Bila diberikan terlalu lambat, efek bolus tercampur dengan redistribusi cairan dan proses penyakit sehingga uji tersebut menjadi tidak valid.<ul><li>Bolus harus terukur dan diberikan dalam waktu singkat.</li><li>Nilai ulang nadi, tekanan darah, status mental, CRT, dan napas segera sesudahnya.</li><li>Waspadai overload bila pasien punya gagal jantung atau paru basah.</li></ul><div class="trick-box"><strong>Workaround:</strong> gunakan bolus kecil-cepat dengan target evaluasi yang jelas, bukan infus lambat tanpa titik penilaian.</div>`
            },
            {
                cat: "PLR Trap",
                q: "Mengapa passive leg raising yang dilakukan pada pasien setengah duduk tanpa reposisi batang tubuh sering menyesatkan?",
                a: `<strong>Karena manuvernya tidak standar.</strong><br><br>PLR bekerja sebagai autotransfusi sementara dari tungkai dan splanchnic bed. Bila posisi awal dan perubahan posisi tidak benar, volume darah yang kembali ke jantung tidak optimal sehingga hasilnya bias.<ul><li>PLR harus dilakukan konsisten agar interpretasi bisa dipercaya.</li><li>Respons yang dinilai idealnya adalah perubahan perfusi atau hemodinamik yang cepat.</li><li>Manuver ini hanya bermakna bila dievaluasi segera sesudah dilakukan.</li></ul><div class="trick-box"><strong>Workaround:</strong> standarkan teknik di tim: mulai dari semi-recumbent lalu angkat tungkai sambil rebahkan batang tubuh.</div>`
            },
            {
                cat: "Permissive Hypotension",
                q: "Pasien trauma penetrasi abdomen syok mulai membaik setelah cairan pertama, sistolik 85 mmHg. Haruskah dikejar sampai normotensi penuh sebelum rujuk?",
                a: `<strong>Tidak selalu.</strong><br><br>Pada trauma perdarahan tanpa cedera kepala berat, over-resuscitation dapat merusak bekuan yang sedang terbentuk, meningkatkan perdarahan, dan menyebabkan dilusi faktor koagulasi. Tujuan awal sering cukup pada perfusi minimal yang dapat mempertahankan kesadaran dan nadi sentral sambil menuju kontrol perdarahan definitif.<ul><li>Normotensi penuh bukan target universal pada semua trauma perdarahan.</li><li>Konteks cedera kepala, usia, dan komorbid tetap harus dipertimbangkan.</li><li>Prioritas utama tetap kontrol sumber perdarahan dan rujukan cepat.</li></ul><div class="trick-box"><strong>Workaround:</strong> pahami hipotensi permisif sebagai strategi jembatan, bukan alasan menunda tindakan definitif.</div>`
            },
            {
                cat: "Crystalloid Choice",
                q: "Mengapa penggunaan NaCl 0,9% dalam jumlah besar bisa memperburuk keadaan pada pasien syok tertentu?",
                a: `<strong>Karena dapat memicu asidosis metabolik hiperkloremik.</strong><br><br>Beban klorida tinggi dapat mengganggu keseimbangan asam-basa dan berpotensi berdampak buruk pada perfusi ginjal. Pada resusitasi besar, cairan balanced lebih fisiologis bila tersedia, walau pilihan akhir tetap dipengaruhi ketersediaan fasilitas.<ul><li>Masalahnya bukan NaCl 0,9% selalu salah, tetapi volume besar tanpa evaluasi.</li><li>Asidosis tambahan dapat memperumit syok yang sudah berat.</li><li>Pantau klinis dan segera rujuk bila kebutuhan cairan terus meningkat.</li></ul><div class="trick-box"><strong>Workaround:</strong> gunakan cairan yang ada secara bijak, tetapi kenali kapan jumlah besar mulai lebih berisiko daripada bermanfaat.</div>`
            },
            {
                cat: "TXA Window",
                q: "Kapan pemberian traneksamat pada trauma perdarahan paling bermanfaat?",
                a: `<strong>Paling baik dalam 3 jam pertama pascatrauma.</strong><br><br>Manfaat terbesar muncul bila diberikan dini, karena fase hiperfibrinolisis paling relevan terjadi pada awal perjalanan trauma. Setelah lewat jendela waktu tersebut, keuntungan menurun dan pada beberapa konteks justru dapat merugikan.<ul><li>Jam kejadian harus ditanyakan secara spesifik, bukan kira-kira.</li><li>Jangan menunggu pasien tampak sangat buruk bila indikasi sudah kuat.</li><li>Dokumentasikan waktu pemberian untuk tim rujukan.</li></ul><div class="trick-box"><strong>Workaround:</strong> masukkan pertanyaan “jam kejadian berapa?” ke dalam checklist primer trauma.</div>`
            },
            {
                cat: "Pelvic Binder",
                q: "Pada fraktur pelvis open-book, posisi pemasangan binder improvisasi yang paling tepat ada di mana?",
                a: `<strong>Di level trokanter mayor.</strong><br><br>Binder yang dipasang terlalu tinggi di krista iliaka atau pinggang gagal menutup cincin pelvis secara efektif. Tujuannya adalah mengurangi volume pelvis dan membantu tamponade perdarahan.<ul><li>Trokanter mayor adalah landmark kunci.</li><li>Sprei tebal dapat dipakai bila binder komersial tidak tersedia.</li><li>Pastikan cukup ketat, tetapi tidak longgar atau terlalu kranial.</li></ul><div class="trick-box"><strong>Workaround:</strong> sebelum mengikat, sentuh dua trokanter terlebih dulu agar pemasangan improvisasi tetap anatomi.</div>`
            },
            {
                cat: "Chest Bleeding",
                q: "Trauma dada dengan bunyi napas menurun dan perkusi redup pada satu sisi lebih mengarah ke kondisi apa?",
                a: `<strong>Hemotoraks.</strong><br><br>Perkusi redup lebih konsisten dengan cairan atau darah dibanding udara. Ini penting agar tidak semua gangguan napas traumatik dengan syok otomatis dianggap tension pneumothorax.<ul><li>Bunyi napas menurun saja tidak cukup; perkusi memberi arah penting.</li><li>Hemotoraks dapat berkontribusi pada hipovolemia dan gangguan ventilasi sekaligus.</li><li>Korelasikan dengan mekanisme trauma dan deviasi trakea bila ada.</li></ul><div class="trick-box"><strong>Workaround:</strong> jangan lompat ke satu diagnosis hanya dari auskultasi; gabungkan inspeksi, perkusi, dan palpasi.</div>`
            },
            {
                cat: "Tension Pneumothorax",
                q: "Kapan Anda harus sangat curiga tension pneumothorax pada pasien syok?",
                a: `<strong>Saat ada distres napas, hipotensi, bunyi napas unilateral menurun, dan perkusi hipersonor dengan tanda obstruktif.</strong><br><br>Masalah utamanya adalah peningkatan tekanan intratoraks yang menurunkan venous return, bukan kehilangan darah primer. Kondisi ini bisa membunuh sangat cepat bila pengenalan tertunda.<ul><li>Hipersonor mengarah ke udara, bukan cairan.</li><li>Pasien dapat memburuk mendadak setelah ventilasi tekanan positif.</li><li>Pada gambaran klasik, tindakan dekompresi bersifat emergensi.</li></ul><div class="trick-box"><strong>Workaround:</strong> jika klinis sangat khas, jangan menunggu foto toraks sebelum melakukan tindakan penyelamatan nyawa.</div>`
            },
            {
                cat: "Obstructive Shock",
                q: "Apa ciri berpikir utama untuk membedakan syok obstruktif dari syok hipovolemik?",
                a: `<strong>Pada syok obstruktif, darah ada tetapi alirannya terhambat.</strong><br><br>Tamponade, tension pneumothorax, dan emboli paru masif merupakan contoh klasik. Pasien dapat tampak sangat kolaps walau perdarahan eksternal tidak terlihat banyak.<ul><li>Pikirkan hambatan mekanis pada pengisian atau pengosongan jantung.</li><li>Cairan saja sering tidak menyelesaikan akar masalah.</li><li>Pemeriksaan fisik terarah bisa memberi petunjuk cepat.</li></ul><div class="trick-box"><strong>Workaround:</strong> saat cairan tidak masuk akal menjelaskan semuanya, cari sumbatan mekanis yang dapat dibalik.</div>`
            },
            {
                cat: "Sepsis Hidden",
                q: "Mengapa lansia dengan infeksi berat bisa tampak tanpa demam tetapi tetap mengalami syok sepsis?",
                a: `<strong>Karena respons inflamasi lansia dapat tumpul.</strong><br><br>Tidak adanya demam sama sekali tidak menyingkirkan infeksi berat pada usia lanjut. Delirium, takipnea, penurunan intake, oliguria, dan kemunduran fungsional sering lebih bermakna daripada suhu tubuh semata.<ul><li>Lansia dapat datang hanya dengan bingung atau lemah mendadak.</li><li>Takipnea sering merupakan petunjuk paling awal.</li><li>Sepsis harus dipikirkan meski suhu normal atau rendah.</li></ul><div class="trick-box"><strong>Workaround:</strong> ubah mindset dari “ada demam atau tidak” menjadi “ada perubahan fisiologi yang tidak wajar atau tidak”.</div>`
            },
            {
                cat: "Sepsis Bundle",
                q: "Apa prioritas awal paling penting pada syok sepsis di layanan awal?",
                a: `<strong>Resusitasi cairan terukur, kultur bila memungkinkan tanpa menunda, dan antibiotik dini.</strong><br><br>Pada sepsis, waktu benar-benar menentukan. Keterlambatan antibiotik adekuat memperbesar risiko kegagalan organ dan mortalitas, sementara resusitasi tanpa antibiotik tidak menyelesaikan sumber inflamasi infeksius.<ul><li>Mulai dari ABC, akses IV, dan perfusi.</li><li>Kultur boleh diupayakan bila tidak menunda terapi bermakna.</li><li>Identifikasi sumber infeksi sejak awal untuk memperbaiki pilihan terapi.</li></ul><div class="trick-box"><strong>Workaround:</strong> bila kecurigaan klinis sangat kuat, jangan menunggu panel lengkap sebelum memulai antibiotik.</div>`
            },
            {
                cat: "CHF + Sepsis",
                q: "Bagaimana prinsip pemberian cairan pada pasien sepsis yang juga punya gagal jantung berat?",
                a: `<strong>Berikan bolus kecil bertahap dengan re-evaluasi ketat.</strong><br><br>Pasien seperti ini tetap dapat mengalami hipovolemia relatif dan tetap memerlukan cairan, tetapi toleransi terhadap kelebihan cairan jauh lebih sempit. Strategi yang aman adalah micro-fluid challenge dengan pemantauan paru dan perfusi yang sering.<ul><li>Nilai ulang sesak, ronki, saturasi, dan kerja napas.</li><li>Perhatikan apakah tekanan dan kesadaran membaik tanpa kongesti bertambah.</li><li>Hindari “guyur standar” tanpa pemikiran individual.</li></ul><div class="trick-box"><strong>Workaround:</strong> berikan sedikit, nilai cepat, lalu putuskan lagi; jangan menganggap semua sepsis butuh skema cairan yang sama.</div>`
            },
            {
                cat: "Anaphylaxis",
                q: "Pada syok anafilaksis, rute epinefrin awal yang paling aman di fasilitas awal adalah apa?",
                a: `<strong>Intramuskular di paha anterolateral.</strong><br><br>Rute IM memberi onset cepat dengan margin keamanan yang lebih baik dibanding bolus IV ampul pekat tanpa pengenceran dan monitor memadai. Kesalahan paling berbahaya adalah panik lalu menyuntikkan epinefrin pekat langsung ke vena tanpa perhitungan benar.<ul><li>Epinefrin adalah terapi utama, bukan antihistamin.</li><li>Tanda kulit dapat tidak dominan pada anafilaksis berat.</li><li>Airway dan bronkospasme harus dipantau paralel.</li></ul><div class="trick-box"><strong>Workaround:</strong> buat protokol dosis IM yang tertempel di area emergensi agar tim tidak ragu saat kondisi genting.</div>`
            },
            {

                q: "Bagaimana suhu tubuh membantu membaca tipe syok tanpa membuat Anda terjebak over-interpretation?",
                a: `<strong>Suhu memberi petunjuk konteks, bukan diagnosis tunggal.</strong><br><br>Demam dapat mendukung sepsis, hipotermia dapat muncul pada syok berat atau pajanan lingkungan, dan suhu normal tidak menyingkirkan keduanya. Nilai suhu harus dibaca bersama perfusi perifer, riwayat pajanan, serta tanda infeksi atau trauma lain.<ul><li>Hipotermia memperburuk koagulopati pada trauma.</li><li>Lansia sepsis dapat tanpa demam.</li><li>Suhu perifer dan suhu inti bisa berbeda maknanya.</li></ul><div class="trick-box"><strong>Workaround:</strong> gunakan suhu untuk memperkaya pola klinis, bukan untuk menutup diagnosis lain terlalu cepat.</div>`
            },
            {
                cat: "Transfer Timing",
                q: "Kapan keputusan rujuk pada pasien syok justru menjadi terlambat walau terapi awal sudah dimulai?",
                a: `<strong>Saat stabilisasi awal berubah menjadi alasan menunda transfer definitif.</strong><br><br>Resusitasi di FKTP bertujuan membeli waktu dan memperbaiki peluang transport, bukan menggantikan source control atau perawatan intensif yang tidak tersedia. Begitu kebutuhan pasien melampaui kemampuan fasilitas, rujukan harus dipercepat sambil terapi berjalan.<ul><li>Jangan menunggu semua parameter menjadi normal sebelum merujuk.</li><li>Koordinasi transport dan penerima harus dilakukan dini.</li><li>Terapi awal tetap diteruskan selama proses transfer.</li></ul><div class="trick-box"><strong>Workaround:</strong> putuskan rujukan berdasarkan kebutuhan definitif pasien, bukan berdasarkan rasa “belum puas” karena monitor belum sempurna.</div>`
            },
            {
                cat: "Hemorrhagic Priorities",
                q: "Pada syok perdarahan, apa prioritas selain cairan?",
                a: `<strong>Kontrol sumber perdarahan.</strong><br><br>Cairan tanpa kontrol sumber hanya membeli waktu singkat dan kadang memperburuk koagulopati atau melepas bekuan. Perdarahan aktif harus dihentikan, dikurangi, atau dikompresi secepat mungkin.<ul><li>Tekanan langsung, tourniquet, binder pelvis, dan imobilisasi punya tempatnya.</li><li>Komunikasi rujukan dini sangat penting.</li><li>Tiap menit tanpa source control memperburuk peluang.</li></ul><div class="trick-box"><strong>Workaround:</strong> saat menyiapkan cairan, pikirkan secara paralel: dari mana darah keluar dan apa yang bisa saya lakukan sekarang terhadap sumber itu?</div>`
            },
            {

                q: "Mengapa komunikasi rujukan yang buruk bisa memperparah outcome syok?",

            {

                q: "Kalimat prinsip apa yang paling penting diingat saat menangani tatalaksana shock di FKTP?",
                a: `<strong>Kenali lebih cepat, resusitasi secukupnya tetapi tepat sasaran, dan jangan terlambat mencari sumber serta merujuk.</strong><br><br>Di FKTP, keberhasilan sering bukan karena tindakan paling canggih, melainkan karena diagnosis tidak terlewat, intervensi awal tidak salah arah, dan transfer dilakukan pada waktu yang tepat. Shock harus diurai sebagai sindrom: jenisnya apa, sumbernya di mana, dan intervensi mana yang membantu atau justru berbahaya.<ul><li>Kecepatan mengenali sering lebih penting daripada kelengkapan data awal.</li><li>Tatalaksana harus paralel: stabilisasi, identifikasi sebab, dan komunikasi.</li><li>Tujuan FKTP adalah menyelamatkan waktu dan mencegah kerusakan tambahan.</li></ul><div class="trick-box"><strong>Workaround:</strong> ulangi tiga pertanyaan ini pada setiap pasien: “jenis syoknya apa, sumbernya di mana, dan apa tindakan yang paling aman sekarang?”</div>`

        let cards = [...originalCards];
        let currentIndex = 0;
        let isFlipped = false;
        
        let touchStartX = 0;
        let touchEndX = 0;
        let touchStartY = 0;
        let isSwiping = false;
        let isScrolling = false;

        const flashcardEl = document.getElementById('flashcard');
        const questionEl = document.getElementById('question-text');
        const answerEl = document.getElementById('answer-text');
        const counterEl = document.getElementById('card-counter');
        const categoryEl = document.getElementById('card-category');

        function renderCard() {
            if (isFlipped) {
                flashcardEl.classList.remove('is-flipped');
                isFlipped = false;
                setTimeout(() => {
                    updateContent();
                }, 400); // Wait for flip animation
            } else {
                updateContent();
            }
        }

        function updateContent() {
            const currentCard = cards[currentIndex];
            questionEl.innerHTML = currentCard.q;
            answerEl.innerHTML = currentCard.a;
            categoryEl.textContent = currentCard.cat;
            counterEl.textContent = `${currentIndex + 1} / ${cards.length}`;
            
            // Reset scroll positions
            const answerContainer = document.querySelector('#answer-text').parentElement;
            const questionContainer = document.querySelector('#question-text').parentElement;
            if(answerContainer) answerContainer.scrollTop = 0;
            if(questionContainer) questionContainer.scrollTop = 0;
        }

        function toggleFlip(e) {
            if (isSwiping) return;
            const selection = window.getSelection();
            if (selection.toString().length > 0) return; // Allow text selection
            
            isFlipped = !isFlipped;
            flashcardEl.classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0;
            }
            renderCard();
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = cards.length - 1; 
            }
            renderCard();
        }

        function shuffleCards() {
            // Fisher-Yates Shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            renderCard();
        }

        flashcardEl.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            isSwiping = false;
            isScrolling = false;
        }, {passive: true});

        flashcardEl.addEventListener('touchmove', e => {
            if (isScrolling) return;

            const currentTouchX = e.changedTouches[0].screenX;
            const currentTouchY = e.changedTouches[0].screenY;
            
            const diffX = Math.abs(currentTouchX - touchStartX);
            const diffY = Math.abs(currentTouchY - touchStartY);

            // Cancel swipe if scrolling vertically mostly
            if (diffY > diffX && diffY > 15) {
                isScrolling = true;
                isSwiping = false;
                return;
            }

            if (diffX > 20) {
                isSwiping = true;
            }
        }, {passive: true});

        flashcardEl.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (isSwiping && !isScrolling) {
                handleSwipe();
            }
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 60; 
            if (touchEndX < touchStartX - swipeThreshold) {
                nextCard(); // Swipe left -> Next
            } else if (touchEndX > touchStartX + swipeThreshold) {
                prevCard(); // Swipe right -> Prev
            }
            setTimeout(() => { isSwiping = false; }, 150);
        }

        // Initialize first card
        window.onload = renderCard;

        // Keyboard accessibility
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault(); 
                toggleFlip();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            }
        });
    </script>
