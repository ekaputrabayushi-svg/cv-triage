    <script>
        const learnerData = [
            { id: 1, topic: "General Principle", urgency: "Must Know", badgeClass: "badge-blue", q: "Bagaimana hubungan antara gangguan mental dan penyakit kardiovaskular (CVD) menurut ESC 2025?", a: "Hubungan bersifat bi-direksional (dua arah).", pearl: "Gangguan mental meningkatkan risiko CVD, dan menderita CVD meningkatkan risiko gangguan mental.", rationale: "Pasien dengan gangguan mental memiliki risiko lebih tinggi terkena PJK dan stroke. Sebaliknya, diagnosa penyakit jantung sering memicu depresi, ansietas, dan PTSD yang memperburuk prognosis." },
            { id: 2, topic: "Screening", urgency: "Essential", badgeClass: "badge-green", q: "Alat skrining apa yang direkomendasikan untuk depresi pada pasien CVD?", a: "Patient Health Questionnaire (PHQ-2) diikuti PHQ-9 jika positif.", pearl: "PHQ-2 adalah 'pembuka jalan' yang cepat untuk praktek sehari-hari.", rationale: "PHQ-2 menanyakan tentang minat dan mood dalam 2 minggu terakhir. Jika salah satu positif, PHQ-9 digunakan untuk menilai keparahan depresi." },
            { id: 3, topic: "Screening", urgency: "Essential", badgeClass: "badge-green", q: "Bagaimana cara melakukan skrining ansietas pada pasien jantung?", a: "Menggunakan GAD-2 (Generalized Anxiety Disorder) scale.", pearl: "GAD-2 sangat sensitif untuk mendeteksi rasa cemas yang mengganggu.", rationale: "Ansietas sering muncul sebagai gejala fisik (palpitasi, nyeri dada) yang menyerupai gejala jantung, sehingga skrining ini membantu membedakan penyebab organ vs psikis." },
            { id: 4, topic: "Pathophysiology", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Apa mekanisme biologis utama yang menghubungkan stres mental dengan kejadian jantung?", a: "Aktivasi aksis HPA, sistem saraf simpatis, dan inflamasi sistemik.", pearl: "Stres kronis menyebabkan disfungsi endotel dan hiperkoagulabilitas.", rationale: "Stres meningkatkan kadar kortisol dan katekolamin, yang memicu takikardia, hipertensi, dan aktivasi makrofag yang mempercepat aterosklerosis." },
            { id: 5, topic: "Depression", urgency: "Must Know", badgeClass: "badge-blue", q: "Apakah SSRI (Selective Serotonin Reuptake Inhibitors) aman untuk pasien PJK?", a: "Ya, Sertraline dan Escitalopram adalah pilihan utama.", pearl: "Sertraline memiliki bukti keamanan terbaik pasca-ACS (Studi SADHART).", rationale: "SSRI umumnya aman dan bahkan mungkin memiliki efek antiplatelet ringan. Hindari Citalopram dosis tinggi karena risiko pemanjangan interval QT." },
            { id: 6, topic: "Red Flag", urgency: "High Alert", badgeClass: "badge-red", q: "Obat antidepresan apa yang harus DIHINDARI pada pasien dengan riwayat penyakit jantung berat?", a: "Antidepresan Trisiklik (TCA).", pearl: "TCA bersifat pro-aritmogenik.", rationale: "TCA memiliki efek samping kardiovaskular yang signifikan, termasuk hipotensi ortostatik, takikardia, dan gangguan konduksi (mirip efek kuinidin) yang dapat memicu aritmia fatal." },
            { id: 7, topic: "Stress", urgency: "Emergency", badgeClass: "badge-red", q: "Apa fenomena kardiak akut yang sering dipicu oleh stres emosional hebat?", a: "Takotsubo Syndrome (Stress-induced cardiomyopathy).", pearl: "Sering menyerupai STEMI tetapi dengan koroner yang normal.", rationale: "Lonjakan katekolamin yang masif menyebabkan 'stunning' pada miokardium apikal, menghasilkan gambaran balon (apical ballooning) pada ventrikulografi." },
            { id: 8, topic: "Intervention", urgency: "Essential", badgeClass: "badge-green", q: "Apa model perawatan yang dianggap paling efektif untuk pasien dengan komorbiditas jantung dan mental?", a: "Collaborative Care Model (CCM).", pearl: "Integrasi antara kardiolog, psikiater, dan perawat khusus.", rationale: "CCM terbukti meningkatkan kepatuhan pengobatan, kualitas hidup, dan menurunkan angka re-hospitalisasi dibandingkan perawatan standar yang terfragmentasi." },
            { id: 9, topic: "Sleep Disorder", urgency: "Must Know", badgeClass: "badge-blue", q: "Bagaimana pengaruh insomnia terhadap risiko kardiovaskular?", a: "Meningkatkan risiko hipertensi, obesitas, dan diabetes.", pearl: "Kurang tidur mengganggu regulasi glukosa dan nafsu makan.", rationale: "Insomnia meningkatkan aktivitas simpatis nokturnal, yang mencegah penurunan tekanan darah secara fisiologis di malam hari (non-dipping), faktor risiko kuat untuk stroke." },
            { id: 10, topic: "Psychosocial", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa yang dimaksud dengan Kepribadian Tipe D (Distressed Personality)?", a: "Kombinasi antara afektivitas negatif dan inhibisi sosial.", pearl: "Tipe D adalah prediktor independen prognosis buruk pada PJK.", rationale: "Individu dengan tipe D cenderung mengalami tingkat stres yang lebih tinggi namun enggan mencari bantuan sosial atau medis, yang memperburuk luaran klinis." },
            { id: 11, topic: "Treatment", urgency: "Class I", badgeClass: "badge-green", q: "Intervensi non-farmakologis apa yang sangat disarankan untuk kecemasan ringan pada pasien CVD?", a: "Cognitive Behavioral Therapy (CBT) dan latihan fisik rutin.", pearl: "Latihan fisik (Exercise) memiliki efek antidepresan dan anksiolitik.", rationale: "CBT membantu pasien merestrukturisasi pikiran negatif terkait penyakitnya, sementara olahraga memperbaiki tonus vagal dan menurunkan tingkat kecemasan." },
            { id: 12, topic: "Treatment", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Bagaimana pengaruh Beta-blocker terhadap gejala depresi?", a: "Secara umum tidak meningkatkan risiko depresi secara signifikan.", pearl: "Hanya Beta-blocker lipofilik (seperti Propranolol) yang lebih sering terkait mimpi buruk.", rationale: "Meta-analisis terbaru menunjukkan bahwa Beta-blocker (Bisoprolol/Metoprolol) aman digunakan dan tidak menyebabkan depresi pada mayoritas pasien jantung." },
            { id: 13, topic: "Red Flag", urgency: "High Alert", badgeClass: "badge-red", q: "Tanda bahaya apa yang harus diwaspadai kardiolog saat meresepkan antipsikotik?", a: "Pemanjangan interval QT (Risiko Torsades de Pointes).", pearl: "Wajib cek EKG berkala, terutama jika kombinasi obat.", rationale: "Banyak antipsikotik (seperti Haloperidol, Quetiapine) memperpanjang fase repolarisasi. Risiko meningkat jika pasien mengalami hipokalemia atau menggunakan diuretik." },
            { id: 14, topic: "Rehabilitation", urgency: "Essential", badgeClass: "badge-green", q: "Mengapa rehabilitasi kardiak (CR) penting bagi kesehatan mental?", a: "CR menurunkan depresi sebesar 20-30% melalui interaksi sosial dan olahraga.", pearl: "CR adalah 'multi-pill' bagi jantung dan pikiran.", rationale: "Program rehabilitasi yang komprehensif mencakup edukasi, dukungan psikososial, dan latihan fisik yang terstruktur, yang semuanya merupakan komponen kunci pemulihan mental." },
            { id: 15, topic: "Prevention", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa peran 'Health Literacy' dalam hubungan mental-jantung?", a: "Literasi yang buruk meningkatkan kecemasan dan menurunkan kepatuhan.", pearl: "Komunikasi dokter-pasien yang empati adalah terapi.", rationale: "Pasien yang tidak memahami kondisinya sering merasa tidak berdaya (learned helplessness), yang memicu depresi dan pengabaian terhadap gaya hidup sehat." },
            { id: 16, topic: "Pharmacology", urgency: "Red Flag", badgeClass: "badge-red", q: "Apa interaksi obat yang berbahaya antara SSRI dan Antiplatelet (DAPT)?", a: "Meningkatkan risiko perdarahan gastrointestinal (GI bleeding).", pearl: "Pertimbangkan pemberian Proton Pump Inhibitor (PPI) jika pasien wajib mendapat SSRI + DAPT.", rationale: "SSRI menghambat reuptake serotonin ke dalam platelet, yang melemahkan kemampuan agregasi platelet. Kombinasi dengan Aspirin/Clopidogrel melipatgandakan risiko perdarahan." },
            { id: 17, topic: "Pharmacology", urgency: "Red Flag", badgeClass: "badge-red", q: "Apa peringatan khusus FDA untuk antidepresan Citalopram pada pasien kardiak?", a: "Dosis maksimal dibatasi 20 mg/hari untuk pasien >60 tahun.", pearl: "Citalopram dosis tinggi menyebabkan prolongasi interval QTc.", rationale: "Memperpanjang repolarisasi ventrikel berisiko memicu Torsades de Pointes. Escitalopram atau Sertraline memiliki profil keamanan QTc yang lebih baik." },
            { id: 18, topic: "Pharmacology", urgency: "High Alert", badgeClass: "badge-red", q: "Mengapa Antidepresan Trisiklik (TCA) sangat dilarang untuk pasien penderita Penyakit Jantung Koroner (PJK)?", a: "TCA memiliki efek pro-aritmogenik dan memicu hipotensi ortostatik.", pearl: "TCA bekerja mirip antiaritmia Kelas 1A (memblok kanal natrium).", rationale: "TCA dapat memperlambat konduksi intraventrikular (memperlebar QRS) dan menurunkan tekanan darah, yang sangat berbahaya pada miokardium yang iskemik." },
            { id: 19, topic: "Pharmacology", urgency: "Must Know", badgeClass: "badge-blue", q: "Antidepresan jenis SNRI (Venlafaxine) memiliki efek samping kardiak apa yang harus dimonitor?", a: "Hipertensi yang bergantung pada dosis (Dose-dependent hypertension).", pearl: "SNRI menaikkan norepinefrin, sehingga tekanan darah wajib dipantau.", rationale: "Peningkatan aktivitas noradrenergik perifer dapat memicu vasokonstriksi dan resistensi vaskular, memperburuk kontrol hipertensi pada pasien kardiak." },
            { id: 20, topic: "Pharmacology", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Apa antidepresan alternatif yang paling aman bagi disfungsi seksual dan kardiometabolik pasien?", a: "Agomelatine atau Bupropion.", pearl: "Bupropion juga membantu penghentian merokok, tapi waspadai sedikit kenaikan TD.", rationale: "Agomelatine bekerja pada reseptor melatonin tanpa efek seksual atau penambahan berat badan, namun memerlukan monitoring fungsi hati (LFT)." },
            { id: 21, topic: "SMI & Antipsychotics", urgency: "Essential", badgeClass: "badge-green", q: "Berapa besar penurunan usia harapan hidup pada penderita Severe Mental Illness (Skizofrenia/Bipolar)?", a: "Berkurang sekitar 10 hingga 20 tahun dibandingkan populasi umum.", pearl: "Penyebab kematian utama BUKAN bunuh diri, melainkan Penyakit Kardiovaskular (CVD).", rationale: "Kombinasi gaya hidup buruk, merokok, tingkat pengabaian medis, dan efek samping kardiometabolik obat antipsikotik memicu aterosklerosis dini." },
            { id: 22, topic: "SMI & Antipsychotics", urgency: "High Alert", badgeClass: "badge-red", q: "Dua antipsikotik atipikal mana yang memiliki risiko paling buruk terhadap sindrom metabolik (obesitas/DM)?", a: "Clozapine dan Olanzapine.", pearl: "Keduanya sangat efektif untuk psikiatri, tapi sangat 'toksik' untuk metabolisme.", rationale: "Obat ini menyebabkan penambahan berat badan masif, resistensi insulin, dan dislipidemia sekunder, secara dramatis mempercepat risiko PJK." },
            { id: 23, topic: "SMI & Antipsychotics", urgency: "Class I", badgeClass: "badge-green", q: "Sebutkan antipsikotik yang lebih 'ramah kardiometabolik' untuk pasien jantung!", a: "Aripiprazole, Lurasidone, dan Ziprasidone.", pearl: "Selalu konsultasikan dengan psikiater untuk mengalihkan (switch) obat jika pasien mengalami obesitas sentral.", rationale: "Golongan ini memiliki profil lipid dan glikemik yang jauh lebih netral, menurunkan progresi plak aterosklerotik." },
            { id: 24, topic: "SMI & Antipsychotics", urgency: "Red Flag", badgeClass: "badge-red", q: "Komplikasi kardiak fatal apa yang unik terjadi pada awal penggunaan Clozapine?", a: "Miokarditis akut dan Kardiomiopati.", pearl: "Paling sering terjadi dalam 1-2 bulan pertama inisiasi terapi.", rationale: "Clozapine dapat memicu reaksi inflamasi miokard eosinofilik. Jika pasien skizofrenia mendadak demam, takikardia, dan troponin naik pasca inisiasi, curigai miokarditis." },
            { id: 25, topic: "SMI & Antipsychotics", urgency: "Red Flag", badgeClass: "badge-red", q: "Apa risiko aritmia spesifik dari penggunaan Haloperidol IV dosis tinggi di ICU?", a: "Torsades de Pointes (Polymorphic VT).", pearl: "Pemberian IV memicu prolongasi QT lebih drastis dibanding per oral.", rationale: "Haloperidol menghambat saluran kalium hERG di jantung, memperpanjang fase repolarisasi. Pasien dengan hipokalemia atau kelainan struktur jantung sangat rentan." },
            { id: 26, topic: "SMI & Antipsychotics", urgency: "High Alert", badgeClass: "badge-red", q: "Obat mood-stabilizer Lithium memiliki efek samping kardiak apa pada orang dewasa?", a: "Sinus Node Dysfunction (Bradikardia / Sinus Arrest).", pearl: "Perubahan EKG menyerupai hiperkalemia, sering reversibel setelah dosis diturunkan.", rationale: "Lithium dapat mengganggu kanal natrium dan kalsium di nodus sinoatrial, memicu bradikardia asimtomatik hingga sinkop pada toksisitas." },
            { id: 27, topic: "SMI & Antipsychotics", urgency: "Must Know", badgeClass: "badge-blue", q: "Bagaimana pasien Skizofrenia merespons nyeri iskemik (angina)?", a: "Mereka sering memiliki ambang nyeri yang lebih tinggi (high pain tolerance).", pearl: "Silent Myocardial Infarction jauh lebih sering terjadi pada Skizofrenia.", rationale: "Disfungsi persepsi nyeri akibat patologi skizofrenia atau efek antipsikotik menutupi presentasi klasik STEMI, menyebabkan keterlambatan mematikan ke IGD." },
            { id: 28, topic: "Stress & Trauma", urgency: "Must Know", badgeClass: "badge-blue", q: "Seberapa sering Post-Traumatic Stress Disorder (PTSD) terjadi pasca-serangan jantung (ACS)?", a: "Sekitar 12-15% pasien mengalami PTSD pasca-ACS.", pearl: "Menyaksikan diri sendiri 'hampir mati' adalah trauma masif.", rationale: "PTSD pasca-ACS memicu hiperarousal simpatis konstan, yang melipatgandakan risiko infark berulang dan kematian." },
            { id: 29, topic: "Stress & Trauma", urgency: "Essential", badgeClass: "badge-green", q: "Pasien pengguna perangkat ICD (Defibrilator) rentan mengalami gangguan apa?", a: "Ansietas antisipatorik parah dan PTSD akibat syok listrik.", pearl: "Syok yang tidak tepat (inappropriate shock) lebih memicu trauma psikis.", rationale: "Ketakutan kapan alat akan meledak/menyengat membatasi aktivitas fisik pasien (kinesiophobia), menurunkan kualitas hidup secara drastis." },
            { id: 30, topic: "Stress & Trauma", urgency: "Red Flag", badgeClass: "badge-red", q: "Apa pemicu klasik Takotsubo Syndrome (Stress Cardiomyopathy)?", a: "Stres emosional akut (berkabung, marah) atau stres fisik masif.", pearl: "Lebih dari 90% terjadi pada wanita pasca-menopause.", rationale: "Lonjakan masif hormon katekolamin meracuni miokardium secara langsung, menyebabkan disfungsi balon apikal (apical ballooning) tanpa oklusi arteri koroner." },
            { id: 31, topic: "Stress & Trauma", urgency: "Must Know", badgeClass: "badge-blue", q: "Terapi spesifik apa yang direkomendasikan untuk PTSD kardiak?", a: "Trauma-focused CBT dan EMDR (Eye Movement Desensitization and Reprocessing).", pearl: "Jangan biarkan memori traumatik serangan jantung mengontrol hidup pasien.", rationale: "EMDR terbukti sangat efektif memproses ulang memori traumatik ruang resusitasi/ICU sehingga tidak lagi memicu respons simpatis." },
            { id: 32, topic: "Anxiety", urgency: "Must Know", badgeClass: "badge-blue", q: "Bagaimana cara membedakan Serangan Panik (Panic Attack) dan Sindrom Koroner Akut (ACS)?", a: "Keduanya identik. ACS harus di-Eksklusi dengan EKG & Troponin.", pearl: "Jangan diagnosis 'Serangan Panik' sebelum menyingkirkan serangan jantung.", rationale: "Misdiagnosis mematikan sering terjadi. Selalu pastikan organ jantung aman (Rule-out MI) sebelum merujuk keluhan somatik ke psikiater." },
            { id: 33, topic: "Anxiety", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Apakah obat Beta-Blocker menyebabkan Depresi Klinis?", a: "Tidak. Mitos ini telah dibantah oleh studi meta-analisis berskala besar.", pearl: "Beta-blocker lipofilik (Propranolol) bisa memicu mimpi buruk, tapi BUKAN depresi.", rationale: "Banyak klinisi ragu memberikan BB karena takut depresi. Panduan ESC menegaskan bahwa BB terbukti netral terhadap suasana hati pada populasi gagal jantung/ACS." },
            { id: 34, topic: "Anxiety", urgency: "Class I", badgeClass: "badge-green", q: "Terapi lini pertama untuk Generalized Anxiety Disorder (GAD) pada pasien jantung?", a: "Cognitive Behavioral Therapy (CBT) dan SSRI.", pearl: "Benzodiazepin (Alprazolam) hanya untuk jangka sangat pendek (<2-4 minggu).", rationale: "Benzodiazepin menyebabkan toleransi dan adiksi. CBT memperbaiki akar distorsi kognitif kecemasan jantung untuk jangka panjang." },
            { id: 35, topic: "Pathophysiology", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Bagaimana mekanisme HPA Axis memperburuk CVD?", a: "Stres kronis memicu hipersekresi Kortisol terus-menerus.", pearl: "Kortisol tinggi memicu obesitas sentral dan resistensi insulin.", rationale: "Disregulasi HPA axis merusak ritme sirkadian metabolisme, memicu sindrom metabolik yang mempercepat aterosklerosis." },
            { id: 36, topic: "Pathophysiology", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Apa marker utama disfungsi otonom akibat stres mental kronis?", a: "Penurunan Heart Rate Variability (HRV).", pearl: "HRV yang rendah = Tonus simpatis tinggi, vagal rendah.", rationale: "Jantung yang sehat memiliki variabilitas denyut yang dinamis mengikuti pernapasan. HRV rendah memprediksi kematian mendadak (SCD) pasca infark." },
            { id: 37, topic: "Pathophysiology", urgency: "Must Know", badgeClass: "badge-blue", q: "Hubungan depresi dan sistem imunitas pada penyakit koroner?", a: "Depresi meningkatkan penanda inflamasi sistemik (CRP, IL-6).", pearl: "Inflamasi ini mengganggu stabilitas plak koroner (rentan ruptur).", rationale: "Respons inflamasi menyebabkan 'sickness behavior' (lelah, anhedonia) yang identik dengan depresi klinis, memicu lingkaran setan kardiometabolik." },
            { id: 38, topic: "Pathophysiology", urgency: "Essential", badgeClass: "badge-green", q: "Bagaimana stres mental sesaat memicu iskemik miokard?", a: "Stres memicu vasokonstriksi mikrovaskular dan agregasi platelet.", pearl: "Mental stress-induced myocardial ischemia (MSIMI) sering tidak bergejala (silent).", rationale: "Berbeda dengan iskemik akibat olahraga, MSIMI dipicu penyempitan pembuluh darah tepi (endothelial dysfunction) akibat lonjakan adrenalin." },
            { id: 39, topic: "Behavior & Lifestyle", urgency: "Must Know", badgeClass: "badge-blue", q: "Mekanisme perilaku apa yang paling menjelaskan kematian pasien depresi dengan CVD?", a: "Ketidakpatuhan pengobatan (non-adherence) dan gaya hidup sedenter.", pearl: "Depresi menyedot energi motivasi dasar pasien.", rationale: "Pasien depresi sering berhenti minum statin/aspirin, kembali merokok, dan menolak olahraga, yang secara langsung merusak prognosis medis mereka." },
            { id: 40, topic: "Behavior & Lifestyle", urgency: "Class I", badgeClass: "badge-green", q: "Obat penghentian merokok apa yang terbukti aman bagi pasien CVD dan mental?", a: "Varenicline dan Bupropion.", pearl: "FDA telah mencabut 'Black Box Warning' psikiatri untuk Varenicline.", rationale: "Berhenti merokok adalah intervensi paling poten. Varenicline terbukti aman untuk jantung dan tidak meningkatkan risiko bunuh diri secara bermakna." },
            { id: 41, topic: "Behavior & Lifestyle", urgency: "Red Flag", badgeClass: "badge-red", q: "Apakah penggunaan Rokok Elektrik (Vape) aman untuk penderita kardiovaskular?", a: "Tidak. Nikotin tetap memicu lonjakan simpatis dan disfungsi endotel.", pearl: "Vape BUKAN alternatif jangka panjang yang aman untuk jantung.", rationale: "Aerosol vape mengandung radikal bebas dan senyawa toksik yang memicu kaku pembuluh darah dan pro-trombosis." },
            { id: 42, topic: "Behavior & Lifestyle", urgency: "High Alert", badgeClass: "badge-red", q: "Apa dampak penggunaan Kokain pada sistem kardiovaskular?", a: "Spasme koroner parah, krisis hipertensi, dan diseksi aorta.", pearl: "Kokain memblokir reuptake norepinefrin = badai adrenergik lokal.", rationale: "Pasien psikiatri rentan terhadap penyalahgunaan zat. Nyeri dada pasca-kokain adalah kegawatdaruratan medis (waspadai STEMI akibat vasospasme)." },
            { id: 43, topic: "Sleep", urgency: "Must Know", badgeClass: "badge-blue", q: "Berapa durasi tidur optimal untuk mencegah penyakit kardiovaskular?", a: "7 hingga 8 jam per malam.", pearl: "Risiko CVD berbentuk kurva U (<6 jam atau >9 jam sama-sama buruk).", rationale: "Tidur terlalu singkat memicu inflamasi dan hipertensi; tidur terlalu lama sering kali merupakan penanda adanya komorbiditas tersembunyi (depresi/sleep apnea)." },
            { id: 44, topic: "Sleep", urgency: "Essential", badgeClass: "badge-green", q: "Patofisiologi Obstructive Sleep Apnea (OSA) dalam merusak jantung?", a: "Hipoksia intermiten malam hari memicu lonjakan simpatis ekstrem.", pearl: "OSA adalah penyebab paling sering dari Hipertensi Resisten.", rationale: "Setiap pasien henti napas, otak melepaskan adrenalin untuk membangunkan tubuh. Hal ini merusak profil penurunan tekanan darah malam hari (non-dipping BP)." },
            { id: 45, topic: "Sleep", urgency: "Must Know", badgeClass: "badge-blue", q: "Kuesioner sederhana apa yang digunakan untuk skrining OSA di poli klinik?", a: "STOP-BANG Questionnaire.", pearl: "Sangat sensitif untuk menangkap OSA sedang-berat.", rationale: "Menilai Snoring, Tiredness, Observed apnea, Pressure (BP), BMI, Age, Neck size, Gender. Alat praktis bagi kardiolog sebelum merujuk ke sleep study." },
            { id: 46, topic: "Sleep", urgency: "Class IIa", badgeClass: "badge-amber", q: "Apakah CPAP mengurangi mortalitas kardiovaskular secara langsung pada OSA?", a: "Studi RCT belum membuktikan penurunan kematian sebagai secondary prevention.", pearl: "Namun CPAP sangat superior memperbaiki tekanan darah dan mood.", rationale: "Peningkatan kualitas hidup (QoL) dan perbaikan depresi akibat tidur yang restoratif menjadikan CPAP intervensi esensial meskipun uji acaknya netral." },
            { id: 47, topic: "Sleep", urgency: "Essential", badgeClass: "badge-green", q: "Apa terapi utama untuk Insomnia kronis tanpa alat/obat?", a: "CBT-I (Cognitive Behavioral Therapy for Insomnia).", pearl: "Lebih superior jangka panjang dibanding obat tidur (Z-drugs).", rationale: "CBT-I merestrukturisasi kebiasaan tidur (sleep restriction, stimulus control) tanpa risiko toleransi atau jatuh pada lansia." },
            { id: 48, topic: "Psychosocial Factors", urgency: "Red Flag", badgeClass: "badge-red", q: "Seberapa mematikan faktor Isolasi Sosial / Kesepian bagi penderita CVD?", a: "Setara dengan bahaya merokok 15 batang sehari atau obesitas berat.", pearl: "Loneliness (subjektif) dan Isolation (objektif) sama-sama prediktor mortalitas kuat.", rationale: "Manusia berevolusi sebagai makhluk sosial. Isolasi diartikan tubuh sebagai 'ancaman bertahan hidup', mengaktifkan kaskade inflamasi pertahanan kronis." },
            { id: 49, topic: "Psychosocial Factors", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa yang dimaksud dengan Sindrom Burnout atau Kelelahan Vital (Vital Exhaustion)?", a: "Rasa lelah ekstrem, hilangnya energi, dan peningkatan iritabilitas akibat stres kerja kronis.", pearl: "Vital exhaustion memprediksi kejadian infark miokard pertama kali.", rationale: "Stres berlebih di tempat kerja (high demand, low control) menguras cadangan adaptasi HPA axis dan simpatis." },
            { id: 50, topic: "Psychosocial Factors", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Bagaimana polusi suara lingkungan (Environmental Noise) merusak jantung?", a: "Bising pesawat/kendaraan di malam hari mengaktifkan Amigdala.", pearl: "Stres bawah sadar memicu radang pembuluh darah (vascular inflammation).", rationale: "Meski pasien sedang tidur, korteks pendengaran tetap aktif. Amigdala merespons bising sebagai stresor, memicu disfungsi endotel." },
            { id: 51, topic: "Psychosocial Factors", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa dampak Status Sosial Ekonomi (SES) yang rendah terhadap CVD?", a: "Meningkatkan insidensi, mortalitas, dan membatasi pemulihan jantung.", pearl: "Keterbatasan akses pangan sehat (food swamp) dan stres finansial harian adalah toksik.", rationale: "SES rendah memicu 'Financial Toxicity' di mana pasien terpaksa menghemat obat (non-adherence) demi bertahan hidup." },
            { id: 52, topic: "Intervention", urgency: "Class I", badgeClass: "badge-green", q: "Model integrasi apa yang paling dianjurkan ESC untuk mengobati komorbid psikis dan CVD?", a: "Collaborative Care Model (CCM).", pearl: "Dokter Jantung + Psikiater/Psikolog + Perawat Manajer Kasus (Case Manager).", rationale: "Perawatan terkotak-kotak (siloed) sering gagal. CCM menggunakan perawat koordinator untuk melacak kepatuhan dan respons terapi, dengan hasil klinis superior." },
            { id: 53, topic: "Intervention", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa prinsip 'Stepped Care' dalam manajemen depresi kardiak?", a: "Memulai terapi dengan intervensi intensitas rendah, lalu eskalasi jika gagal.", pearl: "Self-help -> CBT/Psikoterapi -> Farmakoterapi/SSRI.", rationale: "Sangat efisien dalam alokasi sumber daya klinis, mencegah over-medikalisasi untuk gejala distres ringan." },
            { id: 54, topic: "Intervention", urgency: "Essential", badgeClass: "badge-green", q: "Sebutkan intervensi Mind-Body yang direkomendasikan untuk hipertensi ringan/ansietas?", a: "Yoga, Tai Chi, dan Mindfulness-Based Stress Reduction (MBSR).", pearl: "Aktivitas lambat terfokus napas menurunkan lonjakan simpatis.", rationale: "Praktik ini terbukti memperbaiki Heart Rate Variability (HRV), menurunkan hormon stres, dan mengurangi frekuensi fibrilasi atrium simptomatik." },
            { id: 55, topic: "Intervention", urgency: "Class I", badgeClass: "badge-green", q: "Teknik komunikasi apa yang wajib dikuasai dokter untuk merubah gaya hidup pasien?", a: "Motivational Interviewing (Wawancara Motivasional).", pearl: "Bantu pasien menemukan alasan MEREKA SENDIRI untuk berubah, bukan dinasihati paksa.", rationale: "Menghadapi ambivalensi pasien dengan empati dan refleksi jauh lebih efektif meningkatkan kepatuhan diet/rokok dibanding ceramah direktif." },
            { id: 56, topic: "Specific CVD", urgency: "Must Know", badgeClass: "badge-blue", q: "Bagaimana kaitan antara Gagal Jantung (Heart Failure) dan Depresi?", a: "Lebih dari 20% pasien HF menderita depresi mayor.", pearl: "Semakin berat kelas NYHA (sesak), semakin berat derajat depresinya.", rationale: "Gagal jantung menghilangkan otonomi fisik pasien. Depresi membuat mereka apatis menimbang berat badan harian atau membatasi minum (fluid restriction)." },
            { id: 57, topic: "Specific CVD", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Apa dampak obat jantung SGLT2 Inhibitor pada kesehatan mental pasien HF?", a: "Obat ini signifikan memperbaiki kapasitas fisik dan mood (KCCQ score).", pearl: "Memperbaiki pompa organ seringkali otomatis memperbaiki 'mental' pasien.", rationale: "Dengan mengurangi beban kongesti dan kelemahan fisik (frailty), otonomi pasien kembali, yang langsung mengurangi gejala depresif." },
            { id: 58, topic: "Specific CVD", urgency: "Essential", badgeClass: "badge-green", q: "Palliative Care pada Gagal Jantung stadium akhir berfokus pada apa?", a: "Meringankan penderitaan psikologis, end-of-life anxiety, dan manajemen sesak napas.", pearl: "Paliatif BUKAN berarti pasien segera meninggal, tapi memprioritaskan kualitas hidup.", rationale: "Opiat dosis rendah dan terapi eksistensial membantu meredakan penderitaan fisik dan ketakutan mati akibat air hunger (sesak berat)." },
            { id: 59, topic: "Specific CVD", urgency: "Red Flag", badgeClass: "badge-red", q: "Mengapa asesmen psikososial sangat ketat dilakukan sebelum Transplantasi Jantung atau LVAD?", a: "Untuk memastikan kepatuhan absolut pasca-operasi.", pearl: "Depresi berat atau penyalahgunaan zat aktif adalah kontraindikasi transplantasi.", rationale: "Pasien butuh resiliensi luar biasa dan dukungan keluarga (caregiver) untuk mematuhi regimen imunosupresan seumur hidup yang tidak boleh terlewat 1 dosis pun." },
            { id: 60, topic: "Specific CVD", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa siklus berbahaya antara Fibrilasi Atrium (AF) dan Kecemasan?", a: "Ansietas memicu saraf simpatis (memicu AF), dan episode AF memicu panik hebat.", pearl: "Ablasi AF seringkali 'menyembuhkan' kecemasannya secara radikal.", rationale: "Pasien AF sering takut bepergian karena takut dada berdebar mendadak. Mengembalikan irama sinus sangat memperbaiki skor kecemasan." },
            { id: 61, topic: "Specific CVD", urgency: "Essential", badgeClass: "badge-green", q: "Berapa prevalensi Post-Stroke Depression (PSD) dan dampaknya?", a: "Terjadi pada ~30% pasien pasca stroke.", pearl: "PSD sangat menghambat keberhasilan rehabilitasi motorik dan bicara.", rationale: "Depresi pasca stroke adalah kombinasi trauma psikologis kehilangan fungsi dan kerusakan biologis langsung pada jalur aminergik di otak akibat infark/perdarahan." },
            { id: 62, topic: "Specific CVD", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Apa bedanya Post-Stroke Depression dengan Pseudobulbar Affect (PBA)?", a: "PBA adalah tawa atau tangis patologis yang tidak dapat dikendalikan dan tidak sesuai dengan mood aslinya.", pearl: "Pasien PBA bisa menangis tanpa merasa sedih.", rationale: "PBA terjadi akibat terputusnya jaras kontrol emosi motorik di batang otak. Membedakannya penting karena terapi farmakologisnya bisa berbeda." },
            { id: 63, topic: "Specific CVD", urgency: "Must Know", badgeClass: "badge-blue", q: "Wanita muda dengan keluhan dada (MINOCA/INOCA) sering dikira hanya cemas. Apa faktanya?", a: "Seringkali mereka menderita disfungsi mikrovaskular atau spasme koroner yang nyata.", pearl: "Stres psikis memang memperburuk spasme, tapi iskemianya adalah nyata.", rationale: "Penyakit mikrovaskular didorong oleh ketidakseimbangan endotel yang sangat peka terhadap lonjakan katekolamin akibat stres emosional/mental." },
            { id: 64, topic: "Specific CVD", urgency: "Essential", badgeClass: "badge-green", q: "Bagaimana transisi Menopause memengaruhi risiko psiko-kardiologi wanita?", a: "Hilangnya proteksi estrogen memicu peningkatan TD, lipid, sekaligus meningkatkan kerentanan depresi.", pearl: "Fase perimenopause adalah 'Window of Vulnerability' (Jendela Kerentanan).", rationale: "Fluktuasi hormonal mengganggu termoregulasi (hot flashes), merusak tidur, dan memicu disregulasi mood, mempercepat akumulasi risiko CVD." },
            { id: 65, topic: "Specific CVD", urgency: "Must Know", badgeClass: "badge-blue", q: "Penyakit Jantung Bawaan Dewasa (ACHD) membawa beban psikis spesifik apa?", a: "Kecemasan transisi perawatan dan pembatasan aktivitas fisik/karir seumur hidup.", pearl: "Banyak pasien ACHD menolak kontrol (drop out) di usia 20-an karena lelah medis.", rationale: "Intervensi dukungan psikososial saat fase remaja-dewasa muda sangat krusial mencegah pengabaian medis yang berakibat gagal jantung dini." },
            { id: 66, topic: "Pharmacology", urgency: "Red Flag", badgeClass: "badge-red", q: "Interaksi farmakokinetik mematikan antara Fluoxetine/Paroxetine dengan Clopidogrel?", a: "Keduanya adalah inhibitor kuat enzim CYP2D6.", pearl: "Clopidogrel (prodrug) GAGAL diubah menjadi bentuk aktifnya, memicu trombosis Stent.", rationale: "Jika butuh SSRI bersama Clopidogrel, pilih Sertraline, Citalopram, atau Escitalopram yang tidak secara signifikan memblokir CYP2D6/2C19." },
            { id: 67, topic: "Pharmacology", urgency: "High Alert", badgeClass: "badge-red", q: "Interaksi antara Amiodarone dan Haloperidol?", a: "Risiko ekstrem prolongasi interval QTc dan Torsades de Pointes mematikan.", pearl: "Keduanya adalah agen penyebab QTc memanjang yang sangat poten.", rationale: "Amiodarone memperlambat repolarisasi miokard. Ditambah antipsikotik, risiko aritmia polimorfik meningkat berlipat ganda." },
            { id: 68, topic: "Pharmacology", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Apakah Statin menyebabkan gangguan kognitif, demensia, atau depresi?", a: "Mitos. Uji acak berskala besar tidak menemukan bukti penurunan kognisi atau mood.", pearl: "Efek nocebo (sugesti efek samping negatif dari internet) sering menjadi penyebab keluhan.", rationale: "Keuntungan statin mencegah stroke dan infark jauh melebihi kekhawatiran teoretis efek neurologis (yang sejauh ini tidak terbukti di RCT)." },
            { id: 69, topic: "Pharmacology", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Apakah obat PCSK9 Inhibitor (Evolocumab/Alirocumab) aman untuk otak (memori)?", a: "Sangat aman. Bukti dari studi EBBINGHAUS mengkonfirmasi netralitas kognitif.", pearl: "Menurunkan LDL hingga sangat rendah (<30 mg/dL) TIDAK merusak otak.", rationale: "Otak dapat mensintesis kolesterolnya sendiri melalui astrocyte dan tidak bergantung mutlak pada LDL yang beredar dalam plasma darah." },
            { id: 70, topic: "Pharmacology", urgency: "Must Know", badgeClass: "badge-blue", q: "Efek samping Spironolactone (MRA) yang dapat mengganggu psikologis pria?", a: "Ginekomastia (Pembesaran payudara pria) dan disfungsi ereksi.", pearl: "Ini adalah efek anti-androgenik. Ganti ke Eplerenone jika terjadi.", rationale: "Perubahan bentuk tubuh ini dapat menyebabkan distres citra tubuh (body image) yang parah, memicu pasien diam-diam menghentikan obat gagal jantungnya." },
            { id: 71, topic: "Specific CVD", urgency: "Essential", badgeClass: "badge-green", q: "Bidang Cardio-Oncology: Apa beban ganda psikologis yang dialami pasien kanker?", a: "Trauma diagnosis kanker + Ketakutan akan efek samping kardiotoksik (gagal jantung akibat kemoterapi).", pearl: "Kelelahan ekstrem (fatigue) akibat kemo sering keliru didiagnosis sebagai depresi.", rationale: "Dokter jantung harus peka bahwa penderita kanker yang menjalani ekokardiogram rutin sangat cemas ('scanxiety') menunggu hasil fungsi pompanya." },
            { id: 72, topic: "Specific CVD", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa dampak Shared Decision Making (SDM) pada Valvular Heart Disease (TAVI/SAVR)?", a: "Meningkatkan kepuasan, menurunkan kecemasan, dan mencegah penyesalan pasca-tindakan.", pearl: "Biarkan lansia memilih prioritas hidup mereka (panjang umur vs kualitas hidup).", rationale: "Mengedukasi risiko secara transparan dengan alat bantu visual membuat pasien merasa memiliki kendali atas tubuh mereka sendiri." },
            { id: 73, topic: "Specific CVD", urgency: "Must Know", badgeClass: "badge-blue", q: "Masalah kognitif apa yang muncul pasca-Henti Jantung (Sudden Cardiac Arrest)?", a: "Disfungsi memori jangka pendek dan eksekutif akibat ensefalopati anoksik.", pearl: "Survivor henti jantung butuh neuro-rehabilitasi, bukan sekadar obat jantung.", rationale: "Kekurangan oksigen otak selama RJP meninggalkan jejak kerusakan memori yang sering tidak terdeteksi jika hanya ditanya 'apakah dada masih sesak?'." },
            { id: 74, topic: "Behavior & Lifestyle", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Bagaimana obat penurun berat badan GLP-1 RA (Semaglutide) membantu kesehatan psikokardiologi?", a: "Penurunan berat badan masif meredakan sleep apnea, memperbaiki citra diri, dan menurunkan depresi.", pearl: "Obesitas dan depresi adalah lingkaran setan yang diputus oleh GLP-1.", rationale: "Secara langsung, GLP-1 juga memperbaiki inflamasi sistemik, yang secara independen dapat memperbaiki suasana hati dan energi (vitalitas)." },
            { id: 75, topic: "Behavior & Lifestyle", urgency: "Red Flag", badgeClass: "badge-red", q: "Mitos tentang konsumsi Alkohol ringan (J-shaped curve) untuk jantung?", a: "Pedoman modern menegaskan TIDAK ADA batas aman mutlak konsumsi alkohol.", pearl: "Setiap tetes alkohol secara linear meningkatkan risiko Fibrilasi Atrium dan Hipertensi.", rationale: "Penggunaan alkohol sebagai 'koping stres' sangat merusak, menyebabkan kardiomiopati toksik dan kekacauan ritme sirkadian." },
            { id: 76, topic: "General Principle", urgency: "Class I", badgeClass: "badge-green", q: "Alat kuesioner apa yang paling valid menilai keparahan depresi (severity)?", a: "Patient Health Questionnaire 9 (PHQ-9).", pearl: "Skor >10 menandakan depresi sedang-berat yang butuh intervensi klinis.", rationale: "Mengukur 9 kriteria DSM-IV. Kuesioner ini gratis, cepat, dan menjadi standar emas di seluruh dunia untuk setting perawatan non-psikiatri." },
            { id: 77, topic: "General Principle", urgency: "Emergency", badgeClass: "badge-red", q: "Pertanyaan nomor 9 pada PHQ-9 menilai apa?", a: "Ideasi Bunuh Diri (Pikiran bahwa lebih baik mati atau ingin melukai diri sendiri).", pearl: "Jika pasien menjawab >0 di poin ini, protokol keselamatan darurat WAJIB diaktifkan.", rationale: "Meskipun jarang di poli jantung, pasien gagal jantung kronis memiliki risiko bunuh diri yang meningkat. Tidak boleh diabaikan." },
            { id: 78, topic: "General Principle", urgency: "Class I", badgeClass: "badge-green", q: "Kuesioner kecemasan (Anxiety) yang tervalidasi untuk pasien CVD?", a: "GAD-7 (Generalized Anxiety Disorder 7-item scale).", pearl: "Skor >10 sangat sensitif menangkap patologi kecemasan klinis.", rationale: "Fokus pada kegelisahan, ketidakmampuan untuk rileks, dan ketakutan akan sesuatu yang buruk terjadi (sangat relevan dengan pasien jantung)." },
            { id: 79, topic: "General Principle", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa yang dimaksud dengan Fenomena 'White Coat Hypertension' secara psikologis?", a: "Lonjakan tekanan darah akibat kecemasan terantisipasi di lingkungan medis.", pearl: "Cegah dengan ABPM (Ambulatory Blood Pressure Monitoring) 24-jam.", rationale: "Kecemasan memicu simpatis saat melihat dokter. Mengobati tensi ini tanpa ABPM menyebabkan bahaya hipotensi saat pasien rileks di rumah." },
            { id: 80, topic: "Intervention", urgency: "Essential", badgeClass: "badge-green", q: "Bagaimana teknologi Digital (mHealth) mendukung psiko-kardiologi?", a: "Penggunaan Aplikasi (Apps) untuk Tele-Rehab, modul CBT online, dan monitoring jarak jauh.", pearl: "Sangat menjangkau pasien di pedesaan atau yang mobilitasnya terhambat HF berat.", rationale: "Digital phenotyping (menganalisis pola ketikan keyboard di HP) di masa depan dapat memprediksi relaps depresi sebelum gejala memburuk." },
            { id: 81, topic: "Psychosocial Factors", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Bagaimana Trauma Masa Kecil (Childhood Adversity) merusak jantung di masa dewasa?", a: "Pelecehan/pengabaian masa kecil 'memprogram ulang' HPA axis secara epigenetik menjadi hiper-reaktif.", pearl: "Trauma anak melipatgandakan risiko insiden CVD di usia paruh baya.", rationale: "Tubuh anak yang selalu dalam 'survival mode' mempertahankan tingkat inflamasi basal yang tinggi hingga ia dewasa, menumbuhkan plak aterosklerosis prematur." },
            { id: 82, topic: "Psychosocial Factors", urgency: "Must Know", badgeClass: "badge-blue", q: "Diskriminasi dan rasisme terhadap minoritas berdampak kardiovaskular. Bagaimana mekanismenya?", a: "Stres Akulturasi dan paparan mikro-agresi harian memicu hiperaktivitas simpatis konstan.", pearl: "Tekanan darah orang terpinggirkan secara signifikan lebih tinggi akibat beban stres kronis.", rationale: "Ketidakadilan sosial adalah faktor risiko biologis (bukan sekadar masalah sosiologi), yang berdampak pada keausan fungsi organ (wear and tear/Allostatic Load)." },
            { id: 83, topic: "Specific CVD", urgency: "Essential", badgeClass: "badge-green", q: "Apa dampak psikologis Preeklampsia Berat pada ibu pasca persalinan?", a: "Peningkatan drastis risiko PTSD dan Depresi Postpartum.", pearl: "Trauma di ICU kebidanan + kecemasan akan risiko jantung seumur hidup.", rationale: "Preeklampsia adalah gagal endotel akut yang menempatkan ibu pada ancaman kematian (kejang eklampsia). Konseling kardio-obstetrik pascasalin sangat krusial." },
            { id: 84, topic: "Specific CVD", urgency: "Red Flag", badgeClass: "badge-red", q: "Penyakit arteri perifer (PAD) dan Amputasi: Apa beban mentalnya?", a: "Kehilangan otonomi berjalan dan depresi reaktif berat pasca amputasi tungkai.", pearl: "Rehabilitasi prostetik dan dukungan psikologis mencegah isolasi total.", rationale: "PAD stadium lanjut dengan ulkus kronis sangat nyeri dan berbau, menyebabkan pasien menarik diri secara sosial jauh sebelum amputasi terjadi." },
            { id: 85, topic: "Pathophysiology", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Apa hubungan Microbiome Usus (Gut-Brain-Heart Axis) dengan depresi kardiak?", a: "Disbiosis meningkatkan metabolit inflamasi (TMAO) yang merusak sel endotel pembuluh darah dan otak.", pearl: "Diet Mediterania memperbaiki depresi dan aterosklerosis melalui perbaikan flora usus.", rationale: "Usus memproduksi mayoritas serotonin tubuh. Diet tinggi serat menyuburkan bakteri baik penghasil Short-Chain Fatty Acids (SCFA) yang anti-inflamasi." },
            { id: 86, topic: "Intervention", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa peran Peer Support (Dukungan Sesama Pasien) pada pemulihan jantung?", a: "Berbagi pengalaman dengan 'survivor' lain secara signifikan menurunkan kecemasan dan rasa terisolasi.", pearl: "Pasien lebih percaya pada sesama pasien yang 'pernah dibedah' (bypass) dibanding teori dokter.", rationale: "Kelompok dukungan (support group) menormalisasi ketakutan pasien dan memberikan strategi koping dunia nyata." },
            { id: 87, topic: "Specific CVD", urgency: "Essential", badgeClass: "badge-green", q: "Disfungsi Ereksi (DE) pada pasien kardiak: Mengapa sering disembunyikan dan apa bahayanya?", a: "DE sangat menjatuhkan harga diri (depresi), dan DE adalah prediktor awal penyakit koroner tersembunyi.", pearl: "Arteri penis berukuran lebih kecil dari arteri koroner. Obstruksi aterosklerosis terjadi di sana lebih dulu.", rationale: "Dokter harus proaktif menanyakan fungsi seksual. PDE-5 inhibitor (Sildenafil) umumnya aman bagi PJK asal TIDAK dikombinasi dengan nitrat." },
            { id: 88, topic: "Pharmacology", urgency: "High Alert", badgeClass: "badge-red", q: "Kombinasi obat mematikan apa yang terkait Disfungsi Ereksi dan Jantung?", a: "PDE-5 Inhibitor (Sildenafil/Tadalafil) + Obat Golongan Nitrat (ISDN/Nitroglycerin).", pearl: "Membutuhkan jeda waktu 24-48 jam untuk mencegah hipotensi refrakter fatal.", rationale: "Keduanya melipatgandakan produksi cGMP yang merelaksasi otot polos vaskular secara ekstrem." },
            { id: 89, topic: "Anxiety", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Bagaimana hiperventilasi akibat serangan panik memengaruhi EKG?", a: "Dapat memicu depresi segmen ST transien atau inversi gelombang T.", pearl: "Alkalosis respiratorik menurunkan kalsium ion dan memicu vasospasme koroner ringan.", rationale: "Hal ini dapat memperumit diagnosis di IGD, membuat serangan panik secara keliru diobati sebagai sindrom koroner akut sungguhan." },
            { id: 90, topic: "General Principle", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa hambatan terbesar implementasi Collaborative Care Model (CCM) di praktek klinis?", a: "Sistem pembiayaan (Reimbursement) yang terpisah antara asuransi fisik dan jiwa, serta kekurangan psikiater.", pearl: "Kardiolog harus berani menjadi 'baris depan' farmakoterapi SSRI dasar.", rationale: "Mengirim semua pasien depresi ringan ke psikiater tidak realistis. Kardiolog wajib terampil menangani depresi tanpa komplikasi secara mandiri." },
            { id: 91, topic: "Behavior & Lifestyle", urgency: "Class I", badgeClass: "badge-green", q: "Perubahan diet apa yang memiliki bukti terbaik untuk mengurangi risiko CVD dan depresi?", a: "Diet Mediterania.", pearl: "Tinggi zaitun, kacang, ikan (Omega-3), dan rendah gula olahan/daging merah.", rationale: "Kaya akan antioksidan dan asam lemak tak jenuh ganda (PUFA) yang menstabilkan membran sel saraf dan menurunkan inflamasi endotel." },
            { id: 92, topic: "Sleep", urgency: "Red Flag", badgeClass: "badge-red", q: "Obat penenang (Benzodiazepin) populer untuk insomnia pasien jantung. Apa bahaya tersembunyinya?", a: "Meningkatkan risiko jatuh (fraktur), toleransi dosis, dan memperburuk sleep apnea.", pearl: "Sangat berbahaya jika diresepkan rutin pada pasien geriatri dengan HF dan OSA.", rationale: "Z-drugs dan benzodiazepin menumpulkan refleks jalan napas atas, membuat periode hipoksia OSA memanjang di malam hari." },
            { id: 93, topic: "Psychosocial Factors", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa dampak merawat pasien gagal jantung kronis terhadap keluarga (Caregiver Burden)?", a: "Keletihan ekstrem, depresi klinis (hingga 30%), dan peningkatan insidensi kardiovaskular pada pengasuh itu sendiri.", pearl: "Pasangan dari pasien gagal jantung berat memiliki peningkatan mortalitas mereka sendiri.", rationale: "Stres menjaga pengobatan 24/7 dan menyaksikan penderitaan orang tercinta memicu allostatic load masif pada sang caregiver." },
            { id: 94, topic: "Specific CVD", urgency: "Essential", badgeClass: "badge-green", q: "Prevalensi depresi pada pasien yang menjalani operasi Coronary Artery Bypass Grafting (CABG)?", a: "Mencapai 30-40% di bulan-bulan pertama pasca operasi.", pearl: "Delirium pasca-operasi juga umum terjadi akibat mesin CPB (pump head).", rationale: "Rasa nyeri sternum yang lama, hilangnya independensi, dan inflamasi pasca bedah memicu depresi yang menghambat fisioterapi." },
            { id: 95, topic: "Intervention", urgency: "Scientific Pearl", badgeClass: "badge-purple", q: "Bagaimana mekanisme olahraga (exercise) meregulasi kesehatan otak pasien jantung?", a: "Meningkatkan produksi Brain-Derived Neurotrophic Factor (BDNF).", pearl: "BDNF seperti 'pupuk' yang menumbuhkan koneksi saraf baru (neurogenesis) di hipokampus.", rationale: "Pasien depresi mengalami atrofi hipokampus (pusat memori & emosi). Olahraga rutin secara harfiah memulihkan volume otak area tersebut." },
            { id: 96, topic: "Specific CVD", urgency: "Must Know", badgeClass: "badge-blue", q: "Siklus Psikokardiologi Hipertensi: Apa itu 'Hypertension-Anxiety Spiral'?", a: "Rasa cemas memicu tekanan darah naik -> Pasien panik melihat angka tensimeter tinggi -> TD semakin meroket.", pearl: "Sarankan pasien untuk BERHENTI mengukur tensi tiap jam jika hasilnya memicu panik (obsessive measuring).", rationale: "Fiksasi berlebihan pada angka tensi justru merusak tonus vagal. Ajarkan pengukuran rutin standar (pagi/sore) yang tenang." },
            { id: 97, topic: "Pharmacology", urgency: "High Alert", badgeClass: "badge-red", q: "Obat jantung golongan penyekat kalsium (CCB Non-Dihydropyridine) seperti Diltiazem. Apa interaksinya?", a: "Inhibitor moderat CYP3A4. Dapat meningkatkan kadar antidepresan tertentu dan antipsikotik (misal Quetiapine).", pearl: "Waspada bradikardia fatal jika dikombinasi dengan obat psikiatri penurun denyut nadi.", rationale: "Peningkatan kadar obat psikiatri secara tak terduga memicu peningkatan efek sedasi dan perpanjangan QTc secara drastis." },
            { id: 98, topic: "Pathophysiology", urgency: "Essential", badgeClass: "badge-green", q: "Jelaskan peran 'Resiliensi' (Resilience) dalam prognosis kardiovaskular!", a: "Kemampuan mental pasien untuk memantul kembali (bounce back) secara cepat pasca trauma serangan jantung.", pearl: "Resiliensi BUKAN sifat genetik yang kaku, melainkan skill kognitif yang BISA dilatih (misal via CBT).", rationale: "Pasien dengan resiliensi tinggi melihat ACS sebagai 'wake-up call' (katalis gaya hidup sehat), bukan vonis penderitaan abadi." },
            { id: 99, topic: "General Principle", urgency: "Class I", badgeClass: "badge-green", q: "Bagaimana rekomendasi skrining mental menurut ESC 2025 untuk SEMUA pasien jantung kronis?", a: "Skrining rutin depresi dan ansietas WAJIB dilakukan secara berkala (minimal tahunan atau jika ada perubahan klinis).", pearl: "Gunakan kuesioner baku (PHQ/GAD), bukan sekadar insting 'kasat mata' dokter.", rationale: "Diagnosis kasat mata ('eyeballing') dokter sering gagal mendeteksi depresi ringan/sedang yang diam-diam mulai merusak kepatuhan obat pasien." },
            { id: 100, topic: "Intervention", urgency: "Must Know", badgeClass: "badge-blue", q: "Apa pesan paling sentral (Take Home Message) dari pedoman Psiko-Kardiologi ESC 2025?", a: "Tidak ada kesehatan jantung yang optimal tanpa kesehatan mental yang stabil ('No Heart Health without Mental Health').", pearl: "Menyembuhkan organ jantung namun membiarkan pikiran pasien sakit adalah kegagalan terapi holistik.", rationale: "Paradigma kardiologi modern telah bergeser secara definitif dari sekadar perbaikan mekanik (stent/katup) menuju perawatan pasien seutuhnya." }
        ];

        let state = {
            mode: 'learner',
            idx: 0,
            flipped: false,
            topic: 'All',
            shuffled: false,
            data: [...learnerData],
            mastered: new Set(),
            saved: new Set(),
            search: ''
        };

        const topics = ['All', ...new Set(learnerData.map(d => d.topic))];

        function setMode(m) {
            state.mode = m;
            state.idx = 0;
            state.flipped = false;
            render();
        }

        function setTopic(t) {
            state.topic = t;
            state.idx = 0;
            filterData();
            render();
        }

        function filterData() {
            let d = [...learnerData];
            if (state.topic !== 'All') d = d.filter(x => x.topic === state.topic);
            if (state.shuffled) d = d.sort(() => Math.random() - 0.5);
            state.data = d;
        }

        function toggleShuffle() {
            state.shuffled = !state.shuffled;
            filterData();
            render();
        }

        function flipCard() {
            state.flipped = !state.flipped;
            const el = document.getElementById('flipBox');
            if (el) state.flipped ? el.classList.add('rotate-y-180') : el.classList.remove('rotate-y-180');
        }

        function navigateCard(dir) {
            if (state.data.length === 0) return;
            state.flipped = false;
            if (dir === 'next') state.idx = (state.idx + 1) % state.data.length;
            else state.idx = state.idx === 0 ? state.data.length - 1 : state.idx - 1;
            renderCardContent();
        }

        function toggleMastery() {
            const id = state.data[state.idx].id;
            state.mastered.has(id) ? state.mastered.delete(id) : state.mastered.add(id);
            updateKPI();
            renderCardContent();
        }

        function toggleBookmark() {
            const id = state.data[state.idx].id;
            state.saved.has(id) ? state.saved.delete(id) : state.saved.add(id);
            updateKPI();
            renderCardContent();
        }

        function resetProgress() {
            state.mastered.clear();
            state.saved.clear();
            updateKPI();
            render();
        }

        function updateKPI() {
            document.getElementById('kpi-mastered').innerHTML = `<i class="fa-solid fa-check-circle text-green-400"></i> ${state.mastered.size} Mastered`;
            document.getElementById('kpi-bookmarked').innerHTML = `<i class="fa-solid fa-bookmark text-amber-400"></i> ${state.saved.size} Saved`;
        }

        function render() {
            const container = document.getElementById('mainContent');
            const chips = document.getElementById('filterChips');
            
            // Render Chips
            chips.innerHTML = topics.map(t => {
                const active = state.topic === t;
                return `<button onclick="setTopic('${t}')" class="whitespace-nowrap px-4 py-1.5 rounded-full text-xs border transition-all ${active ? 'bg-emerald-600 text-white border-emerald-600 font-bold' : 'bg-white text-slate-600 border-slate-200'}">${t}</button>`;
            }).join('');

            // Mode Switching
            const btnL = document.getElementById('btnModeLearner');
            const btnM = document.getElementById('btnModeMatrix');
            if (state.mode === 'learner') {
                btnL.className = "flex items-center justify-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition-all duration-300 bg-emerald-600 text-white shadow-md";
                btnM.className = "flex items-center justify-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition-all duration-300 text-slate-400 hover:text-white hover:bg-white/10";
                buildLearnerUI(container);
            } else {
                btnL.className = "flex items-center justify-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition-all duration-300 text-slate-400 hover:text-white hover:bg-white/10";
                btnM.className = "flex items-center justify-center gap-1.5 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition-all duration-300 bg-emerald-600 text-white shadow-md";
                buildMatrixUI(container);
            }
        }

        function buildLearnerUI(container) {
            if (state.data.length === 0) {
                container.innerHTML = `<div class="text-center py-20"><i class="fa-solid fa-folder-open text-5xl text-slate-200 mb-4"></i><p>No cards found for this topic.</p></div>`;
                return;
            }
            container.innerHTML = `
                <div class="max-w-lg mx-auto">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest" id="counterDisplay"></span>
                        <button onclick="toggleShuffle()" class="w-8 h-8 rounded-full border ${state.shuffled ? 'bg-emerald-100 border-emerald-300 text-emerald-600' : 'bg-white text-slate-400'}"><i class="fa-solid fa-shuffle"></i></button>
                    </div>
                    <div class="h-[55vh] min-h-[400px] perspective-1000 relative" onclick="flipCard()">
                        <div id="flipBox" class="w-full h-full card-transition transform-style-preserve-3d shadow-xl rounded-2xl cursor-pointer">
                            <div id="cardFront" class="absolute inset-0 backface-hidden bg-white border-2 border-slate-100 rounded-2xl flex flex-col p-8 items-center justify-center text-center"></div>
                            <div id="cardBack" class="absolute inset-0 backface-hidden rotate-y-180 bg-white border-2 border-emerald-100 rounded-2xl p-8 overflow-y-auto"></div>
                        </div>
                    </div>
                    <div class="hidden md:flex justify-between mt-6 gap-4">
                        <button onclick="navigateCard('prev'); event.stopPropagation()" class="flex-1 py-3 bg-white border rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition-all"><i class="fa-solid fa-arrow-left"></i> Prev</button>
                        <button onclick="navigateCard('next'); event.stopPropagation()" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-md hover:bg-emerald-700 transition-all">Next <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>
            `;
            renderCardContent();
        }

        function renderCardContent() {
            if (state.data.length === 0) return;
            const card = state.data[state.idx];
            const isM = state.mastered.has(card.id);
            const isS = state.saved.has(card.id);

            document.getElementById('counterDisplay').innerText = `CARD ${state.idx + 1} / ${state.data.length}`;
            
            document.getElementById('cardFront').innerHTML = `
                <div class="absolute top-4 left-4"><span class="text-[0.6rem] font-bold uppercase tracking-widest text-slate-400 bg-slate-100 px-2 py-1 rounded">${card.topic}</span></div>
                <div class="absolute top-4 right-4">${isM ? '<i class="fa-solid fa-check-circle text-emerald-500"></i>' : ''}</div>
                <div class="mb-4"><span class="px-3 py-1 rounded-full text-[0.65rem] font-bold uppercase ${card.badgeClass}">${card.urgency}</span></div>
                <h2 class="text-xl sm:text-2xl font-bold text-slate-800 leading-tight">${card.q}</h2>
                <div class="absolute bottom-6 w-full text-[0.6rem] text-slate-300 font-bold uppercase tracking-widest flex justify-center gap-4 animate-swipe-hint">
                    <i class="fa-solid fa-angles-left"></i> Tap to flip <i class="fa-solid fa-angles-right"></i>
                </div>
            `;

            document.getElementById('cardBack').innerHTML = `
                <div class="text-xs font-bold text-emerald-600 mb-2 uppercase tracking-widest">Key Recommendation</div>
                <p class="text-lg font-bold text-slate-800 mb-6 leading-tight">${card.a}</p>
                <div class="bg-amber-50 p-4 rounded-xl border border-amber-100 mb-4 flex gap-3">
                    <i class="fa-solid fa-lightbulb text-amber-500 mt-1"></i>
                    <p class="text-sm text-amber-900 font-medium">${card.pearl}</p>
                </div>
                <div class="mt-auto pt-4 border-t border-slate-100">
                    <span class="text-[0.65rem] font-bold text-slate-400 uppercase">Rationale:</span>
                    <p class="text-sm text-slate-600 leading-relaxed mt-1">${card.rationale}</p>
                </div>
            `;

            // Mobile Bar Sync
            const btnM = document.getElementById('btnActionMastery');
            const btnS = document.getElementById('btnActionBookmark');
            const iconS = document.getElementById('iconActionBookmark');
            
            if(isM) btnM.className = "flex-1 flex flex-col items-center justify-center min-h-[48px] px-2 rounded-xl bg-emerald-50 text-emerald-600 border border-emerald-200";
            else btnM.className = "flex-1 flex flex-col items-center justify-center min-h-[48px] px-2 rounded-xl text-slate-400 border border-slate-200";

            if(isS) { btnS.classList.add('text-amber-500'); iconS.className = "fa-solid fa-bookmark text-lg mb-0.5"; }
            else { btnS.classList.remove('text-amber-500'); iconS.className = "fa-regular fa-bookmark text-lg mb-0.5"; }
        }

        function buildMatrixUI(container) {
            container.innerHTML = `
                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden flex flex-col h-[70vh]">
                    <div class="p-4 bg-slate-800 flex items-center gap-3">
                        <i class="fa-solid fa-search text-slate-400"></i>
                        <input type="text" oninput="handleSearch(this.value)" placeholder="Search matrix..." class="bg-transparent border-none text-white focus:ring-0 w-full text-sm">
                    </div>
                    <div class="overflow-y-auto" id="matrixContent"></div>
                </div>
            `;
            renderMatrixContent();
        }

        function handleSearch(v) {
            state.search = v.toLowerCase();
            renderMatrixContent();
        }

        function renderMatrixContent() {
            const list = document.getElementById('matrixContent');
            const filtered = learnerData.filter(d => d.q.toLowerCase().includes(state.search) || d.a.toLowerCase().includes(state.search) || d.topic.toLowerCase().includes(state.search));
            
            list.innerHTML = `
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-slate-500 sticky top-0 uppercase text-[0.6rem] font-bold">
                        <tr>
                            <th class="p-4">Topic</th>
                            <th class="p-4">Clinical Question</th>
                            <th class="p-4">Key Recommendation</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map(d => `
                            <tr class="border-b hover:bg-slate-50">
                                <td class="p-4 align-top"><span class="text-[0.65rem] font-bold px-2 py-0.5 rounded ${d.badgeClass}">${d.topic}</span></td>
                                <td class="p-4 font-bold text-slate-800 leading-tight">${d.q}</td>
                                <td class="p-4 text-slate-600">${d.a}<br><span class="text-[0.7rem] text-emerald-600 font-bold block mt-1">${d.pearl}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // Init
        render();
        updateKPI();

        // Keyboard navigation
        window.addEventListener('keydown', e => {
            if (state.mode !== 'learner') return;
            if (e.key === 'ArrowRight') navigateCard('next');
            if (e.key === 'ArrowLeft') navigateCard('prev');
            if (e.key === ' ') flipCard();
        });
    </script>
</body>
</html>
