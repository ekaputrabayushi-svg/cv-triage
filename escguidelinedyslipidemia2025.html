<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ESC 2025 Dyslipidemia Focused Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; font-variant-numeric: tabular-nums; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-transition { transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .slide-next { animation: slideNext 0.3s ease-out forwards; }
        .slide-prev { animation: slidePrev 0.3s ease-out forwards; }
        @keyframes slideNext { 0% { transform: translateX(30px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        @keyframes slidePrev { 0% { transform: translateX(-30px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        .animate-swipe-hint { animation: swipeHint 2s infinite; }
        @keyframes swipeHint { 0%, 100% { transform: translateX(0); opacity: 0.3; } 50% { transform: translateX(4px); opacity: 1; } }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .badge-shift { background: linear-gradient(135deg, #fef08a 0%, #f59e0b 100%); color: #78350f; border: 1px solid #fbbf24; }
        .badge-new { background: linear-gradient(135deg, #a7f3d0 0%, #10b981 100%); color: #064e3b; border: 1px solid #34d399; }
        .badge-upgrade { background: linear-gradient(135deg, #bfdbfe 0%, #3b82f6 100%); color: #1e3a8a; border: 1px solid #60a5fa; }
        .badge-extreme { background: linear-gradient(135deg, #fecaca 0%, #ef4444 100%); color: #7f1d1d; border: 1px solid #f87171; }
        .bg-lipid-dark { background: linear-gradient(to right, #0f172a, #1e293b); }
        .plaque-texture { background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 2px, transparent 2px, transparent 4px); }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: slideDown 0.3s ease-in-out; }
        details[open] summary .chevron { transform: rotate(180deg); }
        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col overflow-x-hidden">
    <!-- Header -->
    <header class="bg-lipid-dark text-white shadow-lg sticky top-0 z-50 border-b-4 border-amber-500/80 no-print">
        <div class="max-w-6xl mx-auto px-4 py-4 sm:py-5">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-amber-400 to-amber-600 p-2.5 rounded-xl border border-amber-300 shadow-lg shrink-0">
                        <i class="fa-solid fa-droplet text-xl text-white"></i>
                    </div>
                    <div>
                        <p class="text-[0.65rem] sm:text-xs uppercase tracking-[0.2em] text-amber-400 font-bold drop-shadow-sm">CardiologyVault • Lipid & Athero</p>
                        <h1 class="mt-0.5 text-lg sm:text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-300">ESC 2025 Dyslipidemia Update</h1>
                        <p class="mt-0.5 text-[0.75rem] text-slate-400 font-medium">Bayushi Eka Putra, MD, FIHA</p>
                    </div>
                </div>
                <div class="w-full md:w-64 flex flex-col gap-1.5 bg-slate-900/50 p-2.5 rounded-xl border border-slate-700">
                    <div class="flex justify-between items-end">
                        <span class="text-[0.65rem] font-bold text-slate-300 uppercase tracking-widest flex items-center gap-1"><i class="fa-solid fa-layer-group text-amber-500"></i> Atheroma Burden</span>
                        <span id="plaqueLabel" class="text-[0.7rem] font-black text-amber-400">100% Plaque</span>
                    </div>
                    <div class="w-full h-3.5 bg-rose-900 rounded-full overflow-hidden relative border border-rose-950 shadow-inner">
                        <div id="plaqueBar" class="absolute left-0 top-0 h-full bg-amber-400 plaque-texture transition-all duration-1000 ease-out shadow-[0_0_8px_rgba(251,191,36,0.8)]" style="width: 100%;"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="bg-slate-900/80 border-t border-slate-800">
            <div class="max-w-6xl mx-auto px-2">
                <nav class="flex overflow-x-auto hide-scrollbar gap-2 p-1" id="tabContainer">
                    <button aria-label="Tab Foundation" onclick="setTab('foundation')" id="btnTabFoundation" class="whitespace-nowrap flex-1 flex justify-center items-center gap-2 py-2.5 px-4 text-sm font-bold rounded-lg bg-blue-600 text-white shadow-md border border-blue-500 transition-all"><i class="fa-solid fa-book-medical text-blue-200"></i> 2019 Core Basics</button>
                    <button aria-label="Tab Flashcard" onclick="setTab('flashcard')" id="btnTabFlashcard" class="whitespace-nowrap flex-1 flex justify-center items-center gap-2 py-2.5 px-4 text-sm font-bold rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-all border border-transparent"><i class="fa-solid fa-clone text-amber-500"></i> Flashcards 2025</button>
                    <button aria-label="Tab Matrix" onclick="setTab('matrix')" id="btnTabMatrix" class="whitespace-nowrap flex-1 flex justify-center items-center gap-2 py-2.5 px-4 text-sm font-bold rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-all border border-transparent"><i class="fa-solid fa-code-compare text-emerald-400"></i> Comparator Matrix</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto px-4 py-6 w-full pb-28 md:pb-8 relative" id="mainContent"></main>

    <div id="mobileActionBar" class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-50 p-2 pb-safe hidden no-print">
        <div class="flex justify-between items-center gap-2 max-w-md mx-auto">
            <button aria-label="Kartu Sebelumnya" onclick="navigateCard('prev')" class="flex flex-col items-center justify-center h-[52px] w-14 rounded-xl text-slate-500 bg-slate-50 border border-slate-100 active:bg-slate-200"><i class="fa-solid fa-chevron-left text-lg"></i></button>
            <button aria-label="Tandai Dikuasai" onclick="toggleMastery()" id="btnActionMastery" class="flex-1 flex flex-col items-center justify-center h-[52px] px-2 rounded-xl text-slate-400 border-2 border-slate-200 active:bg-slate-50 transition-colors"><i class="fa-solid fa-check-double text-lg mb-0.5"></i><span class="text-[0.6rem] font-bold uppercase tracking-wider">Mastered</span></button>
            <button aria-label="Balik Kartu" onclick="flipCard()" class="flex-[1.5] flex flex-col items-center justify-center h-[52px] px-2 rounded-xl bg-amber-500 text-amber-950 shadow-md active:bg-amber-600 transition-colors border border-amber-400"><i class="fa-solid fa-rotate text-lg mb-0.5"></i><span class="text-[0.6rem] font-bold uppercase tracking-wider">Flip Card</span></button>
            <button aria-label="Kartu Selanjutnya" onclick="navigateCard('next')" class="flex flex-col items-center justify-center h-[52px] w-14 rounded-xl text-slate-500 bg-slate-50 border border-slate-100 active:bg-slate-200"><i class="fa-solid fa-chevron-right text-lg"></i></button>
        </div>
    </div>

    <script>
        const foundationCategories = ['Semua', 'Patofisiologi', 'Risiko & Target', 'Farmakoterapi', 'Populasi Khusus', 'Lp(a) & Lainnya'];
        const foundationData = [
            { id:"f1", category:"Patofisiologi", icon:"fa-disease", bgClass:"bg-rose-50", iconClass:"text-rose-600", borderClass:"border-rose-100", descClass:"text-rose-700 bg-rose-100/50 border-rose-200", title:"1. Patofisiologi Aterosklerosis", desc:"Perjalanan dari partikel lipoprotein hingga menjadi plak mematikan.", content:`
                <div class="flex flex-col gap-3">
                    <p class="text-sm text-slate-600 mb-2">Aterosklerosis bukanlah penyakit degeneratif pasif, melainkan proses <strong>inflamasi aktif</strong> yang dipicu oleh retensi kolesterol di dinding pembuluh darah.</p>
                    <div class="bg-rose-50 p-4 rounded-xl border border-rose-100 flex flex-col gap-2 relative shadow-inner">
                        <div class="absolute left-6 top-6 bottom-6 w-0.5 bg-rose-300"></div>
                        <div class="flex items-start gap-3 relative z-10"><div class="w-5 h-5 rounded-full bg-rose-500 text-white flex items-center justify-center text-[0.6rem] font-bold shrink-0 mt-0.5 shadow-md">1</div><div><h5 class="text-sm font-bold text-slate-800">Endothelial Injury & Retensi</h5><p class="text-xs text-slate-600 mt-0.5">Faktor risiko merusak endotel. Partikel ApoB menembus dan terperangkap di intima.</p></div></div>
                        <div class="flex items-start gap-3 relative z-10 mt-2"><div class="w-5 h-5 rounded-full bg-rose-500 text-white flex items-center justify-center text-[0.6rem] font-bold shrink-0 mt-0.5 shadow-md">2</div><div><h5 class="text-sm font-bold text-slate-800">Oksidasi & Rekrutmen Makrofag</h5><p class="text-xs text-slate-600 mt-0.5">LDL teroksidasi. Sistem imun memanggil monosit yang berubah menjadi makrofag pemakan lemak.</p></div></div>
                        <div class="flex items-start gap-3 relative z-10 mt-2"><div class="w-5 h-5 rounded-full bg-rose-500 text-white flex items-center justify-center text-[0.6rem] font-bold shrink-0 mt-0.5 shadow-md">3</div><div><h5 class="text-sm font-bold text-slate-800">Foam Cells & Fatty Streak</h5><p class="text-xs text-slate-600 mt-0.5">Makrofag mati, membentuk sel busa dan inti nekrotik cair (lipid core).</p></div></div>
                        <div class="flex items-start gap-3 relative z-10 mt-2"><div class="w-5 h-5 rounded-full bg-rose-500 text-white flex items-center justify-center text-[0.6rem] font-bold shrink-0 mt-0.5 shadow-md">4</div><div><h5 class="text-sm font-bold text-slate-800">Vulnerable Plaque & Ruptur</h5><p class="text-xs text-slate-600 mt-0.5">Enzim MMP menipiskan kapsul fibrous. Plak pecah, memicu trombosis akut.</p></div></div>
                    </div>
                    <div class="bg-slate-800 text-white p-3 rounded-lg text-xs mt-1 border-l-4 border-amber-500 shadow-sm flex gap-2 items-start"><i class="fa-solid fa-gem text-amber-400 mt-0.5"></i><span><strong>Clinical Pearl:</strong> Statin mencegah infark BUKAN dengan membersihkan inti lemak sepenuhnya, melainkan dengan <strong>mereduksi aktivasi makrofag dan menekan inflamasi</strong>, sehingga kapsul fibrous menebal & plak menjadi stabil.</span></div>
                </div>` },
            { id:"f2", category:"Patofisiologi", icon:"fa-vials", bgClass:"bg-amber-50", iconClass:"text-amber-600", borderClass:"border-amber-100", descClass:"text-amber-700 bg-amber-100/50 border-amber-200", title:"2. Klasifikasi Lipoprotein", desc:"Memahami spektrum partikel pembawa lipid dalam darah.", content:`
                <div class="overflow-x-auto rounded-lg shadow-sm border border-slate-200">
                    <table class="w-full text-left text-[0.8rem] border-collapse bg-white">
                        <tr class="bg-amber-100 text-amber-900 border-b border-amber-200"><th class="p-3">Lipoprotein</th><th class="p-3">Apo Utama</th><th class="p-3">Aterogenik?</th></tr>
                        <tr class="border-b border-slate-100"><td class="p-3 font-bold">Chylomicron</td><td class="p-3 bg-slate-50 text-slate-600 text-xs rounded m-1">ApoB-48</td><td class="p-3 text-slate-500">Terlalu besar (Risiko Pankreatitis)</td></tr>
                        <tr class="border-b border-slate-100"><td class="p-3 font-bold">VLDL & IDL</td><td class="p-3 bg-rose-100 text-rose-700 font-bold text-xs rounded m-1">ApoB-100</td><td class="p-3 text-rose-600 font-bold">Ya (Remnant merusak)</td></tr>
                        <tr class="border-b border-slate-100 bg-rose-50/30"><td class="p-3 font-bold text-rose-800">LDL</td><td class="p-3 bg-rose-100 text-rose-700 font-bold text-xs rounded m-1">ApoB-100</td><td class="p-3 text-rose-700 font-black">Sangat Ya (Aktor Utama)</td></tr>
                        <tr class="border-b border-slate-100 bg-emerald-50/30"><td class="p-3 font-bold text-emerald-800">HDL</td><td class="p-3 bg-emerald-100 text-emerald-700 font-bold text-xs rounded m-1">ApoA-1</td><td class="p-3 text-emerald-600 font-bold">Biomarker protektif, BUKAN target terapi</td></tr>
                    </table>
                </div>` },
            { id:"f3", category:"Risiko & Target", icon:"fa-calculator", bgClass:"bg-blue-50", iconClass:"text-blue-600", borderClass:"border-blue-100", descClass:"text-blue-700 bg-blue-100/50 border-blue-200", title:"3. Sistem SCORE & Kalkulasi", desc:"Prediksi risiko kardiovaskular absolut 10 tahun.", content:`
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 shadow-sm"><span class="font-black text-blue-900 block mb-2">Variabel Input:</span><ul class="text-xs space-y-2 text-blue-800"><li>Usia & Gender, Merokok, TDS, Kolesterol Total.</li></ul></div>
                    <div class="bg-rose-50 p-4 rounded-xl border border-rose-200 shadow-sm"><span class="font-black text-rose-900 block mb-2">Pengecualian Mutlak:</span><p class="text-xs text-rose-800">JANGAN gunakan SCORE jika pasien memiliki ACS, TIA/Stroke, PAD, DM dg organ damage, CKD berat, atau FH. Mereka <strong>Otomatis High / Very High Risk</strong>.</p></div>
                </div>` },
            { id:"f4", category:"Risiko & Target", icon:"fa-bullseye", bgClass:"bg-emerald-50", iconClass:"text-emerald-600", borderClass:"border-emerald-100", descClass:"text-emerald-700 bg-emerald-100/50 border-emerald-200", title:"4. Target Lipid Lengkap", desc:"Paradigma revolusioner 'Lower is Better'.", content:`
                <div class="flex flex-col gap-3">
                    <div class="bg-white border-l-4 border-rose-600 rounded-lg shadow-md"><div class="bg-rose-50 px-4 py-2 text-rose-900 font-black text-sm flex justify-between border-b border-rose-100"><span>Very High Risk</span><span class="text-[0.65rem] bg-rose-600 text-white px-2 py-0.5 rounded-full">Turun ≥ 50%</span></div><div class="p-4 grid grid-cols-3 text-center divide-x divide-slate-200"><div><span class="block text-[0.65rem] font-bold text-slate-400">LDL-C</span><span class="font-black text-xl text-rose-600">&lt; 55</span></div><div><span class="block text-[0.65rem] font-bold text-slate-400">NON-HDL</span><span class="font-black text-xl text-slate-700">&lt; 85</span></div><div><span class="block text-[0.65rem] font-bold text-slate-400">APOB</span><span class="font-black text-xl text-slate-700">&lt; 65</span></div></div></div>
                    <div class="bg-white border-l-4 border-amber-500 rounded-lg shadow-md"><div class="bg-amber-50 px-4 py-2 text-amber-900 font-black text-sm flex justify-between border-b border-amber-100"><span>High Risk</span><span class="text-[0.65rem] bg-amber-500 text-white px-2 py-0.5 rounded-full">Turun ≥ 50%</span></div><div class="p-3 grid grid-cols-3 text-center divide-x divide-slate-200"><div><span class="font-black text-lg text-amber-600">&lt; 70</span></div><div><span class="font-black text-lg text-slate-700">&lt; 100</span></div><div><span class="font-black text-lg text-slate-700">&lt; 80</span></div></div></div>
                    <div class="bg-white border-l-4 border-blue-500 rounded-lg shadow-md"><div class="bg-blue-50 px-4 py-2 text-blue-900 font-black text-sm border-b border-blue-100"><span>Moderate Risk</span></div><div class="p-3 grid grid-cols-3 text-center divide-x divide-slate-200"><div><span class="font-black text-lg text-blue-600">&lt; 100</span></div><div><span class="font-black text-lg text-slate-700">&lt; 130</span></div><div><span class="font-black text-lg text-slate-700">&lt; 100</span></div></div></div>
                    <div class="bg-emerald-50 text-emerald-800 p-3 rounded-xl border border-emerald-200 text-xs"><strong>Rumus Cepat:</strong> Target Non-HDL = Target LDL + 30 mg/dL.</div>
                </div>` },
            { id:"f5", category:"Farmakoterapi", icon:"fa-pills", bgClass:"bg-indigo-50", iconClass:"text-indigo-600", borderClass:"border-indigo-100", descClass:"text-indigo-700 bg-indigo-100/50 border-indigo-200", title:"5. Profil Statin Komparatif", desc:"Perbedaan intensitas dan metabolisme statin.", content:`
                <table class="w-full text-left text-xs border-collapse bg-white mb-3 shadow-sm rounded-lg overflow-hidden"><tr class="bg-slate-800 text-white"><th class="p-3 w-1/4">Intensitas</th><th class="p-3 text-center">Efek</th><th class="p-3 w-1/2">Statin & Dosis</th></tr><tr class="border-b bg-rose-50/50"><td class="p-3 font-black text-rose-700">High</td><td class="p-3 font-black text-center text-rose-600">≥ 50%</td><td class="p-3">Atorvastatin (40-80), Rosuvastatin (20-40)</td></tr><tr class="border-b bg-amber-50/50"><td class="p-3 font-black text-amber-700">Moderate</td><td class="p-3 font-bold text-center text-amber-700">30-49%</td><td class="p-3">Atorva (10-20), Rosuva (5-10), Simva (20-40)</td></tr></table>
                <div class="bg-indigo-50 p-3 rounded border border-indigo-100 text-xs text-indigo-900"><p><strong>CYP3A4 (Sangat rentan interaksi):</strong> Atorva, Simva. (Hindari makrolida, azole).<br><strong>Jalur Lain (Lebih aman):</strong> Rosuva, Prava, Pitava.</p></div>` },
            { id:"f6", category:"Farmakoterapi", icon:"fa-diagram-project", bgClass:"bg-teal-50", iconClass:"text-teal-600", borderClass:"border-teal-100", descClass:"text-teal-700 bg-teal-100/50 border-teal-200", title:"6. Algoritma Stepwise 2019", desc:"Cara kerja 3 pilar penurun kolesterol dan alur eskalasi.", content:`
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="md:w-1/2 space-y-2 text-xs text-slate-600"><strong>1. Statin:</strong> Hambat HMG-CoA Reductase di hati, memicu penambahan Reseptor LDL.<br><strong>2. Ezetimibe:</strong> Hambat NPC1L1 usus, blok absorpsi.<br><strong>3. PCSK9i:</strong> Blok PCSK9, perpanjang umur Reseptor LDL.</div>
                    <div class="md:w-1/2 flex flex-col items-center bg-slate-800 p-4 rounded-xl"><span class="text-xs font-black text-white mb-2">Stepwise 2019</span><div class="bg-rose-500 text-white text-xs px-3 py-2 rounded-lg text-center w-full">Inisiasi Statin Max Dose</div><div class="h-6 w-0.5 bg-slate-600 my-1 relative"><span class="absolute bg-slate-700 text-[0.5rem] text-slate-300 px-1 rounded left-2 whitespace-nowrap">Evaluasi 4-6 minggu</span></div><div class="bg-amber-500 text-white text-xs px-3 py-2 rounded-lg text-center w-full">Tambah Ezetimibe 10mg</div><div class="h-6 w-0.5 bg-slate-600 my-1 relative"><span class="absolute bg-slate-700 text-[0.5rem] text-slate-300 px-1 rounded left-2 whitespace-nowrap">Evaluasi 4-6 minggu</span></div><div class="bg-blue-500 text-white text-xs px-3 py-2 rounded-lg text-center w-full">PCSK9 Inhibitor</div></div>
                </div>` },
            { id:"f7", category:"Populasi Khusus", icon:"fa-dna", bgClass:"bg-fuchsia-50", iconClass:"text-fuchsia-600", borderClass:"border-fuchsia-100", descClass:"text-fuchsia-700 bg-fuchsia-100/50 border-fuchsia-200", title:"7. Familial Hypercholesterolemia (FH)", desc:"Penyakit genetik mematikan. Kriteria DLCN.", content:`
                <div class="bg-white p-4 rounded-xl border border-fuchsia-200 shadow-sm"><h4 class="font-black text-fuchsia-900 text-xs border-b border-fuchsia-100 pb-1 mb-2">Kriteria DLCN (Diagnosis)</h4><ul class="text-xs text-slate-700 space-y-1"><li>Riwayat Keluarga PJK Prematur</li><li>Tendon Xanthoma / Arcus Cornealis <45 thn</li><li>LDL-C > 155 hingga > 330 mg/dL</li><li class="font-bold text-rose-600 mt-2">Skor > 8 = Definite, 6-8 = Probable, 3-5 = Possible FH.</li></ul></div>
                <div class="text-xs bg-fuchsia-50 p-2 rounded mt-2 border border-fuchsia-100"><strong>Anak HeFH:</strong> Target <135 mg/dL. Di ESC 2025, skor SCORE2 pediatrik dan target agresif diberlakukan untuk anak ≥10 thn.</div>` },
            { id:"f8", category:"Populasi Khusus", icon:"fa-users", bgClass:"bg-orange-50", iconClass:"text-orange-600", borderClass:"border-orange-100", descClass:"text-orange-700 bg-orange-100/50 border-orange-200", title:"8. Populasi Khusus (DM, CKD, Wanita)", desc:"Manajemen pada spektrum pasien risiko ekstra.", content:`
                <div class="space-y-2 text-xs">
                    <div class="bg-white p-3 rounded shadow-sm border-l-4 border-orange-500"><strong>DM:</strong> Tipe 2 + mikroalbuminuria = <strong>Very High Risk</strong> (<55).</div>
                    <div class="bg-white p-3 rounded shadow-sm border-l-4 border-stone-500"><strong>CKD:</strong> Stage 3-5 = Tinggi/Sangat Tinggi. Gunakan <strong>Statin dosis Rendah/Sedang + Ezetimibe</strong> (mencegah akumulasi obat akibat klirens turun yg memicu miopati, BUKAN krn nefrotoksisitas murni). STOP jika masuk fase Hemodialisis baru.</div>
                    <div class="bg-white p-3 rounded shadow-sm border-l-4 border-pink-500"><strong>Wanita:</strong> Statin TERATOGENIK MUTLAK. Hentikan 1-2 bulan sebelum hamil. Opsi aman hamil: <em>Bile Acid Sequestrants</em>.</div>
                </div>` },
            { id:"f9", category:"Praktik Klinik", icon:"fa-person-running", bgClass:"bg-green-50", iconClass:"text-green-600", borderClass:"border-green-100", descClass:"text-green-700 bg-green-100/50 border-green-200", title:"9. Modifikasi Gaya Hidup", desc:"Pondasi utama terapi (Diet Mediterania).", content:`
                <ul class="text-xs text-slate-600 space-y-1 bg-green-50 p-3 rounded border border-green-100 list-disc pl-4"><li>Ganti SFA dengan lemak tak jenuh (Zaitun, kacang). Hindari lemak trans.</li><li>Trigliserida Tinggi: Batasi alkohol & gula cair.</li><li>Phytosterol (2g/hari) dapat turunkan LDL 10%.</li><li>Stop merokok, olahraga 3.5-7 jam/minggu.</li></ul>` },
            { id:"f10", category:"Praktik Klinik", icon:"fa-clipboard-user", bgClass:"bg-slate-100", iconClass:"text-slate-600", borderClass:"border-slate-200", descClass:"text-slate-700 bg-slate-200/50 border-slate-300", title:"10. Monitoring Keamanan", desc:"Kapan mengecek darah ulang dan menilai enzim.", content:`
                <div class="text-xs bg-white p-3 rounded shadow-sm border border-slate-200 mb-2">Cek profil lipid <strong>4 hingga 6 minggu</strong> pasca inisiasi/ubah dosis.</div>
                <div class="grid grid-cols-2 gap-2 text-[0.7rem]"><div class="bg-rose-50 p-2 rounded border border-rose-200"><strong>SGPT/ALT:</strong> Hentikan/turunkan statin HANYA jika naik > 3x ULN.</div><div class="bg-amber-50 p-2 rounded border border-amber-200"><strong>Enzim CK:</strong> Hentikan jika CK > 10x ULN. Tidak disarankan cek rutin tanpa mialgia.</div></div>` },
            { id:"f11", category:"Lp(a) & Lainnya", icon:"fa-vial-virus", bgClass:"bg-purple-50", iconClass:"text-purple-600", borderClass:"border-purple-100", descClass:"text-purple-700 bg-purple-100/50 border-purple-200", title:"11. Manajemen Lipoprotein(a) Dasar", desc:"Pengenalan target genetik tersembunyi.", content:`
                <div class="bg-purple-50 p-3 text-xs text-slate-700 rounded-xl border border-purple-200">Lp(a) adalah lipoprotein mirip LDL dengan tambahan Apo(a) yang membuatnya sangat aterogenik dan pro-trombosis. Kadarnya 90% genetik.<br><br><strong>Rekomendasi Utama:</strong> Ukur minimal sekali seumur hidup. Kadar >50 mg/dL berisiko tinggi. Statin dan diet tidak dapat menurunkannya. PCSK9i (evolocumab/alirocumab) menurunkan Lp(a) ~25-30% sebagai efek sekunder, sangat dianjurkan untuk pasien dengan Lp(a) tinggi.</div>` }

        const flashcards = [
            {id:1,topic:"Risk Assessment",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apa nama sistem skoring risiko CVD utama yang menggantikan SCORE pada panduan ESC terbaru?",a:"SCORE2 (usia 40-69 tahun) dan SCORE2-OP (usia ≥70 tahun).",pearl:"SCORE lama hanya menghitung kematian, SCORE2 menghitung risiko Fatal dan NON-Fatal CVD.",rationale:"Dengan memasukkan kejadian non-fatal (infark miokard & stroke), SCORE2 mencerminkan beban total penyakit aterosklerosis secara lebih akurat."},
            {id:2,topic:"Risk Assessment",badge:"Upgraded Class",badgeClass:"badge-upgrade",q:"Pada usia berapa saja algoritma SCORE2 direkomendasikan untuk digunakan?",a:"Pada individu sehat berusia 40 hingga 69 tahun.",pearl:"Untuk usia 70-89 tahun, gunakan SCORE2-OP (Older Persons).",rationale:"Risiko CVD pada lansia memiliki kalibrasi yang berbeda karena faktor 'competing risks' dari penyebab kematian non-CVD lainnya."},
            {id:3,topic:"Risk Assessment",badge:"Extreme Risk",badgeClass:"badge-extreme",q:"Apakah pasien dengan riwayat ACS (Sindrom Koroner Akut) perlu dihitung skor SCORE2-nya?",a:"TIDAK. Mereka secara otomatis masuk ke kategori 'Very High Risk' (Risiko Sangat Tinggi).",pearl:"SCORE2 HANYA untuk Primary Prevention (Pencegahan Primer).",rationale:"Sistem skoring tidak berlaku bagi pasien yang sudah terbukti memiliki ASCVD klinis, diabetes dengan kerusakan organ, CKD berat, atau FH."},
            {id:4,topic:"Lipoprotein (a)",badge:"Upgraded Class",badgeClass:"badge-upgrade",q:"Bagaimana rekomendasi pengukuran kadar Lipoprotein (a) [Lp(a)] terbaru?",a:"Diukur MINIMAL SEKALI seumur hidup pada setiap individu dewasa (Kelas I).",pearl:"Level Lp(a) >50 mg/dL meningkatkan risiko ASCVD secara signifikan.",rationale:"Kadar Lp(a) ditentukan secara genetik 90% dan stabil seumur hidup. Diet dan statin tidak menurunkannya. Mengetahui kadarnya krusial untuk re-stratifikasi risiko."},
            {id:5,topic:"Risk Modifiers",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Jika skor risiko SCORE2 berada di ambang batas (borderline), pemeriksaan pencitraan apa yang paling direkomendasikan?",a:"CT Calcium Score (CAC) atau USG Karotis (deteksi plak).",pearl:"CAC Score = 0 menurunkan profil risiko (reclassify downward).",rationale:"Mendeteksi beban aterosklerosis subklinis secara anatomis lebih superior daripada mengukur ketebalan intima-media (CIMT) yang kini tidak direkomendasikan."},
            {id:6,topic:"Lipid Profile",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apakah pasien wajib berpuasa sebelum melakukan tes profil lipid rutin?",a:"TIDAK WAJIB. Sampel darah tidak puasa (non-fasting) direkomendasikan untuk skrining rutin.",pearl:"Puasa hanya diperlukan jika Trigliserida non-puasa >400 mg/dL (4.5 mmol/L).",rationale:"Bukti menunjukkan profil lipid non-puasa memiliki akurasi prognostik yang setara untuk LDL-C dan lebih praktis bagi pasien."},
            {id:7,topic:"Apolipoprotein B",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Kapan pemeriksaan Apolipoprotein B (ApoB) lebih superior daripada LDL-C?",a:"Pada pasien hipertrigliseridemia, obesitas, sindrom metabolik, atau diabetes.",pearl:"1 molekul ApoB = 1 partikel aterogenik (LDL, VLDL, IDL).",rationale:"Pada resistensi insulin, partikel LDL menjadi kecil dan padat (sdLDL). Kolesterol LDL total mungkin tampak normal, tapi jumlah partikelnya (ApoB) sangat tinggi dan aterogenik."},
            {id:8,topic:"Non-HDL-C",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Bagaimana cara menghitung Kolesterol Non-HDL?",a:"Total Kolesterol dikurangi HDL-Kolesterol (TC - HDL).",pearl:"Non-HDL-C adalah target sekunder yang sangat penting, terutama jika ApoB tidak tersedia.",rationale:"Non-HDL-C merepresentasikan seluruh kolesterol yang terkandung dalam semua lipoprotein aterogenik, sangat akurat pada pasien dengan Trigliserida tinggi."},
            {id:9,topic:"Risk Assessment",badge:"Red Flag",badgeClass:"badge-extreme",q:"Kondisi apa saja yang otomatis membuat pasien berstatus 'Very High Risk' tanpa perlu SCORE2?",a:"ASCVD klinis/imajing, DM dengan kerusakan organ, CKD berat (eGFR <30), skor SCORE2 ≥10%, atau FH dengan ASCVD.",pearl:"Jangan buang waktu menghitung SCORE2 pada pasien pasca-MI.",rationale:"Pasien ini memiliki beban aterosklerosis yang sudah definitif atau setara ekuivalen infark, mewajibkan target LDL paling agresif."},
            {id:10,topic:"Risk Modifiers",badge:"New Drug",badgeClass:"badge-new",q:"Selain pencitraan kardiovaskular, apa faktor klinis yang bisa memodifikasi (menaikkan) risiko SCORE2?",a:"Stres psikososial, riwayat preeklampsia/hipertensi kehamilan, penyakit autoimun (RA, Lupus), dan hipertrofi ventrikel kiri (LVH).",pearl:"Inflamasi kronis adalah bahan bakar aterosklerosis.",rationale:"Faktor-faktor ini berkontribusi pada disfungsi endotel dan inflamasi sistemik yang tidak tertangkap oleh skor usia, TD, dan kolesterol tradisional."},
            {id:11,topic:"LDL Targets",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa target absolut LDL-C untuk pasien Very High Risk (Risiko Sangat Tinggi)?",a:"<55 mg/dL (<1.4 mmol/L) DAN penurunan ≥50% dari baseline.",pearl:"Kedua syarat (<55 DAN turun 50%) harus terpenuhi secara simultan.",rationale:"Jika LDL awal pasien adalah 100 mg/dL, mencapai 45 mg/dL sudah memenuhi keduanya. Tapi jika LDL awalnya 80 mg/dL, ia harus turun menjadi <40 mg/dL untuk memenuhi kriteria ≥50%."},
            {id:12,topic:"LDL Targets",badge:"Extreme Risk",badgeClass:"badge-extreme",q:"Berapa target LDL-C untuk pasien dengan kejadian ASCVD BERULANG dalam <2 tahun?",a:"Target sangat agresif: <40 mg/dL (<1.0 mmol/L).",pearl:"Meskipun pasien sudah dalam terapi statin maksimal, target ini wajib dikejar.",rationale:"Konsep 'Lower is Better for Longer'. Kejadian berulang menandakan plak super vulnerabel. LDL <40 terbukti dapat meregresi volume plak ateroma."},
            {id:13,topic:"LDL Targets",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa target LDL-C untuk pasien High Risk (Risiko Tinggi)?",a:"<70 mg/dL (<1.8 mmol/L) DAN penurunan ≥50% dari baseline.",pearl:"Contoh: Pasien DM tanpa kerusakan organ >10 tahun, atau CKD sedang (eGFR 30-59).",rationale:"Penurunan LDL hingga <70 mg/dL pada kelompok ini terbukti secara persisten menunda onset komplikasi kardiovaskular mayor."},
            {id:14,topic:"LDL Targets",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa target LDL-C untuk pasien Moderate Risk (Risiko Sedang)?",a:"<100 mg/dL (<2.6 mmol/L).",pearl:"Termasuk pasien DM usia muda (<35 tahun DM tipe 1, <50 tahun DM tipe 2) durasi <10 tahun.",rationale:"Pada risiko sedang, pendekatan step-wise dengan modifikasi gaya hidup sering kali dicoba sebelum farmakoterapi agresif."},
            {id:15,topic:"LDL Targets",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa target LDL-C untuk pasien Low Risk (Risiko Rendah)?",a:"<116 mg/dL (<3.0 mmol/L).",pearl:"Pasien dengan skor SCORE2 <4% (tergantung usia/region).",rationale:"Fokus utama pada populasi risiko rendah adalah edukasi modifikasi gaya hidup (diet, olahraga, stop merokok)."},
            {id:16,topic:"Secondary Targets",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Jika target LDL <55 mg/dL sudah tercapai pada pasien Very High Risk, berapa target Non-HDL-C nya?",a:"<85 mg/dL (<2.2 mmol/L).",pearl:"Target Non-HDL selalu = Target LDL + 30 mg/dL.",rationale:"Angka +30 mg/dL merepresentasikan kuota maksimum kolesterol yang boleh terkandung dalam VLDL/IDL (Sisa trigliserida)."},
            {id:17,topic:"Secondary Targets",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa target Apolipoprotein B (ApoB) untuk pasien Very High Risk?",a:"<65 mg/dL.",pearl:"ApoB <65 mg/dL setara dengan LDL <55 mg/dL.",rationale:"Memastikan bahwa jumlah total partikel aterogenik benar-benar sudah ditekan, sangat vital bagi pasien diabetik."},
            {id:18,topic:"Triglycerides",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apakah ada target absolut yang harus dicapai untuk kadar Trigliserida (TG)?",a:"Tidak ada target absolut, namun TG >150 mg/dL menandakan peningkatan risiko.",pearl:"TG bukan target primer, tapi indikator 'Residual Risk' (Risiko Sisa).",rationale:"Trigliserida yang tinggi menandakan adanya remnant lipoprotein yang kaya kolesterol. Terapi difokuskan pada lifestyle dan agen penurun TG spesifik jika sangat tinggi."},
            {id:19,topic:"HDL-C",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apakah kita harus menggunakan obat (seperti fibrat/niasin) untuk menaikkan kadar HDL yang rendah?",a:"TIDAK DIREKOMENDASIKAN. Meningkatkan HDL secara farmakologis terbukti tidak menurunkan risiko CVD.",pearl:"HDL rendah adalah biomarker modifikasi risiko, BUKAN target terapi.",rationale:"Trial klinis obat penambah HDL (CETP inhibitor, Niacin) gagal menunjukkan manfaat survival. Fokuslah pada penurunan LDL dan ApoB."},
            {id:20,topic:"Familial Hypercholesterolemia",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa target LDL-C untuk pasien anak-anak (>10 tahun) dengan HeFH?",a:"Target <135 mg/dL (<3.5 mmol/L).",pearl:"Di ESC 2025 disarankan pengunaan SCORE2 pediatrik untuk target lebih agresif pada HoFH.",rationale:"Pemberian statin dini pada anak HeFH terbukti menunda kurva kejadian koroner hingga menyamai populasi normal tanpa FH."},
            {id:21,topic:"Treatment Strategy",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Kapan 'Upfront Combination Therapy' (Statin + Ezetimibe langsung di awal) direkomendasikan?",a:"Pada pasien ASCVD (Very High Risk) yang profil LDL awal-nya sangat jauh dari target (misal butuh penurunan >65%).",pearl:"Tinggalkan strategi 'titrasi lambat' jika gap LDL sangat besar.",rationale:"Kombinasi upfront menurunkan LDL lebih cepat, mencegah progresi plak, dan meningkatkan compliance pasien."},
            {id:22,topic:"Statins",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa yang dimaksud dengan High-Intensity Statin (Statin Intensitas Tinggi)?",a:"Dosis statin yang mampu menurunkan LDL-C ≥50%. (Contoh: Atorvastatin 40-80 mg, Rosuvastatin 20-40 mg).",pearl:"Pilih Atorvastatin atau Rosuvastatin untuk pasien risiko tinggi.",rationale:"Hanya dua statin ini pada dosis maksimalnya yang terbukti konsisten memotong LDL separuh dari nilai baseline."},
            {id:23,topic:"Statins",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa persen rata-rata penurunan LDL-C yang didapat dengan Atorvastatin 20 mg (Moderate Intensity)?",a:"Sekitar 30% - 49%.",pearl:"Atorvastatin 20mg tidak cukup untuk Mayoritas pasien paska Serangan Jantung.",rationale:"Dosis sedang berguna untuk pencegahan primer risiko sedang, namun sub-terapeutik untuk sindrom koroner akut."},
            {id:24,topic:"Statins",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa efek samping statin yang paling ditakuti namun paling jarang terjadi (insidensi <0.1%)?",a:"Rhabdomyolysis (kerusakan otot rangka masif disertai mioglobinuria dan gagal ginjal).",pearl:"Sangat jarang, seringkali dipicu oleh interaksi obat (Polifarmasi).",rationale:"Meskipun rhabdomyolysis fatal, SAMS (gejala otot terkait statin) yang ringan jauh lebih umum dan sering bersifat nocebo."},
            {id:25,topic:"Statins",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Bolehkah statin dihentikan secara tiba-tiba saat pasien mengalami Sindrom Koroner Akut (ACS)?",a:"KONTRAINDIKASI. Statin tidak boleh dihentikan saat ACS.",pearl:"Penghentian statin saat ACS memicu 'rebound inflamasi' dan disfungsi endotel.",rationale:"Statin memiliki efek pleiotropik akut: menstabilkan plak yang robek dan memperbaiki fungsi endotel dalam hitungan jam pasca-iskemia."},
            {id:26,topic:"Statins",badge:"Red Flag",badgeClass:"badge-extreme",q:"Kombinasi statin dengan obat apa yang sangat meningkatkan risiko miopati/rhabdomyolysis?",a:"Gemfibrozil, Makrolida (Eritromisin), Azole Antifungal, dan imunosupresan (Siklosporin).",pearl:"Gunakan Fenofibrate jika harus kombinasi dengan statin, JANGAN Gemfibrozil.",rationale:"Obat-obat ini menghambat jalur metabolisme CYP450 3A4 (untuk Atorvastatin/Simvastatin) dan jalur glukuronidasi, menyebabkan toksisitas darah."},
            {id:27,topic:"Statins",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apakah pasien yang mengeluh 'otot pegal' (Mialgia) tanpa kenaikan enzim CK (Creatine Kinase) harus stop statin permanen?",a:"Tidak. Lakukan re-challenge (coba ulang) dengan statin lain atau turunkan dosis.",pearl:"Mayoritas pasien mialgia dapat mentolerir statin jenis lain (seperti Rosuvastatin/Pitavastatin yang hidrofilik).",rationale:"Efek nocebo bertanggung jawab atas >50% keluhan nyeri otot pada pengguna statin."},
            {id:28,topic:"Ezetimibe",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Bagaimana mekanisme kerja Ezetimibe?",a:"Menghambat transporter NPC1L1 di usus, memblokir penyerapan kolesterol dari empedu dan makanan.",pearl:"Ezetimibe menambah penurunan LDL sebesar 15-20% saat ditambahkan ke statin.",rationale:"Kombinasi Statin (blok sintesis hati) + Ezetimibe (blok absorpsi usus) adalah sinergi sempurna dengan efek samping minimal."},
            {id:29,topic:"Ezetimibe",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Kapan Ezetimibe digunakan sebagai monoterapi?",a:"Hanya pada pasien dengan Intoleransi Statin absolut (Statin Intolerance).",pearl:"Lebih disarankan kombinasi dengan Asam Bempedoat jika pasien intoleran statin.",rationale:"Efektivitas ezetimibe tunggal hanya menurunkan LDL ~18%, jarang cukup untuk mencapai target pada pasien risiko tinggi."},
            {id:30,topic:"Combination Therapy",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Berapa total persen penurunan LDL jika pasien diberikan High-Intensity Statin + Ezetimibe + PCSK9 inhibitor?",a:"Penurunan masif hingga 85% dari baseline.",pearl:"Trinitas penurun lipid terdahsyat saat ini.",rationale:"Kombinasi tiga pilar ini mampu menundukkan hampir semua kasus hiperkolesterolemia refrakter, termasuk HeFH."},
            {id:31,topic:"PCSK9 Inhibitors",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Bagaimana mekanisme kerja Alirocumab dan Evolocumab?",a:"Antibodi monoklonal yang mengikat protein PCSK9 bebas, mencegah penghancuran reseptor LDL (LDL-R) di hati.",pearl:"Memperpanjang usia reseptor LDL, sehingga hati menyedot lebih banyak LDL dari darah.",rationale:"PCSK9 secara alami mendegradasi LDL-R. Dengan menghambat PCSK9, jumlah LDL-R di permukaan hati meningkat drastis."},
            {id:32,topic:"PCSK9 Inhibitors",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa rata-rata penurunan LDL-C yang diberikan oleh injeksi PCSK9 inhibitor (Evolocumab/Alirocumab)?",a:"Penurunan tambahan sekitar 60% di atas terapi statin maksimal.",pearl:"Diberikan secara injeksi subkutan setiap 2 minggu atau 1 bulan sekali.",rationale:"Obat ini merevolusi manajemen lipid bagi pasien yang gagal target dengan kombinasi oral maksimal."},
            {id:33,topic:"Inclisiran",badge:"New Drug",badgeClass:"badge-new",q:"Apa itu Inclisiran dan apa keunggulannya?",a:"Terapi siRNA (small interfering RNA) yang membungkam gen produksi PCSK9 di dalam sel hati.",pearl:"Injeksinya sangat jarang: Hari 1, Bulan ke-3, lalu setiap 6 BULAN (setahun 2x).",rationale:"Frekuensi injeksi yang seperti vaksinasi memastikan kepatuhan pasien (compliance) 100% jika diberikan di klinik."},
            {id:34,topic:"Inclisiran",badge:"New Drug",badgeClass:"badge-new",q:"Bagaimana profil penurunan LDL Inclisiran dibandingkan PCSK9i Monoklonal (Evolocumab)?",a:"Inclisiran menurunkan LDL ~50-55%, sedikit di bawah Evolocumab (~60%).",pearl:"Posisi rekomendasinya kini sejajar (Class IIa/I) sebagai alternatif PCSK9i antibodi.",rationale:"Meskipun penurunannya sedikit lebih rendah, kenyamanan dosis 6-bulanan sangat bernilai secara klinis."},
            {id:35,topic:"Bempedoic Acid",badge:"New Drug",badgeClass:"badge-new",q:"Bagaimana mekanisme kerja Asam Bempedoat (Bempedoic Acid)?",a:"Menghambat enzim ATP Citrate Lyase (ACL), yang berada 1 tingkat di atas enzim target statin (HMG-CoA reductase).",pearl:"Ini adalah statin-like drug dalam bentuk oral.",rationale:"Menghambat jalur biosintesis kolesterol di hati, memicu *up-regulation* reseptor LDL untuk membersihkan darah."},
            {id:36,topic:"Bempedoic Acid",badge:"New Drug",badgeClass:"badge-new",q:"Mengapa Asam Bempedoat SANGAT direkomendasikan untuk pasien Statin Intolerance (nyeri otot)?",a:"Karena ini adalah pro-drug yang HANYA diaktivasi di organ hati, enzim pengaktifnya tidak ada di otot rangka.",pearl:"Bempedoic acid bebas dari risiko Mialgia/SAMS (Statin-Associated Muscle Symptoms).",rationale:"Inovasi brilian ini memberikan efek mirip statin secara lokal di hati tanpa pernah meracuni jaringan otot perifer."},
            {id:37,topic:"Bempedoic Acid",badge:"New Drug",badgeClass:"badge-new",q:"Apa 2 efek samping unik dari Asam Bempedoat yang harus diwaspadai?",a:"Peningkatan kadar Asam Urat (Hiperurisemia/Gout) dan sedikit risiko Batu Empedu.",pearl:"Hati-hati memberikan pada penderita riwayat Gout kronis aktif.",rationale:"Asam Bempedoat bersaing di tubulus ginjal dengan jalur ekskresi asam urat (OAT2), menyebabkan retensi asam urat ringan-sedang di darah."},
            {id:38,topic:"Algorithm",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Bagaimana urutan penambahan obat oral terbaru setelah Statin gagal mencapai target?",a:"Statin Maksimal -> Tambah Ezetimibe -> Tambah Asam Bempedoat -> Baru beralih ke Injeksi (PCSK9i/Inclisiran).",pearl:"Asam bempedoat memperkuat amunisi ORAL sebelum jarum suntik.",rationale:"Kombinasi Statin + Ezetimibe + Bempedoic Acid bisa menurunkan LDL hingga >60% secara oral penuh."},
            {id:39,topic:"Statin Intolerance",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Bagaimana algoritma farmakoterapi untuk pasien intoleransi statin absolut (SAMS terkonfirmasi)?",a:"Ezetimibe + Asam Bempedoat. Jika tidak capai target, tambah PCSK9i / Inclisiran.",pearl:"Kombinasi Eze + Bempedoat menurunkan LDL ~40% tanpa efek otot.",rationale:"Panduan baru memberi rute yang jelas bagi pasien yang trauma dengan nyeri statin tanpa mengorbankan target LDL."},
            {id:40,topic:"PCSK9 Inhibitors",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Selain LDL-C, marker lipid aterogenik apalagi yang secara kuat diturunkan oleh PCSK9 inhibitor?",a:"Lipoprotein (a) [Lp(a)], turun sebesar 25-30%.",pearl:"Statin justru bisa sedikit menaikkan Lp(a). PCSK9i adalah satu-satunya obat penurun Lp(a) yang saat ini disetujui (off-label).",rationale:"Meskipun terapi RNA spesifik Lp(a) masih dalam trial (Pelacarsen), PCSK9i memberi efek bonus proteksi bagi pasien dengan Lp(a) tinggi."},
            {id:41,topic:"Hypertriglyceridemia",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa langkah PERTAMA dan PALING PENTING dalam tata laksana Hipertrigliseridemia?",a:"Modifikasi Gaya Hidup: Penurunan berat badan, batasi alkohol, kurangi karbohidrat sederhana/fruktosa.",pearl:"Trigliserida sangat sensitif terhadap asupan gula dan alkohol.",rationale:"Alkohol dan gula cair memicu lipogenesis hepatik masif. Menghentikannya seringkali memangkas kadar TG hingga 50% tanpa obat."},
            {id:42,topic:"Hypertriglyceridemia",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Pada level Trigliserida berapa risiko Pankreatitis Akut meningkat drastis?",a:"> 880 mg/dL (>10 mmol/L).",pearl:"Trigliserida >880 adalah indikasi Fibrat segera untuk cegah radang pankreas maut.",rationale:"Kolesterol tinggi membunuh dalam tahunan (infark); Trigliserida sangat tinggi membunuh dalam hitungan jam via pankreatitis nekrotik."},
            {id:43,topic:"Hypertriglyceridemia",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apakah Statin efektif menurunkan Trigliserida?",a:"Ya. High-Intensity Statin dapat menurunkan TG sebesar 10% hingga 30%.",pearl:"Statin tetap lini pertama (Class I) jika pasien berisiko tinggi (High Risk CV), terlepas dari nilai TG.",rationale:"Penurunan jumlah VLDL oleh statin berkontribusi terhadap bersihan trigliserida sirkulasi."},
            {id:44,topic:"Icosapent Ethyl",badge:"New Drug",badgeClass:"badge-new",q:"Obat spesifik penurun Trigliserida apa yang direkomendasikan untuk mencegah kejadian Kardiovaskular (Class I/IIa)?",a:"Icosapent Ethyl (Dosis tinggi 2x2g/hari).",pearl:"Hanya terbukti efektif pada pasien berisiko tinggi dengan TG 135-499 mg/dL di atas statin.",rationale:"Berdasarkan REDUCE-IT trial, agen EPA murni ini mencegah infark dan stroke secara signifikan (RRR 25%)."},
            {id:45,topic:"Icosapent Ethyl",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apakah suplemen minyak ikan biasa (kombinasi EPA + DHA) setara dengan Icosapent Ethyl?",a:"TIDAK. Suplemen minyak ikan campuran TIDAK DIREKOMENDASIKAN untuk pencegahan CVD.",pearl:"Campuran DHA dalam minyak ikan generik dapat menaikkan kadar LDL.",rationale:"Trial besar (STRENGTH) membuktikan campuran asam lemak omega-3 biasa tidak memberi manfaat kardiovaskular sama sekali."},
            {id:46,topic:"Fibrates",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Bagaimana peran Fibrat (Fenofibrate, Gemfibrozil) pada era panduan baru?",a:"Pamornya turun. Hanya direkomendasikan (Class IIb) sebagai tambahan statin jika TG tetap >200 mg/dL ATAU lini pertama jika TG >880 mg/dL (Cegah Pankreatitis).",pearl:"Fibrat unggul menggerus TG, tapi gagal terbukti menurunkan mortalitas serangan jantung.",rationale:"Trial PROMINENT (Pemafibrate) yang gagal baru-baru ini semakin memupus harapan kelas obat fibrat untuk pencegahan penyakit koroner."},
            {id:47,topic:"Omega-3",badge:"Red Flag",badgeClass:"badge-extreme",q:"Apa efek samping kardiak spesifik dari konsumsi Icosapent Ethyl / Omega-3 dosis tinggi?",a:"Meningkatkan risiko Fibrilasi Atrium (Atrial Fibrillation - AF).",pearl:"Waspada pada pasien dengan riwayat palpitasi atau takikardia supraventrikular.",rationale:"Meski mekanismenya belum sepenuhnya jelas, inkorporasi EPA dosis tinggi ke membran sel atrium diyakini memodifikasi elektrofisiologi seluler."},
            {id:48,topic:"Hypertriglyceridemia",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Mengapa diabetes yang tidak terkontrol (HbA1c tinggi) sering disertai hipertrigliseridemia?",a:"Defisiensi aksi insulin melemahkan enzim Lipoprotein Lipase (LPL).",pearl:"LPL adalah 'gunting' yang memecah trigliserida darah. Tanpa insulin, LPL tumpul.",rationale:"Memperbaiki kontrol glikemik (menyuntik insulin/SGLT2i) sering kali menormalkan kadar trigliserida secara otomatis."},
            {id:49,topic:"Secondary Causes",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Sebutkan 3 obat yang sering menyebabkan Hipertrigliseridemia iatrogenik!",a:"Kortikosteroid, Estrogen oral (Pil KB), dan Antipsikotik Atipikal (Olanzapine).",pearl:"Beta-blocker non-selektif juga sedikit menaikkan TG.",rationale:"Selalu cari penyebab sekunder (obat-obatan, hipotiroidisme, gagal ginjal) sebelum mendiagnosis kelainan genetik murni."},
            {id:50,topic:"ApoB in TG",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Jika Trigliserida tinggi (misal 300 mg/dL) tapi ApoB normal, apakah risiko aterosklerotiknya tinggi?",a:"Kemungkinan besar TIDAK. Partikel VLDL/kilomikron-nya besar dan tidak bisa menembus dinding endotel.",pearl:"ApoB adalah penentu kebenaran (ultimate arbiter) dari bahaya Trigliserida.",rationale:"Trigliserida sendiri tidak tertumpuk di plak; kolesterol di dalam remnant-lah yang merusak. Jika jumlah partikel (ApoB) normal, risikonya tergolong rendah."},
            {id:51,topic:"FH Diagnosis",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa kriteria diagnosis klinis yang paling sering digunakan untuk Heterozygous FH (HeFH)?",a:"Dutch Lipid Clinic Network (DLCN) Criteria.",pearl:"Skor >8 menandakan Definite FH. Skor 6-8 = Probable FH. Skor 3-5 = Possible FH.",rationale:"Skoring ini mempertimbangkan kadar LDL yang ekstrem, riwayat penyakit koroner dini pada keluarga, dan penanda fisik kolesterol."},
            {id:52,topic:"FH Physical Signs",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Sebutkan tanda fisik patognomonis (khas) dari Familial Hypercholesterolemia!",a:"Tendon Xanthoma (terutama di Achilles) dan Arcus Cornealis (cincin putih di mata) pada usia <45 tahun.",pearl:"Xanthelasma (bercak kuning di kelopak mata) TIDAK spesifik untuk FH.",rationale:"Xanthoma tendon adalah penumpukan kolesterol di makrofag jaringan ikat, tanda pasti reseptor LDL yang sangat cacat sejak lahir."},
            {id:53,topic:"FH Risk Level",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Pasien HeFH (tanpa riwayat ASCVD klinis) masuk ke kategori risiko apa?",a:"High Risk (Risiko Tinggi). Jika disertai penyulit (DM/Hipertensi/ASCVD), menjadi Very High Risk.",pearl:"Pasien FH TIDAK PERNAH masuk kategori risiko rendah.",rationale:"Beban paparan LDL kumulatif seumur hidup (Kolesterol-Tahun) pada FH sangat ekstrem, mendesak ateroma sejak usia belasan."},
            {id:54,topic:"Homozygous FH",badge:"Extreme Risk",badgeClass:"badge-extreme",q:"Apa tanda klinis spesifik dari Homozygous FH (HoFH)?",a:"Kadar LDL-C >500 mg/dL, Xanthoma muncul di usia BALITA, sering meninggal akibat infark sebelum usia 20 tahun.",pearl:"Kondisi sangat langka, dimana KEDUA gen reseptor LDL rusak.",rationale:"Tanpa intervensi ekstrem (Lipoprotein Apheresis/Obat genetik), pasien HoFH akan mengalami oklusi ostium koroner mematikan di usia sekolah."},
            {id:55,topic:"Homozygous FH",badge:"New Drug",badgeClass:"badge-new",q:"Obat baru apa yang diindikasikan khusus untuk Homozygous FH yang kebal Statin/PCSK9i?",a:"Evinacumab (AngPTL3 inhibitor) atau Lomitapide (MTP inhibitor).",pearl:"Bekerja di jalur yang tidak membutuhkan Reseptor LDL sama sekali.",rationale:"Pada HoFH, reseptor LDL hampir nol. Evinacumab mengatasi ini dengan mempercepat bersihan via jalur reseptor remnant alternatif."},
            {id:56,topic:"FH Screening",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Bagaimana metode skrining yang direkomendasikan setelah 1 pasien terdiagnosis FH?",a:"Cascade Screening (Skrining Kaskade).",pearl:"Tes kolesterol pada keluarga inti lapis pertama (orang tua, anak, saudara kandung).",rationale:"Karena HeFH bersifat autosomal dominan, ada kemungkinan 50% keturunan langsungnya juga mewarisi mutasi genetik mematikan ini."},
            {id:57,topic:"Extreme Risk",badge:"Extreme Risk",badgeClass:"badge-extreme",q:"Target LDL <40 mg/dL wajib dicapai jika pasien mengalami rekurensi dalam <2 tahun. Bagaimana strategi tercepatnya?",a:"Upfront Triple Therapy (Statin High Intensity + Ezetimibe + PCSK9 Inhibitor).",pearl:"Jangan buang waktu 3 bulan per evaluasi.",rationale:"Tingkat kerentanan plak sangat gawat darurat. Menurunkan LDL seketika mematikan aktivitas makrofag (MMP) pemakan kapsul fibrous."},
            {id:58,topic:"Vulnerable Plaque",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa manfaat fenomena pleiotropik statin pada plak ateroma?",a:"Menebalkan kapsul fibrous kolagen dan menyusutkan inti lemak cair (Lipid Core).",pearl:"Mengubah plak rapuh (vulnerable) menjadi batu padat yang aman (stable).",rationale:"Inilah mengapa statin menyelamatkan nyawa pasca-serangan jantung, jauh melebihi sekadar menurunkan angka LDL di kertas lab."},
            {id:59,topic:"Carotid Imaging",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apakah temuan plak karotis via USG mengubah status risiko pasien?",a:"YA. Temuan plak karotis definitif langsung memasukkan asimtomatik ke kategori 'Very High Risk'.",pearl:"CIMT (Ketebalan dinding) BUKAN plak. Plak adalah penonjolan lokal >1.5 mm.",rationale:"Aterosklerosis adalah penyakit sistemik. Plak di leher = ada plak di koroner jantung."},
            {id:60,topic:"Coronary Calcium",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Skor kalsium koroner (CAC Score) >100 Agatston setara dengan tingkat risiko apa?",a:"Tingkat risiko tinggi (High Risk).",pearl:"Kalsium adalah bekas luka dari plak yang telah sembuh. Skor tinggi = banyak plak tersembunyi.",rationale:"CAC Score sangat berguna sebagai pemecah keraguan (tie-breaker) untuk memutuskan inisiasi statin pada pasien risiko menengah."},
            {id:61,topic:"Elderly & Frail",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Bagaimana memulai Statin untuk Primary Prevention pada lansia (>75 tahun) yang rapuh (frail)?",a:"Mulai dengan Dosis Rendah atau Sedang (Class IIb). JANGAN langsung dosis tinggi.",pearl:"Bila perlu, gunakan Ezetimibe monoterapi jika statin tidak ditoleransi.",rationale:"Penurunan massa otot (sarkopenia) dan fungsi ginjal ekstrem membuat lansia rapuh sangat rentan rhabdomyolisis dan polifarmasi fatal."},
            {id:62,topic:"Elderly",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apakah pasien berusia 85 tahun yang baru terkena Serangan Jantung (ACS) masih perlu terapi statin?",a:"YA (Secondary Prevention). Direkomendasikan tanpa batas usia atas.",pearl:"Usia tua bukan alasan menghentikan terapi pencegahan sekunder.",rationale:"Risiko infark berulang sangat tinggi pada usia lanjut. Statin menurunkan risiko absolut secara masif pasca-kejadian."},
            {id:63,topic:"Chronic Kidney Disease",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa regimen lipid lini pertama untuk pasien CKD stage 3-5 (Gagal ginjal sedang-berat)?",a:"Kombinasi Statin dosis rendah/sedang + Ezetimibe.",pearl:"Regimen ini (diuji dalam SHARP Trial) menurunkan LDL tanpa membebani ginjal.",rationale:"Mencegah akumulasi obat akibat penurunan klirens ginjal yang dapat meningkatkan risiko miopati (bukan karena statin bersifat nefrotoksik langsung)."},
            {id:64,topic:"Hemodialysis",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apakah pasien yang BARU MULAI cuci darah (Hemodialisis) rutin harus diinisiasi Statin?",a:"TIDAK DIREKOMENDASIKAN (Class III) jika tidak ada riwayat ASCVD.",pearl:"Namun jika sudah minum statin SEBELUM cuci darah, TERUSKAN.",rationale:"Uji klinis (AURORA, 4D) gagal menunjukkan manfaat statin pada gagal ginjal terminal. Kematian mereka mayoritas karena aritmia/kalsifikasi katup, bukan ruptur plak kolesterol."},
            {id:65,topic:"Diabetes",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Pasien Diabetes Mellitus Tipe 2 dengan kerusakan organ target (mikroalbuminuria). Apa target LDL-nya?",a:"Kategori Very High Risk -> Target <55 mg/dL.",pearl:"Diabetes dengan penyulit mikrovaskular = setara dengan sudah kena Serangan Jantung.",rationale:"Lingkungan glikemik memicu glikasi (kerusakan) partikel LDL, menjadikannya 'bom waktu' peradangan mematikan bagi endotel."},
            {id:66,topic:"Diabetes",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Mungkinkah Statin memicu timbulnya Diabetes Baru (New-Onset Diabetes - NODM)?",a:"YA, ada risiko kecil (insidensi ~1%), terutama pada statin intensitas tinggi.",pearl:"Manfaat statin mencegah infark 5x lipat lebih besar dibanding risiko diabetes ringan ini.",rationale:"Statin sedikit mengganggu sensitivitas reseptor insulin. Jangan pernah menyetop statin pada pasien risiko tinggi hanya karena HbA1c naik sedikit."},
            {id:67,topic:"Stroke & TIA",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa target LDL-C untuk pasien paska Stroke Iskemik (Aterotrombotik)?",a:"<55 mg/dL (<1.4 mmol/L) -> Masuk kategori Very High Risk.",pearl:"Berdasarkan Trial TST (Treat Stroke to Target).",rationale:"Penurunan kolesterol intensif secara signifikan menurunkan stroke iskemik rekuren tanpa meningkatkan insidensi stroke perdarahan fatal."},
            {id:68,topic:"Heart Failure",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apakah inisiasi Statin bermanfaat pada Gagal Jantung Kongestif (HFrEF) tanpa penyebab iskemik/koroner?",a:"TIDAK DIREKOMENDASIKAN (Class III).",pearl:"Sama seperti pasien cuci darah: Statin tidak bermanfaat untuk otot jantung yang sudah mati/gagal berdenyut akibat virus/idiopatik.",rationale:"Uji klinis CORONA dan GISSI-HF terbukti negatif. Bahkan kolesterol rendah pada gagal jantung sering merupakan penanda malnutrisi buruk."},
            {id:69,topic:"Aortic Stenosis",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Bisakah Statin mencegah perburukan atau kalsifikasi penyakit Stenosis Katup Aorta (AS)?",a:"TIDAK. Statin tidak boleh diberikan semata-mata untuk menghentikan stenosis aorta.",pearl:"Penyakit katup bukanlah plak ateroma murni.",rationale:"Proses biologis kalsifikasi katup aorta berbeda dengan plak pembuluh darah. Tiga trial besar (SEAS, ASTRONOMER) membuktikan statin gagal mencegah operasi katup."},
            {id:70,topic:"Women & Pregnancy",badge:"Red Flag",badgeClass:"badge-extreme",q:"Kapan statin HARUS DIHENTIKAN pada wanita usia subur?",a:"1-2 bulan SEBELUM merencanakan konsepsi (kehamilan).",pearl:"Statin bersifat Teratogenik (merusak janin).",rationale:"Kolesterol mutlak dibutuhkan untuk perkembangan otak dan membran sel janin di trimester pertama. Memblokir sintesis ini berakibat fatal pada bayi."},
            {id:71,topic:"Pregnancy",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Obat penurun kolesterol apa yang AMAN digunakan selama kehamilan untuk pasien FH?",a:"Bile Acid Sequestrants (Colesevelam/Cholestyramine).",pearl:"Resin ini tidak diserap ke dalam darah (hanya di usus), jadi tidak bisa meracuni janin.",rationale:"Alternatif sementara dan aman untuk menahan laju kolesterol ekstrem ibu FH selama 9 bulan."},
            {id:72,topic:"Cardio-Oncology",badge:"Upgraded Class",badgeClass:"badge-upgrade",q:"Apa peran baru Statin pada pasien kanker yang menjalani kemoterapi Anthracycline (Doxorubicin)?",a:"Direkomendasikan (Class I) sebagai pencegahan untuk menurunkan risiko Gagal Jantung (Kardiotoksisitas).",pearl:"Efek pleiotropik redam stres oksidatif sangat handal.",rationale:"Statin melindungi miosit (sel otot jantung) dari apoptosis akibat paparan radikal bebas yang dihasilkan racun kemoterapi."},
            {id:73,topic:"SAMS Management",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Jika pasien mengalami nyeri otot (Mialgia) dengan nilai CK < 4x batas normal (ULN), apa yang harus dilakukan?",a:"Lanjutkan Statin (jika gejala bisa ditoleransi) ATAU hentikan sementara lalu coba dosis lebih rendah/statin lain.",pearl:"Hanya hentikan total jika CK > 10x batas normal.",rationale:"Kerusakan otot sejati (miopati) dibuktikan dengan kebocoran masif enzim Creatine Kinase (CK). Tanpa itu, keluhan subjektif sering hilang sendiri."},
            {id:74,topic:"SAMS Management",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa itu fenomena 'Nocebo' pada statin?",a:"Timbulnya keluhan/gejala akibat *ekspektasi negatif* pasien setelah membaca efek samping statin di internet.",pearl:"Studi membuktikan pasien yang tidak tahu mereka minum statin jarang mengeluh nyeri otot.",rationale:"Edukasi yang menenangkan dan meyakinkan dari dokter sangat efektif mengobati >50% kasus intoleransi statin palsu."},
            {id:75,topic:"Metabolic Syndrome",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Sebutkan profil khas 'Diabetic Dyslipidemia' (Lipid Triad)!",a:"Trigliserida Tinggi, HDL Rendah, dan partikel LDL kecil-padat (small-dense LDL) yang tinggi.",pearl:"Kadar Kolesterol Total bisa saja tampak 'normal' tapi sangat mematikan.",rationale:"Resistensi insulin menggeser metabolisme liver memproduksi VLDL berlebih, memicu reaksi berantai pembentukan partikel aterogenik kecil yang mudah menembus endotel."},
            {id:76,topic:"Biomarkers",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apakah pemeriksaan hs-CRP (C-Reactive Protein) rutin disarankan?",a:"Sebagai faktor modifikasi jika skor risiko borderline (Class IIb). Tidak wajib.",pearl:"Inflamasi bisa diobati. (Studi CANTOS & colchicine).",rationale:"Meskipun inflamasi penting, hs-CRP sangat mudah terpengaruh oleh infeksi ringan. Kolesterol LDL/ApoB tetap komandan utama aterosklerosis."},
            {id:77,topic:"Liver Disease",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apakah statin aman untuk pasien dengan perlemakan hati (NAFLD/NASH) dan SGOT/SGPT naik ringan?",a:"SANGAT AMAN. Bahkan statin memperbaiki perlemakan hati kardiovaskular.",pearl:"Hentikan statin HANYA jika transaminase (SGOT/PT) melonjak >3x batas normal.",rationale:"Penyakit hati berlemak berisiko mati karena serangan jantung, bukan sirosis. Statin menyelamatkan populasi ini."},
            {id:78,topic:"HIV Infection",badge:"Red Flag",badgeClass:"badge-extreme",q:"Apa risiko pengobatan dislipidemia pada pasien HIV yang menggunakan terapi ART (Anti-retroviral)?",a:"Interaksi obat yang parah. Protease Inhibitor memblokir pemecahan statin, memicu keracunan statin.",pearl:"Gunakan statin yang dimetabolisme di luar jalur CYP3A4 (seperti Rosuvastatin, Pitavastatin, Pravastatin).",rationale:"HIV itu sendiri, serta obat ART-nya, memicu dislipidemia ekstrem dan penuaan vaskular dini."},
            {id:79,topic:"Dietary Interventions",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Diet apa yang secara spesifik terbukti paling superior menurunkan kolesterol dan risiko CVD?",a:"Mediterranean Diet (Diet Mediterania) atau diet kaya serat dan lemak tak jenuh.",pearl:"Kunci: Ganti lemak jenuh (Saturated Fat) dan lemak trans dengan Polyunsaturated Fat (PUFA/MUFA).",rationale:"Minyak zaitun murni, ikan, kacang-kacangan menekan inflamasi plak tanpa harus kelaparan ekstrim."},
            {id:80,topic:"Red Yeast Rice",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Bolehkah pasien mengonsumsi suplemen Beras Ragi Merah (Red Yeast Rice) sebagai ganti obat dokter?",a:"Tidak Direkomendasikan. Keamanan dan dosis Monacolin K tidak teregulasi dengan baik.",pearl:"Monacolin K adalah identik dengan Lovastatin kimiawi.",rationale:"Pasien mengira itu 'herbal aman', padahal mereka mengonsumsi statin dosis tak terukur yang bisa memicu kerusakan ginjal tersembunyi."},
            {id:81,topic:"Ezetimibe Combo",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Selain dengan statin, obat apa yang bekerja sangat sinergis bila dikombinasi dengan Ezetimibe?",a:"Asam Bempedoat (Bempedoic Acid).",pearl:"Polypill Bempedoat + Eze kini disetujui, memberi efek penurunan LDL kuat tanpa sentuh otot.",rationale:"Keduanya memotong jalur berbeda (sintesis hati & absorpsi usus), meniru efikasi high-intensity statin."},
            {id:82,topic:"PCSK9 Genotype",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa yang terjadi pada orang dengan mutasi genetik 'Loss of Function' pada PCSK9?",a:"Mereka memiliki kadar LDL yang sangat rendah (misal ~15 mg/dL) seumur hidup dan KEBAL terhadap serangan jantung.",pearl:"Fakta alam inilah yang menginspirasi penciptaan obat PCSK9 inhibitor.",rationale:"Kondisi ini membuktikan bahwa memiliki LDL <20 mg/dL tidak mengganggu fungsi otak, steroid, atau hormon secara absolut."},
            {id:83,topic:"Very Low LDL Safety",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apakah mencapai kadar LDL <25 mg/dL dapat menyebabkan gangguan memori/kognitif lambat laun?",a:"TIDAK TERBUKTI. Uji klinis besar (FOURIER, ODYSSEY) menjamin keamanan neurokognitif.",pearl:"Otak menyintesis kolesterolnya sendiri, tidak bergantung pada suplai LDL darah.",rationale:"Sawar darah otak (Blood-Brain Barrier) menolak masuknya partikel lipoprotein besar. Kecemasan akan demensia akibat LDL ekstrem rendah tidak terbukti."},
            {id:84,topic:"Peripheral Artery Disease",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Pasien dengan Penyakit Arteri Perifer (PAD / klaudikasio intermiten) masuk dalam risiko apa?",a:"Very High Risk (Risiko Sangat Tinggi). Target LDL <55 mg/dL.",pearl:"Plak di kaki = Plak di Jantung.",rationale:"Sumbatan aorta-iliaka atau femoral mengonfirmasi aterosklerosis sistemik. Pasien ini berisiko kehilangan tungkai sekaligus nyawa."},
            {id:85,topic:"Aortic Aneurysm",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Pasien Aneurisma Aorta Abdominal (AAA) masuk kategori risiko apa?",a:"Very High Risk.",pearl:"AAA memiliki patobiologi yang sangat erat dengan aterosklerosis destruktif.",rationale:"Pemberian statin menghambat protease (MMP) di dinding aorta, mencegah pembengkakan lebih lanjut dan robekan aneurisma."},
            {id:86,topic:"Alirocumab",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa temuan utama studi ODYSSEY OUTCOMES (Alirocumab)?",a:"Penambahan PCSK9i menurunkan risiko MACE (kejadian kardiovaskular mayor) dan juga menurunkan Total Mortality (Mortalitas Kasar).",pearl:"Awalnya dipertanyakan apakah mahal, tapi terbukti memperpanjang umur.",rationale:"Manfaat sangat maksimal terlihat pada pasien dengan LDL awal >100 mg/dL meskipun sudah distatin maksimal paska infark."},
            {id:87,topic:"Evolocumab",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa temuan dari studi GLAGOV (menggunakan intravaskular ultrasound)?",a:"Menambahkan Evolocumab hingga LDL <36 mg/dL terbukti menghasilkan regresi (penyusutan) volume plak atheroma secara anatomis nyata.",pearl:"Membuktikan dogma: Plak bisa menciut jika 'bahan bakarnya' diputus drastis.",rationale:"Pembersihan kolesterol dari plak oleh makrofag dapat membalikkan proses penyumbatan parsial."},
            {id:88,topic:"Lipoprotein Apheresis",badge:"Extreme Risk",badgeClass:"badge-extreme",q:"Kapan prosedur 'Cuci Darah Kolesterol' (Lipoprotein Apheresis) diindikasikan?",a:"Pada pasien HoFH, atau pasien HeFH / rekurensi ASCVD ekstrem di mana LDL tetap >200 mg/dL mimo semua kombinasi obat maksimal.",pearl:"Sangat mahal, invasif (dilakukan tiap 1-2 minggu).",rationale:"Darah dialirkan keluar tubuh melewati kolom filter yang mengikat dan membuang ApoB, langsung menurunkan LDL 60% dalam 2 jam."},
            {id:89,topic:"Alcohol & Lipids",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apakah konsumsi alkohol 'moderat' dianjurkan untuk menaikkan HDL dan melindungi jantung?",a:"TIDAK. Panduan modern tidak menganjurkan inisiasi alkohol bagi teetotaler demi proteksi CVD.",pearl:"Batas aman nol. Efek peningkatan TG jauh lebih berbahaya.",rationale:"Efek hepatotoksik, hipertensi, dan aritmia dari alkohol jauh melampaui mitos perlindungan HDL-nya."},
            {id:90,topic:"Plant Sterols",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Apa peran *Phytosterols/Phytostanols* (Suplemen tumbuhan) dalam dislipidemia?",a:"Dapat menurunkan LDL sekitar 7-10% dengan cara bersaing serapan kolesterol di usus.",pearl:"Tidak menggantikan farmakoterapi, tapi bisa ditambahkan pada diet pasien risiko rendah/sedang.",rationale:"Konsumsi 2 gram stanols/sterols per hari menghambat misel absorpsi intestinal kolesterol hewani."},
            {id:91,topic:"Familial Chylomicronemia",badge:"Extreme Risk",badgeClass:"badge-extreme",q:"Penyakit genetik FCS (Familial Chylomicronemia Syndrome) ditandai dengan apa?",a:"Kadar Trigliserida ekstrem (>1000 hingga 5000 mg/dL) sejak bayi, darah berwarna putih susu, sering pankreatitis rekuren.",pearl:"Gagal fungsi Lipoprotein Lipase (LPL).",rationale:"Diet HANYA boleh <15 gram lemak per hari total. Statin/Fibrat tidak mempan."},
            {id:92,topic:"Volanesorsen",badge:"New Drug",badgeClass:"badge-new",q:"Obat antisens apa yang baru disetujui untuk Sindrom Kilomikronemia Familial (FCS)?",a:"Volanesorsen (penghambat produksi ApoC-III).",pearl:"ApoC-III adalah rem alamiah bagi LPL. Memblokir rem ini, LPL bekerja keras menghancurkan TG.",rationale:"Menurunkan trigliserida raksasa hingga 70% dan menyelamatkan pasien dari siksaan pankreatitis ICU tahunan."},
            {id:93,topic:"Fasting TG vs Non-Fasting",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Jika profil lipid non-puasa menunjukkan Trigliserida 450 mg/dL, apa tindakan selanjutnya?",a:"Wajib diulang dengan darah PUFA (Puasa 8-12 jam).",pearl:"Profil lipid tanpa puasa tidak akurat untuk Trigliserida ekstrem karena kontaminasi kilomikron diet.",rationale:"TG postprandial memang bisa naik, namun jika di atas batas 400 mg/dL, kita perlu nilai baseline yang jujur tanpa gangguan makanan."},
            {id:94,topic:"CKD & PCSK9i",badge:"Upgraded Class",badgeClass:"badge-upgrade",q:"Bolehkah PCSK9 Inhibitor diberikan pada penderita Gagal Ginjal berat (CKD eGFR <30)?",a:"Diperbolehkan, sangat aman. Farmakokinetik antibodi monoklonal tidak dibuang via ginjal.",pearl:"Dieleminasi via sistem retikuloendotelial, tanpa penyesuaian dosis ginjal.",rationale:"Pasien CKD dengan statin intolerance dapat tertolong mencapai target via PCSK9i tanpa bahaya akumulasi obat."},
            {id:95,topic:"Post-ACS Assessment",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa minggu paska-Serangan Jantung profil lipid harus diperiksa ulang untuk evaluasi pencapaian target?",a:"4 hingga 6 minggu setelah inisiasi/titrasi obat awal.",pearl:"Jangan tunggu 6 bulan! Otot jantung berpacu dengan waktu.",rationale:"Steady state statin/PCSK9i tercapai penuh di 4 minggu. Evaluasi krusial untuk segera menambah 'amunisi' obat bila gagal menembus <55 mg/dL."},
            {id:96,topic:"Dementia",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apakah penggunaan Statin memicu demensia Alzheimer?",a:"TIDAK ADA BUKTI. Uji klinis besar memastikan statin tidak mengganggu kognisi, justru MENCEGAH demensia vaskular (stroke senyap).",pearl:"Aterosklerosis otaklah penyebab utama kepikunan berulang.",rationale:"Melindungi sirkulasi mikro otak dengan statin = menjaga memori dari kerusakan iskemik mikro infark."},
            {id:97,topic:"Rheumatoid Arthritis",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Berapa faktor pengali yang harus diberikan pada skor SCORE2 bagi penderita Arthritis Rematoid (RA)?",a:"Kalikan risiko SCORE2 yang didapat sebesar 1.5 kali lipat.",pearl:"Inflamasi sendi autoimun merembet menjadi radang pembuluh darah jantung (vaskulitis sistemik).",rationale:"Pedoman menuntut kita menganggap semua penyakit inflamasi kronis sebagai pemercepat (accelerator) aterosklerosis asimtomatik 10 tahun lebih cepat."},
            {id:98,topic:"Statins Mechanism",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Bagaimana cara tepat Statin menurunkan Kolesterol Darah?",a:"Menghambat HMG-CoA reduktase di hati -> Liver kekurangan kolesterol -> Hati 'panik' dan menambah jumlah Reseptor LDL -> Reseptor menyedot LDL dari darah.",pearl:"Efek utamanya bukan di blokir sintesis, melainkan 'Upgrade' Reseptor pembersih.",rationale:"Peningkatan aktivitas reseptor LDL di hepatosit adalah mesin utama yang menjernihkan partikel aterogenik sistemik."},
            {id:99,topic:"Coronary Intervention",badge:"Core Knowledge",badgeClass:"badge-upgrade",q:"Pasien sedang di-PCI (pasang stent/ring). Apakah perlu 'loading dose' statin?",a:"YA, Loading dose Atorvastatin 80mg atau Rosuvastatin 40mg dianjurkan sebelum prosedur.",pearl:"Mengurangi risiko cedera miokard peri-prosedural (peradangan saat balon ditiup).",rationale:"Efek stabilitasi endotel dan anti-radang akut dari statin dosis masif melindungi sel otot yang tertekan iskemia transien saat pemasangan ring."},
            {id:100,topic:"Final Pearl",badge:"Paradigm Shift",badgeClass:"badge-shift",q:"Apa falsafah utama penanganan Lipid menurut ESC 2025 Focused Update?",a:"LOWER is Better, for LONGER is Better, EARLIER is Best.",pearl:"Jangan menunda terapi agresif pada pasien risiko tinggi. Tumpukan kolesterol bertindak bagai 'Radiasi' sepanjang masa.",rationale:"Mengintervensi sejak dini dengan sasaran agresif akan membelokkan secara permanen nasib arteri koroner di masa tua pasien."}
        ];

            { id: 5, domain: "Domain 1: Risk Assessment & Biomarkers", topic: "Coronary Artery Calcium (CAC) Score", old: "Disebutkan sekilas sebagai faktor modifikasi (Class IIb) tanpa pengikatan kategori yang tegas.", new: "Posisi naik ke Class IIa. CAC ≥100 otomatis menetapkan pasien ke High Risk. CAC=0 dapat menurunkan kategori risiko (reclassify downward).", rationale: "CAC adalah 'tiebreaker' terbaik. Sangat berguna untuk meyakinkan pasien usia pertengahan yang ragu untuk mulai minum statin seumur hidup." },

            { id: 8, domain: "Domain 2: LDL Targets & Kategori Risiko", topic: "Target Absolut LDL-C Lengkap", old: "Kategori Very High <55, High <70, Moderate <100 mg/dL dengan catatan untuk turun >50%.", new: "Target dipertahankan, namun ditambah penegasan: Syarat target absolut (<55) DAN penurunan persentase (≥50%) harus tercapai SECARA SIMULTAN.", rationale: "Sering terjadi kesalahan praktik di mana dokter berhenti saat LDL sudah 50 padahal baseline-nya 80 (hanya turun <40%). Dua syarat ini memastikan plak benar-benar stabil." },

            { id: 11, domain: "Domain 2: LDL Targets & Kategori Risiko", topic: "Non-HDL-C sebagai Target Sekunder", old: "Disebut opsional dan agak abu-abu, sering diabaikan dalam evaluasi klinik harian.", new: "Ditetapkan sebagai target sekunder wajib, paralel dengan LDL (<85 Very High, <100 High). Rumus praktis: Target Non-HDL = Target LDL + 30 mg/dL.", rationale: "Sangat efisien tanpa biaya tambahan (Kolesterol Total minus HDL). Menangkap bahaya trigliserida sisa (remnant) yang sangat tinggi di populasi sindrom metabolik kita." },

            { id: 13, domain: "Domain 2: LDL Targets & Kategori Risiko", topic: "Peripheral Artery Disease (PAD)", old: "Sering di-undertreat di klinik. Target LDL bervariasi bergantung komorbid lain.", new: "Penyamaan hak yang absolut (PAD = Penyakit Jantung Koroner). Status pasien langsung menjadi Very High Risk (Target LDL <55 mg/dL).", rationale: "Sumbatan di pembuluh darah kaki jaminan ada sumbatan di jantung. Statin agresif terbukti mencegah ancaman terburuk ganda: amputasi dan kematian jantung mendadak." },
            { id: 14, domain: "Domain 2: LDL Targets & Kategori Risiko", topic: "Stroke Iskemik & TIA", old: "Disebutkan dalam kelompok penyakit aterosklerosis, tapi penekanannya kalah kuat dari infark koroner.", new: "Berbasis Trial TST, stroke iskemik aterotrombotik adalah Very High Risk mutlak (Target LDL <55 mg/dL).", rationale: "LDL <55 terbukti mencegah kejadian stroke ulang tanpa meningkatkan risiko stroke perdarahan. Misi penting untuk edukasi lintas disiplin dengan teman sejawat Neurologi." },

            { id: 16, domain: "Domain 3: Farmakoterapi & Algoritma", topic: "Urutan Algoritma Obat Oral", old: "Tiga tangga terapi: Statin -> Ezetimibe -> Langsung melompat ke obat injeksi (PCSK9i).", new: "Empat tangga oral sebelum jarum suntik: Statin -> + Ezetimibe -> + Asam Bempedoat -> Baru beralih ke Injeksi (PCSK9i / Inclisiran).", rationale: "Menawarkan jembatan farmasi oral yang sangat kuat, ideal untuk Indonesia di mana PCSK9i masih berharga mahal dan prosedur pengajuan BPJS untuk injeksi cukup ketat." },
            { id: 17, domain: "Domain 3: Farmakoterapi & Algoritma", topic: "Alternatif Statin Intolerance", old: "Hanya bergantung pada Ezetimibe monoterapi, jika gagal pasien terpaksa pindah ke injeksi PCSK9i.", new: "Asam Bempedoat (Bempedoic Acid) masuk sebagai rekomendasi utama pendamping Eze. Bekerja eksklusif di hati, BEBAS risiko nyeri otot (SAMS).", rationale: "Menyelamatkan pasien yang benar-benar mengalami mialgia akibat statin tanpa harus mengorbankan pencapaian target LDL-nya." },
            { id: 18, domain: "Domain 3: Farmakoterapi & Algoritma", topic: "Modalitas PCSK9 (Inclisiran)", old: "Opsi PCSK9i sangat terbatas pada Antibodi Monoklonal (Evolocumab/Alirocumab) dengan injeksi tiap 2-4 minggu.", new: "Inclisiran (terapi siRNA) disetujui penuh sejajar mAb. Jadwal injeksi sangat revolusioner: Hari 1, Bulan 3, lalu cukup setiap 6 BULAN sekali.", rationale: "Sistem injeksi ala 'vaksinasi' ini menyelesaikan akar masalah farmakologi kronis: ketidakpatuhan pasien (non-compliance) pada obat suntik mandiri." },
            { id: 19, domain: "Domain 3: Farmakoterapi & Algoritma", topic: "Obat Trigliserida Tinggi", old: "Fibrat dan suplemen Minyak Ikan pasaran (kombinasi EPA + DHA) masih direkomendasikan secara longgar.", new: "Icosapent Ethyl (EPA murni) sangat diutamakan untuk prevensi sekunder. Suplemen minyak ikan campuran (DHA) TIDAK lagi direkomendasikan.", rationale: "Hanya formulasi EPA murni (Trial REDUCE-IT) yang terbukti memotong angka infark. Suplemen omega-3 generik di apotek gagal memberi proteksi kardiovaskular." },
            { id: 20, domain: "Domain 3: Farmakoterapi & Algoritma", topic: "Penurunan Pamor Fibrat", old: "Sering ditambahkan secara bebas pada resep statin jika Trigliserida 'sedikit tinggi' (di atas 200 mg/dL).", new: "Berdasarkan Trial PROMINENT, fibrat diturunkan pamornya. Kini HANYA direkomendasikan jika TG >880 mg/dL demi mencegah Pankreatitis Akut.", rationale: "Fibrat unggul menggerus angka trigliserida di kertas, tapi terbukti gagal menurunkan kejadian infark. Statin tetap lini pertama mutlak pada TG berapapun." },

            { id: 23, domain: "Domain 4: Populasi Khusus & Kondisi Spesifik", topic: "Prevensi Primer & Lifetime Risk", old: "Dogma kaku terhadap angka ambang batas inisiasi statin murni berbasis persentase skor 10 tahun.", new: "Penekanan pada 'Shared Decision Making' dan pertimbangan Lifetime Risk (Beban paparan seumur hidup) untuk memulai terapi lebih dini pada usia muda.", rationale: "Memulai intervensi saat usia 40 tahun akan menghentikan pembentukan plak sejak akar, bukan menunggu sampai plak sudah rapuh di usia 60 tahun." },
