            { id: 26, domain: "Domain 4: Populasi Khusus & Kondisi Spesifik", topic: "Pasien Hemodialisis (ESRD)", old: "Ketegasan mengenai perlunya penghentian statin saat masuk fase cuci darah masih samar.", new: "Pasien baru HD tanpa riwayat jantung: JANGAN diinisiasi statin (Class III). Jika sudah minum sedari dulu, boleh diteruskan.", rationale: "Uji klinis membuktikan pasien cuci darah wafat karena aritmia maut/kalsifikasi katup, bukan ruptur plak kolesterol lunak. Pemberian statin di tahap ini sia-sia." },
            { id: 27, domain: "Domain 4: Populasi Khusus & Kondisi Spesifik", topic: "Populasi Cardio-Oncology", old: "Belum dibahas secara matang sebagai target profilaksis kardioprotektif khusus.", new: "Kolaborasi baru: Statin kini direkomendasikan Class I untuk pencegahan gagal jantung akibat kemoterapi Anthracycline (Doxorubicin).", rationale: "Efek pleiotropik statin sangat handal melindungi miosit dari kehancuran radikal bebas kemoterapi. Relevan seiring naiknya angka 'survivor' kanker di Indonesia." },
            { id: 28, domain: "Domain 4: Populasi Khusus & Kondisi Spesifik", topic: "Wanita & Kehamilan", old: "Hanya disebutkan bahwa statin teratogenik dan dikontraindikasikan absolut.", new: "Panduan tegas: Hentikan statin 1-2 bulan SEBELUM konsepsi terencana. Selama hamil, pasien risiko tinggi (FH) HANYA boleh menggunakan Bile Acid Sequestrants.", rationale: "Kolesterol sangat krusial untuk pembentukan otak janin trimester awal. Pasien FH wanita di Indonesia butuh navigasi ketat ini agar bayi tak terpapar cacat." },
            { id: 29, domain: "Domain 4: Populasi Khusus & Kondisi Spesifik", topic: "Infeksi HIV dan Obat ART", old: "Hanya disebutkan secara umum dalam daftar interaksi obat yang perlu diperhatikan.", new: "Peringatan khusus: Obat HIV (Protease Inhibitor) memblokir enzim CYP3A4 hati, memicu toksisitas statin mematikan. Pilih statin jalur beda (Rosuvastatin/Pitavastatin).", rationale: "Virus HIV dan obat ART mempercepat penuaan vaskular. Kolaborasi antara Divisi Infeksi (Tropmed) dan Kardiologi mutlak memerlukan algoritma aman ini." },
            { id: 30, domain: "Domain 4: Populasi Khusus & Kondisi Spesifik", topic: "HF Non-Iskemik & Stenosis Aorta", old: "Penggunaan statin pada indikasi ini tidak dianjurkan kuat, namun di lapangan masih banyak diresepkan.", new: "Masuk kategori Class III mutlak (Jangan Diinisiasi). Statin terbukti gagal memperbaiki pompa jantung idiopatik maupun kalsifikasi katup mekanik murni.", rationale: "Berhenti meresepkan statin hanya karena 'ingin melindungi jantung' jika patofisiologinya bukan plak aterosklerotik. Mengurangi beban finansial BPJS." },
            { id: 31, domain: "Domain 5: Konsep Baru & Keamanan", topic: "Konsep 'Nocebo' Statin", old: "Setiap laporan mialgia (nyeri otot) seringkali langsung dianggap sebagai kerusakan farmakologis sejati.", new: "Pengakuan resmi: >50% sindrom nyeri statin adalah NOCEBO (sugesti dari informasi internet). Wajib edukasi dan lakukan 'Re-challenge' dosis.", rationale: "Dokter Indonesia harus proaktif membantah hoaks di grup WhatsApp agar pasien tidak mati konyol akibat putus obat statin hanya karena persepsi psikologis." },
            { id: 32, domain: "Domain 5: Konsep Baru & Keamanan", topic: "Keamanan LDL Ekstrem Rendah", old: "Terdapat kekhawatiran teoritis mengenai batas bawah keamanan LDL (mengenai kognisi dan memori).", new: "Berdasarkan FOURIER dan ODYSSEY: Mencapai LDL <25 mg/dL SANGAT AMAN. Justru memicu regresi (penyusutan ukuran) plak ateroma secara anatomis nyata.", rationale: "Mitos 'kolesterol di bawah angka 50 berbahaya' resmi dipatahkan. Jaringan otak memproduksi kolesterolnya sendiri, terlindung oleh Blood-Brain Barrier." },
            { id: 33, domain: "Domain 5: Konsep Baru & Keamanan", topic: "Statin dan Risiko Demensia", old: "Studi masih belum meyakinkan secara penuh untuk menenangkan ketakutan lansia akan penyakit Alzheimer.", new: "Panduan menegaskan: Statin TIDAK menyebabkan demensia. Sebaliknya, obat ini MELINDUNGI otak dari Demensia Vaskular (mikro-infark/stroke senyap).", rationale: "Ketakutan akan 'pikun' adalah alasan utama lansia Indonesia berhenti berobat diam-diam. Klarifikasi pedoman ini berdampak masif pada kepatuhan." },
            { id: 34, domain: "Domain 5: Konsep Baru & Keamanan", topic: "Alkohol dan Lipid (Myth Busting)", old: "Konsumsi alkohol ringan-moderat sering dianggap 'abu-abu' dengan potensi efek menguntungkan bagi kadar HDL.", new: "Pedoman mencoret keras hal ini. TIDAK ADA dosis alkohol yang aman. Alkohol meningkatkan Trigliserida, hipertensi, dan risiko Atrial Fibrilasi.", rationale: "Membersihkan pedoman medis dari celah interpretasi yang selama ini sering melegitimasi konsumsi alkohol berlabel kedok 'menyehatkan jantung'." },
            { id: 35, domain: "Domain 5: Konsep Baru & Keamanan", topic: "Lipoprotein Apheresis", old: "Sekadar disebutkan sebagai terapi 'cuci darah kolesterol' untuk kasus FH berat.", new: "Indikasi diperjelas secara tajam: Untuk HoFH atau pasien yang tetap memiliki LDL >200 mg/dL meski menggunakan semua amunisi farmasi maksimal. Turunkan LDL 60% instan.", rationale: "Apheresis berbiaya sangat mahal dan aksesnya amat terbatas di Indonesia. Mengetahui kriteria tepat sangat penting agar fasilitas tidak salah sasaran." }
        ];

        // ==========================================
        // STATE & LOGIC
        // ==========================================
        let state = {
            tab: 'foundation',
            foundationCategory: 'Semua',
            flashcardTopic: 'Semua', 
            flashcardIdx: 0,
            isFlipped: false,
            isShuffled: false,
            currentFlashcards: [],
            masteredCards: new Set()
        };

        const allFlashcardTopics = ['Semua', ...new Set(flashcards.map(f => f.topic))];
        state.currentFlashcards = [...flashcards];

        // LOCAL STORAGE LOAD
        const savedMastery = localStorage.getItem('esc2025_mastered');
        if(savedMastery) state.masteredCards = new Set(JSON.parse(savedMastery));

        let touchstartX = 0; let touchstartY = 0;
        let isSwiping = false; let isNavigating = false;

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function applyFlashcardFilters() {
            let filtered = flashcards;
            if (state.flashcardTopic !== 'Semua') {
                filtered = flashcards.filter(f => f.topic === state.flashcardTopic);
            }
            if (state.isShuffled) {
                filtered = shuffleArray(filtered);
            }
            state.currentFlashcards = filtered;
            state.flashcardIdx = 0;
            state.isFlipped = false;
        }

        window.toggleShuffle = () => {
            state.isShuffled = !state.isShuffled;
            applyFlashcardFilters();
            renderFlashcards();
        };

        window.setFlashcardTopic = (topic) => {
            state.flashcardTopic = topic;
            applyFlashcardFilters();
            renderFlashcards();
        };

        function setTab(tabId) {
            state.tab = tabId;
            updateUI();
        }

        function setFoundationCategory(cat) {
            state.foundationCategory = cat;
            renderFoundation();
        }

        function updateUI() {
            const btnFound = document.getElementById('btnTabFoundation');
            const btnF = document.getElementById('btnTabFlashcard');
            const btnM = document.getElementById('btnTabMatrix');
            const mobileActionBar = document.getElementById('mobileActionBar');
            
            const defaultClass = "whitespace-nowrap flex-1 flex justify-center items-center gap-2 py-2.5 px-4 text-sm font-bold rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-all border border-transparent";
            btnFound.className = defaultClass;
            btnF.className = defaultClass;
            btnM.className = defaultClass;

            if (state.tab === 'foundation') {
                btnFound.className = "whitespace-nowrap flex-1 flex justify-center items-center gap-2 py-2.5 px-4 text-sm font-bold rounded-lg bg-blue-600 text-white shadow-md border border-blue-500 transition-all";
                mobileActionBar.classList.add('hidden');
                renderFoundation();
            } else if (state.tab === 'flashcard') {
                btnF.className = "whitespace-nowrap flex-1 flex justify-center items-center gap-2 py-2.5 px-4 text-sm font-bold rounded-lg bg-amber-500 text-amber-950 shadow-md border border-amber-400 transition-all";
                mobileActionBar.classList.remove('hidden');
                renderFlashcards();
            } else {
                btnM.className = "whitespace-nowrap flex-1 flex justify-center items-center gap-2 py-2.5 px-4 text-sm font-bold rounded-lg bg-emerald-600 text-white shadow-md border border-emerald-500 transition-all";
                mobileActionBar.classList.add('hidden');
                renderMatrix();
            }
        }

        function updateAtheromaTracker() {
            const total = flashcards.length;
            const mastered = state.masteredCards.size;
            const plaquePercent = total === 0 ? 100 : 100 - ((mastered / total) * 100);
            
            const plaqueBar = document.getElementById('plaqueBar');
            const plaqueLabel = document.getElementById('plaqueLabel');
            
            if(plaqueBar) plaqueBar.style.width = `${plaquePercent}%`;
            
            if(plaqueLabel) {
                if (plaquePercent === 0) {
                    plaqueLabel.innerText = "Clear Artery!";
                    plaqueLabel.className = "text-[0.7rem] font-black text-rose-400";
                } else if (plaquePercent < 50) {
                    plaqueLabel.innerText = `${Math.round(plaquePercent)}% Plaque`;
                    plaqueLabel.className = "text-[0.7rem] font-black text-amber-200";
                } else {
                    plaqueLabel.innerText = `${Math.round(plaquePercent)}% Plaque`;
                    plaqueLabel.className = "text-[0.7rem] font-black text-amber-400";
                }
            }
        }

        // ==========================================
        // RENDER: FOUNDATION (2019 CORE)
        // ==========================================
        function renderFoundation() {
            const container = document.getElementById('mainContent');
            let pillsHtml = foundationCategories.map(cat => {
                const isActive = state.foundationCategory === cat;
                const activeClass = isActive ? "bg-blue-600 text-white border-blue-600 shadow-sm" : "bg-white text-slate-600 border-slate-200 hover:bg-slate-50";
                return `<button aria-label="Kategori ${cat}" onclick="setFoundationCategory('${cat}')" class="whitespace-nowrap px-4 py-1.5 rounded-full text-xs sm:text-sm border font-bold transition-colors ${activeClass}">${cat}</button>`;
            }).join('');

            const filteredData = foundationData.filter(item => state.foundationCategory === 'Semua' || item.category === state.foundationCategory);

            let accordionsHtml = filteredData.map((item, index) => {
                let isOpen = false;
                if(state.foundationCategory !== 'Semua' && index === 0) isOpen = true;
                if(state.foundationCategory === 'Semua' && index < 2) isOpen = true;

                return `
                    <details class="group bg-white rounded-2xl shadow-sm border border-slate-200 mb-4 overflow-hidden no-print" ${isOpen ? 'open' : ''}>
                        <summary class="flex items-center justify-between p-4 sm:p-5 cursor-pointer bg-white hover:bg-slate-50 transition-colors select-none">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-xl ${item.bgClass} ${item.iconClass} flex items-center justify-center shrink-0 border ${item.borderClass} shadow-inner">
                                    <i class="fa-solid ${item.icon} text-lg"></i>
                                </div>
                                <h3 class="font-black text-[1rem] sm:text-lg text-slate-800 leading-tight">${item.title}</h3>
                            </div>
                            <div class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-400 shrink-0 group-hover:bg-slate-200 transition-colors">
                                <i class="fa-solid fa-chevron-down chevron transition-transform duration-300"></i>
                            </div>
                        </summary>
                        <div class="p-4 sm:p-6 bg-slate-50/50 border-t border-slate-100">
                            ${item.desc ? `<p class="text-sm font-semibold ${item.descClass} p-3 rounded-lg border mb-4">${item.desc}</p>` : ''}
                            <div class="text-slate-700">${item.content}</div>
                        </div>
                    </details>
                    <!-- For Print only -->
                    <div class="hidden print:block mb-8">
                        <h3 class="font-black text-lg text-slate-800 mb-2 border-b-2 border-slate-300 pb-1">${item.title}</h3>
                        <div class="text-sm text-slate-700">${item.content}</div>
                    </div>
                `;
            }).join('');

            let htmlContent = `
                <div class="fade-in flex flex-col w-full">
                    <div class="bg-slate-800 rounded-2xl border-b-4 border-blue-500 p-5 md:p-6 mb-5 relative overflow-hidden shadow-md no-print">
                        <div class="absolute right-0 top-0 w-48 h-48 bg-blue-500 rounded-full blur-[60px] opacity-20 -mt-10 -mr-10 pointer-events-none"></div>
                        <h2 class="text-white text-lg md:text-xl font-black flex items-center gap-2 relative z-10"><i class="fa-solid fa-book-medical text-blue-400"></i> Fondasi ESC 2019 (Core Guidelines)</h2>
                        <p class="text-xs md:text-sm text-slate-300 font-medium leading-relaxed relative z-10 max-w-3xl mt-2">Buku saku digital ini merangkum algoritma asli, patofisiologi, target absolut, dan definisi stratifikasi risiko yang menjadi tulang punggung praktik kardiovaskular hari ini, sebelum kita mengulas perbaruannya di tab 2025.</p>
                    </div>
                    <div class="sticky top-[100px] sm:top-[115px] z-30 bg-slate-50/95 backdrop-blur-sm py-3 -mx-4 px-4 sm:mx-0 sm:px-0 mb-2 border-b border-slate-200 sm:border-none no-print">
                        <div class="flex overflow-x-auto hide-scrollbar gap-2 pb-1">${pillsHtml}</div>
                    </div>
                    <div class="flex flex-col pb-8">${accordionsHtml}</div>
                </div>
            `;
            container.innerHTML = htmlContent;
        }

        // ==========================================
        // RENDER: FLASHCARDS
        // ==========================================
        function toggleMastery() {
            if(state.currentFlashcards.length === 0) return;
            const cardId = state.currentFlashcards[state.flashcardIdx].id;
            if (state.masteredCards.has(cardId)) state.masteredCards.delete(cardId);
            else state.masteredCards.add(cardId);
            
            // LocalStorage Save
            localStorage.setItem('esc2025_mastered', JSON.stringify([...state.masteredCards]));
            
            updateAtheromaTracker();
            updateFlashcardContent('none');
        }

        function renderFlashcards() {
            const container = document.getElementById('mainContent');
            let topicPillsHtml = allFlashcardTopics.map(topic => {
                const isActive = state.flashcardTopic === topic;
                const activeClass = isActive ? "bg-amber-500 text-white border-amber-600 shadow-sm" : "bg-white text-slate-500 border-slate-200 hover:bg-slate-50";
                return `<button aria-label="Filter ${topic}" onclick="setFlashcardTopic('${topic}')" class="whitespace-nowrap px-3 py-1 rounded-full text-xs font-bold border transition-colors ${activeClass}">${topic}</button>`;
            }).join('');

            if (state.currentFlashcards.length === 0) {
                container.innerHTML = `
                    <div class="fade-in w-full max-w-lg mx-auto flex flex-col items-center">
                        <div class="w-full mb-4 overflow-x-auto hide-scrollbar flex gap-2 pb-2 px-1 no-print">${topicPillsHtml}</div>
                        <div class="bg-white p-8 rounded-2xl border border-slate-200 text-center w-full shadow-sm mt-10">
                            <i class="fa-solid fa-box-open text-4xl text-slate-300 mb-3"></i>
                            <h3 class="font-bold text-slate-600">Tidak ada kartu.</h3>
                            <p class="text-xs text-slate-400 mt-1">Silakan ubah filter topik Anda.</p>
                        </div>
                    </div>
                `;
                return;
            }

            const html = `
                <div class="fade-in w-full max-w-lg mx-auto flex flex-col items-center">
                    <div class="w-full mb-4 overflow-x-auto hide-scrollbar flex gap-2 pb-2 px-1 no-print">${topicPillsHtml}</div>
                    <div class="w-full flex justify-between items-center mb-3 px-1 no-print">
                        <span class="text-xs sm:text-sm font-bold text-slate-400 tracking-wide uppercase" id="cardCounter">Card ${state.flashcardIdx + 1} / ${state.currentFlashcards.length}</span>
                        <div class="flex gap-2">
                            <button aria-label="Acak Kartu" onclick="toggleShuffle()" class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-full transition-all border-2 ${state.isShuffled ? 'bg-amber-500 text-white border-amber-500' : 'bg-white text-slate-400 border-slate-200 hover:bg-amber-50 hover:text-amber-500'} shadow-sm"><i class="fa-solid fa-shuffle"></i></button>
                            <button aria-label="Tandai Dikuasai" onclick="toggleMastery()" id="btnTopMastery" class="w-9 h-9 sm:w-10 sm:h-10 hidden md:flex items-center justify-center rounded-full transition-all border-2 bg-white text-slate-400 border-slate-200 hover:bg-emerald-50 hover:text-emerald-600 hover:border-emerald-200 shadow-sm"><i class="fa-solid fa-check-double"></i></button>
                        </div>
                    </div>
                    <div id="touchWrapper" class="relative w-full h-[60vh] min-h-[440px] max-h-[550px] perspective-1000">
                        <div id="slideBox" class="w-full h-full">
                            <div id="flipBox" class="w-full h-full card-transition transform-style-preserve-3d shadow-xl rounded-2xl cursor-pointer">
                                <div id="cardFront" class="absolute inset-0 backface-hidden bg-white border border-slate-200 rounded-2xl flex flex-col p-6 sm:p-8 relative overflow-hidden"></div>
                                <div id="cardBack" class="absolute inset-0 backface-hidden rotate-y-180 bg-lipid-dark border-2 border-amber-500 rounded-2xl p-5 sm:p-8 overflow-hidden flex flex-col"></div>
                            </div>
                        </div>
                    </div>
                    <div class="hidden md:flex justify-between w-full mt-6 gap-3 no-print">
                        <button aria-label="Sebelumnya" onclick="navigateCard('prev')" class="flex-1 py-3.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 font-bold text-slate-600 shadow-sm active:scale-95 transition-transform"><i class="fa-solid fa-arrow-left"></i> Prev</button>
                        <button aria-label="Balik" onclick="flipCard()" class="flex-[2] py-3.5 bg-slate-800 text-white rounded-xl hover:bg-slate-900 font-bold shadow-md active:scale-95 transition-transform"><i class="fa-solid fa-rotate"></i> Flip to Reveal</button>
                        <button aria-label="Selanjutnya" onclick="navigateCard('next')" class="flex-1 py-3.5 bg-amber-500 hover:bg-amber-600 text-amber-950 rounded-xl font-bold shadow-md active:scale-95 transition-transform">Next <i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            setupTouchListeners();
            updateFlashcardContent('none');
        }

        window.flipCard = () => {
            if(state.currentFlashcards.length === 0) return;
            const flipBox = document.getElementById('flipBox');
            state.isFlipped = !state.isFlipped;
            if(state.isFlipped) flipBox.classList.add('rotate-y-180');
            else flipBox.classList.remove('rotate-y-180');
        };

        window.navigateCard = (direction) => {
            if (isNavigating || state.currentFlashcards.length === 0) return;
            isNavigating = true;

            const flipBox = document.getElementById('flipBox');
            state.isFlipped = false;
            flipBox.style.transition = 'none'; 
            flipBox.classList.remove('rotate-y-180');
            
            if (direction === 'next') state.flashcardIdx = (state.flashcardIdx + 1) % state.currentFlashcards.length;
            else state.flashcardIdx = state.flashcardIdx === 0 ? state.currentFlashcards.length - 1 : state.flashcardIdx - 1;

            requestAnimationFrame(() => { requestAnimationFrame(() => {
                flipBox.style.transition = 'transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1)';
            });});

            updateFlashcardContent(direction);
            setTimeout(() => { isNavigating = false; }, 400);
        };

        function updateFlashcardContent(animationDir) {
            if(state.currentFlashcards.length === 0) return;
            const card = state.currentFlashcards[state.flashcardIdx];
            const isMastered = state.masteredCards.has(card.id);
            
            const counter = document.getElementById('cardCounter');
            if (counter) counter.innerText = `Card ${state.flashcardIdx + 1} / ${state.currentFlashcards.length}`;
            
            const btnMobMastery = document.getElementById('btnActionMastery');
            if (btnMobMastery) {
                if(isMastered) btnMobMastery.className = "flex-1 flex flex-col items-center justify-center h-[52px] px-2 rounded-xl bg-emerald-50 text-emerald-600 border-2 border-emerald-200 active:bg-emerald-100 transition-colors shadow-inner";
                else btnMobMastery.className = "flex-1 flex flex-col items-center justify-center h-[52px] px-2 rounded-xl text-slate-400 border-2 border-slate-200 active:bg-slate-50 transition-colors";
            }
            const btnTopM = document.getElementById('btnTopMastery');
            if(btnTopM) {
                if(isMastered) btnTopM.innerHTML = `<i class="fa-solid fa-check-double text-emerald-500"></i>`;
                else btnTopM.innerHTML = `<i class="fa-solid fa-check-double"></i>`;
            }

            const frontHTML = `
                <div class="relative z-10 w-full flex justify-between items-start mb-auto">
                    <span class="text-[0.65rem] sm:text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-md uppercase tracking-wider shadow-sm border border-slate-200">${card.topic}</span>
                    ${isMastered ? '<div class="bg-emerald-100 p-1.5 rounded-full shadow-sm border border-emerald-200"><i class="fa-solid fa-check text-emerald-600 text-lg"></i></div>' : ''}
                </div>
                <div class="relative z-10 flex flex-col items-center justify-center my-auto w-full px-2">
                    <div class="mb-6"><span class="px-4 py-2 rounded-full text-[0.75rem] font-bold uppercase tracking-widest shadow-md ${card.badgeClass}"><i class="fa-solid fa-bolt mr-1 opacity-70"></i> ${card.badge}</span></div>
                    <h2 class="text-[1.15rem] sm:text-2xl font-black text-slate-800 text-center leading-snug drop-shadow-sm">${card.q}</h2>
                </div>
                <div class="relative z-10 w-full flex justify-between items-end mt-auto text-slate-300">
                    <div class="flex items-center gap-2 text-xs font-semibold animate-swipe-hint text-amber-400"><i class="fa-solid fa-angles-left"></i></div>
                    <div class="text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest bg-white/80 px-2 rounded-full"><i class="fa-solid fa-hand-pointer mr-1"></i> Tap to flip</div>
                    <div class="flex items-center gap-2 text-xs font-semibold animate-swipe-hint text-amber-400"><i class="fa-solid fa-angles-right"></i></div>
                </div>
            `;

            const backHTML = `
                <div class="h-full overflow-y-auto hide-scrollbar flex flex-col pt-1">
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fa-solid fa-lightbulb text-amber-400 text-xl drop-shadow-[0_0_5px_rgba(251,191,36,0.5)]"></i>
                        <span class="text-[0.7rem] sm:text-xs font-bold text-amber-400 uppercase tracking-widest border-b border-amber-400/30 pb-0.5">2025 Core Answer</span>
                    </div>
                    <p class="text-[1.05rem] sm:text-xl font-bold text-white mb-6 leading-tight drop-shadow-sm">${card.a}</p>
                    <div class="bg-gradient-to-r from-amber-500/20 to-amber-600/10 p-3 sm:p-4 rounded-xl border border-amber-500/30 mb-4 flex gap-3 shadow-inner">
                        <i class="fa-solid fa-gem text-amber-400 mt-1 drop-shadow-sm"></i>
                        <div><p class="text-[0.8rem] sm:text-[0.9rem] text-amber-100 font-semibold leading-snug tracking-wide">"${card.pearl}"</p></div>
                    </div>
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 mt-auto">
                        <span class="font-bold text-slate-400 block mb-2 text-[0.65rem] uppercase tracking-widest"><i class="fa-solid fa-microscope text-slate-500 mr-1"></i> Rationale / Details:</span> 
                        <p class="text-[0.85rem] sm:text-[0.95rem] text-slate-300 leading-relaxed font-light">${card.rationale}</p>
                    </div>
                </div>
            `;
            
            const cFront = document.getElementById('cardFront');
            const cBack = document.getElementById('cardBack');
            if(cFront) cFront.innerHTML = frontHTML;
            if(cBack) cBack.innerHTML = backHTML;

            const slideBox = document.getElementById('slideBox');
            if (slideBox && animationDir !== 'none') {
                slideBox.className = 'w-full h-full'; 
                void slideBox.offsetWidth; 
                slideBox.className = `w-full h-full ${animationDir === 'next' ? 'slide-next' : 'slide-prev'}`;
            }
        }

        function setupTouchListeners() {
            const touchWrapper = document.getElementById('touchWrapper');
            if(!touchWrapper) return;
            
            touchWrapper.addEventListener('touchstart', e => {
                touchstartX = e.changedTouches[0].screenX;
                touchstartY = e.changedTouches[0].screenY;
                isSwiping = false;
            }, {passive: true});

            touchWrapper.addEventListener('touchmove', e => {
                let touchEndX = e.changedTouches[0].screenX;
                let touchEndY = e.changedTouches[0].screenY;
                if (Math.abs(touchEndX - touchstartX) > 15 || Math.abs(touchEndY - touchstartY) > 15) isSwiping = true;
            }, {passive: true});

            touchWrapper.addEventListener('touchend', e => {
                let touchendX = e.changedTouches[0].screenX;
                let diffX = touchstartX - touchendX;
                if (isSwiping && Math.abs(diffX) > 40) {
                    if (diffX > 0) navigateCard('next'); else navigateCard('prev');
                } else if (!isSwiping) {
                    flipCard();
                }
            });
            touchWrapper.addEventListener('click', e => {
                if(!isSwiping && e.pointerType === 'mouse') flipCard();
            });
        }

        // ==========================================
        // RENDER: MATRIX COMPONENT
        // ==========================================
        function renderMatrix() {
            const container = document.getElementById('mainContent');
            const groupedData = matrixData.reduce((acc, item) => {
                if(!acc[item.domain]) acc[item.domain] = [];
                acc[item.domain].push(item);
                return acc;
            }, {});

            let desktopRows = '';
            let mobileCards = '';

            for (const [domain, items] of Object.entries(groupedData)) {
                desktopRows += `
                    <tr class="bg-slate-800 text-white border-b-2 border-amber-500"><td colspan="3" class="px-4 py-3 text-xs font-black uppercase tracking-widest shadow-inner"><i class="fa-solid fa-folder-open text-amber-400 mr-2"></i> ${domain}</td></tr>
                `;
                mobileCards += `
                    <div class="bg-slate-800 text-white p-3 rounded-xl shadow-md mt-6 mb-2 border-l-4 border-amber-500 sticky top-[90px] z-20 flex items-center gap-2"><i class="fa-solid fa-folder-open text-amber-400"></i><span class="font-black text-[0.7rem] uppercase tracking-widest leading-tight">${domain}</span></div>
                `;

                items.forEach(item => {
                    desktopRows += `
                        <tr class="hover:bg-slate-50 border-b border-slate-200 transition-colors group">
                            <td class="p-4 align-top w-1/4"><span class="font-black text-slate-800 text-sm block mb-1 group-hover:text-emerald-700 transition-colors">${item.topic}</span></td>
                            <td class="p-4 align-top w-1/3 text-[0.85rem] text-slate-600 border-r border-slate-100 bg-slate-50/50"><div class="line-through decoration-slate-400 leading-relaxed">${item.old}</div></td>
                            <td class="p-4 align-top w-auto bg-emerald-50/30"><div class="text-[0.95rem] font-bold text-emerald-800 mb-3 leading-snug"><i class="fa-solid fa-arrow-right text-emerald-500 mr-1 text-xs"></i> ${item.new}</div><div class="text-[0.8rem] text-slate-700 mt-2 p-3 bg-white rounded-lg border border-emerald-100 shadow-sm relative overflow-hidden"><div class="absolute left-0 top-0 h-full w-1 bg-emerald-400"></div><span class="font-black text-emerald-800 uppercase tracking-wider text-[0.65rem] block mb-1"><i class="fa-solid fa-stethoscope text-emerald-500 mr-1"></i> Pesan Klinis Indonesia</span><span class="leading-relaxed">${item.rationale}</span></div></td>
                        </tr>
                    `;
                    mobileCards += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-2 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-slate-200"></div>
                            <h4 class="font-black text-[0.9rem] text-slate-800 border-b border-slate-100 pb-2 mb-1 pl-2">${item.topic}</h4>
                            <div class="flex gap-2 items-start mt-2 pl-2"><span class="mt-0.5 text-[0.6rem] font-bold bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded uppercase">2019</span><p class="text-[0.8rem] text-slate-500 line-through leading-tight">${item.old}</p></div>
                            <div class="flex gap-2 items-start bg-emerald-50/50 p-3 rounded-xl border border-emerald-200 mt-2 flex-col ml-2">
                                <div class="flex items-start gap-2"><span class="mt-0.5 text-[0.6rem] font-bold bg-gradient-to-r from-emerald-400 to-emerald-600 text-white px-2 py-0.5 rounded shadow-sm uppercase tracking-wider">2025</span><p class="text-[0.85rem] font-bold text-emerald-900 leading-tight">${item.new}</p></div>
                                <div class="mt-3 pt-3 border-t border-emerald-200/60 w-full"><span class="font-black text-emerald-800 uppercase tracking-wider text-[0.6rem] block mb-1"><i class="fa-solid fa-stethoscope text-emerald-500 mr-1"></i> Pesan Klinis</span><p class="text-[0.75rem] text-slate-700 leading-relaxed">${item.rationale}</p></div>
                            </div>
                        </div>
                    `;
                });
            }

            const html = `
                <div class="fade-in bg-white md:rounded-2xl md:shadow-md md:border border-slate-200 overflow-hidden flex flex-col h-[75vh] -mx-4 md:mx-0">
                    <div class="p-4 bg-lipid-dark border-b-2 border-emerald-500 flex flex-col gap-2 sticky top-0 z-30 shadow-md no-print">
                        <h2 class="text-white text-base sm:text-lg font-black flex items-center gap-2"><i class="fa-solid fa-code-compare text-emerald-400"></i> Guideline Comparator Matrix (35 Poin)</h2>
                        <p class="text-[0.7rem] sm:text-xs text-slate-300 font-medium leading-relaxed">Analisis Sistematis Perbedaan ESC 2019 vs 2025. Diperkaya dengan Implikasi Klinis Khusus untuk Praktik Sehari-hari di Faskes Indonesia.</p>
                    </div>
                    <div class="overflow-y-auto flex-grow hide-scrollbar bg-slate-50 md:bg-white relative">
                        <table class="w-full text-left border-collapse hidden md:table relative">
                            <thead class="bg-slate-100 border-b border-slate-200 text-slate-500 text-[0.65rem] uppercase tracking-widest sticky top-0 z-20 shadow-sm no-print">
                                <tr><th class="p-4 w-1/4 font-black">Topik Kunci / Domain</th><th class="p-4 w-1/3 font-black text-slate-400 border-r border-slate-200">ESC 2019 (Pedoman Lama)</th><th class="p-4 w-auto font-black text-emerald-700 bg-emerald-50">ESC 2025 (Pembaruan)</th></tr>
                            </thead>
                            <tbody>${desktopRows}</tbody>
                        </table>
                        <div class="md:hidden flex flex-col gap-3 pb-8 px-4 print:hidden">
                            ${mobileCards}
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        updateAtheromaTracker();
        updateUI();

    </script>
</body>
</html>
