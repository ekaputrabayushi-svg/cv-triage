                                    <!-- Injected by JS -->
                                </div>
                                <!-- Back -->
                                <div id="cardBack" class="absolute inset-0 backface-hidden rotate-y-180 bg-white border-2 ${state.mode === 'learner' ? 'border-blue-300' : 'border-emerald-300'} rounded-2xl p-5 sm:p-8 overflow-hidden flex flex-col">
                                    <!-- Injected by JS -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Desktop Navigation (Hidden on Mobile) -->
                    <div class="hidden md:flex justify-between w-full mt-6 gap-3">
                        <button onclick="navigateCard('prev')" class="flex-1 flex justify-center items-center gap-2 py-3.5 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 font-bold text-slate-600 shadow-sm active:scale-95 transition-transform">
                            <i class="fa-solid fa-arrow-left"></i> Prev
                        </button>
                        <button onclick="flipCard()" class="flex-[2] flex justify-center items-center gap-2 py-3.5 bg-slate-800 text-white rounded-xl hover:bg-slate-900 font-bold shadow-md active:scale-95 transition-transform">
                            <i class="fa-solid fa-rotate"></i> Flip to Reveal
                        </button>
                        <button onclick="navigateCard('next')" class="flex-1 flex justify-center items-center gap-2 py-3.5 ${theme.bg} rounded-xl ${theme.hover} font-bold text-white shadow-md active:scale-95 transition-transform">
                            Next <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;
            container.innerHTML = html;

            // Touch Listeners
            const touchWrapper = document.getElementById('touchWrapper');
            touchWrapper.addEventListener('touchstart', e => {
                touchstartX = e.changedTouches[0].screenX;
                touchstartY = e.changedTouches[0].screenY;
                isSwiping = false;
            }, {passive: true});

            touchWrapper.addEventListener('touchmove', e => {
                let touchEndX = e.changedTouches[0].screenX;
                let touchEndY = e.changedTouches[0].screenY;
                if (Math.abs(touchEndX - touchstartX) > 15 || Math.abs(touchEndY - touchstartY) > 15) isSwiping = true;
            }, {passive: true});

            touchWrapper.addEventListener('touchend', e => {
                let touchendX = e.changedTouches[0].screenX;
                let diffX = touchstartX - touchendX;
                
                if (isSwiping && Math.abs(diffX) > 40) {
                    if (diffX > 0) navigateCard('next'); else navigateCard('prev');
                } else if (!isSwiping) {
                    flipCard(); // Tap to flip
                }
            });

            // Desktop Click
            touchWrapper.addEventListener('click', e => {
                if(!isSwiping && e.pointerType === 'mouse') flipCard();
            });

            updateFlashcardContent('none');
        }

        window.flipCard = () => {
            const flipBox = document.getElementById('flipBox');
            state.isFlipped = !state.isFlipped;
            if(state.isFlipped) flipBox.classList.add('rotate-y-180');
            else flipBox.classList.remove('rotate-y-180');
        };

        window.navigateCard = (direction) => {
            if (isNavigating || state.activeData.length === 0) return;
            isNavigating = true;

            const flipBox = document.getElementById('flipBox');
            state.isFlipped = false;
            flipBox.style.transition = 'none'; 
            flipBox.classList.remove('rotate-y-180');
            
            if (direction === 'next') state.flashcardIdx = (state.flashcardIdx + 1) % state.activeData.length;
            else state.flashcardIdx = state.flashcardIdx === 0 ? state.activeData.length - 1 : state.flashcardIdx - 1;

            requestAnimationFrame(() => { requestAnimationFrame(() => {
                flipBox.style.transition = 'transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1)';
            });});

            updateFlashcardContent(direction);
            setTimeout(() => { isNavigating = false; }, 300);
        };

        function updateFlashcardContent(animationDir) {
            if(state.activeData.length === 0) return;
            
            const card = state.activeData[state.flashcardIdx];
            const prefix = state.mode === 'learner' ? 'L_' : 'C_';
            const uniqueId = prefix + card.id;
            const isMastered = state.db.masteredCards.has(uniqueId);
            const isBookmarked = state.db.bookmarkedCards.has(uniqueId);
            
            // 1. Update Counters & Buttons
            const counter = document.getElementById('cardCounter');
            if (counter) counter.innerText = `Card ${state.flashcardIdx + 1} / ${state.activeData.length}`;

            // Sync Mobile Action Bar states
            const btnMobMastery = document.getElementById('btnActionMastery');
            const btnMobBookmark = document.getElementById('btnActionBookmark');
            const iconMobBookmark = document.getElementById('iconActionBookmark');
            
            if (btnMobMastery) {
                if(isMastered) { btnMobMastery.className = "flex-1 flex flex-col items-center justify-center min-h-[48px] px-2 rounded-xl bg-green-50 text-green-600 border border-green-200 active:bg-green-100 transition-colors"; }
                else { btnMobMastery.className = "flex-1 flex flex-col items-center justify-center min-h-[48px] px-2 rounded-xl text-slate-400 border border-slate-200 active:bg-slate-50 transition-colors"; }
            }
            if (btnMobBookmark) {
                if(isBookmarked) { btnMobBookmark.classList.add('text-amber-500'); btnMobBookmark.classList.remove('text-slate-400'); iconMobBookmark.className = "fa-solid fa-bookmark text-lg mb-0.5"; }
                else { btnMobBookmark.classList.add('text-slate-400'); btnMobBookmark.classList.remove('text-amber-500'); iconMobBookmark.className = "fa-regular fa-bookmark text-lg mb-0.5"; }
            }

            // Sync Desktop Top buttons
            const btnTopM = document.getElementById('btnTopMastery');
            if(btnTopM) {
                if(isMastered) btnTopM.innerHTML = `<i class="fa-solid fa-check text-green-500"></i>`;
                else btnTopM.innerHTML = `<i class="fa-solid fa-check"></i>`;
            }
            const btnTopB = document.getElementById('btnTopBookmark');
            if(btnTopB) {
                if(isBookmarked) btnTopB.innerHTML = `<i class="fa-solid fa-bookmark text-amber-500"></i>`;
                else btnTopB.innerHTML = `<i class="fa-regular fa-bookmark"></i>`;
            }

            // 2. Generate Inner Content (Only Learner logic applies here since Flashcards are hidden in Comparator)
            let frontHTML, backHTML;
            
            frontHTML = `
                <div class="w-full flex justify-between items-start mb-auto">
                    <span class="text-[0.65rem] sm:text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md uppercase tracking-wider">${card.topic}</span>
                    ${isMastered ? '<i class="fa-solid fa-check-circle text-green-500 text-xl"></i>' : ''}
                </div>
                <div class="flex flex-col items-center justify-center my-auto w-full px-2">
                    <div class="mb-5"><span class="px-3 py-1.5 rounded-full text-[0.7rem] sm:text-xs font-bold uppercase tracking-wider ${card.badgeClass} shadow-sm">${card.urgency}</span></div>
                    <h2 class="text-[1.15rem] sm:text-2xl font-bold text-slate-800 text-center leading-snug">${card.q}</h2>
                </div>
                <div class="w-full flex justify-between items-end mt-auto text-slate-300">
                    <div class="flex items-center gap-2 text-xs font-semibold animate-swipe-hint text-blue-400"><i class="fa-solid fa-angles-left"></i></div>
                    <div class="text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest"><i class="fa-solid fa-hand-pointer mr-1"></i> Tap to flip</div>
                    <div class="flex items-center gap-2 text-xs font-semibold animate-swipe-hint text-blue-400"><i class="fa-solid fa-angles-right"></i></div>
                </div>
            `;
            backHTML = `
                <div class="h-full overflow-y-auto hide-scrollbar flex flex-col pt-1">
                    <div class="bg-blue-50 text-blue-800 font-bold px-3 py-1.5 rounded w-max mb-4 text-[0.7rem] sm:text-xs border border-blue-200 uppercase tracking-wide">Core Answer</div>
                    <p class="text-[1.05rem] sm:text-xl font-bold text-slate-800 mb-5 leading-tight">${card.a}</p>
                    
                    <div class="bg-amber-50/50 p-3 sm:p-4 rounded-xl border border-amber-200/60 mb-3 flex gap-3">
                        <i class="fa-solid fa-gem text-amber-500 mt-1"></i>
                        <div><p class="text-[0.8rem] sm:text-[0.9rem] text-amber-900 font-semibold leading-snug">${card.pearl}</p></div>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 mt-auto">
                        <span class="font-bold text-slate-800 block mb-1 text-xs uppercase"><i class="fa-solid fa-microscope text-slate-400 mr-1"></i> Rationale / Details:</span> 
                        <p class="text-[0.85rem] sm:text-[0.95rem] text-slate-600 leading-relaxed">${card.rationale}</p>
                    </div>
                </div>
            `;
            

            const cFront = document.getElementById('cardFront');
            const cBack = document.getElementById('cardBack');
            if(cFront) cFront.innerHTML = frontHTML;
            if(cBack) cBack.innerHTML = backHTML;

            const slideBox = document.getElementById('slideBox');
            if (slideBox && animationDir !== 'none') {
                slideBox.className = 'w-full h-full'; 
                void slideBox.offsetWidth; 
                slideBox.className = `w-full h-full ${animationDir === 'next' ? 'slide-next' : 'slide-prev'}`;
            }
        }

        // ==========================================
        // 5. MATRIX (Responsive Cards/Table)
        // ==========================================
        function renderCheatSheet(container) {
            const isLearner = state.mode === 'learner';
            
            // Build the shell (hanya dirender sekali saat tab dibuka)
            const html = `
                <div class="fade-in bg-white md:rounded-2xl md:shadow-sm md:border border-slate-200 overflow-hidden flex flex-col h-[70vh] md:h-[75vh] -mx-4 md:mx-0">
                    <div class="p-3 sm:p-4 bg-slate-800 flex flex-col sm:flex-row gap-3 items-center sticky top-0 z-10">
                        <h2 class="text-white text-sm sm:text-base font-bold flex items-center gap-2 w-full sm:w-auto"><i class="fa-solid fa-table-cells-large"></i> ${isLearner ? 'Guideline Matrix' : 'Comparison Matrix'}</h2>
                        <div class="relative w-full sm:flex-1">
                            <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input type="text" id="searchInput" placeholder="Cari topik atau kata kunci..." value="${state.searchQuery}"
                                class="w-full pl-9 pr-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-sm text-white placeholder-slate-400 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all"
                                oninput="handleSearch(event)">
                        </div>
                    </div>
                    
                    <div class="overflow-y-auto flex-grow hide-scrollbar p-4 md:p-0 bg-slate-50 md:bg-white">
                        <!-- Desktop Table -->
                        <table class="w-full text-left border-collapse hidden md:table">
                            <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-[0.65rem] uppercase tracking-widest sticky top-0 z-10 shadow-sm">
                                ${isLearner ? '<tr><th class="p-4 w-1/4 font-bold">Kategori</th><th class="p-4 w-1/3 font-bold">Situasi Klinis</th><th class="p-4 w-2/3 font-bold text-blue-700">Rekomendasi ESC 2025</th></tr>' 
                                            : '<tr><th class="p-4 w-1/4 font-bold">Topik Kunci</th><th class="p-4 w-1/3 font-bold text-slate-500">ESC 2018 (Pedoman Lama)</th><th class="p-4 w-auto font-bold text-emerald-700">ESC 2025 (Pembaruan)</th></tr>'}
                            </thead>
                            <tbody id="matrixTableBody">
                                <!-- Data akan di-inject ke sini oleh updateCheatSheetResults -->
                            </tbody>
                        </table>
                        
                        <!-- Mobile Cards -->
                        <div id="matrixMobileCards" class="md:hidden flex flex-col gap-3 pb-8">
                             <!-- Data mobile akan di-inject ke sini -->
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            
            // Panggil injeksi data pertama kali
            updateCheatSheetResults();
        }

        function updateCheatSheetResults() {
            const isLearner = state.mode === 'learner';
            const data = isLearner ? state.activeData : comparatorRaw;

            const searchStr = state.searchQuery.toLowerCase();
            const filteredData = data.filter(item => {
                if (isLearner) return item.q.toLowerCase().includes(searchStr) || item.a.toLowerCase().includes(searchStr) || item.topic.toLowerCase().includes(searchStr);
                return item.topic.toLowerCase().includes(searchStr) || item.new.toLowerCase().includes(searchStr);
            });

            // DESKTOP TABLE
            let desktopRows = filteredData.map(item => {
                if(isLearner) {
                    return `
                    <tr class="hover:bg-blue-50/50 border-b border-slate-100 group transition-colors">
                        <td class="p-4 align-top w-1/4">
                            <span class="px-2 py-1 rounded text-[0.65rem] font-bold uppercase tracking-wider bg-slate-100 text-slate-500 mb-2 inline-block">${item.topic}</span><br>
                            <span class="text-[0.7rem] font-bold px-2 py-0.5 rounded ${item.badgeClass} mb-2 inline-block">${item.urgency}</span>
                        </td>
                        <td class="p-4 text-sm font-semibold text-slate-800 align-top w-1/3 leading-snug">${item.q}</td>
                        <td class="p-4 align-top w-2/3">
                            <span class="font-bold text-sm text-blue-700 block mb-2 leading-snug">${item.a}</span>
                            <div class="bg-slate-50 p-2.5 rounded-lg border border-slate-200 text-[0.8rem] text-slate-600"><span class="font-semibold text-slate-800">Rasional:</span> ${item.rationale}</div>
                        </td>
                    </tr>`;
                } else {
                    return `
                    <tr class="hover:bg-emerald-50/50 border-b border-slate-100">
                        <td class="p-4 text-sm font-bold text-slate-800 align-top w-1/4">${item.topic}</td>
                        <td class="p-4 align-top w-1/3 text-[0.85rem] text-slate-500 line-through decoration-slate-300">${item.old}</td>
                        <td class="p-4 align-top w-auto bg-emerald-50/20">
                            <div class="text-[0.95rem] font-bold text-emerald-800 mb-2">${item.new}</div>
                            <div class="text-[0.8rem] text-slate-600 mt-2 p-2 bg-emerald-100/50 rounded border border-emerald-200/50"><span class="font-bold text-emerald-900">Rasional: </span>${item.rationale}</div>
                        </td>
                    </tr>`;
                }
            }).join('');

            // MOBILE CARDS
            let mobileCards = filteredData.map(item => {
                if(isLearner) {
                    return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-2">
                        <div class="flex justify-between items-start">
                            <span class="text-[0.65rem] font-bold uppercase tracking-wider text-slate-500">${item.topic}</span>
                            <span class="text-[0.6rem] font-bold px-2 py-0.5 rounded ${item.badgeClass}">${item.urgency}</span>
                        </div>
                        <h4 class="font-bold text-[0.95rem] text-slate-800 leading-snug mt-1">${item.q}</h4>
                        <div class="bg-blue-50/50 mt-2 p-3 rounded-xl border border-blue-100">
                            <p class="font-bold text-[0.9rem] text-blue-800 leading-snug mb-2">${item.a}</p>
                            <p class="text-[0.75rem] text-slate-600"><strong class="text-slate-800">Why:</strong> ${item.rationale}</p>
                        </div>
                    </div>`;
                } else {
                    return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-2">
                        <h4 class="font-bold text-sm text-slate-800 border-b pb-2 mb-1">${item.topic}</h4>
                        <div class="flex gap-2 items-start mt-1">
                            <span class="mt-1 text-[0.6rem] font-bold bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded">2018</span>
                            <p class="text-[0.8rem] text-slate-500 line-through leading-tight">${item.old}</p>
                        </div>
                        <div class="flex gap-2 items-start bg-emerald-50 p-3 rounded-lg border border-emerald-200 mt-1 flex-col">
                            <div class="flex items-start gap-2">
                                <span class="mt-0.5 text-[0.6rem] font-bold bg-emerald-200 text-emerald-800 px-1.5 py-0.5 rounded shadow-sm">2025</span>
                                <p class="text-[0.85rem] font-bold text-emerald-900 leading-tight">${item.new}</p>
                            </div>
                            <p class="text-[0.75rem] text-slate-600 mt-2 pt-2 border-t border-emerald-200/60"><strong class="text-slate-800">Rasional:</strong> ${item.rationale}</p>
                        </div>
                    </div>`;
                }
            }).join('');

            const emptyState = `<div class="p-10 text-center w-full"><i class="fa-solid fa-magnifying-glass text-4xl text-slate-300 mb-3"></i><p class="text-slate-500 font-medium">Data tidak ditemukan.</p></div>`;

            // Hanya mengganti isi tbody dan div mobile tanpa menghancurkan kerangka input search
            const tbody = document.getElementById('matrixTableBody');
            const mCards = document.getElementById('matrixMobileCards');

            if (tbody) tbody.innerHTML = filteredData.length > 0 ? desktopRows : `<tr><td colspan="3">${emptyState}</td></tr>`;
            if (mCards) mCards.innerHTML = filteredData.length > 0 ? mobileCards : emptyState;
        }

        window.handleSearch = (e) => {
            state.searchQuery = e.target.value;
            updateCheatSheetResults();
        };

        // ==========================================
        // INITIALIZATION
        // ==========================================
        applyFilters();
        updateUI();

    </script>
</body>
</html>
