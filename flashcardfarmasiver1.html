<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Farmasi Klinis Kardiologi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS untuk efek flip 3D */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        .is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Peningkatan tipografi untuk teks yang lebih panjang */
        .answer-text {
            line-height: 1.6;
        }
        .answer-text ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans flex flex-col overflow-x-hidden">

    <!-- Header -->
    <header class="bg-teal-800 text-white shadow-md p-3 md:p-4 sticky top-0 z-20">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2 sm:gap-0">
            <div class="text-center sm:text-left">
                <h1 class="text-lg sm:text-xl md:text-2xl font-bold flex items-center justify-center sm:justify-start gap-2">
                    <span>⚕️</span> Farmasi Klinis Kardiologi
                </h1>
                <p class="text-[10px] sm:text-xs md:text-sm text-teal-200 font-medium tracking-wide">
                    Varian 1. Part of CardiologyVault (Vignette-Based Clinical Pathway)
                </p>
            </div>
            <div class="text-[10px] sm:text-xs md:text-sm font-medium bg-teal-900 px-3 py-1 rounded-full border border-teal-500 shadow-sm text-center">
                Dev: Bayushi Eka Putra, MD, FIHA
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-start sm:justify-center p-4 md:p-8 max-w-4xl mx-auto w-full">
        
        <!-- Progress Info -->
        <div class="w-full flex justify-between items-center mb-3 md:mb-4 text-slate-600 font-medium">
            <span id="card-category" class="text-xs md:text-sm uppercase tracking-wider text-teal-700 font-bold bg-teal-100 px-3 py-1 rounded shadow-sm">Kategori</span>
            <span id="card-counter" class="text-xs md:text-sm bg-white px-3 py-1 rounded-full shadow-sm font-bold border border-slate-200">1 / 50</span>
        </div>

        <!-- Flashcard Container -->
        <div id="flashcard" class="relative w-full max-w-2xl h-[60vh] min-h-[400px] md:h-[480px] perspective-1000 cursor-pointer group mb-6 md:mb-8 touch-pan-y" onclick="toggleFlip(event)">
            <div class="card-inner w-full h-full absolute transform-style-3d shadow-xl rounded-2xl md:rounded-3xl">
                
                <!-- Front (Question) -->
                <div class="absolute inset-0 w-full h-full backface-hidden bg-white rounded-2xl md:rounded-3xl p-6 md:p-10 flex flex-col items-center justify-center text-center border-t-4 border-teal-600">
                    <div class="absolute top-4 left-5 text-slate-200 font-bold text-3xl md:text-4xl">Q</div>
                    <div class="w-full h-full flex flex-col justify-center overflow-y-auto no-scrollbar pt-8 pb-8">
                        <p id="question-text" class="text-base sm:text-lg md:text-xl text-slate-800 font-semibold leading-relaxed md:leading-normal m-auto">
                            Memuat pertanyaan...
                        </p>
                    </div>
                    <div class="absolute bottom-4 text-xs md:text-sm text-slate-400 flex items-center gap-1 animate-pulse">
                        <span class="hidden sm:inline">Ketuk kartu untuk melihat intervensi Farmasis</span>
                        <span class="sm:hidden">Ketuk: Jawaban • Usap: Lanjut</span>
                    </div>
                </div>

                <!-- Back (Answer) -->
                <div class="absolute inset-0 w-full h-full backface-hidden bg-slate-50 rounded-2xl md:rounded-3xl p-6 md:p-8 flex flex-col rotate-y-180 border-t-4 border-emerald-500 shadow-inner overflow-hidden">
                    <div class="absolute top-4 right-5 text-emerald-200 font-bold text-3xl md:text-4xl z-10 opacity-50">A</div>
                    <div class="w-full h-full overflow-y-auto no-scrollbar pt-6 pb-2 pr-2 flex">
                        <div id="answer-text" class="answer-text text-sm sm:text-base md:text-[15px] text-slate-800 font-medium w-full m-auto text-left">
                            Memuat jawaban...
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Controls -->
        <div class="w-full max-w-2xl grid grid-cols-2 sm:flex sm:flex-row justify-center gap-3 md:gap-4 pb-8">
            <button onclick="prevCard()" class="col-span-1 bg-white hover:bg-slate-50 text-slate-700 font-bold text-sm md:text-base py-3 md:py-4 px-2 md:px-6 rounded-xl shadow-sm transition-all border border-slate-200 flex justify-center items-center gap-1 active:scale-95">
                <span>&larr;</span> <span class="hidden sm:inline">Sebelumnya</span><span class="sm:hidden">Prev</span>
            </button>
            <button onclick="nextCard()" class="col-span-1 bg-teal-700 hover:bg-teal-800 text-white font-bold text-sm md:text-base py-3 md:py-4 px-2 md:px-6 rounded-xl shadow-md transition-all flex justify-center items-center gap-1 active:scale-95">
                <span class="hidden sm:inline">Selanjutnya</span><span class="sm:hidden">Next</span> <span>&rarr;</span>
            </button>
            <button onclick="shuffleCards()" class="col-span-2 sm:col-span-1 order-last sm:order-none bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm md:text-base py-3 md:py-4 px-4 md:px-6 rounded-xl shadow-md transition-all flex justify-center items-center active:scale-95">
                Acak (Shuffle)
            </button>
        </div>

    </main>

    <script>
        // Data Flashcard Farmasi Kardiologi Komprehensif (50 Soal) - Pharmacist Vignette Based
        const originalCards = [
            // --- BAB 1: ANTIKOAGULAN & ANTIPLATELET (10 Soal) ---
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Pasien NSTEMI post-PCI diresepkan Clopidogrel 75mg. Karena ada riwayat GERD, DPJP meresepkan Omeprazole 20mg kapsul. <br><br>Apakah DRP (Drug-Related Problem) pada kasus ini dan apa intervensi farmasis?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Interaksi obat mayor. Omeprazole adalah inhibitor kuat enzim CYP2C19. Clopidogrel (prodrug) butuh CYP2C19 untuk aktif. Kombinasi ini mematikan efikasi Clopidogrel, memicu risiko <em>Stent Thrombosis</em>.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Rekomendasi <em>switch</em> (ganti) Omeprazole menjadi <strong>Pantoprazole</strong> atau <strong>Lansoprazole</strong>, yang memiliki afinitas hambatan CYP2C19 sangat minimal.<br><br>📚 <strong>Evidence:</strong> FDA Drug Safety Communication & ESC Guidelines for ACS." 
            },
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Pasien Fibrilasi Atrium (AF) dengan <em>Mechanical Heart Valve</em> (Katup Mekanik Mitral) diresepkan Rivaroxaban (DOAC) 20mg. <br><br>Sebagai apoteker yang melakukan rekonsiliasi, apa tindakan Anda?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Kontraindikasi Absolut. DOAC tidak efektif mencegah trombosis pada permukaan metalik katup buatan.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Segera <em>Hold</em> Rivaroxaban. Hubungi DPJP untuk konversi ke <em>Vitamin K Antagonist</em> (VKA) yaitu <strong>Warfarin</strong>.<br><br>🔬 <strong>Monitoring:</strong> Pantau INR dengan target ketat 2.5 - 3.5 (tergantung jenis/posisi katup mekanik).<br><br>📚 <strong>Evidence:</strong> Studi <strong>RE-ALIGN</strong> (dihentikan awal karena risiko tromboemboli/pendarahan fatal grup DOAC)." 
            },
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Pasien ACS (BB 60 kg) dengan komorbid CKD Stage 4 (CrCl 25 mL/mnt) diresepkan Injeksi Enoxaparin 60 mg Subkutan setiap 12 jam. <br><br>Apakah peresepan ini tepat?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> <em>Overdose</em>. Enoxaparin dominan dieliminasi via ginjal. Pada CrCl <30 mL/mnt, klirens obat turun drastis, memicu akumulasi dan perdarahan masif.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Rekomendasikan penyesuaian dosis terapi menjadi <strong>1 mg/kgBB setiap 24 jam</strong> (menjadi 60 mg tiap 24 jam).<br><br>🔬 <strong>Monitoring:</strong> Cek Hb/Ht berkala, pantau feses melena, dan disarankan cek <em>Anti-Factor Xa level</em> darah pada jam ke-4 pasca injeksi.<br><br>📚 <strong>Evidence:</strong> AHA/ESC Guideline (Penyesuaian LMWH pada disfungsi renal)." 
            },
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Pasien AF geriatri (81 tahun, BB 55 kg, Kreatinin Serum 1.6 mg/dL) diresepkan Apixaban 5 mg BID. <br><br>Sebagai Apoteker, parameter klinis apa yang Anda evaluasi untuk optimasi dosis?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Dosis berlebih. Pasien memenuhi 3 kriteria reduksi dosis Apixaban (Usia ≥80 th, BB ≤60 kg, Kreatinin Serum ≥1.5 mg/dL). Cukup memenuhi 2 dari 3 kriteria ini mewajibkan reduksi dosis.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Rekomendasikan penurunan dosis Apixaban menjadi <strong>2.5 mg BID (dua kali sehari)</strong> untuk meminimalkan risiko perdarahan kranial.<br><br>📚 <strong>Evidence:</strong> <em>ARISTOTLE Trial</em> dan Prescribing Information (Kriteria penyesuaian dosis spesifik Apixaban)." 
            },
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Di Cath Lab, pasien NSTEMI diresepkan injeksi Fondaparinux 2.5 mg SC. Namun dari rekam medis, diketahui CrCl pasien adalah 15 mL/menit. <br><br>Bagaimana tindak lanjut farmasis?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Kontraindikasi berat. Fondaparinux 100% diekskresikan melalui ginjal. Penggunaan pada CrCl < 20 mL/menit dilarang karena waktu paruh memanjang tak terkendali dan tidak ada antidotum spesifik.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> <em>Hold</em> pemberian obat. Rekomendasikan konversi ke <strong>Unfractionated Heparin (UFH) drip</strong> yang ekskresinya independen dari fungsi ginjal (dimetabolisme oleh sistem retikuloendotelial).<br><br>📚 <strong>Evidence:</strong> <em>OASIS-5 Trial</em> (Fondaparinux superior, tapi eksklusi gagal ginjal berat)." 
            },
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Pasien dengan riwayat <em>Ischemic Stroke</em> 2 tahun lalu masuk IGD dengan STEMI anterior. Direncanakan Primary PCI. Dokter menginstruksikan loading Prasugrel 60mg. <br><br>Apa intervensi farmasis yang <em>life-saving</em> di sini?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Kontraindikasi absolut antiplatelet. Pasien dengan riwayat TIA atau Stroke Iskemik masa lalu DILARANG menerima Prasugrel.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Segera intersep obat. Rekomendasikan penggantian <em>loading dose</em> menggunakan <strong>Ticagrelor 180 mg</strong> atau <strong>Clopidogrel 600 mg</strong>.<br><br>📚 <strong>Evidence:</strong> <em>TRITON-TIMI 38 Trial</em> membuktikan Prasugrel pada kelompok pasien stroke sangat signifikan memicu Perdarahan Intrakranial (ICH) fatal." 
            },
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Pasien STEMI yang sedang menerima UFH drip di CVCU tiba-tiba mengalami trombositopenia drastis (Platelet drop >50%) disertai trombosis vena baru. Dicurigai HIT. <br><br>Saran farmakoterapi apa yang diberikan apoteker?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> <em>Heparin-Induced Thrombocytopenia</em> (HIT) Tipe II. Reaksi imunologis mematikan.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> <br>1. STOP UFH dan <em>heparin flushes</em> segera.<br>2. Rekomendasikan inisiasi antikoagulan intravena <em>Direct Thrombin Inhibitor</em> (DTI), seperti <strong>Argatroban</strong> (jika ginjal buruk) atau <strong>Bivalirudin</strong>.<br>3. Hindari transfusi platelet kecuali ada pendarahan aktif (transfusi justru memicu bahan bakar trombosis baru pada HIT)." 
            },
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Pasien Fibrilasi Atrium yang sudah rutin minum Warfarin (INR stabil) baru saja menjalani PCI pasang stent. DPJP menulis <em>Triple Therapy</em> (Warfarin + Aspirin + Clopidogrel) selama 1 tahun. <br><br>Apa tinjauan klinis apoteker?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Durasi <em>Triple Antithrombotic Therapy</em> (TAT) terlalu panjang. Ini meningkatkan risiko perdarahan masif secara eksponensial.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Sesuai guideline modern, durasi TAT (Warfarin/DOAC + DAPT) direkomendasikan sesingkat mungkin, maksimal <strong>1 hingga 4 minggu</strong> saja. Setelah itu Aspirin dihentikan (<em>drop aspirin</em>), dan dilanjutkan dengan <em>Dual Therapy</em> (OAC + Clopidogrel) hingga 12 bulan.<br><br>📚 <strong>Evidence:</strong> <em>AUGUSTUS Trial</em> dan ESC 2020 AF Guidelines." 
            },
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Apoteker bangsal menerima keluhan dari pasien pengguna Ticagrelor yang baru diresepkan 3 hari lalu. Pasien mengeluh sering sesak napas (<em>dyspnea</em>) padahal paru-paru bersih dan SpO2 99%. <br><br>Bagaimana apoteker mengedukasi?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Efek samping spesifik (Adverse Drug Reaction) dari Ticagrelor. Obat ini menghambat <em>reuptake</em> seluler dari adenosin endogen, akumulasi adenosin di jaringan memicu sensasi sesak sentral.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> <br>1. Edukasi bahwa ini efek samping wajar (~15-20% pasien) dan seringkali <em>self-limiting</em> (mereda dalam 1-2 minggu).<br>2. Jika sesak sangat mengganggu/tidak tertahankan, komunikasikan dengan DPJP untuk de-eskalasi (<em>switch</em>) ke Clopidogrel." 
            },
            { 
                cat: "Antikoagulan & Antiplatelet", 
                q: "<strong>[Vignette]</strong> Pasien ACS di IGD yang mendapat loading dose Ticagrelor 180mg dijadwalkan operasi CABG emergensi keesokan harinya. Ahli bedah menanyakan waktu henti obat. <br><br>Berapa lama farmasis merekomendasikan *wash-out* antiplatelet ini sebelum sayatan?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Risiko perdarahan bedah mayor akibat ikatan P2Y12 inhibitor.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Berbeda dengan Clopidogrel/Prasugrel (butuh 5-7 hari karena ikatan ireversibel), Ticagrelor memiliki ikatan reversibel. Farmasis merekomendasikan penundaan bedah CABG non-emergensi selama <strong>3 hingga 5 hari</strong> pasca dosis terakhir Ticagrelor untuk meminimalkan pendarahan perioperatif.<br><br>📚 <strong>Evidence:</strong> ESC/EACTS Guidelines on Myocardial Revascularization." 
            },

            // --- BAB 2: GAGAL JANTUNG & INOTROPIK (10 Soal) ---
            { 
                cat: "HF & Inotropik", 
                q: "<strong>[Vignette]</strong> Pasien HFrEF rawat jalan direkomendasikan ganti terapi dari Lisinopril 10mg ke ARNI (Sacubitril/Valsartan) 50mg BID. Pasien menebus resep siang ini. <br><br>Edukasi transisi krusial apa yang wajib diberikan apoteker?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Risiko <em>Angioedema</em> fatal akibat efek aditif akumulasi bradikinin jika ACE-I dan Neprilysin inhibitor bertemu di sirkulasi.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Berikan instruksi <em>Washout Period</em> mutlak. Pasien <strong>TIDAK BOLEH meminum ARNI selama 36 jam penuh</strong> sejak dosis terakhir Lisinopril diminum. Setelah 36 jam lewat, barulah dosis pertama ARNI boleh ditelan.<br><br>📚 <strong>Evidence:</strong> Protokol keselamatan dari <em>PARADIGM-HF Trial</em>." 
            },
            { 
                cat: "HF & Inotropik", 
                q: "<strong>[Vignette]</strong> Pasien ADHF (<em>Acute Decompensated HF</em>) dengan <em>severe gut edema</em> tidak memberikan respon diuresis yang adekuat (urin output minim) setelah diberikan tablet oral Furosemide dosis tinggi. <br><br>Apa rekomendasi klinis apoteker?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Penurunan bioavailabilitas obat. Edema pada mukosa dinding usus pasien ADHF menghalangi absorpsi oral Furosemide (bioavailabilitasnya bisa anjlok <10%).<br><br>⚕️ <strong>Intervensi Farmasis:</strong> <br>1. Rekomendasikan konversi rute pemberian menjadi <strong>Furosemide Intravena (IV)</strong> (dosis ekuivalen IV biasanya 1/2 dari dosis oral).<br>2. Alternatif oral jika rawat jalan: Ganti ke <strong>Torsemide</strong>, yang memiliki absorpsi >80% dan kebal terhadap efek blokade edema usus." 
            },
            { 
                cat: "HF & Inotropik", 
                q: "<strong>[Vignette]</strong> Pasien syok kardiogenik (BP 80/50, akral dingin basah) di CVCU baru saja dipasang infus inotropik Dobutamin. DPJP berencana meresepkan Bisoprolol hari ini. <br><br>Apa sikap apoteker yang menelaah resep?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Penggunaan obat inotropik negatif (Beta-blocker) pada fase akut dekompensasi berat / syok (profil Forrester <em>Cold & Wet</em>) adalah kontraindikasi absolut, dapat memicu kolaps hemodinamik.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> <em>Hold</em> inisiasi Bisoprolol. Sarankan DPJP untuk menunda terapi beta-blocker hingga hemodinamik pasien stabil, euvolemik (edema hilang), dan telah disapih (*weaning*) lepas sepenuhnya dari inotropik IV.<br><br>📚 <strong>Evidence:</strong> ESC Heart Failure Guidelines." 
            },
            { 
                cat: "HF & Inotropik", 
                q: "<strong>[Vignette]</strong> Dapagliflozin 10mg (SGLT2i) akan ditambahkan pada pasien gagal jantung (HFrEF) usia 65 tahun tanpa riwayat Diabetes. Pasien bingung mengapa diberi obat gula. <br><br>Edukasi indikasi & efek samping apa yang diberikan apoteker?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Kepatuhan pasien (<em>Compliance</em>) akibat kebingungan indikasi *off-label* (dulunya).<br><br>⚕️ <strong>Intervensi Farmasis:</strong> <br>1. Edukasi bahwa obat ini terbukti memperkuat pompa jantung dan membuang cairan berlebih, bukan sekadar turunkan gula darah.<br>2. <strong>Peringatan Efek Samping:</strong> Minta pasien ekstra higienis di area genital pasca BAK, karena pembuangan glukosa via urin meningkatkan risiko <strong>Infeksi Jamur Genital</strong> dan ISK.<br><br>📚 <strong>Evidence:</strong> <em>DAPA-HF Trial</em>." 
            },
            { 
                cat: "HF & Inotropik", 
                q: "<strong>[Vignette]</strong> Pasien pria 55 tahun pengguna Spironolactone 25mg mengeluhkan nyeri dan pembengkakan payudara (Ginekomastia). Pasien minta obat dihentikan selamanya. <br><br>Rekomendasi substitusi apa yang disarankan apoteker?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Efek samping anti-androgenik dari Spironolactone (terjadi pada ~10% pria) yang menurunkan kepatuhan minum obat pilar (MRA).<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Jangan hentikan terapi MRA secara total karena penting untuk <em>survival</em> HF. Rekomendasikan <em>switch</em> ke <strong>Eplerenone 25mg</strong>. Eplerenone adalah MRA generasi baru yang sangat selektif pada reseptor mineralokortikoid, tanpa afinitas terhadap reseptor androgen/progesteron, sehingga tidak memicu ginekomastia.<br><br>📚 <strong>Evidence:</strong> <em>EPHESUS / EMPHASIS-HF Trials</em>." 
            },
            { 
                cat: "HF & Inotropik", 
                q: "<strong>[Vignette]</strong> Pasien HFrEF simptomatik (LVEF 30%) dengan sinus ritme memiliki <em>Heart Rate</em> persisten 85x/menit meskipun sudah diresepkan Carvedilol 25mg BID (dosis maks toleransi, TD 100/60). <br><br>Terapi tambahan apa yang direkomendasikan?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> Target <em>Heart Rate</em> (< 70x/mnt) gagal dicapai dengan Beta-blocker saja, risiko progresi gagal jantung.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Rekomendasikan penambahan obat <strong>Ivabradine</strong> (dosis awal 5mg BID). <br><em>Mekanisme:</em> Ivabradine memblokir kanal <em>funny current (If)</em> di Nodus SA, murni menurunkan nadi tanpa memiliki efek inotropik negatif atau menurunkan tekanan darah lebih lanjut.<br><br>📚 <strong>Evidence:</strong> <em>SHIFT Trial</em>." 
            },
            { 
                cat: "HF & Inotropik", 
                q: "<strong>[Vignette]</strong> Pasien HFrEF tua rutin minum Digoxin 0.25mg/hari. Ia masuk RS karena kelemahan otot. Hasil lab kalium serum 2.8 mEq/L, fungsi ginjal normal. <br><br>Risiko DRP apa yang sangat krusial dipantau apoteker?", 
                a: "⚠️ <strong>Identifikasi DRP:</strong> <strong>Hipokalemia memicu Toksisitas Digoxin.</strong> <br>Mekanisme: Kalium dan Digoxin berkompetisi untuk mengikat pompa Na+/K+-ATPase. Saat kalium rendah (akibat diuretik loop), situs ikatan pompa kosong, sehingga molekul digoxin bebas berikatan sangat kuat, memicu aritmia fatal seketika meski kadar lab digoxin darah normal.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Segera rekomendasikan koreksi <strong>KCl Intravena/Oral</strong> hingga kalium stabil > 4.0 mEq/L. Cek EKG untuk melihat perubahan *scooped ST segment*." 
            },
            { 
                cat: "HF & Inotropik", 
                q: "<strong>[Vignette]</strong> Pasien syok kardiogenik (LVEF 20%) yang selama ini rutin minum dosis tinggi Beta-blocker (Bisoprolol 10mg) tiba di IGD. Dibutuhkan obat inotropik segera. <br><br>Mana yang lebih efektif direkomendasikan: Dobutamin atau Levosimendan?",

                a: "⚠️ <strong>Identifikasi DRP:</strong> Inkompatibilitas farmasetik pada durasi infus panjang Amiodaron.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Drip pemeliharaan lambat (> 2 jam) Amiodaron mensyaratkan pelarut <strong>HANYA Dextrose 5% (D5W)</strong>. Dalam NaCl, amiodaron cenderung membentuk kristal/endapan dalam beberapa jam. Selain itu, kantong/selang PVC bisa membuat obat menempel, dan apoteker merekomendasikan penggunaan <em>polyolefin/glass bag</em> serta *filter in-line 0.22 mikron*."

                a: "⚠️ <strong>Identifikasi DRP:</strong> Ekstravasasi agen vasokonstriktor vesikan sangat kuat yang memicu nekrosis jaringan perifer (amputasi).<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Segera siapkan sediaan <strong>Phentolamine (Fentolamin)</strong> 5-10 mg yang diencerkan salin untuk Injeksi Subkutan Lokal Infiltrasi.<br>Phentolamine memblokir reseptor alfa di area bocoran, memecahkan vasokonstriksi kejang, dan memulihkan perfusi jaringan tangan kembali merah merona."

                a: "⚠️ <strong>Identifikasi DRP:</strong> <em>Medication Error</em> kategori *Sentinel Event* (Penyebab Kematian Langsung). Bolus KCl memicu *ventricular fibrillation* & asystole dalam hitungan detik.<br><br>⚕️ <strong>Intervensi Farmasis (SOP Keselamatan):</strong><br>1. KCl <strong>MUTLAK WAJIB DIENCERKAN</strong> dalam *base solution* (min. 500 mL NaCl 0.9%).<br>2. Laju infus lewat vena perifer MAKSIMAL <strong>10 mEq/jam</strong>, dengan batas konsentrasi 40 mEq/Liter untuk mencegah phlebitis terbakar vena."

                a: "⚠️ <strong>Identifikasi DRP:</strong> Degradasi fotokimia cepat yang menghancurkan efikasi obat dan mempercepat terbentuknya racun.<br><br>⚕️ <strong>Intervensi Farmasis:</strong> Larutan obat SNP sangat ekstrem <strong>sensitif terhadap radiasi cahaya (Fotosensitif)</strong>. Paparan sinar ultraviolet lampu/matahari akan menghancurkan struktur molekuler (terlihat berubah warna dari bening coklat ke biru tua) dan memicu terlepasnya radikal ion Sianida (*Cyanide*) racun secara spontan ke dalam kantong cairan infus."

            { 
                cat: "TDM & IV Admixture", 
                q: "<strong>[Vignette]</strong> Dokter meresepkan Losartan untuk gagal jantung, tapi gudang Farmasi RS hanya menyetok Candesartan dan Valsartan karena penyesuaian Formularium RS/JKN e-Katalog. <br><br>Bagaimana kebijakan substitusi apoteker?", 
                a: "⚕️ <strong>Intervensi Farmasis (Manajemen & Regulasi):</strong><br>Apoteker berhak melakukan <strong>Substitusi Terapeutik (Therapeutic Interchange)</strong> sesuai payung hukum Kebijakan Komite Farmasi & Terapi (KFT) dan SOP RS.<br><br>1. Komunikasikan ke DPJP bahwa Losartan *out of formulary*.<br>2. Konversi mandiri berdasarkan rasio ekipotensi kelas ARB (misalnya konversi dosis ekuivalen ke Candesartan 8mg/16mg atau Valsartan 80mg).<br>3. Pastikan kelancaran terapi JKN BPJS tidak tersendat tanpa mengurangi kaidah indikasi *evidence-based* kardiovaskular."

        let cards = [...originalCards];
        let currentIndex = 0;
        let isFlipped = false;
        
        // Touch Variables for Swipe (Mobile)
        let touchStartX = 0;
        let touchEndX = 0;
        let isSwiping = false;

        const flashcardEl = document.getElementById('flashcard');
        const questionEl = document.getElementById('question-text');
        const answerEl = document.getElementById('answer-text');
        const counterEl = document.getElementById('card-counter');
        const categoryEl = document.getElementById('card-category');

        function renderCard() {
            if (isFlipped) {
                flashcardEl.classList.remove('is-flipped');
                isFlipped = false;
                setTimeout(() => {
                    updateContent();
                }, 300);
            } else {
                updateContent();
            }
        }

        function updateContent() {
            const currentCard = cards[currentIndex];
            questionEl.innerHTML = currentCard.q;
            answerEl.innerHTML = currentCard.a;
            categoryEl.textContent = currentCard.cat;
            counterEl.textContent = `${currentIndex + 1} / ${cards.length}`;
            
            // Scroll answer to top whenever card changes
            document.querySelector('#answer-text').parentElement.parentElement.scrollTop = 0;
        }

        function toggleFlip(e) {
            // Prevent flip if the user is swiping or selecting text
            if (isSwiping) return;
            const selection = window.getSelection();
            if (selection.toString().length > 0) return;
            
            isFlipped = !isFlipped;
            flashcardEl.classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                renderCard();
            } else {
                currentIndex = 0;
                renderCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard();
            } else {
                currentIndex = cards.length - 1; // loop to back
                renderCard();
            }
        }

        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            renderCard();
        }

        // --- Fitur Swipe untuk Mobile ---
        flashcardEl.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            isSwiping = false;
        }, {passive: true});

        flashcardEl.addEventListener('touchmove', e => {
            const currentTouchX = e.changedTouches[0].screenX;
            // Deteksi threshold geseran untuk membedakan tap vs swipe
            if (Math.abs(currentTouchX - touchStartX) > 15) {
                isSwiping = true;
            }
        }, {passive: true});

        flashcardEl.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 50; 
            if (touchEndX < touchStartX - swipeThreshold) {
                nextCard();
            } else if (touchEndX > touchStartX + swipeThreshold) {
                prevCard();
            }
            setTimeout(() => {
                isSwiping = false;
            }, 100);
        }

        window.onload = renderCard;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault(); // Mencegah scrolling bawah jika spasi ditekan
                toggleFlip();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            }
        });
    </script>
