<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioRx Masterclass: 50 Vignette Flashcards</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #090d16;
            --bg-secondary: #0f1626;
            --bg-card-front: #172033;
            --bg-card-back: #f8fafc;
            --glass-bg: rgba(23, 32, 51, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            
            --accent-cyan: #06b6d4;
            --accent-cyan-glow: rgba(6, 182, 212, 0.3);
            --accent-emerald: #10b981;
            --accent-emerald-glow: rgba(16, 185, 129, 0.2);
            --accent-rose: #f43f5e;
            --accent-rose-glow: rgba(244, 63, 94, 0.25);
            --accent-gold: #f59e0b;
            --accent-indigo: #6366f1;
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-dark-primary: #0f172a;
            --text-dark-secondary: #475569;
            
            --font-sans: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'Fira Code', monospace;
            
            --card-height: 52vh;
            --card-min-height: 420px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Ambient EKG Pulse Background Animation */
        .ekg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            opacity: 0.15;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ekg-svg {
            width: 100%;
            height: 250px;
            stroke: var(--accent-cyan);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: drawLine 6s linear infinite;
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* App Container & Layout (Mobile-First) */
        .app-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding: 1rem;
            position: relative;
        }

        /* Header */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-pulse {
            width: 10px;
            height: 10px;
            background-color: var(--accent-rose);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-rose);
            animation: heartPulse 1.2s ease-in-out infinite;
        }

        @keyframes heartPulse {
            0% { transform: scale(1); box-shadow: 0 0 4px var(--accent-rose); }
            30% { transform: scale(1.3); box-shadow: 0 0 12px var(--accent-rose); }
            60% { transform: scale(0.9); box-shadow: 0 0 4px var(--accent-rose); }
            80% { transform: scale(1.1); box-shadow: 0 0 8px var(--accent-rose); }
            100% { transform: scale(1); box-shadow: 0 0 4px var(--accent-rose); }
        }

        .logo-title h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-title p {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.5rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .icon-btn.active {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }

        /* Search & Filter Header Container */
        .search-filter-container {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        .search-bar-wrapper {
            position: relative;
            flex-grow: 1;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.6rem 1rem 0.6rem 2.25rem;
            border-radius: 0.75rem;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        /* Layout Columns (Desktop-ready) */
        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex-grow: 1;
        }

        /* Right Panel: Active Flashcard & Navigation Controls */
        .flashcard-section {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .progress-indicator {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 580px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            padding: 0 0.25rem;
        }

        .category-tag {
            color: var(--accent-rose);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--accent-rose-glow);
            padding: 0.15rem 0.6rem;
            border-radius: 0.35rem;
            border: 1px solid rgba(244, 63, 94, 0.15);
        }

        /* 3D Flashcard Structure */
        .flashcard-wrapper {
            position: relative;
            width: 100%;
            max-width: 580px;
            height: var(--card-height);
            min-height: var(--card-min-height);
            perspective: 1000px;
            cursor: pointer;
            touch-action: pan-y;
        }

        .card-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-radius: 1.5rem;
        }

        .flashcard-wrapper.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* Front Face (Question) styling */
        .card-face-front {
            background-color: var(--bg-card-front);
            border: 1px solid var(--glass-border);
            border-top: 4px solid var(--accent-cyan);
            color: var(--text-primary);
        }

        .card-header-q {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .q-symbol {
            font-size: 1.5rem;
            font-weight: 900;
            color: rgba(6, 182, 212, 0.25);
            font-family: var(--font-mono);
        }

        .bookmark-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.25rem;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .bookmark-btn.active {
            color: var(--accent-gold);
            transform: scale(1.1);
            filter: drop-shadow(0 0 5px rgba(245, 158, 11, 0.4));
        }

        .vignette-body {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 0.25rem;
            font-family: var(--font-body);
            font-size: 0.925rem;
            line-height: 1.6;
            font-weight: 500;
            color: rgba(248, 250, 252, 0.95);
            display: flex;
            align-items: center;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Dynamic Visual Badges inside vignette questions */
        .clinical-badge {
            display: inline-block;
            padding: 0.05rem 0.4rem;
            border-radius: 0.25rem;
            font-weight: 700;
            font-size: 0.8rem;
            margin: 0 0.15rem;
            font-family: var(--font-mono);
            letter-spacing: -0.02em;
        }
        
        .clinical-badge-red {
            background: rgba(244, 63, 94, 0.2);
            color: #ffa3b1;
            border: 1px solid rgba(244, 63, 94, 0.35);
            box-shadow: 0 0 8px rgba(244, 63, 94, 0.2);
        }
        .clinical-badge-yellow {
            background: rgba(245, 158, 11, 0.18);
            color: #ffe082;
            border: 1px solid rgba(245, 158, 11, 0.35);
        }
        .clinical-badge-cyan {
            background: rgba(6, 182, 212, 0.18);
            color: #a5f3fc;
            border: 1px solid rgba(6, 182, 212, 0.35);
        }
        .clinical-badge-indigo {
            background: rgba(99, 102, 241, 0.18);
            color: #c7d2fe;
            border: 1px solid rgba(99, 102, 241, 0.35);
        }

        .card-tip {
            font-size: 0.725rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        /* Back Face (Answer) styling */
        .card-face-back {
            background-color: var(--bg-card-back);
            border: 1px solid #e2e8f0;
            border-top: 4px solid var(--accent-emerald);
            color: var(--text-dark-primary);
            transform: rotateY(180deg);
        }

        .card-header-a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .a-symbol {
            font-size: 1.5rem;
            font-weight: 900;
            color: rgba(16, 185, 129, 0.25);
            font-family: var(--font-mono);
        }

        .intervention-body {
            flex-grow: 1;
            overflow-y: auto;
            font-family: var(--font-body);
            font-size: 0.85rem;
            line-height: 1.55;
            padding-right: 0.25rem;
        }

        .answer-section {
            margin-bottom: 0.75rem;
        }

        .answer-title {
            font-family: var(--font-sans);
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        
        .title-drp { color: #dc2626; }
        .title-pharmacist { color: #059669; }
        .title-evidence { color: #4f46e5; }

        .answer-content {
            color: var(--text-dark-secondary);
            font-weight: 500;
        }
        
        .answer-content strong {
            color: var(--text-dark-primary);
            font-weight: 700;
        }

        .answer-content ul {
            list-style-position: inside;
            margin-top: 0.25rem;
            padding-left: 0.5rem;
        }

        .answer-content li {
            margin-bottom: 0.15rem;
        }

        /* Thumb-friendly Control Area */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 580px;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        /* Confidence Scorers (Bisa / Ragu-Ragu) */
        .score-buttons-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .score-btn {
            border: none;
            border-radius: 0.75rem;
            padding: 0.85rem 1rem;
            font-family: var(--font-sans);
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
        }

        .score-btn:active {
            transform: scale(0.95);
        }

        .btn-ragu {
            background: linear-gradient(135deg, #e11d48, #be123c);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .btn-ragu:hover {
            box-shadow: 0 4px 15px var(--accent-rose-glow);
        }

        .btn-bisa {
            background: linear-gradient(135deg, #059669, #047857);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .btn-bisa:hover {
            box-shadow: 0 4px 15px var(--accent-emerald-glow);
        }

        /* Standard Nav buttons (Prev, Next, Shuffle, Dashboard) */
        .nav-buttons-row {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.75rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            font-family: var(--font-sans);
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .nav-btn:active {
            transform: scale(0.97);
        }

        .nav-btn-highlight {
            border-color: var(--accent-cyan);
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent-cyan);
        }

        .nav-btn-highlight:hover {
            background: rgba(6, 182, 212, 0.15);
        }

        .nav-btn-dash {
            display: flex;
        }

        /* Desktop Sidebar & Mobile Bottom Sheet Panels */
        .sidebar-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* Section titles inside sidebars */
        .panel-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.075em;
            color: var(--text-secondary);
            font-weight: 700;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Analytics Stats widgets */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 0.75rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: var(--font-mono);
            line-height: 1.2;
        }
        
        .stat-value-cyan { color: var(--accent-cyan); }
        .stat-value-emerald { color: var(--accent-emerald); }
        .stat-value-rose { color: var(--accent-rose); }
        .stat-value-gold { color: var(--accent-gold); }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 0.25rem;
        }

        /* Category Filter Buttons list */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .filter-btn.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: var(--accent-indigo);
            color: #a5b4fc;
        }

        .filter-count {
            background: rgba(255, 255, 255, 0.06);
            padding: 0.1rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.65rem;
            font-family: var(--font-mono);
            color: var(--text-secondary);
        }

        .filter-btn.active .filter-count {
            background: rgba(99, 102, 241, 0.25);
            color: #a5b4fc;
        }

        /* Bookmarked Cards scrollable list */
        .bookmark-list-wrapper {
            max-height: 140px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            padding-right: 0.25rem;
        }

        .bookmark-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .bookmark-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .no-bookmarks {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
            padding: 1rem 0;
            font-style: italic;
        }

        /* Danger controls */
        .danger-zone {
            display: flex;
            justify-content: flex-end;
        }

        .reset-btn {
            background: none;
            border: none;
            color: var(--accent-rose);
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
            opacity: 0.6;
        }

        .reset-btn:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Mobile Bottom Sheet Drawer implementation */
        .bottom-sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            max-height: 85vh;
            background: var(--bg-secondary);
            border-top: 1px solid var(--glass-border);
            border-radius: 2rem 2rem 0 0;
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1.25rem 2rem 1.25rem;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
        }

        .bottom-sheet-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .bottom-sheet-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            margin: -0.75rem auto 1rem auto;
        }

        .bottom-sheet-content {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            padding-right: 0.1rem;
        }

        .close-sheet-btn {
            position: absolute;
            top: 1rem;

    <!-- Audio Synthesis & Logic JavaScript -->
    <script>
        // WEB AUDIO API SYNTHESIZER
        let audioCtx = null;
        let isMuted = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (isMuted) return;
            initAudio();
            if (!audioCtx) return;
            
            // Resume context if suspended (common in browsers)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'flip') {
                // Short, low frequency mechanical click
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(30, now + 0.08);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'success') {
                // Happy two-tone chime (C5 to G5)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(783.99, now + 0.08); // G5
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.28);
                osc.start(now);
                osc.stop(now + 0.28);
            } else if (type === 'unsettled') {
                // Neutral soft click/chime (G3)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(196.00, now); // G3
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            const soundOnIcon = document.getElementById('soundOnIcon');
            const soundOffIcon = document.getElementById('soundOffIcon');
            const soundToggle = document.getElementById('soundToggle');

            if (isMuted) {
                soundOnIcon.style.display = 'none';
                soundOffIcon.style.display = 'block';
                soundToggle.classList.remove('active');
                localStorage.setItem('cardio_rx_muted', 'true');
            } else {
                soundOnIcon.style.display = 'block';
                soundOffIcon.style.display = 'none';
                soundToggle.classList.add('active');
                localStorage.setItem('cardio_rx_muted', 'false');
                playSound('flip');
            }
        }

        // LOAD MUTED STATUS FROM STORAGE
        if (localStorage.getItem('cardio_rx_muted') === 'true') {
            setTimeout(toggleMute, 100);
        }

        // 50 NEW VIGNETTES DATA
        const rawCards = [
            // --- Kategori 1: Farmakoterapi Iskemik & Dislipidemia Khusus (1-10) ---
            {
                cat: "Iskemik & Dislipidemia",
                q: "Seorang pria 62 tahun dengan riwayat angina stabil kronis datang kontrol rutin. Pasien saat ini rutin menggunakan antiangina Ranolazine 500 mg BID. Profil lipid pasien menunjukkan kolesterol tinggi sehingga dokter berencana menambahkan Simvastatin 40 mg sekali sehari malam hari. Apakah DRP (Drug-Related Problem) mayor yang harus diintersep oleh Apoteker Klinis?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Interaksi Obat Mayor & Overdosis Simvastatin.</strong> Ranolazine merupakan inhibitor moderat enzim CYP3A4 dan inhibitor transporter P-glycoprotein (P-gp). Simvastatin dimetabolisme murni oleh CYP3A4. Gabungan kedua obat ini melipatgandakan paparan sistemik Simvastatin, secara eksponensial meningkatkan risiko toksisitas otot parah (<em>Rhabdomyolysis</em>).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Merekomendasikan kepada DPJP untuk <strong>membatasi dosis maksimal Simvastatin ke 20 mg sekali sehari</strong>, atau lebih baik menggantinya dengan statin yang tidak sensitif terhadap inhibisi CYP3A4 seperti <strong>Rosuvastatin 10-20 mg</strong> atau <strong>Pravastatin 40 mg</strong>.</div></div><div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE & PANDUAN</span><div class='answer-content'>FDA Drug Safety Labeling & Pedoman AHA/ACC terkait Pembatasan Dosis Maksimal Simvastatin saat digabung dengan inhibitor CYP3A4/P-gp.</div></div>"
            },
            {
                cat: "Iskemik & Dislipidemia",
                q: "Seorang pasien 58 tahun baru saja menjalani PCI pasang stent jantung akibat serangan NSTEMI. DPJP memberikan resep pulang berupa Ticagrelor 90 mg BID. Pasien juga diresepkan Aspirin 325 mg sekali sehari untuk efek antiplatelet ganda (DAPT). Bagaimana evaluasi ketepatan dosis Aspirin oleh Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Ketidaktepatan Dosis Aspirin (Overdosing).</strong> Penggunaan Aspirin dosis pemeliharaan tinggi (>100 mg/hari) secara klinis terbukti menurunkan efektivitas antitrombotik dari Ticagrelor. Dosis Aspirin yang terlalu tinggi justru memblokir sintesis prostasiklin vaskular tanpa memberikan efek sinergis tambahan, dan meningkatkan risiko perdarahan GI secara signifikan.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Merekomendasikan penurunan dosis Aspirin pemeliharaan menjadi <strong>81 mg atau 100 mg sekali sehari</strong> (Aspirin dosis rendah/baby aspirin) sebagai pasangan DAPT yang aman dan efektif bersama Ticagrelor.</div></div><div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE & PANDUAN</span><div class='answer-content'>Berdasarkan sub-analisis dari landmark <strong>PLATO Trial</strong> (tercatat penurunan efikasi Ticagrelor yang signifikan pada populasi AS yang menerima Aspirin dosis tinggi). Rekomendasi ini diadopsi oleh Guideline ESC/AHA ACS.</div></div>"
            },
            {
                cat: "Iskemik & Dislipidemia",
                q: "Pasien dislipidemia parah dengan riwayat PJK diresepkan Niacin Extended-Release (ER) 1000 mg sekali sehari malam hari. Setelah 3 hari mengonsumsi obat, pasien menelpon instalasi farmasi mengeluh wajah dan leher terasa terbakar, merah, dan gatal (flushing) sesaat setelah meminum obat. Pasien berencana membuang obat tersebut karena takut alergi. Bagaimana edukasi dan tindakan Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Efek Samping Terprediksi (Adverse Drug Reaction) - Vasodilatasi Kutaneus.</strong> Niacin mengaktifkan reseptor GP109A di sel epidermal, merangsang pelepasan asam arakidonat dan sintesis Prostaglandin D2/E2 yang mendilatasi kapiler kulit. Ini adalah efek samping farmakologis umum, bukan reaksi alergi imunologis (hipersensitivitas).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>1. Berikan edukasi bahwa ini bukan alergi dan akan mereda seiring toleransi tubuh (1-2 minggu).<br>2. Instruksikan pasien meminum <strong>Aspirin 325 mg atau Ibuprofen 200 mg sekitar 30-60 menit sebelum</strong> meminum Niacin.<br>3. Sarankan meminum obat tepat sebelum tidur bersama camilan rendah lemak, dan hindari konsumsi minuman hangat, alkohol, atau makanan pedas dekat dengan jadwal minum obat.</div></div>"
            },
            {
                cat: "Iskemik & Dislipidemia",
                q: "Pasien wanita 54 tahun dengan hiperkolesterolemia berat rutin mengonsumsi Cholestyramine 4 g BID. Pasien juga meminum rutin Levothyroxine 100 mcg (pagi hari untuk hipotiroid) dan Warfarin 3 mg (malam hari untuk katup buatan). Hasil lab menunjukkan kadar TSH pasien melonjak (hipotiroid tidak terkontrol) dan INR drop ke 1.3 (sub-terapeutik). Mengapa hal ini bisa terjadi?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Interaksi Absorpsi (Fase Farmakokinetik).</strong> Cholestyramine adalah resin pengikat asam empedu yang bekerja non-spesifik. Resin ini mengikat senyawa asam lemah seperti Levothyroxine dan Warfarin di lumen saluran cerna, membentuk kompleks tidak larut yang tidak dapat diserap, sehingga kedua obat tersebut keluar bersama feses.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Berikan instruksi jeda waktu pemberian yang ketat: Obat lain (Levothyroxine, Warfarin, dll) wajib diminum minimal <strong>1 jam sebelum</strong> atau <strong>4 hingga 6 jam setelah</strong> mengonsumsi Cholestyramine. Lakukan pemantauan ulang TSH dan INR 2 minggu kemudian.</div></div>"
            },
            {
                cat: "Iskemik & Dislipidemia",
                q: "Pasien hipertensi berusia 65 tahun rutin meminum Amlodipine 10 mg QD. Karena profil LDL-nya buruk pasca serangan jantung, dokter umum menambahkan Simvastatin 40 mg QD. Bagaimana analisis klinis apoteker terhadap kombinasi terapi baru ini?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Interaksi Obat Mayor.</strong> Amlodipine adalah inhibitor CYP3A4 tingkat lemah-sedang. Simvastatin adalah substrat sensitif CYP3A4. Kehadiran Amlodipine secara konsisten menghambat metabolisme lintas pertama Simvastatin, melipatgandakan konsentrasi serum statin dan meningkatkan risiko miopati/rhabdomyolysis secara drastis.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Rekomendasikan dokter untuk <strong>menurunkan dosis Simvastatin menjadi maksimal 20 mg sekali sehari</strong>, atau sebaiknya menggantinya dengan statin berdaya tinggi (high-intensity statin) yang tidak berinteraksi dengan Amlodipine seperti <strong>Atorvastatin 20-40 mg</strong> or <strong>Rosuvastatin 20 mg</strong>.</div></div>"
            },
            {
                cat: "Iskemik & Dislipidemia",
                q: "Pasien intoleransi statin berat (selalu mengalami mialgia hebat dengan statin dosis rendah sekalipun) mendapatkan terapi baru Asam Bempedoat (Bempedoic Acid) 180 mg sekali sehari. Karena kolesterol target belum tercapai, residen bermaksud menambahkan terapi kombinasi Pravastatin 80 mg sekali sehari. Apakah interaksi obat yang perlu diwaspadai?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Peningkatan Toksisitas Statin akibat Gangguan Transportasi.</strong> Asam Bempedoat secara tidak langsung menghambat protein transporter anion organik hati OATP1B1/1B3. Pravastatin (dan Simvastatin) sangat bergantung pada transporter ini untuk masuk ke sel hati. Akibat hambatan tersebut, kadar Pravastatin di dalam darah melesat tinggi, meningkatkan risiko mialgia parah pada pasien yang sudah sensitif.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Ingatkan tim medis bahwa berdasarkan regulasi keamanan obat, dosis maksimal <strong>Pravastatin dibatasi hanya 40 mg sekali sehari</strong> (atau 20 mg untuk Simvastatin) jika diberikan bersama Asam Bempedoat. Lakukan monitoring CK (Creatine Kinase) berkala.</div></div>"
            },
            {
                cat: "Iskemik & Dislipidemia",
                q: "Seorang geriatri wanita berusia 77 tahun dengan berat badan 52 kg masuk IGD dengan diagnosis STEMI Inferior akut dan direncanakan Primary PCI. Dokter ingin memberikan resep loading dose antiplatelet Prasugrel 60 mg dilanjutkan pemeliharaan 10 mg sekali sehari. Berikan telaah farmasi Anda!",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Risiko Perdarahan Fatal (High Bleeding Risk).</strong> Pasien geriatri (usia &ge;75 tahun) memiliki risiko perdarahan intrakranial yang sangat tinggi dengan Prasugrel. Selain itu, berat badan pasien <60 kg juga merupakan faktor risiko akumulasi obat. Prasugrel umumnya dikontraindikasikan pada usia &ge;75 tahun kecuali pada kasus DM risiko sangat tinggi atau riwayat MI berulang.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Rekomendasikan penggantian antiplatelet menggunakan <strong>Ticagrelor (180 mg loading, 90 mg BID pemeliharaan)</strong> atau Clopidogrel. Jika Prasugrel terpaksa digunakan karena resistensi mutlak antiplatelet lain, dosis pemeliharaannya wajib diturunkan menjadi <strong>5 mg sekali sehari</strong>.</div></div><div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE & PANDUAN</span><div class='answer-content'>Berdasarkan studi landmark <strong>TRITON-TIMI 38</strong>, efikasi Prasugrel diimbangi oleh peningkatan perdarahan mayor yang fatal pada kelompok lansia dan berat badan rendah.</div></div>"
            },
            {
                cat: "Iskemik & Dislipidemia",
                q: "Seorang pasien PJK dengan kadar Trigliserida tinggi (320 mg/dL) berniat membeli minyak ikan / suplemen Omega-3 OTC (Over the Counter) campuran EPA & DHA dosis tinggi di apotek karena harganya murah. Pasien meminta pendapat Anda sebagai Apoteker. Apa pertimbangan klinis berbasis bukti yang Anda jelaskan?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ EVALUASI KLINIS PANDUAN OBAT</span><div class='answer-content'><strong>Ketidakcocokan Sediaan Omega-3.</strong> Minyak ikan komersial OTC mengandung campuran asam lemak EPA dan DHA. Komponen DHA (Docosahexaenoic Acid) terbukti secara klinis dapat <strong>menaikkan kadar kolesterol jahat LDL-C</strong> hingga 15-20%, dan sediaan campuran ini tidak terbukti mengurangi risiko kejadian serangan kardiovaskular pada pasien risiko tinggi.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Edukasi pasien untuk menggunakan preparat <strong>Icosapent Ethyl murni (2 gram BID)</strong>. Sediaan ini hanya mengandung EPA termodifikasi (tanpa DHA), yang terbukti menurunkan trigliserida tanpa menaikkan LDL, sekaligus memberikan proteksi langsung terhadap pembuluh darah.</div></div><div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE & PANDUAN</span><div class='answer-content'>Berdasarkan uji klinis <strong>REDUCE-IT Trial</strong>, penggunaan Icosapent Ethyl terbukti memangkas risiko kejadian kardiovaskular mayor (CV death, MI, stroke) sebesar 25%.</div></div>"
            },
            {
                cat: "Iskemik & Dislipidemia",
                q: "Seorang pria 50 tahun pengguna Atorvastatin 40 mg mengeluhkan kelemahan otot bahu dan paha yang parah disertai nyeri tanpa trauma fisik. Hasil lab menunjukkan kadar CK (Creatine Kinase) sangat tinggi yaitu 14.000 U/L. Meskipun Atorvastatin telah dihentikan selama 3 minggu, kekuatan otot pasien terus menurun dan nyeri tidak mereda. Kondisi patologis spesifik apa yang dicurigai terjadi?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Statin-Induced Necrotizing Autoimmune Myopathy (IMNM).</strong> Ini adalah varian reaksi autoimun langka yang dipicu oleh statin. Berbeda dengan mialgia biasa yang sembuh setelah obat dihentikan, pada IMNM tubuh memproduksi <strong>antibodi patologis anti-HMGCR</strong> (HMG-CoA Reductase) yang terus menyerang dan menghancurkan sel otot skeletal secara progresif meskipun paparan obat telah ditiadakan.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Segera rekomendasikan rujukan ke spesialis saraf/reumatologi untuk pemeriksaan antibodi anti-HMGCR dan biopsi otot. Pasien membutuhkan terapi imunosupresif agresif (seperti Kortikosteroid dosis tinggi, Methotrexate, atau IVIG), bukan sekadar istirahat. Statin dikontraindikasikan seumur hidup.</div></div>"
            },
            {
                cat: "Iskemik & Dislipidemia",
                q: "Seorang pasien dengan diagnosis Homozygous Familial Hypercholesterolemia (HoFH) mendapatkan terapi obat pembatas lipid mutakhir Lomitapide (Juxtapid). Pasien kembali kontrol mengeluhkan diare lemak (steatorrhea) yang hebat, kram perut, dan mual setiap kali selesai makan. Penyesuaian diet apa yang wajib diedukasikan apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Efek Samping Diet-Dependent Akibat Mekanisme Kerja Obat.</strong> Lomitapide menghambat protein MTP (Microsomal Triglyceride Transfer Protein) di enterosit usus dan hepatosit. Hambatan ini mencegah perakitan dan sekresi lipoprotein pembawa lemak. Jika pasien mengonsumsi makanan berlemak tinggi, lemak tersebut akan terjebak di lumen usus dan tidak dapat diserap, memicu malabsorpsi, kram perut, dan steatorrhea berat.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Edukasi pasien secara ketat untuk mematuhi <strong>diet sangat rendah lemak (kurang dari 20% dari total asupan energi harian)</strong>. Selama terapi Lomitapide, pasien juga wajib mengonsumsi suplemen vitamin larut lemak (A, D, E, K) dan asam lemak esensial setiap hari untuk mencegah defisiensi akibat gangguan penyerapan.</div></div>"
            },

            // --- Kategori 2: Gagal Jantung Lanjut & Regulasi Neurohormonal (11-20) ---
            {
                cat: "Gagal Jantung",
                q: "Pasien gagal jantung kongestif (HFrEF) dengan komorbid Diabetes Melitus tipe 2 rutin menggunakan Lisinopril 20 mg sekali sehari. Untuk menahan progresi remodeling jantung, dokter ingin menambahkan obat Aliskiren (Direct Renin Inhibitor) 150 mg sekali sehari. Apa tinjauan kritis Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Kontraindikasi Absolut (Interaksi Kombinasi RAS Blockade).</strong> Kombinasi langsung antara ACE Inhibitor (Lisinopril) dengan Direct Renin Inhibitor (Aliskiren) dilarang keras pada pasien Diabetes Melitus atau gangguan ginjal (eGFR <60). Kombinasi ganda ini meningkatkan risiko gagal ginjal akut, hipotensi berat, dan hiperkalemia fatal secara drastis tanpa memberikan tambahan manfaat kardiovaskular.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Intersep resep. Rekomendasikan kepada dokter untuk membatalkan penambahan Aliskiren. Jika ingin mengoptimalkan pilar terapi gagal jantung, sarankan transisi dari Lisinopril ke <strong>Sacubitril/Valsartan (ARNI)</strong> setelah washout period 36 jam.</div></div><div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE & PANDUAN</span><div class='answer-content'>Berdasarkan hasil uji klinis landmark <strong>ALTITUDE Trial</strong> yang dihentikan lebih awal karena tingginya kejadian stroke dan komplikasi renal pada kelompok kombinasi Aliskiren.</div></div>"
            },
            {
                cat: "Gagal Jantung",
                q: "Seorang pasien 60 tahun dengan riwayat Gagal Jantung Kronis (LVEF 30%) masuk ke poli dengan keluhan klaudikasio intermiten (nyeri tungkai saat berjalan) akibat penyakit arteri perifer (PAD). Dokter ingin meresepkan Cilostazol 100 mg BID untuk meredakan gejala nyerinya. Bagaimana sikap Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Kontraindikasi Absolut.</strong> Cilostazol adalah inhibitor enzim Phosphodiesterase-3 (PDE3). Obat golongan inhibitor PDE3 memiliki efek inotropik positif yang meningkatkan konsentrasi kalsium intraseluler miokard. Pada pasien dengan gagal jantung derajat apa pun, penggunaan kronis inhibitor PDE3 terbukti meningkatkan mortalitas akibat aritmia ventrikel letal (efek kelas).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Segera tolak penyiapan obat dan hubungi DPJP. Jelaskan kontraindikasi Cilostazol pada gagal jantung. Rekomendasikan terapi alternatif untuk PAD pasien, seperti program latihan fisik terstruktur, optimasi terapi antiplatelet (Aspirin/Clopidogrel), dan kontrol faktor risiko (statin intensitas tinggi).</div></div>"
            },
            {
                cat: "Gagal Jantung",
                q: "Pasien HFrEF simptomatik dengan sinus ritme mendapatkan terapi tambahan Ivabradine 5 mg BID untuk kontrol denyut nadi. Satu minggu kemudian, pasien datang ke farmasi mengeluh sering melihat kilatan cahaya terang atau bintik-bintik berkilau di bidang visualnya (phosphenes), terutama saat terjadi perubahan mendadak intensitas cahaya. Pasien merasa cemas terkena stroke mata. Penjelasan farmakologi apa yang harus diberikan?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ PENDIDIKAN EFEK SAMPING SPESIFIK</span><div class='answer-content'><strong>Visual Phosphenes Terinduksi Ivabradine.</strong> Ivabradine bekerja dengan menghambat kanal f-current ($I_f$) di nodus SA jantung. Secara anatomis, kanal serupa ($I_h$) juga terdapat di sel retina mata. Hambatan aliran listrik retina ini menyebabkan gangguan pemrosesan cahaya visual sementara yang dirasakan sebagai fenomena kilatan cahaya terang (phosphenes).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Tenangkan pasien dan edukasikan bahwa efek samping ini bersifat jinak (benign), sementara, dan umumnya membaik sendiri seiring waktu tanpa merusak mata. Sarankan pasien berhati-hati saat berkendara malam hari atau saat keluar dari ruangan gelap ke tempat terang secara mendadak. Jika sangat mengganggu, diskusikan pengurangan dosis dengan dokter.</div></div>"
            },
            {
                cat: "Gagal Jantung",
                q: "Pasien gagal jantung dengan Diabetes Melitus tipe 2 sedang dirawat di bangsal jantung dan rutin menerima Empagliflozin 10 mg sekali sehari. Pasien mendadak mengalami demam tinggi disertai nyeri hebat, bengkak, merah, dan kehitaman di area perineum serta skrotum. Tim medis mencurigai adanya infeksi nekrotikan yang cepat menyebar. Apa tindakan farmakoterapi darurat yang harus diambil?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Fournier's Gangrene (Necrotizing Fasciitis Perineum) akibat SGLT2i.</strong> Meskipun sangat jarang, penggunaan obat golongan SGLT2 inhibitor (seperti Empagliflozin, Dapagliflozin) memiliki peringatan keamanan serius terkait kejadian infeksi bakteri nekrotikan pada jaringan lunak perineum. Glukosuria yang dipicu obat menyediakan media nutrisi subur bagi bakteri di area genital.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>1. Segera <strong>Hentikan (Hold) penggunaan Empagliflozin permanently</strong>.<br>2. Bantu koordinasikan persiapan antibiotik spektrum luas intravena darurat (misalnya Meropenem + Linezolid) dan pastikan pasien segera disiapkan untuk debridement bedah darurat. SGLT2i tidak boleh digunakan lagi di kemudian hari.</div></div>"
            },
            {
                cat: "Gagal Jantung",
                q: "Dokter spesialis jantung mendiskusikan dengan Apoteker tentang rasionalisasi penambahan Spironolactone 25 mg sekali sehari pada pasien gagal jantung dengan fraksi ejeksi yang dipertahankan (HFpEF) dengan LVEF 52% yang masih sering sesak napas. Bukti klinis apa yang mendasari rekomendasi ini?",
                a: "<div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE-BASED ANALYSIS</span><div class='answer-content'>Berdasarkan hasil uji klinis landmark <strong>TOPCAT Trial</strong>, penggunaan Spironolactone (golongan antagonis reseptor mineralokortikoid / MRA) pada pasien HFpEF memang tidak menurunkan target primer komposit secara signifikan pada analisis global awal. Namun, sub-analisis menunjukkan bahwa Spironolactone <strong>secara signifikan memangkas angka rawat inap (hospitalisasi) akibat gagal jantung</strong> sebesar 17%, terutama pada pasien yang memiliki peningkatan kadar BNP/NT-proBNP baseline.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI & MONITORING</span><div class='answer-content'>Apoteker menyetujui inisiasi MRA dengan syarat ketat pemeriksaan fungsi ginjal (eGFR harus >30 mL/menit) dan Kalium serum (<5.0 mEq/L) sebelum obat diserahkan, serta melakukan monitoring berkala 1 minggu pasca inisiasi untuk mencegah hiperkalemia.</div></div>"
            },
            {
                cat: "Gagal Jantung",
                q: "Seorang pasien 67 tahun didiagnosis menderita gagal jantung dengan fraksi ejeksi menengah (HFmrEF, LVEF 45%). Residen bertanya kepada Apoteker spesialis jantung mengenai obat pilar pertama apa yang memiliki rekomendasi berbasis bukti (evidence-based) paling kuat untuk menurunkan angka kematian kardiovaskular pada kondisi LVEF >40% ini.",
                a: "<div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE-BASED ANALYSIS</span><div class='answer-content'>Obat golongan <strong>SGLT2 Inhibitor (Dapagliflozin atau Empagliflozin)</strong> adalah terapi pertama yang terbukti secara konsisten memotong risiko kematian kardiovaskular dan hospitalisasi gagal jantung pada spektrum fraksi ejeksi yang lebih tinggi (LVEF >40%).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI & REKOMENDASI</span><div class='answer-content'>Merekomendasikan inisiasi <strong>Dapagliflozin 10 mg QD</strong> atau <strong>Empagliflozin 10 mg QD</strong>. Jelaskan kepada residen bahwa bukti ini disokong kuat oleh hasil studi <strong>EMPEROR-Preserved</strong> (Empagliflozin) dan <strong>DELIVER Trial</strong> (Dapagliflozin) yang menjadi landasan revisi guideline gagal jantung dunia terbaru.</div></div>"
            },
            {
                cat: "Gagal Jantung",
                q: "Seorang pasien wanita berusia 55 tahun dengan HFrEF mendapatkan terapi Digoxin 0.25 mg sekali sehari untuk membantu kontrol gejala. Sebagai Apoteker, Anda meninjau resep tersebut berdasarkan temuan uji klinis historis (DIG Trial). Mengapa parameter dosis dan target kadar serum Digoxin harus dievaluasi lebih ketat pada pasien wanita?",
                a: "<div class='answer-section'><span class='answer-title title-evidence'>📚 ANALISIS DATA KLINIS HISTORIS</span><div class='answer-content'>Analisis post-hoc dari <strong>DIG (Digitalis Investigation Group) Trial</strong> menunjukkan bahwa penambahan Digoxin pada terapi standar gagal jantung ternyata <strong>meningkatkan risiko kematian (mortalitas) secara signifikan pada pasien wanita</strong> dibandingkan pria. Hal ini disebabkan karena wanita memiliki volume distribusi yang lebih kecil dan klirens renal yang lebih rendah, sehingga rentan mengalami akumulasi obat ke kadar serum yang toksik secara subklinis.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>1. Rekomendasikan penurunan dosis rutin menjadi <strong>0.125 mg sekali sehari (atau tiga kali seminggu jika fungsi ginjal menurun)</strong>.<br>2. Target kadar serum Digoxin (SDC) untuk gagal jantung harus dijaga ketat di rentang rendah yang aman, yaitu <strong>0.5 - 0.9 ng/mL</strong> (bukan target aritmia tradisional 1.0 - 2.0 ng/mL).</div></div>"
            },
            {
                cat: "Gagal Jantung",
                q: "Pasien gagal jantung keturunan Afrika-Amerika yang dirawat di bangsal jantung diputuskan untuk dialihkan terapinya dari Ramipril ke Sacubitril/Valsartan (ARNI). Sebagai apoteker ruangan, mengapa Anda harus memberikan edukasi dan kewaspadaan ekstra terkait risiko efek samping Angioedema pada pasien ini?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ FAKTOR RISIKO ETNIS (FARMACOGENOMICS)</span><div class='answer-content'>Pasien keturunan kulit hitam/Afrika-Amerika memiliki <strong>risiko angioedema (pembengkakan wajah, bibir, lidah yang dapat menyumbat jalan napas) 3 kali lipat lebih tinggi</strong> dibandingkan ras kaukasia saat terpapar obat yang memengaruhi kadar bradikinin (seperti ACEI dan ARNI). Hal ini dikaitkan dengan variasi genetik aktivitas enzim kompensasi pemecah bradikinin endogen di jaringan epitel mereka.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Pastikan washout period 36 jam dipatuhi mutlak jika sebelumnya meminum ACEI. Berikan edukasi visual kepada pasien dan keluarga untuk mengenali gejala awal pembengkakan di area mulut atau kesulitan menelan, dan segera mencari pertolongan medis jika gejala tersebut muncul.</div></div>"
            },
            {
                cat: "Gagal Jantung",
                q: "Seorang pasien gagal jantung kulit hitam (African descent) dengan status fungsional NYHA kelas III tetap menunjukkan gejala sesak napas yang sering kambuh meskipun telah menggunakan terapi standar maksimal (Bisoprolol, Ramipril, Spironolactone, Empagliflozin). Terapi kombinasi spesifik apa yang direkomendasikan apoteker untuk ditambahkan?",
                a: "<div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE-BASED RECOMMENDATION</span><div class='answer-content'>Kombinasi obat vasodilator <strong>Hydralazine dan Isosorbide Dinitrate (H-ISDN)</strong> terbukti sangat efektif secara spesifik pada populasi pasien gagal jantung keturunan kulit hitam yang masih bergejala berat.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Merekomendasikan penambahan kombinasi dosis tetap (fixed-dose) Hydralazine (37.5 mg) / Isosorbide Dinitrate (20 mg) tiga kali sehari (atau dosis terpisah ekuivalen). Langkah ini didukung kuat oleh hasil studi <strong>A-HeFT Trial</strong> yang menunjukkan penurunan angka kematian absolut sebesar 43% dan penurunan hospitalisasi sebesar 33% pada populasi spesifik ini.</div></div>"
            },
            {
                cat: "Gagal Jantung",
                q: "Seorang pasien gagal jantung (HFrEF) dengan riwayat komorbid Asma Bronkial kronis persisten yang sering mengalami serangan sesak napas. Residen berniat meresepkan Carvedilol 6.25 mg BID sebagai salah satu dari 4 pilar obat gagal jantung. Apa tinjauan kritis Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Risiko Bronkospasme Berat (Kontraindikasi Relatif Beta-blocker Non-selektif).</strong> Carvedilol adalah beta-blocker non-selektif yang menghambat reseptor Beta-1 dan Beta-2 (sata Alfa-1). Blokade pada reseptor Beta-2 di otot polos bronkus dapat mencetuskan bronkokonstriksi (bronkospasme) fatal pada pasien dengan saluran napas reaktif seperti asma.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Rekomendasikan penggantian Carvedilol menjadi beta-blocker yang bersifat <strong>kardioselektif (selective Beta-1 blocker)</strong>, seperti <strong>Bisoprolol</strong> (dosis awal 1.25 mg QD) atau <strong>Metoprolol Suksinat</strong>. Ingatkan untuk memulai dengan dosis sangat rendah, dititrasi sangat perlahan, serta dipantau ketat gejala klinis pernapasannya.</div></div>"
            },

            // --- Kategori 3: Aritmia Kompleks & Agen Penstabil Membran (21-30) ---
            {
                cat: "Aritmia Kompleks",
                q: "Seorang pasien 68 tahun dengan diagnosis Atrial Fibrilasi Permanen (diputuskan oleh tim medis untuk membiarkan irama AF dan hanya mengontrol rate denyut nadi saja, tidak direncanakan kardioversi ke irama sinus). DPJP meresepkan Dronedarone 400 mg BID untuk kontrol irama. Apa tindakan Apoteker Klinis?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Kontraindikasi Absolut (Risiko Kematian Melipat Ganda).</strong> Dronedarone dilarang keras digunakan pada pasien dengan Atrial Fibrilasi Permanen atau pasien gagal jantung sedang-berat (NYHA III/IV). Penggunaan obat ini pada populasi tersebut terbukti melipatgandakan kejadian stroke, gagal jantung akut, dan kematian akibat aritmia.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Intersep resep. Hubungi DPJP dan rekomendasikan pembatalan Dronedarone. Sarankan terapi pengontrol laju nadi (rate control) yang aman menggunakan <strong>Beta-blocker (misal Metoprolol/Bisoprolol)</strong>, Digoxin, atau Diltiazem (jika fraksi ejeksi jantung normal).</div></div><div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE & PANDUAN</span><div class='answer-content'>Berdasarkan hasil uji klinis landmark <strong>PALLAS Trial</strong> dan black box warning resmi FDA untuk Dronedarone (Multaq).</div></div>"
            },
            {
                cat: "Aritmia Kompleks",
                q: "Di IGD, seorang residen meminta Apoteker menyiapkan ampul Lidocaine IV bolus untuk diberikan kepada pasien yang mengalami Atrial Fibrilasi (AF) dengan respon ventrikel cepat (RVR). Mengapa Apoteker harus mengoreksi permintaan ini berdasarkan prinsip farmakodinamik obat?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ INEFIKASI PENGGUNAAN OBAT</span><div class='answer-content'><strong>Inefektivitas Terapi Lidocaine pada Aritmia Supraventrikular.</strong> Lidocaine adalah antiaritmia Kelas IB yang bekerja dengan memblokir kanal natrium aktif/inaktif secara cepat. Obat Kelas IB memiliki afinitas yang sangat selektif terhadap jaringan dengan potensial aksi durasi panjang (seperti ventrikel) dan jaringan terdepolarisasi iskemik. Lidocaine tidak efektif pada jaringan atrium karena durasi potensial aksi atrium yang sangat pendek menghalangi ikatan obat yang adekuat.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Edukasi residen bahwa Lidocaine tidak memiliki peran dalam penanganan AF. Rekomendasikan agen pengontrol laju nadi yang sesuai untuk IGD seperti <strong>Amiodaron IV</strong>, Diltiazem IV (jika tidak ada gagal jantung), atau penyekat beta IV.</div></div>"
            },
            {
                cat: "Aritmia Kompleks",
                q: "Seorang pasien aritmia rawat jalan yang rutin mengonsumsi obat antiaritmia oral datang ke apotek mengeluhkan telinga berdenging kencang (tinnitus), sakit kepala berdenyut parah, gangguan pendengaran ringan, dan pandangan agak kabur. Pasien dicurigai mengalami sindrom efek samping klasik yang disebut Cinchonism. Obat apa yang memicu kondisi ini?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI TOKSISITAS SPESIFIK</span><div class='answer-content'><strong>Toksisitas Quinidine (Cinchonism).</strong> Quinidine adalah antiaritmia Kelas IA yang diisolasi dari kulit pohon Cinchona. Sindrom Cinchonism (tinnitus, vertigo, sakit kepala, gangguan visual, dan penurunan pendengaran) merupakan manifestasi toksisitas neurologis klasik akibat akumulasi dosis obat ini.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Sarankan pasien untuk segera menghentikan obat (setelah konfirmasi dokter) dan lakukan pemeriksaan EKG untuk memantau pemanjangan interval QTc (risiko Torsades de Pointes). Rekomendasikan konversi ke agen antiaritmia modern yang memiliki profil keamanan organ lebih baik.</div></div>"
            },
            {
                cat: "Aritmia Kompleks",
                q: "Pasien wanita 42 tahun dengan riwayat aritmia ventrikel kronis mengeluhkan nyeri sendi yang menyebar di lutut dan pergelangan tangan, ruam kemerahan berbentuk kupu-kupu di wajah (butterfly rash), dan demam ringan. Tes laboratorium menunjukkan antibodi ANA (Antinuclear Antibody) positif dan antibodi anti-histone positif kuat. Riwayat pengobatan menunjukkan pasien mengonsumsi Procainamide secara rutin. Apa analisis klinis Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ IDENTIFIKASI DRP</span><div class='answer-content'><strong>Drug-Induced Lupus Erythematosus (DILE) akibat Procainamide.</strong> Procainamide (antiaritmia Kelas IA) memiliki risiko tertinggi memicu lupus imbas obat (terjadi pada 20-30% pasien yang menggunakan terapi jangka panjang >1 tahun). Mekanisme ini berkaitan dengan akumulasi metabolit reaktif obat yang memicu autoimunitas, terutama pada pasien dengan variasi genetik *slow acetylator* (metabolisme asetilasi lambat oleh enzim NAT2).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Rekomendasikan untuk <strong>menghentikan (discontinue) penggunaan Procainamide secara permanen</strong>. Gejala DILE dan titer antibodi umumnya akan mereda dan hilang secara bertahap dalam beberapa minggu hingga bulan setelah obat dihentikan. Berikan terapi antiaritmia pengganti dari golongan lain.</div></div>"
            },
            {
                cat: "Aritmia Kompleks",
                q: "Di ruang resusitasi IGD, seorang pasien mengalami serangan Supraventricular Tachycardia (SVT) dengan HR 185x/menit. Dokter memberikan injeksi Adenosin 6 mg IV bolus cepat dilanjutkan flush saline, namun laju jantung pasien sama sekali tidak merespon. Dosis kedua 12 mg diberikan dan tetap gagal. Pada rekonsiliasi, diketahui pasien rutin minum obat asma Teofilin dan meminum kopi hitam pekat sesaat sebelum masuk IGD. Apa penyebab kegagalan terapi ini?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ INTERAKSI ANTAGONISME FARMAKODINAMIK</span><div class='answer-content'><strong>Blokade Reseptor Adenosin oleh Teofilin & Kafein.</strong> Teofilin (metilxantin) dan Kafein adalah zat antagonis kompetitif yang kuat pada reseptor adenosin ($A_1$ dan $A_{2A}$) di nodus AV jantung. Kehadiran zat-zat ini di sirkulasi secara kompetitif menghalangi molekul Adenosin luar untuk berikatan dengan reseptornya, sehingga efek konduksi nodal AV tidak terjadi.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Informasikan kepada dokter bahwa pasien memerlukan <strong>dosis Adenosin yang jauh lebih tinggi</strong> (misal naik ke 18 mg) untuk menggeser ikatan kompetitif Teofilin/Kafein, atau sebaiknya pertimbangkan terapi alternatif seperti penyekat beta IV, Verapamil IV, atau Kardioversi elektrik (DC Shock).</div></div>"
            },
            {
                cat: "Aritmia Kompleks",
                q: "Seorang pasien SVT yang rutin mengonsumsi Dipyridamole (sebagai antiplatelet) direncanakan menerima terapi injeksi Adenosin IV di IGD untuk menormalkan irama jantungnya. Penyesuaian dosis Adenosin spesifik apa yang wajib diingatkan oleh Apoteker kepada dokter?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ INTERAKSI SINERGISME (PENGUATAN EFEK)</span><div class='answer-content'><strong>Potensiasi Efek Adenosin oleh Dipyridamole.</strong> Dipyridamole menghambat transpor nukleosida yang bertanggung jawab untuk ambilan (uptake) selular Adenosin ke dalam eritrosit dan sel endotel. Hambatan ini membuat molekul Adenosin tertahan sangat lama di ruang ekstraselular, secara masif memperpanjang waktu paruh dan efek hambatan nodus AV-nya, meningkatkan risiko bradikardia ekstrem atau asistol berkepanjangan.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Instruksikan dokter untuk <strong>menurunkan dosis awal Adenosin sebesar 50%</strong> (menjadi hanya 3 mg bolus IV). Lakukan pemantauan EKG kontinu yang sangat ketat selama proses injeksi.</div></div>"
            },
            {
                cat: "Aritmia Kompleks",
                q: "Pasien dengan Atrial Fibrilasi paroksimal rutin meminum Sotalol 80 mg BID. Pada pemeriksaan lab rutin, nilai serum kreatinin pasien melonjak, dan perhitungan klirens kreatinin menunjukkan CrCl anjlok menjadi 35 mL/menit. Apa rekomendasi Apoteker Klinis?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ AKUMULASI OBAT & RISIKO PRO-ARITMIA</span><div class='answer-content'><strong>Gangguan Ekskresi Renal Sotalol.</strong> Sotalol adalah obat larut air yang diekskresikan 100% dalam bentuk utuh melalui ginjal. Pada nilai CrCl <40 mL/menit, waktu paruh Sotalol memanjang ekstrem. Akumulasi ini memperpanjang repolarisasi miokardium secara berlebihan, memicu pemanjangan interval QTc yang ekstrem dan berisiko tinggi memicu aritmia ventrikel letal <em>Torsades de Pointes</em> (TdP).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Rekomendasikan penyesuaian dosis: <strong>Turunkan frekuensi pemberian Sotalol menjadi 80 mg sekali sehari</strong> (setiap 24 jam), atau jika CrCl turun <30 mL/menit, obat harus <strong>dihentikan (discontinue) sepenuhnya</strong>. Monitor ketat interval QTc pada EKG (pastikan <500 ms).</div></div>"
            },
            {
                cat: "Aritmia Kompleks",
                q: "Seorang pasien di ICU mengalami VT polimorfik Torsades de Pointes (TdP) and diberikan injeksi Magnesium Sulfat (MgSO4) 2 gram IV secara perlahan. Dokter residen bertanya mengapa MgSO4 diberikan padahal kadar magnesium serum pasien di laboratorium menunjukkan hasil normal (2.0 mg/dL). Jelaskan mekanismenya!",
                a: "<div class='answer-section'><span class='answer-title title-evidence'>🔬 MEKANISME FARMAKOLOGIS SELULER</span><div class='answer-content'>Magnesium bekerja sebagai <strong>inhibitor kompetitif kalsium pada kanal kalsium tipe-L (L-type calcium channels)</strong> di sel miokard. Tanpa memedulikan kadar magnesium dalam darah pasien, infus magnesium dosis tinggi secara eksternal akan menghambat masuknya kalsium intraseluler selama fase dataran (plateau) potensial aksi. Hambatan ini menghentikan depolarisasi dini yang abnormal (Early Afterdepolarizations / EAD) yang merupakan pencetus utama melintirnya gelombang TdP.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ MONITORING FARMASIS</span><div class='answer-content'>Pastikan MgSO4 dilarutkan dalam 50-100 mL D5W atau NaCl 0.9% dan diberikan secara IV bolus lambat (selama 5-20 menit) untuk menghindari hipotensi mendadak. Pantau hilangnya refleks tendon dalam sebagai tanda awal intoksikasi Mg.</div></div>"
            },
            {
                cat: "Aritmia Kompleks",
                q: "Seorang pasien Atrial Fibrilasi yang stabil menggunakan antikoagulan Warfarin ditambahkan terapi antiaritmia oral Propafenone oleh DPJP. Setelah 5 hari, pasien datang dengan keluhan gusi berdarah saat sikat gigi dan muncul lebam keunguan di lengan. Pemeriksaan laboratorium menunjukkan nilai INR melonjak drastis menjadi 5.8 (baseline 2.4). Jelaskan mekanisme interaksi obat ini!",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ INTERAKSI FARMAKOKINETIK BERAT</span><div class='answer-content'><strong>Inhibisi Enzim Metabolisme Warfarin oleh Propafenone.</strong> Propafenone (antiaritmia Kelas IC) adalah inhibitor kuat enzim sitokrom P450 CYP2C9 (jalur utama eliminasi S-warfarin yang aktif) dan CYP2D6. Hambatan ini secara signifikan memperlambat pembersihan Warfarin dari tubuh, menyebabkan akumulasi obat dan hipoprothrombinemia (darah terlalu encer) yang memicu perdarahan spontan.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>1. Rekomendasikan <strong>penurunan dosis Warfarin (turun sekitar 30-50%)</strong> secara proaktif jika digabung Propafenone.<br>2. Untuk kondisi saat ini (INR 5.8 tanpa perdarahan mayor aktif), sarankan *hold* dosis Warfarin selama 1-2 hari dan berikan Vitamin K1 oral 1-2.5 mg untuk menurunkan INR secara aman. Lakukan cek INR harian.</div></div>"
            },
            {
                cat: "Aritmia Kompleks",
                q: "Seorang pasien paruh baya yang telah mengonsumsi Amiodaron 200 mg sekali sehari selama 3 tahun mengeluhkan perubahan warna kulit yang aneh pada wajah, hidung, dan tangan menjadi biru-keabu-abuan (ceruloderma). Kulit pasien juga sangat sensitif terhadap sinar matahari (fotosensitivitas). Apa penjelasan klinis Apoteker terkait kondisi kosmetik ini?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ TOKSISITAS KRONIS AKUMULASI ORGAN</span><div class='answer-content'><strong>Amiodarone-Induced Blue-Gray Skin Discoloration (Ceruloderma).</strong> Amiodaron adalah senyawa lipofilik tinggi dengan waktu paruh sangat panjang (~50-60 hari). Pada penggunaan kronis, obat dan metabolitnya (desetilamiodaron) terakumulasi di dalam lisosom makrofag dermal. Paparan sinar matahari (ultraviolet) memicu reaksi fototoksik yang mengubah akumulasi kompleks iodium obat ini menjadi pigmen lipofusin biru-abu-abu di kulit.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI & KONSELING</span><div class='answer-content'>Edukasi pasien bahwa efek ini umumnya jinak tetapi reversibilitasnya sangat lambat (bisa memakan waktu berbulan-bulan hingga tahunan setelah obat dihentikan). Instruksikan pasien menggunakan tabir surya berspektrum luas (SPF &ge;30), memakai pakaian tertutup/topi saat keluar rumah, dan meminimalkan paparan sinar matahari langsung. Jika tidak dapat ditoleransi secara kosmetik, diskusikan penggantian obat dengan dokter.</div></div>"
            },

            // --- Kategori 4: Kegawatdaruratan Vaskular & Toksikologi Kardiologi (31-40) ---
            {
                cat: "Emergensi & Toksikologi",
                q: "Pasien pasca operasi bypass jantung (CABG) tidak sengaja menerima infus Unfractionated Heparin (UFH) melebihi dosis protokol karena kesalahan pompa infus. Pasien mengalami perdarahan rembes di luka operasi, dan nilai aPTT >150 detik. DPJP memutuskan memberikan Protamine Sulfate IV. Bagaimana Apoteker menghitung kebutuhan dosis Protamine yang presisi untuk menetralisir efek heparin tersebut?",
                a: "<div class='answer-section'><span class='answer-title title-evidence'>🔬 PERHITUNGAN DOSIS ANTIDOTUM</span><div class='answer-content'>Secara stoikiometri, <strong>1 mg Protamine Sulfate menetralisir secara aktif sekitar 100 unit Heparin</strong> yang tersisa di tubuh.<br><br>Apoteker harus menghitung jumlah unit Heparin yang masuk dalam 2-3 jam terakhir (karena waktu paruh UFH pendek, ~60-90 menit). Sebagai contoh, jika diperkirakan sisa Heparin di sirkulasi adalah 4.000 unit, maka dosis Protamine yang diberikan adalah 40 mg secara IV lambat.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI & BATAS MAKSIMAL</span><div class='answer-content'>Ingatkan dokter bahwa <strong>dosis tunggal maksimal Protamine adalah 50 mg</strong>. Pemberian Protamine melebihi dosis (overdosis) justru berbahaya karena Protamine sendiri memiliki efek antikoagulan lemah intrinsik (menghambat fungsi trombosit dan faktor pembekuan) yang dapat memperparah perdarahan.</div></div>"
            },
            {
                cat: "Emergensi & Toksikologi",
                q: "Seorang pasien pria 60 tahun dengan riwayat alergi makanan laut (seafood/ikan) yang berat dan riwayat menjalani vasektomi 10 tahun lalu, mengalami perdarahan hebat akibat overdosis heparin di ICU. DPJP meminta disiapkan Protamine Sulfate untuk injeksi. Apa kewaspadaan imunologis kritis yang harus dilaporkan Apoteker sebelum obat diserahkan?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ RISIKO REAKSI ANAFILAKSIS FATAL</span><div class='answer-content'><strong>Sensitivitas Silang Imunologis Protamine.</strong> Protamine secara komersial diisolasi dari sperma ikan salmon. Pasien dengan alergi ikan memiliki risiko tinggi mengalami reaksi hipersensitivitas silang. Selain itu, pria yang telah menjalani vasektomi memproduksi antibodi anti-sperma endogen yang dapat mengenali dan berikatan silang dengan struktur protamine, memicu pelepasan histamin masif (anafilaksis, hipotensi berat, dan vasokonstriksi paru letal).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Segera laporkan risiko ini kepada tim medis. Jika Protamine harus diberikan, pastikan pasien diberikan premedikasi terlebih dahulu (antihistamin H1/H2 dan kortikosteroid IV), siapkan Epinefrin di samping tempat tidur, dan instruksikan untuk menginfuskan Protamine secara **sangat lambat** (lebih dari 10-20 menit).</div></div>"
            },
            {
                cat: "Emergensi & Toksikologi",
                q: "Seorang perawat di bangsal meminta ampul Phytomenadione (Vitamin K1) injeksi untuk disuntikkan secara bolus IV cepat kepada pasien dengan nilai INR 10.5 tanpa perdarahan aktif. Apa intervensi keselamatan pasien yang harus dilakukan Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ RISIKO EFEK SAMPING MEMATIKAN (KOS-S)</span><div class='answer-content'><strong>Bahaya Reaksi Anafilaktoid Fatal Akibat Injeksi IV Cepat.</strong> Pemberian Vitamin K1 secara bolus IV cepat dikaitkan dengan risiko tinggi terjadinya reaksi anafilaktoid ekstrem (syok, sesak napas berat, sianosis, dan kolaps kardiovaskular) yang dimediasi oleh bahan pembawa pelarut emulsi obat (polietoksiasi castor oil). Efek ini tidak bergantung pada sistem imun (non-IgE mediated) melainkan akibat degranulasi sel mast langsung.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>1. Cegat pemberian IV bolus cepat. Sampaikan bahwa pada pasien INR >10 tanpa perdarahan, rute pilihan utama adalah <strong>Vitamin K1 2.5 - 5 mg secara ORAL</strong>.<br>2. Jika rute IV terpaksa dipilih karena risiko klinis lain, obat wajib <strong>dilarutkan dalam 50 mL NaCl 0.9% atau D5W dan diinfuskan perlahan menggunakan syringe pump selama minimal 20 hingga 30 menit</strong>.</div></div>"
            },
            {
                cat: "Emergensi & Toksikologi",
                q: "Seorang residen di ICU menanyakan kepada Apoteker mengenai dasar ilmiah mengapa Norepinefrin (NE) direkomendasikan sebagai vasopresor lini pertama pada syok kardiogenik, dibandingkan dengan Epinefrin yang memiliki aksi stimulator jantung yang lebih kuat.",
                a: "<div class='answer-section'><span class='answer-title title-evidence'>📚 EVIDENCE-BASED CLINICAL ANALYSIS</span><div class='answer-content'>Berdasarkan hasil uji klinis multisenter <strong>CardShock Study</strong> dan uji acak lainnya, penggunaan Epinefrin pada syok kardiogenik dikaitkan dengan peningkatan risiko kejadian syok refrakter, aritmia ventrikel baru, dan asidosis laktat yang signifikan. Epinefrin merangsang reseptor Beta-2 otot rangka secara masif yang meningkatkan glikolisis aerobik (memproduksi laktat berlebih), serta stimulasi Beta-1 yang terlalu agresif meningkatkan konsumsi oksigen miokardium yang sudah sekarat (ischemic oxygen demand).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Edukasi tim medis untuk konsisten menggunakan <strong>Norepinefrin</strong> karena NE dominan merangsang Alfa-1 (vasokonstriksi untuk MAP) dengan efek Beta-1 sedang yang memelihara curah jantung tanpa memicu takikardia ekstrem atau asidosis laktat.</div></div>"
            },
            {
                cat: "Emergensi & Toksikologi",
                q: "Di bangsal penyakit dalam, seorang pasien geriatri mengalami krisis hipertensi (tekanan darah 210/120 mmHg) tanpa target organ damage akut. Dokter menulis instruksi verbal darurat: 'Beri kapsul Nifedipine short-acting 10 mg sublingual (ditusuk jarum lalu diperas di bawah lidah)'. Bagaimana respon Apoteker?",
