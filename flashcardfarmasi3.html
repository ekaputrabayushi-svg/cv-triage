                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ KONTRAINDIKASI MUTLAK (NEVER EVENT)</span><div class='answer-content'><strong>Risiko Kolaps Kardiovaskular & Stroke Iskemik.</strong> Penggunaan Nifedipine short-acting sublingual/oral untuk krisis hipertensi dilarang keras di seluruh dunia. Absorpsi obat yang tidak menentu dan sangat cepat memicu penurunan tekanan darah secara mendadak dan tidak terkendali. Kondisi ini merangsang aktivasi saraf simpatis secara masif (refleks takikardia hebat) serta mencuri perfusi darah dari otak dan jantung (coronary/cerebral steal syndrome), memicu infark miokard akut atau stroke iskemik fatal.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'><strong>Cegat resep segera.</strong> Rekomendasikan penggantian terapi menggunakan obat antihipertensi oral kerja lambat yang aman seperti <strong>Captopril 25 mg tablet (dikunyah/ditelan, bukan sublingual)</strong>, Clonidine oral, atau jika ada target organ damage (hipertensi emergensi), rujuk ke ICU untuk titrasi obat intravena kontinu seperti Nicardipine IV.</div></div>"
            },
            {
                cat: "Emergensi & Toksikologi",
                q: "Sebuah botol infus Sodium Nitroprusside (SNP) 50 mg dalam 250 mg D5W yang sedang berjalan di kamar ICU terlihat berwarna agak kebiruan dan tidak dilapisi pelindung cahaya (aluminium foil/kantong hitam). Apa tindakan pencegahan bahaya yang harus segera dilakukan Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ FOTODEGRADASI & TOKSISITAS SIANIDA</span><div class='answer-content'><strong>Pelepasan Gas Sianida akibat Paparan Cahaya.</strong> Sodium Nitroprusside adalah senyawa nitrogenosianida yang sangat tidak stabil terhadap cahaya (highly photosensitive). Paparan cahaya memicu fotodegradasi kimia cepat yang merusak struktur molekul obat, melepaskan ion Sianida bebas ($CN^-$) ke dalam botol infus yang mengubah warna larutan menjadi biru/kecoklatan. Menginfuskan larutan ini akan menyebabkan keracunan sianida sistemik instan.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>1. Segera instruksikan perawat untuk <strong>Menghentikan dan membuang infus berwarna biru tersebut</strong>.<br>2. Racik sediaan baru di farmasi steril, pastikan botol infus dan seluruh selang pemberian <strong>dibungkus rapat dengan aluminium foil / pembungkus opaque pelindung cahaya</strong> segera setelah dilarutkan.</div></div>"
            },
            {
                cat: "Emergensi & Toksikologi",
                q: "Seorang pasien masuk IGD dengan krisis hipertensi disertai nyeri dada iskemik akut. DPJP berniat memberikan infus vasodilator intravena Fenoldopam. Namun, pada rekam medis tercatat pasien memiliki riwayat asma bronkial berat dengan riwayat syok anafilaktoid setelah minum obat yang mengandung pengawet sulfit. Apa tinjauan kritis Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ KONTRAINDIKASI RELATIF (SENSITIVITAS SILANG BAHAN TAMBAHAN)</span><div class='answer-content'><strong>Bahaya Reaksi Bronkospasme Akut akibat Pengawet Sulfit.</strong> Sediaan injeksi Fenoldopam secara komersial mengandung zat tambahan <strong>Sodium Metabisulfit</strong> sebagai antioksidan/pengawet. Pada pasien dengan asma yang sensitif terhadap sulfit, paparan metabisulfit dapat memicu reaksi hipersensitivitas parah berupa bronkospasme akut yang mengancam jiwa.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Laporkan temuan ini kepada dokter dan rekomendasikan penggantian Fenoldopam ke vasodilator alternatif yang bebas sulfit, seperti <strong>Nicardipine IV drip</strong> atau <strong>Nitroglycerin IV drip</strong>.</div></div>"
            },
            {
                cat: "Emergensi & Toksikologi",
                q: "Seorang pasien pulang dari rawat inap dibekali obat transdermal Clonidine Patch (Catapres-TTS) yang harus diganti setiap 7 hari sekali. Apoteker memberikan edukasi mengenai cara pembuangan patch bekas pakai yang aman. Mengapa patch bekas tidak boleh dibuang langsung begitu saja ke tempat sampah terbuka?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ PENCEGAHAN TOKSISITAS PAPARAN KETIDAKSENGJAAN</span><div class='answer-content'><strong>Bahaya Residu Obat Aktif yang Tinggi.</strong> Teknologi transdermal patch dirancang agar obat berdifusi secara pasif. Untuk menjaga gradien difusi yang konsisten selama 7 hari, patch bekas pakai sebenarnya <strong>masih mengandung sisa (residu) obat aktif Clonidine sekitar 50% hingga 70%</strong> dari dosis awal. Pembuangan langsung ke tempat sampah terbuka berisiko tinggi memicu penyerapan obat yang tidak disengaja atau keracunan sistemik fatal (hipotensi, bradikardia berat, koma) jika disentuh atau tertelan oleh anak-anak atau hewan peliharaan.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Instruksikan pasien untuk melipat patch bekas menjadi dua bagian dengan sisi berperekat saling menempel erat (menutup permukaan membran pelepasan obat), masukkan ke dalam plastik tertutup, dan buang di tempat sampah yang aman tidak terjangkau anak-anak.</div></div>"
            },
            {
                cat: "Emergensi & Toksikologi",
                q: "Pasien hipertensi berat kronis diresepkan Hydralazine monoterapi oleh dokter umum. Pasien kembali kontrol 2 minggu kemudian mengeluhkan kaki dan pergelangan tangannya sangat bengkak (fluid retention) serta jantung sering berdebar kencang (refleks takikardia). Mengapa efek samping ini terjadi, dan bagaimana mitigasi kombinasi terapinya?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ EFEK DINAMIS KOMPENSASI HOMEOSTASIS</span><div class='answer-content'><strong>Aktivasi Simpatik Refleks & Retensi Sodium-Air.</strong> Hydralazine bekerja sebagai vasodilator langsung pada otot polos arteriol pembuluh darah. Penurunan resistensi vaskular yang mendadak memicu baroreseptor arteri, menyebabkan lonjakan refleks sistem saraf simpatis berupa pelepasan katekolamin (takikardia, peningkatan kontraktilitas jantung). Penurunan tekanan perfusi ginjal juga mengaktifkan sistem RAAS, memicu penahanan garam dan air (edema).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Rekomendasikan kepada dokter untuk tidak menggunakan Hydralazine secara tunggal. Hydralazine idealnya wajib dikombinasikan dengan <strong>Beta-blocker (misal Bisoprolol/Metoprolol)</strong> untuk meredam refleks takikardia, dan <strong>Diuretik Loop (misal Furosemide)</strong> untuk membuang retensi cairan.</div></div>"
            },
            {
                cat: "Emergensi & Toksikologi",
                q: "Seorang pasien kanker payudara sedang menjalani protokol kemoterapi berbasis Doxorubicin (Anthracycline). Apoteker klinis di unit onko-kardiologi melakukan monitoring kumulatif dosis pengobatan. Berapa batas ambang kumulatif dosis seumur hidup (lifetime cumulative dose) Doxorubicin yang disyaratkan untuk mencegah risiko gagal jantung ireversibel?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ TOKSISITAS MIOKARD KULUMATIF KRONIS</span><div class='answer-content'><strong>Kardiomiopati Ireversibel Terinduksi Anthracycline.</strong> Doxorubicin memicu kerusakan otot jantung melalui pembentukan radikal bebas oksigen dan hambatan enzim Topoisomerase IIbeta di miokard. Risiko toksisitas jantung meningkat secara eksponensial setelah dosis kumulatif seumur hidup melewati batas ambang <strong>450 hingga 550 mg/m²</strong>, di mana setelah batas ini risiko terjadinya gagal jantung kongestif yang tidak dapat disembuhkan meroket hingga >30%.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>1. Catat dan hitung dosis kumulatif setiap sesi kemoterapi.<br>2. Rekomendasikan pemeriksaan ekokardiografi berkala untuk menilai LVEF baseline dan setiap kenaikan dosis kumulatif.<br>3. Jika dosis mendekati ambang batas dan klinis mengharuskan kelanjutan kemoterapi, sarankan penggunaan agen kardioprotektan <strong>Dexrazoxane</strong>.</div></div>"
            },

            // --- Kategori 5: Farmakokinetika Klinis & Toksisitas Obat Spesifik (41-50) ---
            {
                cat: "Kinetika & Toksisitas",
                q: "Seorang pasien rawat jalan menebus resep Dabigatran Etexilate (Pradaxa) 150 mg BID. Pasien bertanya kepada Apoteker apakah ia boleh memindahkan kapsul-kapsul tersebut dari kemasan blister aslinya ke dalam wadah pillbox organizer mingguan agar lebih praktis dibawa bepergian. Apa jawaban dan edukasi Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ KERUSAKAN STABILITAS SEDIAAN (HIGROSKOPIS EKSTREM)</span><div class='answer-content'><strong>Degradasi Formulasi Dabigatran oleh Kelembaban Udara.</strong> Dabigatran etexilate adalah zat aktif yang sangat sensitif terhadap kelembaban (highly hygroscopic). Untuk meningkatkan absorpsi di pH rendah, pelet di dalam kapsul dilapisi oleh asam tartarat. Jika kapsul dikeluarkan dari botol kaca asli pabrikan (yang memiliki pengering desikan di tutupnya) atau dari kemasan aluminium blister, kelembaban udara akan merusak lapisan kapsul dan memicu degradasi kimia cepat, secara drastis menurunkan bioavailabilitas dan efikasi terapi obat.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI & KONSELING</span><div class='answer-content'>Instruksikan pasien dengan tegas untuk <strong>tidak memindahkan kapsul Dabigatran ke pillbox mingguan</strong>. Kapsul harus tetap berada di blister atau botol aslinya dan hanya dikeluarkan sesaat sebelum ditelan. Jika menggunakan botol, ingatkan bahwa obat harus dibuang setelah botol dibuka selama <strong>4 bulan</strong>.</div></div>"
            },
            {
                cat: "Kinetika & Toksisitas",
                q: "Pasien pasca stroke iskemik diresepkan Rivaroxaban 20 mg sekali sehari untuk pencegahan sekunder. Pasien rutin meminum obat tersebut di pagi hari sesaat setelah bangun tidur dengan segelas air putih tanpa sarapan karena sedang menjalani program diet intermiten. Bagaimana evaluasi farmakokinetik Anda?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ PENURUNAN BIOAVAILABILITAS OBAT (SUB-TERAPEUTIK)</span><div class='answer-content'><strong>Absorpsi Rivaroxaban yang Bersifat Food-Dependent pada Dosis Tinggi.</strong> Rivaroxaban dosis 10 mg memiliki bioavailabilitas tinggi (~100%) baik saat perut kosong maupun kenyang. Namun, untuk dosis pemeliharaan tinggi <strong>(15 mg dan 20 mg)</strong>, absorpsinya sangat bergantung pada makanan. Jika diminum saat perut kosong/puasa, bioavailabilitas sistemik obat ini anjlok hingga <strong>hanya 66%</strong>, menyisakan kadar obat sub-terapeutik yang gagal mencegah stroke berulang.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Instruksikan pasien secara ketat untuk <strong>selalu meminum Rivaroxaban 20 mg bersamaan dengan makanan utama terbesar harian</strong> (bukan perut kosong). Makanan memicu sekresi cairan pencernaan dan memperlambat waktu transit usus, memungkinkan disolusi dan absorpsi obat secara maksimal mendekati 100%.</div></div>"
            },
            {
                cat: "Kinetika & Toksisitas",
                q: "Pasien dengan Fibrilasi Atrium yang memiliki riwayat obesitas morbid baru saja menjalani operasi bariatrik (bypass lambung roux-en-y). DPJP ingin memulangkan pasien dengan resep antikoagulan Apixaban 5 mg BID karena dinilai praktis tanpa cek darah berkala. Bagaimana pertimbangan Apoteker Klinis?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ RISIKO KEGAGALAN ABSORPSI PASCA BEDAH BARIATRIK</span><div class='answer-content'><strong>Gangguan Absorpsi DOAC akibat Pemotongan Saluran Cerna.</strong> Operasi gastric bypass secara dramatis mengurangi volume lambung dan memotong usus halus proksimal (duodenum dan jejunum atas) yang merupakan tempat utama absorpsi sebagian besar obat DOAC (Apixaban, Rivaroxaban). Tanpa data pemantauan kadar obat yang terstandardisasi, penggunaan DOAC pasca operasi bariatrik berisiko tinggi mengalami kegagalan terapi akibat kegagalan penyerapan obat.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Rekomendasikan DPJP untuk beralih menggunakan <strong>Warfarin</strong> sebagai antikoagulan oral pilihan pasca bariatrik. Efikasi Warfarin dapat dipantau dan disesuaikan secara presisi secara klinis menggunakan pemeriksaan nilai INR berkala.</div></div>"
            },
            {
                cat: "Kinetika & Toksisitas",
                q: "Seorang pasien yang mengonsumsi Warfarin rutin untuk pencegahan stroke katup jantung mekanik mengalami hipertiroidisme akut (Graves disease) dengan kadar tiroid bebas (FT4) melesat tinggi. Tanpa adanya perubahan diet, asupan obat lain, maupun kepatuhan, nilai INR pasien tiba-tiba melonjak dari 2.5 menjadi 4.8. Mengapa hipertiroidisme meningkatkan keenceran darah pasien pengguna Warfarin?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ PERUBAHAN METABOLISME FAKTOR KOAGULASI ENDOGEN</span><div class='answer-content'><strong>Akselerasi Katabolisme Faktor Pembekuan Darah.</strong> Hormon tiroid memodulasi laju metabolisme protein tubuh. Pada kondisi hipertiroidisme, laju degradasi (katabolisme) faktor pembekuan darah yang bergantung pada Vitamin K (faktor II, VII, IX, X) meningkat drastis. Karena pabrik faktor pembekuan sudah ditekan oleh Warfarin dan faktor pembekuan yang tersisa dirusak lebih cepat di sirkulasi, efek antikoagulasi menjadi jauh lebih kuat, memicu lonjakan INR tanpa perubahan kadar obat.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Rekomendasikan untuk <strong>menurunkan dosis rutin Warfarin pasien secara empiris (sebesar 10-25%)</strong> selama fase tirotoksikosis akut, lakukan cek INR berkala setiap 3 hari, dan sesuaikan dosis kembali setelah fungsi tiroid dinormalkan oleh obat anti-tiroid.</div></div>"
            },
            {
                cat: "Kinetika & Toksisitas",
                q: "Seorang pasien pengguna rutin Warfarin melaporkan keluhan aneh ke apotek. Nilai INR pasien selalu turun drastis (menjadi 1.3, risiko bekuan darah) setiap kali ia rajin meminum Teh Hijau (Green Tea), dan sebaliknya nilai INR melonjak tinggi (menjadi 5.4, risiko perdarahan) saat ia rutin minum jus buah Cranberry untuk obat infeksi saluran kemih. Jelaskan mekanisme farmakologi di balik kedua interaksi ini!",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ DUAL POLA INTERAKSI OBAT-HERBAL BERBEDA</span><div class='answer-content'>1. <strong>Interaksi Teh Hijau (Antagonisme Farmakodinamik):</strong> Teh hijau mengandung konsentrasi tinggi **Vitamin K1 alami**. Vitamin K ini secara langsung mengantagonis efek hambatan Warfarin pada enzim VKORC1, mengaktifkan kembali sintesis faktor koagulasi dan menurunkan INR.<br>2. <strong>Interaksi Jus Cranberry (Inhibisi Farmakokinetik):</strong> Buah Cranberry mengandung senyawa flavonoid yang menghambat aktivitas enzim sitokrom **CYP2C9**. Karena CYP2C9 dihambat, metabolisme Warfarin terhenti, memicu penumpukan obat di darah dan peningkatan nilai INR.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Edukasi pasien untuk menjaga konsistensi diet: Hindari konsumsi Teh Hijau dalam jumlah besar/rutin, dan hentikan konsumsi jus Cranberry. Sarankan terapi alternatif non-interaktif untuk infeksi kemih.</div></div>"
            },
            {
                cat: "Kinetika & Toksisitas",
                q: "Pasien PJK pasca-PCI dengan komorbid Diabetes Melitus tipe 2 rutin menggunakan Gemfibrozil 600 mg BID untuk penurun Trigliserida. Dokter umum berniat menambahkan Repaglinide 1 mg tiga kali sehari sebelum makan untuk kontrol gula darah post-prandial. Apa intervensi kritis Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ INTERAKSI OBAT MAYOR (KONTRAINDIKASI ABSOLUT)</span><div class='answer-content'><strong>Hambatan Metabolisme Repaglinide Secara Ekstrem.</strong> Gemfibrozil dan metabolit glukurony-nya merupakan inhibitor kuat enzim sitokrom <strong>CYP2C8</strong> dan transporter OATP1B1. Repaglinide dimetabolisme murni oleh CYP2C8. Kombinasi ini meningkatkan kadar plasma Repaglinide hingga <strong>lebih dari 8 kali lipat (800%)</strong>, serta memperpanjang waktu paruhnya secara drastis, memicu hipoglikemia berat yang berkepanjangan dan mengancam nyawa.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'><strong>Intersep resep.</strong> Informasikan kontraindikasi ini kepada dokter. Rekomendasikan alternatif obat antidiabetes oral lain yang tidak berinteraksi dengan Gemfibrozil, seperti golongan DPP-4 inhibitor, SGLT2i, atau insulin basal. (Catatan: Fenofibrate tidak berinteraksi dengan Repaglinide seberat Gemfibrozil).</div></div>"
            },
            {
                cat: "Kinetika & Toksisitas",
                q: "Seorang pasien di ICU mengalami intoksikasi Digoxin berat dan diberikan terapi antidotum antibodi spesifik DigiFab. Tiga jam kemudian, dokter ICU meminta cek laboratorium kadar Digoxin serum untuk melihat apakah kadar racun sudah turun. Bagaimana Apoteker menjelaskan interpretasi hasil lab tersebut?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ INTERFERENSI LABORATORIUM ANALITIS</span><div class='answer-content'><strong>Pengukuran Palsu Peningkatan Kadar Digoxin Serum.</strong> Metode pemeriksaan laboratorium (Immunoassay) standar untuk Digoxin mengukur konsentrasi obat total (molekul obat bebas ditambah molekul obat yang terikat dengan protein/antibodi). Setelah pemberian DigiFab, antibodi tersebut akan mengikat digoxin di sirkulasi. Immunoassay akan mendeteksi kompleks terikat ini, menunjukkan hasil kadar Digoxin serum yang <strong>tampak melonjak naik sangat tinggi secara artifisial (bisa naik 10-100 kali lipat)</strong>, padahal secara klinis obat aktif bebas yang beracun sudah dinetralisir sepenuhnya.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Edukasi dokter untuk tidak memeriksa kadar Digoxin serum pasca-DigiFab selama minimal 1-2 minggu (hingga klirens antibodi-digoxin selesai). Evaluasi klinis pasien harus didasarkan pada perbaikan gejala EKG dan kadar Kalium darah.</div></div>"
            },
            {
                cat: "Kinetika & Toksisitas",
                q: "Pasien perikarditis akut rutin mengonsumsi Colchicine 0.6 mg sekali sehari. Karena mengalami infeksi paru bronkitis, dokter meresepkan antibiotik Clarithromycin 500 mg BID selama 7 hari. Apakah DRP kritis yang terdeteksi?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ INTERAKSI LETAL KONTRAINDIKASI MUTLAK</span><div class='answer-content'><strong>Toksisitas Akut Colchicine akibat Hambatan Ganda CYP3A4 & P-gp.</strong> Colchicine adalah substrat sensitif dari enzim sitokrom CYP3A4 dan protein transporter P-glycoprotein (P-gp). Clarithromycin adalah inhibitor sangat kuat untuk kedua protein tersebut. Kombinasi ini menutup seluruh jalur eliminasi dan ekskresi Colchicine, memicu lonjakan kadar obat hingga tingkat toksik yang melumpuhkan pembelahan sel spindel mitosis, menyebabkan kegagalan organ multi-sistem (agranulositosis, neuromiopati, kolaps sirkulasi, kematian).</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'><strong>Segera cegat resep Clarithromycin.</strong> Rekomendasikan penggantian antibiotik dengan golongan yang tidak menghambat CYP3A4/P-gp secara agresif, seperti <strong>Azithromycin</strong> (hambatan minimal) atau Amoxicillin, atau tunda penggunaan Colchicine jika antibiotik harus diberikan.</div></div>"
            },
            {
                cat: "Kinetika & Toksisitas",
                q: "Pasien HFrEF stabil rutin mengonsumsi Digoxin 0.125 mg sekali sehari. Pasien didiagnosis menderita angina tambahan sehingga dokter jantung menambahkan Verapamil SR 240 mg sekali sehari. Bagaimana rekomendasi dosis Digoxin oleh Apoteker?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ INTERAKSI PENGOATAN TOKSISITAS KADAR LEMBAH</span><div class='answer-content'><strong>Inhibisi Transporter Ekskresi Ginjal Digoxin.</strong> Digoxin dieliminasi dari tubuh melalui filtrasi glomerulus dan sekresi tubular aktif melalui pompa P-glycoprotein (P-gp) ginjal. Verapamil adalah inhibitor kuat P-gp. Penambahan Verapamil secara konsisten <strong>menduplikasi kadar serum Digoxin sebesar 70-100%</strong> dengan menghalangi sekresi ginjalnya, menempatkan pasien pada risiko tinggi keracunan digitalis fatal.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>Rekomendasikan untuk <strong>menurunkan dosis rutin Digoxin sebesar 50%</strong> (misal menjadi 0.125 mg setiap dua hari sekali, atau 0.0625 mg sehari) secara proaktif sejak hari pertama Verapamil dimulai. Lakukan pemantauan EKG (depresi segmen ST) dan kadar serum Digoxin.</div></div>"
            },
            {
                cat: "Kinetika & Toksisitas",
                q: "Pasien gagal jantung dengan DM tipe 2 rutin menggunakan Dapagliflozin 10 mg sekali sehari. Pasien masuk IGD dalam kondisi lemas, mual muntah berat, napas cepat dan dalam (Kussmaul). Menariknya, hasil pemeriksaan gula darah acak pasien menunjukkan hasil hanya 165 mg/dL. Namun, pemeriksaan gas darah menunjukkan pH 7.22, HCO3 14 mEq/L (asidosis metabolik), dan pemeriksaan urin menunjukkan keton positif kuat. Kondisi klinis spesifik apa yang terjadi?",
                a: "<div class='answer-section'><span class='answer-title title-drp'>⚠️ RECOGNITION OF EUGLYCEMIC DIABETIC KETOACIDOSIS (euDKA)</span><div class='answer-content'><strong>Ketoasidosis Diabetik Euglikemik terinduksi SGLT2i.</strong> Penggunaan obat golongan SGLT2i (Dapagliflozin) meningkatkan pembuangan glukosa lewat urin (glukosuria), menjaga kadar gula darah tetap rendah atau sedikit meningkat (<250 mg/dL). Namun, hilangnya glukosa memicu tubuh kekurangan insulin relatif dan merangsang produksi glukagon berlebih, memaksa pemecahan lemak menjadi badan keton asam (asidosis). Dokter sering kali terlambat mendeteksi karena terkecoh oleh angka gula darah yang normal.</div></div><div class='answer-section'><span class='answer-title title-pharmacist'>⚕️ INTERVENSI FARMASIS</span><div class='answer-content'>1. Segera <strong>Hentikan (Hold) Dapagliflozin</strong>.<br>2. Bantu koordinasikan inisiasi cairan intravena Dextrose (untuk mencegah penurunan gula lebih lanjut) bersamaan dengan infus **Insulin Intravena kontinu** untuk menyetop ketogenesis, serta koreksi asidosis. Monitoring ketat elektrolit (Kalium).</div></div>"
            }
        ];

        // DYNAMIC HIGHLIGHT ENGINE FOR CLINICAL BADGES
        // Processes parameters like "BP 120/80 mmHg", "HR 80x/mnt", "CrCl 50 mL/min", etc., and adds colorful glowing spans
        function formatClinicalVignette(text) {
            // Regex patterns
            const bpPattern = /(tekanan darah|BP)\s+\d{2,3}\/\d{2,3}\s*(mmHg)?/gi;
            const hrPattern = /(laju nadi|HR|nadi)\s+\d{2,3}\s*x\/menit/gi;
            const crclPattern = /(CrCl|klirens kreatinin)\s*[<>=]?\s*\d{2,3}\s*mL\/menit/gi;
            const scrPattern = /(serum kreatinin|SCr)\s+\d+(\.\d+)?\s*mg\/dL/gi;
            const egfrPattern = /eGFR\s*[<>=]?\s*\d{2,3}\s*(mL\/min\/1\.73m2)?/gi;
            const kPattern = /(Kalium|K)\s*=\s*\d+(\.\d+)?\s*mEq\/L/gi;
            const lvefPattern = /(LVEF|fraksi ejeksi)\s*[<>=]?\s*\d{2,3}%/gi;
            const inrPattern = /INR\s*[<>=]?\s*\d+(\.\d+)?/gi;
            const ckPattern = /(kadar CK|CK|Creatine Kinase)\s*(sangat tinggi)?\s*(yaitu)?\s*\d+(\.\d+)?\s*(U\/L)?/gi;

            let formatted = text;

            // Apply badges with matching styles
            formatted = formatted.replace(bpPattern, match => `<span class="clinical-badge clinical-badge-red">${match}</span>`);
            formatted = formatted.replace(hrPattern, match => `<span class="clinical-badge clinical-badge-yellow">${match}</span>`);
            formatted = formatted.replace(crclPattern, match => `<span class="clinical-badge clinical-badge-indigo">${match}</span>`);
            formatted = formatted.replace(scrPattern, match => `<span class="clinical-badge clinical-badge-indigo">${match}</span>`);
            formatted = formatted.replace(egfrPattern, match => `<span class="clinical-badge clinical-badge-indigo">${match}</span>`);
            formatted = formatted.replace(kPattern, match => `<span class="clinical-badge clinical-badge-red">${match}</span>`);
            formatted = formatted.replace(lvefPattern, match => `<span class="clinical-badge clinical-badge-cyan">${match}</span>`);
            formatted = formatted.replace(inrPattern, match => `<span class="clinical-badge clinical-badge-yellow">${match}</span>`);
            formatted = formatted.replace(ckPattern, match => `<span class="clinical-badge clinical-badge-red">${match}</span>`);

            return formatted;
        }

        // STATE VARIABLES
        let cards = [...rawCards];
        let currentIndex = 0;
        let bookmarks = [];
        let cardScores = {}; // Map of card index -> 'bisa' or 'ragu'
        let currentFilter = 'ALL';

        // INITIALIZATION
        function initApp() {
            // Load Bookmarks & Scores from LocalStorage
            const storedBookmarks = localStorage.getItem('cardio_rx_bookmarks');
            if (storedBookmarks) {
                bookmarks = JSON.parse(storedBookmarks);
            }
            const storedScores = localStorage.getItem('cardio_rx_scores');
            if (storedScores) {
                cardScores = JSON.parse(storedScores);
            }

            // Draw layouts based on screen width
            setupSidebarPanels();
            updateCardDisplay();
            updateStats();
            setupTouchGestures();
        }

        // DYNAMICALLY GENERATE PANELS CONTENT FOR SIDEBAR & BOTTOM SHEET
        function generatePanelHTML() {
            // Calculate category counts
            const counts = {
                'ALL': rawCards.length,
                'Iskemik & Dislipidemia': 0,
                'Gagal Jantung': 0,
                'Aritmia Kompleks': 0,
                'Emergensi & Toksikologi': 0,
                'Kinetika & Toksikologi': 0
            };
            rawCards.forEach(c => {
                if (counts[c.cat] !== undefined) {
                    counts[c.cat]++;
                }
            });

            // Generate category filter buttons list
            let categoryButtonsHTML = '';
            const categories = [
                { id: 'ALL', label: 'Semua Kategori' },
                { id: 'Iskemik & Dislipidemia', label: '1. Iskemik & Dislipidemia' },
                { id: 'Gagal Jantung', label: '2. Gagal Jantung Lanjut' },
                { id: 'Aritmia Kompleks', label: '3. Aritmia Kompleks' },
                { id: 'Emergensi & Toksikologi', label: '4. Emergensi & Vaskular' },
                { id: 'Kinetika & Toksikologi', label: '5. Kinetika & Toksitas' }
            ];

            categories.forEach(cat => {
                const isActive = currentFilter === cat.id ? 'active' : '';
                categoryButtonsHTML += `
                    <button class="filter-btn ${isActive}" onclick="setFilter('${cat.id}')">
                        <span>${cat.label}</span>
                        <span class="filter-count">${counts[cat.id]}</span>
                    </button>
                `;
            });

            // Generate bookmarked items list
            let bookmarksHTML = '';
            if (bookmarks.length === 0) {
                bookmarksHTML = '<div class="no-bookmarks">Belum ada kasus dibintang</div>';
            } else {
                bookmarks.forEach(bIndex => {
                    const originalCard = rawCards[bIndex];
                    bookmarksHTML += `
                        <div class="bookmark-item" onclick="jumpToCard(${bIndex})">
                            <span style="color:var(--accent-gold)">★</span>
                            <span>Case #${bIndex + 1}: ${originalCard.q.substring(0, 35)}...</span>
                        </div>
                    `;
                });
            }

            // Stats values
            const totalStudied = Object.keys(cardScores).length;
            const countBisa = Object.values(cardScores).filter(s => s === 'bisa').length;
            const countRagu = Object.values(cardScores).filter(s => s === 'ragu').length;
            const masteryPercent = totalStudied > 0 ? Math.round((countBisa / totalStudied) * 100) : 0;

            return `
                <!-- Panel Statistik -->
                <div>
                    <h3 class="panel-title">
                        <span>Statistik Belajar</span>
                        <span style="font-size:0.65rem; color:var(--accent-cyan); font-family:var(--font-mono)">LIVE</span>
                    </h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value stat-value-cyan">${totalStudied}</div>
                            <div class="stat-label">Dipelajari</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value stat-value-emerald">${countBisa}</div>
                            <div class="stat-label">Bisa</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value stat-value-rose">${countRagu}</div>
                            <div class="stat-label">Ragu-Ragu</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value stat-value-gold">${masteryPercent}%</div>
                            <div class="stat-label">Kuasai</div>
                        </div>
                    </div>
                </div>

                <!-- Panel Kategori -->
                <div>
                    <h3 class="panel-title">Kategori Materi</h3>
                    <div class="category-list">
                        ${categoryButtonsHTML}
                    </div>
                </div>

                <!-- Panel Bookmarks -->
                <div>
                    <h3 class="panel-title">Ditandai Bintang (${bookmarks.length})</h3>
                    <div class="bookmark-list-wrapper">
                        ${bookmarksHTML}
                    </div>
                </div>

                <!-- Panel Aksi Resets -->
                <div class="danger-zone">
                    <button class="reset-btn" onclick="resetProgress()">Reset Progress</button>
                </div>
            `;
        }

        function setupSidebarPanels() {
            const html = generatePanelHTML();
            
            // Populate Desktop Sidebar
            const desktopSidebar = document.getElementById('desktopSidebar');
            desktopSidebar.innerHTML = html;
            
            // Show sidebar if screen is wide
            if (window.innerWidth >= 900) {
                desktopSidebar.style.display = 'flex';
            } else {
                desktopSidebar.style.display = 'none';
            }

            // Populate Bottom Sheet Content
            document.getElementById('bottomSheetContent').innerHTML = html;
        }

        // RESPONSIVE SCREEN RESIZE ADJUSTMENT
        window.addEventListener('resize', () => {
            const desktopSidebar = document.getElementById('desktopSidebar');
            if (window.innerWidth >= 900) {
                desktopSidebar.style.display = 'flex';
            } else {
                desktopSidebar.style.display = 'none';
            }
        });

        // UPDATE FLASHCARD CONTENT AND FACES
        function updateCardDisplay() {
            const flashcard = document.getElementById('flashcard');
            
            // Revert flipped state first without sound
            flashcard.classList.remove('is-flipped');

            if (cards.length === 0) {
                document.getElementById('questionText').innerHTML = "<div class='text-center w-full text-slate-400'>Tidak ada kartu yang cocok dengan pencarian / filter Anda.</div>";
                document.getElementById('answerText').innerHTML = "<div class='text-center w-full text-slate-400'>Tidak ada kartu.</div>";
                document.getElementById('cardCounter').innerText = "0 / 0";
                document.getElementById('currentCategoryTag').innerText = "KOSONG";
                return;
            }

            // Get current active card
            const currentCard = cards[currentIndex];
            
            // Dynamically calculate index from original array for bookmarks/stats
            const originalIndex = rawCards.findIndex(c => c.q === currentCard.q);

            // Display contents
            document.getElementById('questionText').innerHTML = formatClinicalVignette(currentCard.q);
            document.getElementById('answerText').innerHTML = currentCard.a;
            document.getElementById('cardCounter').innerText = `${currentIndex + 1} / ${cards.length}`;
            document.getElementById('currentCategoryTag').innerText = currentCard.cat;

            // Bookmark button state
            const bookmarkBtn = document.getElementById('bookmarkBtn');
            if (bookmarks.includes(originalIndex)) {
                bookmarkBtn.classList.add('active');
            } else {
                bookmarkBtn.classList.remove('active');
            }

            // Highlights scoring rows
            const cardInner = document.querySelector('.card-inner');
            cardInner.style.borderColor = 'var(--glass-border)';
            if (cardScores[originalIndex] === 'bisa') {
                cardInner.style.boxShadow = '0 10px 25px var(--accent-emerald-glow)';
            } else if (cardScores[originalIndex] === 'ragu') {
                cardInner.style.boxShadow = '0 10px 25px var(--accent-rose-glow)';
            } else {
                cardInner.style.boxShadow = '0 15px 35px rgba(0,0,0,0.4)';
            }
        }

        // CORE UTILITY ACTIONS
        function flipCard() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.toggle('is-flipped');
            playSound('flip');
        }

        // SWIPE TOAST NOTIFICATIONS ANIMATOR
        let toastTimeout = null;
        function triggerToast(text) {
            const toast = document.getElementById('toastNotif');
            const toastText = document.getElementById('toastText');
            
            toastText.innerText = text;
            
            clearTimeout(toastTimeout);
            toast.classList.add('active');
            
            toastTimeout = setTimeout(() => {
                toast.classList.remove('active');
            }, 1200);
        }

        function nextCard() {
            if (cards.length <= 1) return;
            currentIndex = (currentIndex + 1) % cards.length;
            updateCardDisplay();
            playSound('flip');
            triggerToast('Kartu Berikutnya ➔');
        }

        function prevCard() {
            if (cards.length <= 1) return;
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            updateCardDisplay();
            playSound('flip');
            triggerToast('➔ Kartu Sebelumnya');
        }

        function shuffleCards() {
            if (cards.length <= 1) return;
            
            // Fisher-Yates Shuffle algorithm
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            
            currentIndex = 0;
            updateCardDisplay();
            playSound('flip');
            triggerToast('Urutan Diacak! 🔀');
        }

        // CONFIDENCE RATING SELECTIONS
        function scoreCard(isBisa) {
            if (cards.length === 0) return;
            const currentCard = cards[currentIndex];
            const originalIndex = rawCards.findIndex(c => c.q === currentCard.q);

            if (isBisa) {
                cardScores[originalIndex] = 'bisa';
                playSound('success');
                triggerToast('Kuasai: Bisa!  ✔');
            } else {
                cardScores[originalIndex] = 'ragu';
                playSound('unsettled');
                triggerToast('Kuasai: Ragu-Ragu ⚠️');
            }

            localStorage.setItem('cardio_rx_scores', JSON.stringify(cardScores));
            updateStats();
            
            // Auto transition to next card after a short timeout to speed up studying
            setTimeout(nextCard, 500);
        }

        // BOOKMARK MANAGEMENT
        function toggleBookmark(event) {
            event.stopPropagation(); // Stop card flipping when clicking bookmark button
            
            if (cards.length === 0) return;
            const currentCard = cards[currentIndex];
            const originalIndex = rawCards.findIndex(c => c.q === currentCard.q);

            const bIndex = bookmarks.indexOf(originalIndex);
            if (bIndex > -1) {
                bookmarks.splice(bIndex, 1);
                triggerToast('Bintang Dihapus ☆');
            } else {
                bookmarks.push(originalIndex);
                triggerToast('Bintang Ditambahkan ★');
            }

            localStorage.setItem('cardio_rx_bookmarks', JSON.stringify(bookmarks));
            updateStats();
            
            // Redraw bookmark button in current view
            const bookmarkBtn = document.getElementById('bookmarkBtn');
            if (bookmarks.includes(originalIndex)) {
                bookmarkBtn.classList.add('active');
            } else {
                bookmarkBtn.classList.remove('active');
            }
        }

        // FILTER AND SEARCH ROUTINES
        function setFilter(catId) {
            currentFilter = catId;
            applyFilterAndSearch();
            closeBottomSheet();
            triggerToast(`Filter: ${catId === 'ALL' ? 'Semua' : catId}`);
        }

        function handleSearch() {
            applyFilterAndSearch();
        }

        function applyFilterAndSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();

            // Filter
            let filtered = rawCards;
            if (currentFilter !== 'ALL') {
                filtered = rawCards.filter(c => c.cat === currentFilter);
            }

            // Search query filter (matches in question text or category or answer text)
            if (query !== '') {
                filtered = filtered.filter(c => 
                    c.q.toLowerCase().includes(query) || 
                    c.cat.toLowerCase().includes(query) ||
                    c.a.toLowerCase().includes(query)
                );
            }

            cards = filtered;
            currentIndex = 0;
            updateCardDisplay();
            updateStats();
        }

        function jumpToCard(originalIndex) {
            // Find card in current cards filter. If not present, clear filters
            let cardIdx = cards.findIndex(c => c.q === rawCards[originalIndex].q);
            if (cardIdx === -1) {
                currentFilter = 'ALL';
                document.getElementById('searchInput').value = '';
                cards = [...rawCards];
                cardIdx = originalIndex;
            }

            currentIndex = cardIdx;
            updateCardDisplay();
            closeBottomSheet();
            playSound('flip');
            triggerToast(`Membuka Kasus #${originalIndex + 1}`);
        }

        function updateStats() {
            setupSidebarPanels();
        }

        function resetProgress() {
            if (confirm("Apakah Anda yakin ingin menghapus seluruh progress belajar dan tanda bintang?")) {
                cardScores = {};
                bookmarks = [];
                localStorage.removeItem('cardio_rx_scores');
                localStorage.removeItem('cardio_rx_bookmarks');
                
                currentFilter = 'ALL';
                document.getElementById('searchInput').value = '';
                cards = [...rawCards];
                currentIndex = 0;

                updateCardDisplay();
                updateStats();
                triggerToast('Progress Direset! ↺');
                playSound('unsettled');
            }
        }

        // SWIPE GESTURES ENGINE (TOUCH INTERACTION)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        function setupTouchGestures() {
            const cardElement = document.getElementById('flashcard');

            cardElement.addEventListener('touchstart', function(event) {
                touchStartX = event.changedTouches[0].screenX;
                touchStartY = event.changedTouches[0].screenY;
            }, { passive: true });

            cardElement.addEventListener('touchend', function(event) {
                touchEndX = event.changedTouches[0].screenX;
                touchEndY = event.changedTouches[0].screenY;
                handleSwipeGesture();
            }, { passive: true });
        }

        function handleSwipeGesture() {
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            const threshold = 60; // minimum distance required to trigger swipe

            // Check primary swipe axis
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal swipes
                if (Math.abs(deltaX) > threshold) {
                    if (deltaX < 0) {
                        nextCard(); // swipe left -> next
                    } else {
                        prevCard(); // swipe right -> prev
                    }
                }
            } else {
                // Vertical swipes
                if (Math.abs(deltaY) > threshold) {
                    if (deltaY < 0) {
                        // swipe up -> flip card
                        flipCard();
                        triggerToast('Flip Kartu ⇅');
                    } else {
                        // swipe down -> bookmark toggle
                        toggleBookmark(new Event('swipe'));
                    }
                }
            }
        }

        // BOTTOM SHEET ROUTINES (MOBILE SPECIFIC PANEL)
        function openBottomSheet() {
            document.getElementById('bottomSheet').classList.add('active');
            document.getElementById('bottomSheetOverlay').classList.add('active');
            playSound('unsettled');
        }

        function closeBottomSheet() {
            document.getElementById('bottomSheet').classList.remove('active');
            document.getElementById('bottomSheetOverlay').classList.remove('active');
        }

        // KEYBOARD HOTKEYS ASSIST
        document.addEventListener('keydown', function(event) {
            // Check if user is typing in search input
            if (document.activeElement === document.getElementById('searchInput')) {
                return;
            }

            if (event.key === 'ArrowRight' || event.key === ' ') {
                event.preventDefault();
                nextCard();
            } else if (event.key === 'ArrowLeft') {
                event.preventDefault();
                prevCard();
            } else if (event.key === 'ArrowUp' || event.key === 'Enter') {
                event.preventDefault();
                flipCard();
            } else if (event.key === 'ArrowDown' || event.key.toLowerCase() === 's') {
                event.preventDefault();
                toggleBookmark(new Event('key'));
            } else if (event.key.toLowerCase() === 'b') {
                scoreCard(true);
            } else if (event.key.toLowerCase() === 'r') {
                scoreCard(false);
            }
        });

        // Start App
        window.onload = initApp;
    </script>
</body>
</html>
