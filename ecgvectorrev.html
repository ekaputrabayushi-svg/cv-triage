<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CardioVector Sandbox | CardiologyVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .touch-area { touch-action: none; -webkit-user-select: none; user-select: none; }
        body { 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        /* Neon EKG Traces */
        .ecg-trace { filter: drop-shadow(0px 0px 3px rgba(6, 182, 212, 0.8)); }
        .ecg-trace-ideal { filter: drop-shadow(0px 0px 2px rgba(255, 255, 255, 0.6)); }
        
        /* Custom Scrollbar - Compact for Telemetry */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="text-slate-800 font-sans selection:bg-indigo-200 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useRef, useMemo, useEffect } = React;

        // --- ICONS COMPONENT ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />,
                Maximize: <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />,
                RefreshCw: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><polyline points="3 3 3 8 8 8" /></>,
                MousePointer2: <><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" /><path d="M13 13l6 6" /></>,
                Info: <><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></>,
                AlertTriangle: <><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>,
                CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></>,
                BookOpen: <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></>,
                Stethoscope: <><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3A.5.5 0 0 1 11 2.5v5a5 5 0 0 1-5 5v0a5 5 0 0 1-5-5v-5a.5.5 0 0 1 .8-.2z" /><path d="M8 15v3a6 6 0 0 1-6 6v0" /><circle cx="20" cy="24" r="2" /></>,
                Compass: <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- CONFIG & PHYSICS (Diperbaiki agar Fisiologis +60°) ---
        const LIMB_ANCHORS = [
            { id: 'RA', name: 'RA (Kanan)', color: '#ef4444', idealX: 20, idealY: 30 },
            { id: 'LA', name: 'LA (Kiri)', color: '#eab308', idealX: 80, idealY: 30 },
            { id: 'LL', name: 'LL (Kaki K)', color: '#22c55e', idealX: 50, idealY: 82 },
            { id: 'RL', name: 'RL (Netral)', color: '#1e293b', idealX: 40, idealY: 82 },
        ];

        const PRECORDIAL_ANCHORS = [
            { id: 'V1', name: 'V1', idealX: 45, idealY: 40, color: '#ef4444' },
            { id: 'V2', name: 'V2', idealX: 55, idealY: 40, color: '#eab308' },
            { id: 'V3', name: 'V3', idealX: 58, idealY: 44, color: '#22c55e' },
            { id: 'V4', name: 'V4', idealX: 63, idealY: 48, color: '#14b8a6' },
            { id: 'V5', name: 'V5', idealX: 72, idealY: 48, color: '#3b82f6' },
            { id: 'V6', name: 'V6', idealX: 80, idealY: 48, color: '#a855f7' },
        ];

        const IDEAL_LIMB_POSITIONS = LIMB_ANCHORS.reduce((acc, l) => ({ ...acc, [l.id]: { x: l.idealX, y: l.idealY } }), {});

        // Vektor presisi anatomis (Aksis Normal ~ +45 Derajat agar aVL Positif Tegak)
        const HEART_DIPOLE = {
            p: { x: 0.08, y: 0.08 },   // Depolarisasi atrium (Aksis +45)
            q: { x: -0.03, y: -0.03 }, // Depolarisasi septum (Kiri ke Kanan Atas)
            r: { x: 0.9, y: 0.9 },     // Vektor Mayor Ventrikel Kiri (Aksis +45)
            s: { x: -0.2, y: -0.2 },   // Depolarisasi basal (Kanan Atas)
            t: { x: 0.2, y: 0.2 }      // Repolarisasi (Konkordan dengan R)
        };

        const PRECORDIAL_SURFACE = [
            { x: 45, y: 40, p: 0.05, q: 0.02, r: 0.2, s: -0.8, t: 0.05 }, 
            { x: 55, y: 40, p: 0.05, q: 0, r: 0.4, s: -0.6, t: 0.1 },   
            { x: 58, y: 44, p: 0.06, q: -0.02, r: 0.7, s: -0.4, t: 0.15 },
            { x: 63, y: 48, p: 0.08, q: -0.04, r: 1.0, s: -0.2, t: 0.2 }, 
            { x: 72, y: 48, p: 0.08, q: -0.05, r: 0.9, s: -0.1, t: 0.2 },    
            { x: 80, y: 48, p: 0.06, q: -0.04, r: 0.7, s: 0, t: 0.15 }      
        ];

        // --- MATH ---
        const getLimbVectorParams = (leadName, limbs) => {
            const { RA, LA, LL } = limbs;
            let dx = 0, dy = 0;

            if (leadName === 'I') { dx = LA.x - RA.x; dy = LA.y - RA.y; }
            else if (leadName === 'II') { dx = LL.x - RA.x; dy = LL.y - RA.y; }
            else if (leadName === 'III') { dx = LL.x - LA.x; dy = LL.y - LA.y; }
            else if (leadName === 'aVR') { dx = RA.x - (LA.x + LL.x)/2; dy = RA.y - (LA.y + LL.y)/2; }
            else if (leadName === 'aVL') { dx = LA.x - (RA.x + LL.x)/2; dy = LA.y - (RA.y + LL.y)/2; }
            else if (leadName === 'aVF') { dx = LL.x - (RA.x + LA.x)/2; dy = LL.y - (RA.y + LA.y)/2; }

            const mag = Math.sqrt(dx*dx + dy*dy) || 1;
            const ux = dx / mag;
            const uy = dy / mag;
            
            const dot = (dipole) => (dipole.x * ux) + (dipole.y * uy);

            let params = {
                p: dot(HEART_DIPOLE.p), 
                q: dot(HEART_DIPOLE.q),
                r: Math.max(0, dot(HEART_DIPOLE.r)), // Gelombang R idealnya komponen positif
                s: Math.min(0, dot(HEART_DIPOLE.s) + Math.min(0, dot(HEART_DIPOLE.r))), // Gabung jika arah R terbalik
                t: dot(HEART_DIPOLE.t),
            };

            // Jika r terbalik karena proyeksi, r berubah menjadi gelombang q/s dalam (QS pattern)
            if (dot(HEART_DIPOLE.r) < 0) {
                params.s = dot(HEART_DIPOLE.r);
                params.r = 0;
            }

            return params;
        };

        const getPrecordialParams = (x, y) => {
            let sumWeights = 0;
            let params = { p: 0, q: 0, r: 0, s: 0, t: 0 };
            
            PRECORDIAL_SURFACE.forEach(anchor => {
                let dx = anchor.x - x;
                let dy = anchor.y - y;
                let distSq = dx * dx + dy * dy;
                if (distSq < 0.1) distSq = 0.1;
                let weight = 1.0 / Math.pow(distSq, 1.5);
                
                params.p += anchor.p * weight; params.q += anchor.q * weight;
                params.r += anchor.r * weight; params.s += anchor.s * weight;
                params.t += anchor.t * weight; sumWeights += weight;
            });

            return {
                p: params.p / sumWeights, q: params.q / sumWeights,
                r: params.r / sumWeights, s: params.s / sumWeights, t: params.t / sumWeights,
            };
        };

        // --- ECG TRACE COMPONENT ---
        const ECGMonitorTrace = ({ title, width = 350, height = 75, params, idealParams, highlight = false }) => {
            const generatePathData = (prm) => {
                if (!prm) return "";
                const points = [];
                const baselineY = height * 0.65; 
                const scaleY = 24; // Disesuaikan agar tidak terpotong saat aksis membesar
                const steps = width;

                for (let i = 0; i <= steps; i++) {
                    const t = (i / width) * 1000; 
                    const p = prm.p * Math.exp(-Math.pow((t - 280) / 20, 2));
                    const q = prm.q * Math.exp(-Math.pow((t - 380) / 8, 2));
                    const r = prm.r * Math.exp(-Math.pow((t - 405) / 12, 2));
                    const s = prm.s * Math.exp(-Math.pow((t - 435) / 12, 2));
                    const tw = prm.t * Math.exp(-Math.pow((t - 600) / 40, 2));
                    const u = 0.01 * Math.exp(-Math.pow((t - 750) / 25, 2));

                    const y = baselineY - ((p + q + r + s + tw + u) * scaleY);
                    points.push(`${i},${y}`);
                }
                return `M ${points.join(' L ')}`;
            };

            const pathData = useMemo(() => generatePathData(params), [params, width, height]);
            const idealPathData = useMemo(() => generatePathData(idealParams), [idealParams, width, height]);

            return (
                <div className={`relative bg-[#050B14] rounded-xl overflow-hidden transition-all duration-300 w-full ${highlight ? 'ring-1 ring-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.2)]' : 'border border-slate-800'}`}>
                    <div className="absolute top-1 left-2 z-10 text-[9px] md:text-[11px] font-bold text-cyan-400 font-mono tracking-wider drop-shadow-md">
                        {title}
                    </div>
                    
                    <svg viewBox={`0 0 ${width} ${height}`} className="block w-full h-auto">
                        <defs>
                            <pattern id={`grid-small-${title}`} width="5" height="5" patternUnits="userSpaceOnUse">
                                <path d="M 5 0 L 0 0 0 5" fill="none" stroke="#0f293e" strokeWidth="0.5"/>
                            </pattern>
                            <pattern id={`grid-large-${title}`} width="25" height="25" patternUnits="userSpaceOnUse">
                                <rect width="25" height="25" fill={`url(#grid-small-${title})`} />
                                <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#163c5c" strokeWidth="1"/>
                            </pattern>
                        </defs>
                        
                        <rect width="100%" height="100%" fill={`url(#grid-large-${title})`} />
                        
                        {idealParams && (
                            <path 
                                d={idealPathData} 
                                fill="none" 
                                stroke="#ffffff" 
                                strokeWidth="1.5" 
                                strokeDasharray="2 3"
                                className="ecg-trace-ideal"
                                opacity="0.6"
                            />
                        )}

                        <path 
                            d={pathData} 
                            fill="none" 
                            stroke="#06b6d4" 
                            strokeWidth="1.8" 
                            strokeLinejoin="round"
                            className="ecg-trace"
                        />
                    </svg>
                </div>
            );
        };

        // --- HEXAXIAL WHEEL COMPONENT ---
        const HexaxialWheel = ({ angle }) => (
            <div className="relative w-14 h-14 md:w-16 md:h-16 shrink-0">
                <svg viewBox="-50 -50 100 100" className="w-full h-full drop-shadow-sm">
                    <circle r="48" fill="#f8fafc" stroke="#cbd5e1" strokeWidth="2" />
                    <line x1="-48" y1="0" x2="48" y2="0" stroke="#e2e8f0" strokeWidth="1" />
                    <line x1="0" y1="-48" x2="0" y2="48" stroke="#e2e8f0" strokeWidth="1" />
                    <line x1="-24" y1="-41.5" x2="24" y2="41.5" stroke="#e2e8f0" strokeWidth="1" />
                    <line x1="-41.5" y1="-24" x2="41.5" y2="24" stroke="#e2e8f0" strokeWidth="1" />
                    <line x1="-41.5" y1="24" x2="41.5" y2="-24" stroke="#e2e8f0" strokeWidth="1" />
                    <line x1="-24" y1="41.5" x2="24" y2="-41.5" stroke="#e2e8f0" strokeWidth="1" />
                    
                    {/* Busur Hijau: Area Aksis Normal (-30 sd +90) */}
                    <path d="M 41.5 -24 A 48 48 0 0 1 0 48" fill="none" stroke="#a7f3d0" strokeWidth="6" opacity="0.5" />
                    
                    <g transform={`rotate(${angle})`} className="transition-transform duration-300 ease-out">
                        <line x1="0" y1="0" x2="40" y2="0" stroke="#4f46e5" strokeWidth="3" strokeLinecap="round" />
                        <polygon points="45,0 38,-4 38,4" fill="#4f46e5" />
                    </g>
                    <circle r="3" fill="#1e293b" />
                </svg>
            </div>
        );

        // --- DIAGNOSTICS (Updated with LITFL logic) ---
        const getClinicalDiagnosis = (mode, limbLeads, precordialLeads, axisAngle) => {
            const isSwapped = (lead1, lead2, ideal1, ideal2) => {
                const d12 = Math.hypot(lead1.x - ideal2.x, lead1.y - ideal2.y);
                const d21 = Math.hypot(lead2.x - ideal1.x, lead2.y - ideal1.y);
                return d12 < 15 && d21 < 15;
            };

            if (mode === 'limb') {
                if (isSwapped(limbLeads.RA, limbLeads.LA, IDEAL_LIMB_POSITIONS.RA, IDEAL_LIMB_POSITIONS.LA)) return { type: 'LA_RA_SWAP', status: 'error', title: 'LA & RA Tertukar (Reversal)' };
                if (isSwapped(limbLeads.RA, limbLeads.LL, IDEAL_LIMB_POSITIONS.RA, IDEAL_LIMB_POSITIONS.LL)) return { type: 'RA_LL_SWAP', status: 'error', title: 'RA & LL Tertukar (Reversal)' };
                if (isSwapped(limbLeads.LA, limbLeads.LL, IDEAL_LIMB_POSITIONS.LA, IDEAL_LIMB_POSITIONS.LL)) return { type: 'LA_LL_SWAP', status: 'error', title: 'LA & LL Tertukar (Reversal)' };
                
                if (axisAngle >= -30 && axisAngle <= 90) {
                    if (limbLeads.LL.y < 55) return { type: 'HIGH_LL', status: 'warning', title: 'Penempatan LL Terlalu Tinggi' };
                    if (limbLeads.RA.y > 60 || limbLeads.LA.y > 60) return { type: 'LOW_ARM', status: 'warning', title: 'Elektroda Lengan di Abdomen' };
                    return { type: 'NORMAL_LIMB', status: 'normal', title: 'Aksis Jantung Normal', desc: 'Aksis berada pada rentang -30° hingga +90°.' };
                } else if (axisAngle < -30 && axisAngle >= -90) {
                    return { type: 'LAD', status: 'warning', title: 'Left Axis Deviation (LAD)', desc: `Aksis bergeser ekstrem ke kiri (${axisAngle}°).` };
                } else if (axisAngle > 90 && axisAngle <= 180) {
                    return { type: 'RAD', status: 'warning', title: 'Right Axis Deviation (RAD)', desc: `Aksis bergeser ke kanan (${axisAngle}°).` };
                } else {
                    return { type: 'EXTREME_AXIS', status: 'error', title: 'Extreme Axis Deviation', desc: `Aksis Northwest (-90° hingga -180°).` };
                }
            } else {
                if (precordialLeads.V1.x > precordialLeads.V2.x || precordialLeads.V2.x > precordialLeads.V3.x || precordialLeads.V3.x > precordialLeads.V4.x || precordialLeads.V4.x > precordialLeads.V5.x || precordialLeads.V5.x > precordialLeads.V6.x) {
                    return { type: 'OUT_OF_SEQUENCE', status: 'error', title: 'Elektroda Prekordial Menyilang', desc: 'Urutan penempatan V1-V6 tidak berurutan di dinding dada.' };
                }
                if (precordialLeads.V1.y < 35 || precordialLeads.V2.y < 35) return { type: 'HIGH_V1', status: 'warning', title: 'High Placement V1/V2 (Pseudo-RBBB)' };
                if (precordialLeads.V1.y > 55 || precordialLeads.V2.y > 55) return { type: 'LOW_V1', status: 'warning', title: 'Low Placement V1/V2', desc: 'Elektroda diletakkan terlalu inferior (bawah).' };
                if (precordialLeads.V5.y > 60 || precordialLeads.V6.y > 60) return { type: 'LOW_V6', status: 'warning', title: 'Low Voltage Lateral' };
                if (precordialLeads.V5.y < 35 || precordialLeads.V6.y < 35) return { type: 'HIGH_V6', status: 'warning', title: 'High Placement V5/V6', desc: 'Elektroda lateral diletakkan terlalu superior.' };

                let totalDeviation = 0;
                PRECORDIAL_ANCHORS.forEach(ideal => {
                    const current = precordialLeads[ideal.id];
                    totalDeviation += Math.hypot(current.x - ideal.idealX, current.y - ideal.idealY);
                });
                if (totalDeviation > 45) return { type: 'DEVIATED_PRECORDIAL', status: 'warning', title: 'Deviasi Aksis Horizontal', desc: 'Elektroda bergeser signifikan dari titik ICS ideal.' };
                
                return { type: 'NORMAL_PRECORDIAL', status: 'normal', title: 'Vektor Prekordial Normal', desc: 'Elektroda prekordial mendeteksi vektor dari bidang horizontal dengan benar.' };
            }
        };

        // --- MAIN APP ---
        function App() {
            const [mode, setMode] = useState('precordial'); 
            const [limbLeads, setLimbLeads] = useState(
                LIMB_ANCHORS.reduce((acc, l) => ({ ...acc, [l.id]: { x: l.idealX, y: l.idealY } }), {})
            );
            const [precordialLeads, setPrecordialLeads] = useState(
                PRECORDIAL_ANCHORS.reduce((acc, l) => ({ ...acc, [l.id]: { x: l.idealX, y: l.idealY } }), {})
            );

            const [activeLead, setActiveLead] = useState(null);
            const svgRef = useRef(null);

            const handlePointerDown = (id, e) => {
                if (e.cancelable) e.preventDefault();
                setActiveLead(id);
            };

            const handlePointerMove = useCallback((e) => {
                if (!activeLead || !svgRef.current) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                const rect = svgRef.current.getBoundingClientRect();
                let px = ((clientX - rect.left) / rect.width) * 100;
                let py = ((clientY - rect.top) / rect.height) * 100;
                px = Math.max(5, Math.min(95, px));
                py = Math.max(5, Math.min(95, py));

                if (mode === 'limb') {
                    setLimbLeads(prev => ({ ...prev, [activeLead]: { x: px, y: py } }));
                } else {
                    setPrecordialLeads(prev => ({ ...prev, [activeLead]: { x: px, y: py } }));
                }
            }, [activeLead, mode]);

            const handlePointerUp = useCallback(() => setActiveLead(null), []);
            const resetPositions = () => {
                if (mode === 'limb') {
                    setLimbLeads(LIMB_ANCHORS.reduce((acc, l) => ({ ...acc, [l.id]: { x: l.idealX, y: l.idealY } }), {}));
                } else {
                    setPrecordialLeads(PRECORDIAL_ANCHORS.reduce((acc, l) => ({ ...acc, [l.id]: { x: l.idealX, y: l.idealY } }), {}));
                }
            };

            const calcAxis = () => {
                const paramsI = getLimbVectorParams('I', limbLeads);
                const paramsaVF = getLimbVectorParams('aVF', limbLeads);
                // Komputasi matematis yang akurat untuk Quadrant Method
                let netI = paramsI.r + paramsI.s;
                let netaVF = paramsaVF.r + paramsaVF.s;
                let angle = Math.atan2(netaVF, netI) * (180 / Math.PI);
                return Math.round(angle);
            };
            
            const axisAngle = calcAxis();
            const diagnosis = getClinicalDiagnosis(mode, limbLeads, precordialLeads, axisAngle);

            return (
                <div 
                    className="min-h-screen pb-6 bg-slate-50 font-sans flex flex-col"
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onMouseLeave={handlePointerUp}
                    onTouchMove={handlePointerMove}
                    onTouchEnd={handlePointerUp}
                >
                    {/* NAVBAR: Ultra Compact */}
                    <nav className="bg-indigo-950 text-white shadow-md relative overflow-hidden shrink-0">
                        <div className="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
                        <div className="max-w-7xl mx-auto px-2 md:px-4 py-2 flex flex-row items-center justify-between gap-2 relative z-10">
                            <div className="flex items-center gap-2 md:gap-3 w-auto">
                                <div className="p-1.5 md:p-2 bg-indigo-800/50 rounded-lg border border-indigo-700/50 shadow-inner hidden xs:block">
                                    <Icon name="Activity" size={20} className="text-cyan-400" />
                                </div>
                                <div className="flex flex-col">
                                    <h1 className="text-sm md:text-xl font-black tracking-tight text-white drop-shadow-sm leading-none">
                                        CardioVector <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">Sandbox</span>
                                    </h1>
                                    <p className="text-[8px] md:text-xs text-indigo-200 font-medium tracking-wide mt-0.5 whitespace-nowrap">
                                        Part of <span className="text-white font-bold">CardiologyVault</span>
                                    </p>
                                </div>
                            </div>
                            
                            <div className="flex w-auto bg-indigo-900/50 rounded-lg p-1 border border-indigo-800 shadow-inner shrink-0">
                                <button 
                                    onClick={() => setMode('precordial')}
                                    className={`px-2 py-1 md:px-3 md:py-1.5 rounded text-[10px] md:text-xs font-bold transition-all duration-300 ${mode === 'precordial' ? 'bg-cyan-500 text-indigo-950 shadow-sm' : 'text-indigo-200 hover:text-white'}`}
                                >
                                    Prekordial
                                </button>
                                <button 
                                    onClick={() => setMode('limb')}
                                    className={`px-2 py-1 md:px-3 md:py-1.5 rounded text-[10px] md:text-xs font-bold transition-all duration-300 ${mode === 'limb' ? 'bg-cyan-500 text-indigo-950 shadow-sm' : 'text-indigo-200 hover:text-white'}`}
                                >
                                    Ekstremitas
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* MAIN LAYOUT */}
                    <main className="max-w-7xl w-full mx-auto px-2 md:px-4 mt-3 flex flex-col gap-3 md:gap-5 flex-1">
                        
                        {/* 1. INTERACTIVE AREA: Side by Side on ALL screens */}
                        <div className="flex flex-row gap-2 md:gap-4 h-[340px] md:h-[450px]">
                            
                            {/* KANVAS PASIEN (Kiri - Lebar 42%) */}
                            <div className="w-[42%] md:w-[35%] bg-white rounded-xl md:rounded-3xl shadow-md overflow-hidden flex flex-col relative border border-slate-200">
                                <div className="px-2 py-1.5 md:px-4 md:py-3 border-b border-slate-100 flex justify-between items-center bg-white z-10 shrink-0">
                                    <h2 className="text-[10px] md:text-sm font-extrabold text-slate-800 flex items-center gap-1">
                                        <Icon name="MousePointer2" size={14} className="text-indigo-600 hidden md:block" /> Kanvas
                                    </h2>
                                    <button onClick={resetPositions} className="text-[8px] md:text-xs font-bold px-1.5 py-1 bg-slate-100 hover:bg-indigo-50 border border-slate-200 rounded text-slate-600 hover:text-indigo-700 transition-colors shadow-sm">
                                        Reset
                                    </button>
                                </div>

                                <div className="relative flex-1 w-full bg-slate-50 overflow-hidden select-none touch-area">
                                    <svg ref={svgRef} className="absolute inset-0 w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                                        <defs>
                                            <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                                <stop offset="0%" stopColor="#f8fafc" />
                                                <stop offset="100%" stopColor="#e2e8f0" />
                                            </linearGradient>
                                        </defs>
                                        <g>
                                            <path d="M 35 5 C 45 10, 55 10, 65 5 C 75 10, 85 20, 85 45 C 85 60, 80 80, 75 95 L 25 95 C 20 80, 15 60, 15 45 C 15 20, 25 10, 35 5 Z" fill="url(#bodyGrad)" stroke="#cbd5e1" strokeWidth="1"/>
                                            <path d="M 45 -5 L 45 5 C 50 8, 50 8, 55 5 L 55 -5 Z" fill="#f8fafc" stroke="#cbd5e1" strokeWidth="1" />
                                            <path d="M 35 15 Q 50 20 65 15" fill="none" stroke="#94a3b8" strokeWidth="1.5" opacity="0.5"/>
                                            <line x1="50" y1="20" x2="50" y2="60" stroke="#94a3b8" strokeWidth="1" strokeDasharray="1.5 1.5" opacity="0.4"/>
                                            <path d="M 50 60 Q 35 65 20 75 M 50 60 Q 65 65 80 75" fill="none" stroke="#cbd5e1" strokeWidth="1.5" opacity="0.7"/>
                                            
                                            {/* Jantung & Vektor Dinamis */}
                                            <g opacity="0.9">
                                                <path d="M 55 35 C 65 30, 70 45, 60 55 C 50 60, 45 45, 55 35" fill="#ffe4e6" stroke="#fb7185" strokeWidth="0.5" />
                                                
                                                {/* Panah Vektor berputar sesuai axisAngle */}
                                                <g transform={`translate(55, 43) rotate(${axisAngle})`} className="transition-transform duration-300 ease-out">
                                                    <line x1="0" y1="0" x2="9" y2="0" stroke="#e11d48" strokeWidth="1" strokeLinecap="round" />
                                                    <polygon points="12,0 8,-2.5 8,2.5" fill="#e11d48" />
                                                </g>
                                            </g>
                                        </g>

                                        {mode === 'limb' && (
                                            <>
                                                <g stroke="#818cf8" strokeWidth="0.5" opacity="0.5" strokeDasharray="2 2">
                                                    <line x1={limbLeads.RA.x} y1={limbLeads.RA.y} x2={limbLeads.LA.x} y2={limbLeads.LA.y} />
                                                    <line x1={limbLeads.RA.x} y1={limbLeads.RA.y} x2={limbLeads.LL.x} y2={limbLeads.LL.y} />
                                                    <line x1={limbLeads.LA.x} y1={limbLeads.LA.y} x2={limbLeads.LL.x} y2={limbLeads.LL.y} />
                                                </g>
                                                
                                                {LIMB_ANCHORS.map(l => (
                                                    <circle key={`ghost-${l.id}`} cx={l.idealX} cy={l.idealY} r="3" fill="none" stroke="#94a3b8" strokeWidth="0.5" strokeDasharray="1 1" />
                                                ))}
                                                {LIMB_ANCHORS.map(l => (
                                                    <g key={l.id} transform={`translate(${limbLeads[l.id].x}, ${limbLeads[l.id].y})`} onPointerDown={(e) => handlePointerDown(l.id, e)} onTouchStart={(e) => handlePointerDown(l.id, e)} className="cursor-grab active:cursor-grabbing">
                                                        <circle cx="0" cy="0" r="5" fill={l.color} stroke="#fff" strokeWidth="1.5" className="shadow-lg" />
                                                        <circle cx="0" cy="0" r={activeLead === l.id ? "12" : "0"} fill={l.color} opacity="0.2" className="transition-all" />
                                                        <text x="0" y="-8" textAnchor="middle" fontSize="4.5" fontWeight="900" fill="#1e293b" className="pointer-events-none drop-shadow-[0_1px_1px_rgba(255,255,255,1)]">{l.id}</text>
                                                    </g>
                                                ))}
                                            </>
                                        )}

                                        {mode === 'precordial' && (
                                            <>
                                                {PRECORDIAL_ANCHORS.map(l => (
                                                    <circle key={`ghost-${l.id}`} cx={l.idealX} cy={l.idealY} r="2.5" fill="none" stroke="#94a3b8" strokeWidth="0.8" strokeDasharray="1 1" />
                                                ))}
                                                {PRECORDIAL_ANCHORS.map(l => (
                                                    <g key={l.id} transform={`translate(${precordialLeads[l.id].x}, ${precordialLeads[l.id].y})`} onPointerDown={(e) => handlePointerDown(l.id, e)} onTouchStart={(e) => handlePointerDown(l.id, e)} className="cursor-grab active:cursor-grabbing">
                                                        <circle cx="0" cy="0" r="4" fill={l.color} stroke="#ffffff" strokeWidth="1.5" className="shadow-sm" />
                                                        <circle cx="0" cy="0" r={activeLead === l.id ? "10" : "0"} fill={l.color} opacity="0.3" className="transition-all" />
                                                        <text x="0" y="-6" textAnchor="middle" fontSize="4" fontWeight="900" fill="#1e293b" className="pointer-events-none drop-shadow-[0_1px_1px_rgba(255,255,255,1)]">{l.id}</text>
                                                    </g>
                                                ))}
                                            </>
                                        )}
                                    </svg>
                                </div>
                            </div>

                            {/* TELEMETRY MONITOR (Kanan - Lebar 58%, Scrollable) */}
                            <div className="w-[58%] md:w-[65%] bg-[#020617] rounded-xl md:rounded-3xl shadow-xl border border-slate-800 flex flex-col overflow-hidden relative">
                                <div className="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent"></div>
                                
                                <div className="px-2 py-2 md:px-5 md:py-3 flex flex-col md:flex-row justify-between items-start md:items-center gap-1.5 border-b border-slate-800 z-10 shrink-0 bg-[#020617]/90 backdrop-blur">
                                    <h2 className="text-white text-[10px] md:text-sm font-bold flex items-center gap-1.5 leading-tight">
                                        <Icon name="Activity" size={14} className="text-cyan-400" />
                                        Telemetri
                                    </h2>
                                    <div className="flex items-center gap-1.5 text-[8px] md:text-[10px] text-slate-300 bg-slate-900 px-2 py-1 rounded border border-slate-700">
                                        <span className="w-1.5 h-1.5 rounded-full bg-white shadow-[0_0_3px_rgba(255,255,255,0.8)]"></span>
                                        <span>Ideal</span>
                                    </div>
                                </div>
                                
                                {/* Area scrollable */}
                                <div className="flex-1 overflow-y-auto p-2 md:p-4 grid grid-cols-1 sm:grid-cols-2 gap-2 md:gap-4 content-start">
                                    {mode === 'limb' 
                                        ? ['I', 'aVR', 'II', 'aVL', 'III', 'aVF'].map(leadId => (
                                            <ECGMonitorTrace key={leadId} title={leadId} params={getLimbVectorParams(leadId, limbLeads)} idealParams={getLimbVectorParams(leadId, IDEAL_LIMB_POSITIONS)} />
                                        ))
                                        : ['V1', 'V2', 'V3', 'V4', 'V5', 'V6'].map(id => {
                                            const idealAnchor = PRECORDIAL_ANCHORS.find(a => a.id === id);
                                            return (
                                                <ECGMonitorTrace key={id} title={id} params={getPrecordialParams(precordialLeads[id].x, precordialLeads[id].y)} idealParams={getPrecordialParams(idealAnchor.idealX, idealAnchor.idealY)} highlight={activeLead === id}/>
                                            );
                                        })
                                    }
                                </div>
                            </div>

                        </div>

                        {/* 2. INFORMATIVE AREA: Sesuai Panduan Klinis LITFL */}
                        <div className="flex flex-col md:flex-row gap-3 md:gap-5">
                            
                            {/* Panel Diagnosis AI (Kiri - 40% Desktop) */}
                            <div className={`w-full md:w-[40%] rounded-2xl p-3 md:p-5 shadow-sm border relative overflow-hidden transition-all duration-300 ${
                                diagnosis.status === 'normal' ? 'bg-white border-emerald-200' :
                                diagnosis.status === 'warning' ? 'bg-amber-50 border-amber-300' : 
                                'bg-rose-50 border-rose-300'
                            }`}>
                                <div className="flex items-start gap-2.5 md:gap-4 relative z-10">
                                    <div className={`p-1.5 md:p-2.5 rounded-xl shrink-0 ${
                                        diagnosis.status === 'normal' ? 'bg-emerald-100 text-emerald-600' :
                                        diagnosis.status === 'warning' ? 'bg-amber-200 text-amber-700' : 
                                        'bg-rose-200 text-rose-700'
                                    }`}>
                                        {diagnosis.status === 'normal' ? <Icon name="CheckCircle" size={18} /> : <Icon name="AlertTriangle" size={18} />}
                                    </div>
                                    <div className="flex-1">
                                        <h3 className={`font-black text-xs md:text-base mb-0.5 md:mb-1 ${
                                            diagnosis.status === 'normal' ? 'text-slate-800' :
                                            diagnosis.status === 'warning' ? 'text-amber-900' : 
                                            'text-rose-900'
                                        }`}>
                                            {diagnosis.title}
                                        </h3>
                                        {diagnosis.status !== 'normal' && (
                                            <p className={`text-[10px] md:text-xs font-medium leading-relaxed ${
                                                diagnosis.status === 'warning' ? 'text-amber-800' : 'text-rose-800'
                                            }`}>
                                                {diagnosis.desc}
                                            </p>
                                        )}
                                    </div>
                                </div>

                                {mode === 'limb' && (
                                    <div className="mt-3 pt-3 border-t border-slate-200/60 flex items-center justify-between">
                                        <div>
                                            <div className="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Rotasi Aksis QRS</div>
                                            <div className={`text-xl md:text-2xl font-black ${axisAngle < -30 ? 'text-rose-600' : axisAngle > 90 ? 'text-amber-600' : 'text-indigo-600'}`}>
                                                {axisAngle}°
                                            </div>
                                        </div>
                                        <HexaxialWheel angle={axisAngle} />
                                    </div>
                                )}
                            </div>

                            {/* EDUCATION PANEL (Kanan - 60% Desktop) LITFL Interpretation */}
                            <div className="w-full md:w-[60%] bg-white border border-slate-200 rounded-2xl p-3 md:p-5 shadow-sm">
                                <div className="flex items-center gap-2 mb-2 md:mb-3 border-b border-slate-100 pb-2 md:pb-3">
                                    <Icon name="BookOpen" size={16} className="text-indigo-600" />
                                    <h3 className="text-slate-800 font-black text-xs md:text-sm tracking-tight">
                                        Analisis Patofisiologi & Aksis EKG
                                    </h3>
                                </div>
                                
                                <div className="text-slate-600 text-[10px] md:text-xs leading-relaxed overflow-y-auto max-h-[160px] md:max-h-none pr-1">
                                    
                                    {/* --- KONTEN EDUKASI KHUSUS MODE LIMB (AXIS) --- */}
                                    {mode === 'limb' && diagnosis.status === 'normal' && (
                                        <div className="space-y-3">
                                            <div className="bg-indigo-50 border border-indigo-100 p-2 md:p-3 rounded-lg text-indigo-900">
                                                <p className="font-bold mb-1">Metode Kuadran (Quadrant Method):</p>
                                                <p>Lihat <strong>Lead I</strong> dan <strong>aVF</strong>. Jika QRS di kedua sadapan ini Positif (+), maka aksis berada di kuadran normal (0° hingga +90°).</p>
                                            </div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                                    <p className="font-bold text-slate-800">Isoelectric Lead Method:</p>
                                                    <p>Cari sadapan yang bifasik/paling datar. Aksis jantung berada tepat <strong>90 derajat</strong> dari sadapan tersebut mengarah ke sadapan yang positif.</p>
                                                </div>
                                                <div className="bg-slate-50 p-2 rounded border border-slate-200">
                                                    <p className="font-bold text-slate-800">Three Lead Analysis:</p>
                                                    <p>Jika Lead I (+) dan aVF (-), lihat Lead II. Jika Lead II (+), maka aksis fisiologis. Jika Lead II (-), maka <strong>LAD Patologis</strong>.</p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {mode === 'limb' && diagnosis.type === 'LAD' && (
                                        <div className="space-y-2">
                                            <p className="font-bold text-slate-800 text-sm">Left Axis Deviation (LAD)</p>
                                            <p>Aksis QRS kurang dari -30°. Metode Kuadran: Lead I (+), Lead aVF (-), dan <strong>Lead II (-)</strong>.</p>
                                            <div className="bg-indigo-50/80 border-l-2 border-indigo-500 p-2 rounded-r-lg">
                                                <p className="font-bold text-indigo-900 mb-0.5">Etiologi Klinis (LITFL):</p>
                                                <p className="text-indigo-800">Left Ventricular Hypertrophy (LVH), LBBB, Inferior MI, Ventricular pacing/ectopy, Wolff-Parkinson-White Syndrome, Left Anterior Fascicular Block (LAFB), Primum ASD.</p>
                                            </div>
                                        </div>
                                    )}

                                    {mode === 'limb' && diagnosis.type === 'RAD' && (
                                        <div className="space-y-2">
                                            <p className="font-bold text-slate-800 text-sm">Right Axis Deviation (RAD)</p>
                                            <p>Aksis QRS lebih dari +90°. Metode Kuadran: Lead I (-), Lead aVF (+).</p>
                                            <div className="bg-indigo-50/80 border-l-2 border-indigo-500 p-2 rounded-r-lg">
                                                <p className="font-bold text-indigo-900 mb-0.5">Etiologi Klinis (LITFL):</p>
                                                <p className="text-indigo-800">Right Ventricular Hypertrophy (RVH), Acute RV strain (cth: Emboli Paru), Lateral STEMI, COPD, Hyperkalemia, TCA poisoning, Dextrocardia, Secundum ASD, Left Posterior Fascicular Block (LPFB).</p>
                                            </div>
                                        </div>
                                    )}

                                    {mode === 'limb' && diagnosis.type === 'EXTREME_AXIS' && (
                                        <div className="space-y-2">
                                            <p className="font-bold text-slate-800 text-sm">Extreme Axis Deviation (Northwest Axis)</p>
                                            <p>Aksis QRS antara -90° hingga -180°. Metode Kuadran: <strong>Lead I (-)</strong> dan <strong>Lead aVF (-)</strong>.</p>
                                            <div className="bg-rose-50/80 border-l-2 border-rose-500 p-2 rounded-r-lg">
                                                <p className="font-bold text-rose-900 mb-0.5">Etiologi Klinis Kritis (LITFL):</p>
                                                <p className="text-rose-800">Ventricular Tachycardia (VT), Accelerated Idioventricular Rhythm (AIVR), Hiperkalemia ekstrim, atau RVH yang sangat berat.</p>
                                            </div>
                                        </div>
                                    )}

                                    {diagnosis.type === 'LA_RA_SWAP' && (
                                        <div className="space-y-2 md:space-y-3">
                                            <p>Segitiga Einthoven terbalik (flip) 180° secara horizontal di sekitar sumbu (aksis) Lead aVF.</p>
                                            <div className="bg-amber-50 border-l-2 border-amber-500 p-2 rounded-r-lg">
                                                <p className="font-bold text-amber-900 mb-0.5">Mirip Dextrocardia!</p>
                                                <p className="text-amber-800">Pembeda utamanya: pada Dextrocardia sejati, progresi R di prekordial akan terbalik. Pada salah pasang ini (Reversal), progresi V1-V6 tetap normal.</p>
                                            </div>
                                        </div>
                                    )}

                                    {diagnosis.type === 'LA_LL_SWAP' && (
                                        <div className="space-y-2 md:space-y-3">
                                            <p>Segitiga Einthoven berputar (rotate) 180° vertikal pada sumbu Lead aVR.</p>
                                            <p>Lead III terbalik total. <strong>Ciri khas (LITFL):</strong> Gelombang P secara tak terduga tampak lebih besar di Lead I dibandingkan Lead II.</p>
                                        </div>
                                    )}

                                    {diagnosis.type === 'RA_LL_SWAP' && (
                                        <div className="space-y-2 md:space-y-3">
                                            <p>Segitiga Einthoven berputar (rotate) 180° vertikal pada sumbu Lead aVL.</p>
                                            <p>Sadapan I, II, III, dan aVF semuanya terbalik total. Sebaliknya, aVR yang normalnya negatif, menjadi tegak (upright).</p>
                                        </div>
                                    )}

                                    {diagnosis.type === 'HIGH_LL' && (
                                        <p>Elektroda tungkai ditarik terlalu tinggi membuat Segitiga memipih vertikal. Lead II, III, aVF akan mengalami penurunan amplitudo drastis (Low Voltage).</p>
                                    )}
                                    {diagnosis.type === 'LOW_ARM' && (
                                        <p>Elektroda lengan ditarik terlalu bawah membuat Segitiga memipih horizontal. Amplitudo Lead I sangat terdistorsi atau menghilang.</p>
                                    )}

                                    {/* --- KONTEN EDUKASI KHUSUS MODE PRECORDIAL --- */}
                                    {mode === 'precordial' && diagnosis.status === 'normal' && (
                                        <div className="space-y-3">
                                            <p>Sadapan V1-V6 merekam depolarisasi ventrikel secara horizontal. Normalnya, progresi gelombang R berangsur membesar dari V1 hingga mencapai transisi puncaknya di V4 atau V5.</p>
                                            <div className="bg-indigo-50 border border-indigo-100 p-2 rounded-lg text-indigo-900">
                                                <p className="font-bold mb-1">💡 Tips Simulasi:</p>
                                                <p>Tarik V1 atau V2 naik ke atas (ICS 2) untuk melihat efek terciptanya pola rSr' palsu (Pseudo-RBBB) akibat distorsi sudut pandang elektroda.</p>
                                            </div>
                                        </div>
                                    )}

                                    {diagnosis.type === 'OUT_OF_SEQUENCE' && (
                                        <div className="bg-rose-50/80 border-l-2 border-rose-500 p-2 md:p-3 rounded-r-lg">
                                            <p className="font-bold text-rose-900 mb-0.5">Progresi Gelombang R Kacau</p>
                                            <p className="text-rose-800">Menyilangkan posisi elektroda (misal V3 tertukar letaknya dengan V2) akan merusak perekaman progresi R normal. Sangat sering memunculkan diagnosis palsu seperti <em>Poor R-Wave Progression</em> (PRWP) atau <em>Anterior MI</em>.</p>
                                        </div>
                                    )}

                                    {diagnosis.type === 'HIGH_V1' && (
                                        <div className="bg-amber-50/80 border-l-2 border-amber-500 p-2 md:p-3 rounded-r-lg space-y-1">
                                            <h4 className="font-bold text-amber-900">Fenomena Pseudo-RBBB</h4>
                                            <p className="text-amber-800">Jika V1/V2 diletakkan terlalu tinggi (ICS 2), elektroda "melihat" alur keluar ventrikel kanan (RVOT) langsung dari atas. Ini mendistorsi gelombang normal menjadi pola <strong>rSr' palsu</strong>.</p>
                                        </div>
                                    )}

                                    {diagnosis.type === 'LOW_V1' && (
                                        <p>V1/V2 diletakkan terlalu inferior akan merekam aktivitas septum dari sudut yang salah. Gelombang P menjadi negatif, mendistorsi QRS menyerupai iskemik dinding inferior.</p>
                                    )}

                                    {diagnosis.type === 'LOW_V6' && (
                                        <p><strong>Low Voltage Lateral:</strong> Menggeser V5/V6 terlalu jauh menjauhi jantung membuat sudut (θ) tegak lurus (90°). Berdasarkan dot product vektor, QRS menjadi sangat mendatar.</p>
                                    )}

                                    {diagnosis.type === 'HIGH_V6' && (
                                        <p>Penempatan lateral (V5/V6) terlalu superior menjauhi sumbu vektor massa ventrikel kiri. Dapat memunculkan gelombang Q lateral palsu atau inversi gelombang T.</p>
                                    )}

                                    {diagnosis.type === 'DEVIATED_PRECORDIAL' && (
                                        <p>Pergeseran aksis elektroda prekordial massal menjauhi ICS ideal mendistorsi perekaman kelistrikan jantung, menghambat progresi gelombang R yang normal.</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
