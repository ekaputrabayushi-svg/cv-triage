    <script>
        const originalCards = [
            {
                cat: "Vital Sign Trap",
                q: "Seorang pria 25 tahun dibawa ke IGD setelah menabrak pohon dengan motor kecepatan tinggi. Ia tampak sadar penuh, bisa diajak bercanda, dan meminta pulang. Tanda vital: <strong>Tekanan Darah 120/95 mmHg</strong>, Nadi 115x/menit, RR 20x/menit, CRT 3 detik. Keluarga mendesak pulang karena menganggap 'tensinya normal'.<br><br>Parameter hemodinamik tersembunyi apa dari data di atas yang harus Anda waspadai agar tidak tertipu?",
                a: `<strong>Perhatikan <em>pulse pressure</em> (tekanan nadi) yang menyempit.</strong><br><br>Syok hemoragik awal dapat tetap mempertahankan tekanan sistolik melalui aktivasi simpatis, tetapi diastolik sering naik akibat vasokonstriksi sehingga selisih sistolik-diastolik menyempit (120 - 95 = 25 mmHg). Angka 120 mmHg pada sistolik belum otomatis berarti perfusi aman.<ul><li>Hitung selisih sistolik-diastolik (< 30-40 mmHg adalah red flag).</li><li>Bandingkan dengan takikardia, warna kulit, CRT lambat, dan mekanisme trauma.</li><li>Pikirkan perdarahan tersembunyi berlanjut.</li></ul><div class="trick-box"><strong>Workaround:</strong> Jangan puas dengan label “tensi normal”; integrasikan pulse pressure, shock index, dan cegah pasien pulang sebelum observasi ketat.</div>`
            },
            {
                cat: "Relative Bradycardia",
                q: "Pria 40 tahun datang dengan jejas sabuk pengaman di perut pasca kecelakaan mobil. Pasien gelisah, akral sangat dingin, CRT 4 detik. Tanda vital: TD 80/50 mmHg. Anehnya, EKG monitor menunjukkan Irama Sinus dengan <strong>Heart Rate hanya 62x/menit.</strong><br><br>Apakah tidak adanya takikardia dapat menyingkirkan diagnosis syok perdarahan masif pada pasien ini?",
                a: `<strong>Tidak.</strong><br><br>Pada perdarahan tertentu dapat muncul bradikardia relatif karena refleks vagal (misal: refleks Bezold-Jarisch), terutama pada perdarahan intraabdomen masif, stimulasi peritoneal, atau fase terminal dari dekompensasi syok.<ul><li>Nadi “normal” atau lambat tidak boleh menenangkan bila perfusi sangat buruk.</li><li>Hipotensi + trauma abdomen tumpul signifikan tetap harus dianggap hemoperitoneum masif sampai terbukti sebaliknya.</li><li>Periksa sumber perdarahan (FAST/DPL bila ada).</li></ul><div class="trick-box"><strong>Workaround:</strong> Bila cerita klinis (trauma energi tinggi, akral dingin) mendukung, perlakukan sebagai syok hemoragik tanpa peduli nadinya tidak takikardi.</div>`
            },
            {
                cat: "Lactate Proxy",
                q: "Seorang wanita 65 tahun dirawat di fasilitas primer dengan suspek urosepsis. Ia tampak apatis. TD 90/55 mmHg, HR 110x/menit. Fasilitas Anda <strong>tidak memiliki alat pemeriksa Laktat Darah</strong> maupun fasilitas AGD.<br><br>Tanda klinis *bedside* sederhana apa yang dapat Anda pantau sebagai proksi untuk menilai beratnya hipoperfusi/mikrosirkulasi yang buruk?",
                a: `<strong>Mottling score, suhu akral, dan pemanjangan CRT.</strong><br><br>Ketiga tanda klinis ini tidak menggantikan angka mutlak laktat, tetapi terbukti secara literatur sangat valid sebagai proksi bedside untuk menilai gangguan mikrosirkulasi perifer.<ul><li>Lihat bercak marbling atau <em>mottling</em> (bercak keunguan seperti jala) di sekitar lutut yang meluas.</li><li>Raba batas suhu akral dingin, bandingkan dengan batang tubuh.</li><li>Ulangi evaluasi CRT secara serial.</li></ul><div class="trick-box"><strong>Workaround:</strong> Dokumentasikan waktu, skor mottling, dan perubahan perfusi serial di rekam medis agar dokter RS rujukan mendapat gambaran jelas evolusi syoknya.</div>`
            },
            {
                cat: "Fluid Challenge",
                q: "Laki-laki 55 tahun dengan syok tak teridentifikasi direncakan mendapat *fluid challenge*. Perawat memasang infus Ringer Laktat 500 mL dan <strong>dihabiskan secara perlahan (di-drip) selama 2 jam.</strong> Setelah cairan habis, TD tetap 85/50 mmHg.<br><br>Bolehkah Anda menyimpulkan bahwa pasien ini adalah seorang *fluid non-responder*?",
                a: `<strong>Belum tentu. Kesimpulan tersebut tidak valid.</strong><br><br>Fluid challenge bertujuan menguji apakah tambahan preload yang *cepat* mampu meregangkan miokard dan memperbaiki curah jantung (Hukum Frank-Starling). Bila 500 cc diberikan terlalu lambat (2 jam), efek regangan bolus tercampur dengan redistribusi cairan ke ekstravaskular dan eliminasi ginjal.<ul><li>Bolus tantangan cairan harus diberikan dalam waktu singkat (contoh: 250-500 cc dalam 15-30 menit).</li><li>Nilai ulang parameter hemodinamik <em>segera</em> sesudahnya.</li><li>Waspadai overload pada pasien gagal jantung.</li></ul><div class="trick-box"><strong>Workaround:</strong> Gunakan bolus cepat dan terukur (fluid challenge sesungguhnya) dengan target re-evaluasi yang jelas, bukan drip lambat tanpa titik penilaian.</div>`
            },
            {
                cat: "PLR Trap",
                q: "Untuk menilai responsivitas cairan pada pasien syok sepsis, Anda memutuskan melakukan <em>Passive Leg Raising</em> (PLR). Posisi awal pasien adalah <strong>setengah duduk (elevasi kepala 45 derajat)</strong>. Anda kemudian <strong>langsung mengangkat kedua tungkainya</strong> ke udara sambil membiarkan posisi kepalanya tetap setengah duduk.<br><br>Mengapa teknik PLR seperti ini sering memberikan hasil negatif palsu yang menyesatkan?",
                a: `<strong>Karena manuver reposisi batang tubuhnya salah.</strong><br><br>PLR bekerja sebagai "autotransfusi" ~300cc dari tungkai dan organ splanknik ke intratorakal. Bila batang tubuh tetap tegak (kepala tetap di atas), darah splanknik tidak turun ke dada secara maksimal akibat gravitasi, sehingga *venous return* gagal meningkat.<ul><li>PLR harus dimulai dari semi-recumbent (45 derajat).</li><li>Lalu <strong>rebahkan batang tubuh/kepala menjadi datar (0 derajat)</strong> BERSAMAAN dengan mengangkat tungkai 45 derajat.</li><li>Evaluasi perubahan perfusi (Nadi, Pulse Pressure) maksimal dalam 1-2 menit.</li></ul><div class="trick-box"><strong>Workaround:</strong> Standarkan teknik PLR di tim IGD Anda: turunkan kepala dan naikkan kaki serentak. Evaluasi segera, jangan tunggu 10 menit.</div>`
            },
            {
                cat: "Permissive Hypotension",
                q: "Laki-laki 30 tahun tiba di IGD dengan luka tusuk multipel di abdomen. Pasien tampak sangat pucat, akral dingin, Nadi 130x/menit, TD awal 70/40 mmHg. <strong>Tidak ada tanda cedera kepala.</strong> Setelah loading 500 cc RL, nadi sentral kuat, pasien bisa menjawab pertanyaan, dan <strong>TD menjadi 85/55 mmHg.</strong><br><br>Haruskah Anda agresif memberikan guyuran cairan berikutnya untuk mencapai target tensi normal (120/80 mmHg) sebelum merujuk pasien?",
                a: `<strong>Tidak selalu (Terapkan Hipotensi Permisif).</strong><br><br>Pada trauma penetrasi (perdarahan internal aktif) tanpa cedera kepala, <em>over-resuscitation</em> dengan kristaloid dapat merontokkan bekuan darah (clot) rapuh yang sedang terbentuk, memicu hemodilusi faktor koagulasi, dan justru memperderas laju perdarahan aktif di dalam perut.<ul><li>Normotensi penuh (120/80) bukan target di fase pre-operatif syok hemoragik.</li><li>Target cairan seringkali cukup mencapai nadi sentral teraba, status mental membaik, atau sistolik 80-90 mmHg.</li><li>Prioritas absolut adalah merujuk cepat untuk laparotomi (source control).</li></ul><div class="trick-box"><strong>Workaround:</strong> Pahami hipotensi permisif sebagai 'jembatan' menjaga pasien tetap hidup menuju kamar operasi, bukan alasan bersantai di IGD.</div>`
            },
            {
                cat: "Crystalloid Choice",
                q: "Seorang pasien syok hemoragik berat pasca kecelakaan lalu lintas telah diresusitasi dengan <strong>4 liter NaCl 0,9% (Normal Saline)</strong> di fasilitas Anda sambil menunggu evakuasi rujukan. Pasien kini mengeluh napas semakin sesak dan dalam (Kussmaul), laju napas 32x/menit.<br><br>Komplikasi metabolik spesifik iatrogenik apa yang paling mungkin Anda picu dari resusitasi ini?",
                a: `<strong>Asidosis Metabolik Hiperkloremik.</strong><br><br>NaCl 0,9% memiliki kandungan Klorida (Cl) yang un-fisiologis (154 mEq/L). Beban klorida masif ini akan menggeser keseimbangan *strong ion difference* (SID), memicu asidosis metabolik non-anion gap (hiperkloremik). Hal ini justru memperburuk asidosis laktat bawaan pasien dari syok hemoragiknya.<ul><li>Asidosis tambahan menekan kontraktilitas miokard dan memicu takipnea berat.</li><li>Pada resusitasi volume >2 Liter, <em>balanced crystalloid</em> (seperti Ringer Laktat atau Asering) lebih diutamakan jika tersedia.</li></ul><div class="trick-box"><strong>Workaround:</strong> Bila terpaksa hanya ada NaCl 0,9%, pakailah seperlunya hingga perfusi minimal tercapai, dan segerakan rujukan sebelum butuh volume raksasa.</div>`
            },
            {
                cat: "TXA Window",
                q: "Pekerja pabrik 45 tahun mengalami amputasi paha traumatik parsial akibat mesin. Ia sempat dibawa ke klinik desa sebelum akhirnya tiba di fasilitas Anda <strong>sekitar 4 jam pasca kejadian.</strong> TD 85/50 mmHg. Perdarahan tampak masih merembes.<br><br>Sesuai protokol trauma terkini, apakah Anda harus memberikan bolus Asam Traneksamat (TXA) 1 gram IV saat ini?",
                a: `<strong>TIDAK. Hindari pemberian TXA jika sudah >3 jam.</strong><br><br>Studi besar (CRASH-2) membuktikan TXA menyelamatkan nyawa jika diberikan secepatnya, terutama dalam 3 jam pertama. Namun, bila diberikan <strong>melewati jendela 3 jam</strong>, profil risiko bergeser dan justru terbukti meningkatkan mortalitas (kemungkinan akibat risiko trombotik lambat atau perburukan DIC).<ul><li>Gali informasi 'jam kejadian' (Time of Injury) secara spesifik.</li><li>Bila ragu kejadiannya sudah >3 jam, jangan berikan TXA.</li><li>Fokus pada kontrol mekanik perdarahan dan resusitasi darah/cairan.</li></ul><div class="trick-box"><strong>Workaround:</strong> Masukkan pertanyaan “Kecelakaannya jam berapa persisnya?” di detik pertama anamnesis trauma.</div>`
            },
            {
                cat: "Pelvic Binder",
                q: "Pria 50 tahun jatuh dari atap setinggi 4 meter. Terdapat jejas di panggul, instabilitas (+) *suspek open-book pelvic fracture*, skrotum bengkak kebiruan. TD 80/40 mmHg. Fasilitas Anda tidak memiliki *pelvic binder* komersial, sehingga Anda <strong>menyiapkan kain sprei tebal</strong> untuk membebat panggul.<br><br>Di titik penanda anatomi manakah pusat tarikan kain sprei tersebut harus diposisikan?",
                a: `<strong>Tepat di level Trokanter Mayor (Bonggol Tulang Paha atas).</strong><br><br>Kesalahan paling umum dan fatal adalah memasang binder terlalu tinggi di atas Krista Iliaka (pinggang/perut bawah). Posisi yang salah tidak akan menutup cincin pelvis depan, malah berisiko mendesak fragmen tulang masuk. Tarikan setinggi Trokanter Mayor memberikan vektor biomekanik terbaik menutup cincin *open-book*.<ul><li>Raba tulang menonjol di sisi luar paha atas (Trokanter Mayor).</li><li>Posisikan titik tengah sprei/binder di sana, lalu ikat menyilang seketat mungkin.</li><li>Ikat lutut/mata kaki (internal rotasi) untuk mengoptimalkan penutupan cincin pelvis.</li></ul><div class="trick-box"><strong>Workaround:</strong> Sebelum melingkarkan kain, posisikan tangan Anda di pinggir luar kedua paha pasien; raba trokanternya, di situlah pusat bebatan.</div>`
            },
            {
                cat: "Chest Bleeding",
                q: "Laki-laki 28 tahun tiba setelah ditusuk di dada kanan. Ia sesak napas berat dan syok (TD 70/50 mmHg). Inspeksi: dada kanan tertinggal. Auskultasi: suara napas kanan menghilang. <strong>Perkusi: REDUP (Dullness) yang sangat jelas di paru kanan.</strong> Trakea di tengah.<br><br>Jebakan kognitif apa yang sering membuat dokter IGD salah menangani klinis ini dengan melakukan *needle thoracostomy*?",
                a: `<strong>Salah membedakan Hemotoraks Masif dengan Tension Pneumotoraks.</strong><br><br>Keduanya menyebabkan syok obstruktif/hipovolemik dan hilangnya suara napas. Kunci pembedanya di ranah klinis tanpa rontgen adalah <strong>PERKUSI</strong>. Perkusi redup (dull) konsisten dengan akumulasi cairan/darah (Hemotoraks Masif). Menusukkan jarum (*needle thoracostomy*) pada hemotoraks tidak akan menolong dan justru menunda intervensi yang benar (Chest Tube 28-32 Fr dan persiapan transfusi).<ul><li>Suara napas turun + Perkusi Hipersonor = Udara (Pneumotoraks).</li><li>Suara napas turun + Perkusi Redup = Cairan/Darah (Hemotoraks).</li></ul><div class="trick-box"><strong>Workaround:</strong> Jangan melompat pasang jarum dekompresi hanya karena "suara napas hilang". Luangkan 2 detik untuk perkusi dinding dada!</div>`
            },
            {
                cat: "Tension Pneumothorax",
                q: "Wanita 22 tahun penumpang mobil KLL mengalami benturan dada ke dashboard. Tiba di IGD merintih sesak. TD 75/Palpasi, Nadi 145x/menit lemah. <strong>Vena leher tampak distensi (JVP naik), trakea terdorong ke kiri, dada kanan cembung dengan suara napas hilang dan perkusi hipersonor.</strong><br><br>Tindakan penyelamatan nyawa (*life-saving*) apa yang HARUS segera dilakukan TANPA menunggu hasil rontgen toraks?",
                a: `<strong>Dekompresi Jarum (*Needle Thoracocentesis*) / *Finger Thoracostomy* segera di dada kanan.</strong><br><br>Ini adalah tanda klasik Tension Pneumotoraks. Udara terus masuk ke rongga pleura tanpa bisa keluar, menekan mediastinum, dan memblokir *venous return* ke jantung (syok obstruktif mendadak). Menunggu foto rontgen pada kondisi syok ini adalah malpraktik karena pasien bisa henti jantung (PEA) dalam hitungan menit.<ul><li>Hipersonor + JVP naik + Trakea deviasi = Tension Pneumotoraks Klinis.</li><li>Lakukan dekompresi di ICS 5 Mid-Axillary Line (protokol ATLS terbaru) atau ICS 2 Mid-Clavicular Line.</li><li>Susul dengan pemasangan definitif *Chest Tube*.</li></ul><div class="trick-box"><strong>Workaround:</strong> Bila syok dan klinis sangat khas, foto toraks adalah buang waktu. Dekompresi adalah langkah diagnostik sekaligus terapeutik.</div>`
            },
            {
                cat: "Obstructive Shock",
                q: "Seorang wanita 35 tahun pasca operasi ortopedi tulang panjang mendadak kolaps di bangsal. TD 80/50 mmHg, Nadi 125x/menit, RR 30x/menit, saturasi 82%. <strong>JVP tampak sangat meningkat (distensi vena leher), namun tidak ada tanda perdarahan sama sekali.</strong><br><br>Secara patofisiologis, apa yang membedakan syok pada pasien ini dari syok hipovolemik biasa?",
                a: `<strong>Ini Syok Obstruktif (suspek Emboli Paru Masif). Darah ada, tapi alirannya terhambat.</strong><br><br>Berbeda dengan syok hipovolemik di mana pipanya kosong (volume darah kurang), pada syok obstruktif volume darah cukup/penuh, namun ada sumbatan mekanis pada pengisian atau pengosongan jantung (dalam kasus ini sumbatan di arteri pulmonalis). Ini membuat darah menumpuk di kanan (JVP naik) dan gagal mengisi jantung kiri (hipotensi).<ul><li>Syok Hipovolemik: JVP kolaps, vena-vena kempes.</li><li>Syok Obstruktif: JVP distensi di tengah hipotensi mendadak.</li><li>Loading cairan masif tidak menyembuhkan, bahkan bisa over-distensi ventrikel kanan.</li></ul><div class="trick-box"><strong>Workaround:</strong> Jika pasien kolaps mendadak dengan urat leher menonjol, setop pikirkan dehidrasi. Pikirkan: Jantung tercekik (tamponade/tension) atau tertutup (emboli paru).</div>`
            },
            {
                cat: "Sepsis Hidden",
                q: "Seorang kakek 78 tahun dibawa keluarga ke klinik karena sejak semalam tidak mau makan, tampak linglung, dan napasnya agak cepat (26x/menit). <strong>Suhu tubuh di termometer 36.1°C (tidak demam)</strong>. TD 90/50 mmHg. Keluarga yakin ini bukan infeksi karena kakek tidak panas.<br><br>Mengapa kakek ini tetap sangat berisiko mengalami Syok Sepsis yang tersembunyi?",
                a: `<strong>Karena respons imun dan regulasi suhu lansia sering tumpul (Afebris).</strong><br><br>Tidak adanya demam sama sekali tidak menyingkirkan sepsis pada populasi geriatri, pasien imunokompromais, atau gagal ginjal kronik. Manifestasi infeksi pada lansia seringkali atipikal: delirium (bingung mendadak), takipnea (bernapas cepat), letargi, atau hipotensi mendadak tanpa keluhan lokalisata.<ul><li>Takipnea sering merupakan kompensasi awal asidosis metabolik akibat sepsis.</li><li>Suhu hipotermia (<36°C) pada sepsis justru penanda prognosis buruk.</li><li>Lacak sumber infeksi (paru, urin, kulit, abdomen).</li></ul><div class="trick-box"><strong>Workaround:</strong> Ubah mindset triage lansia: Jangan tanya “Ada demam atau tidak?”, tapi tanyakan “Ada perubahan mental/napas mendadak dari baseline atau tidak?”.</div>`
            },
            {
                cat: "Sepsis Bundle",
                q: "Pria 60 tahun dengan batuk purulen datang somnolen. TD 80/40 mmHg, HR 120x/menit, RR 28x/menit, Suhu 39°C. Kecurigaan ke arah Syok Sepsis ec Pneumonia sangat kuat. Saat Anda mengedukasi keluarga untuk persiapan rujukan, terapi belum diberikan karena menunggu hasil lab darah lengkap yang baru jadi 1 jam lagi.<br><br>Tiga prioritas awal (*bundle*) apa yang <strong>pantang ditunda</strong> sambil menunggu pasien berangkat rujuk?",
                a: `<strong>1. Resusitasi Cairan IV, 2. Ambil Kultur Darah (jika bisa), 3. Antibiotik Empiris Spektrum Luas IV.</strong><br><br>Menunggu hasil lab rutin (leukosit) untuk memulai terapi sepsis adalah kesalahan fatal. Sepsis adalah kegawatdaruratan yang setara dengan infark miokard atau stroke. Keterlambatan antibiotik setiap jamnya meningkatkan mortalitas secara signifikan.<ul><li>Mulai cairan kristaloid bolus (target 30cc/kgBB bila tidak ada kontraindikasi) via akses IV besar.</li><li>Berikan injeksi antibiotik empiris pertama di FKTP sebelum merujuk.</li><li>Kultur idealnya diambil sebelum antibiotik masuk, JIKA tidak menunda terapi (>45 menit).</li></ul><div class="trick-box"><strong>Workaround:</strong> Buat "Sepsis Box" di IGD. Jika dokter mencurigai syok sepsis, obat antibiotik dosis pertama dan cairan harus masuk dalam jam pertama (Golden Hour).</div>`
            },
            {
                cat: "CHF + Sepsis",
                q: "Wanita 65 tahun dengan riwayat Gagal Jantung Kongestif (Ejection Fraction 30%) datang dengan demam 39°C, urosepsis, dan tensi jatuh (TD 80/50 mmHg). Auskultasi dada menunjukkan <strong>ronki basah halus di kedua basal paru.</strong> Pasien membutuhkan resusitasi hemodinamik.<br><br>Bagaimana prinsip *fluid challenge* (pemberian cairan) yang paling aman pada dilema klinis ini?",
                a: `<strong>Gunakan <em>Micro-Fluid Challenge</em> dengan bolus kecil bertahap dan re-evaluasi paru sangat ketat.</strong><br><br>Memberikan cairan 30 cc/kgBB sekaligus pada pasien gagal jantung dengan ronki akan berujung pada edema paru akut yang fatal. Namun, menahan cairan sepenuhnya saat syok sepsis juga salah karena sepsis menyebabkan hipovolemia relatif (vasodilatasi & kebocoran kapiler).<ul><li>Berikan bolus kecil: 200 - 250 mL kristaloid selama 15 menit.</li><li>Segera dengarkan ulang paru-paru dan nilai oksigenasi.</li><li>Bila ronki bertambah atau saturasi turun -> STOP cairan, mulai pertimbangkan Vasopresor dini (Norepinefrin).</li><li>Bila hemodinamik membaik tanpa perburukan napas -> Ulangi bolus kecil hati-hati.</li></ul><div class="trick-box"><strong>Workaround:</strong> Cairan pada pasien CHF ibarat menyetir di jalan bersalju: injak gas (infus) sedikit-sedikit, kalau mulai slip (ronki/sesak), langsung lepas gas!</div>`
            },
            {
                cat: "Anaphylaxis",
                q: "Pemuda 20 tahun mendadak sesak, stridor, urtikaria seluruh tubuh, dan kolaps (TD 70/palpasi) 5 menit setelah disuntik antibiotik seftriakson. Diagnosis Syok Anafilaksis ditegakkan. Perawat panik dan bertanya, 'Dok, epinefrinnya dioplos dengan cairan infus atau disuntik langsung ke pembuluh darah vena?'<br><br>Instruksi rute dan lokasi penyuntikan Epinefrin awal apa yang paling cepat dan aman di FKTP?",
                a: `<strong>Suntikkan Epinefrin 1:1000 secara INTRAMUSKULAR (IM) di paha anterolateral (vastus lateralis) bagian tengah.</strong><br><br>Dosisnya 0.3 - 0.5 mg (dewasa). Kesalahan paling fatal di IGD awal adalah membuang waktu mencari akses IV pada pasien syok yang venanya kolaps, atau menyuntikkan epinefrin 1:1000 pekat langsung secara bolus intravena (IV) yang dapat memicu fibrilasi ventrikel atau infark miokard fatal.<ul><li>Suntikan IM di paha anterolateral menyerap jauh lebih cepat daripada di lengan (deltoid).</li><li>Tidak perlu menunggu akses IV terpasang. Langsung tusuk di atas celana bila darurat.</li><li>Bila tidak membaik, dosis IM dapat diulang tiap 5-15 menit.</li></ul><div class="trick-box"><strong>Workaround:</strong> Teriakkan "Epinefrin 0.5 mili IM di paha sekarang!" Jangan biarkan perawat bingung mencari vena untuk jalur obat penyelamat ini.</div>`
            },
            {
                cat: "Beta-blocker Effect",
                q: "Pria 55 tahun mengalami anafilaksis berat setelah disengat lebah. Anda telah menyuntikkan Epinefrin IM dua kali dengan jeda 5 menit, dan melakukan resusitasi cairan agresif, namun <strong>pasien tetap hipotensi refrakter (TD 70/40) dan bronkospasme berat.</strong> Dari riwayat keluarga, pasien ternyata rutin mengonsumsi Bisoprolol (Beta-blocker) untuk hipertensinya.<br><br>Mengapa riwayat obat ini penting, dan terapi *antidote* alternatif apa yang perlu dipikirkan?",
                a: `<strong>Beta-blocker menumpulkan kerja reseptor beta dari epinefrin, sehingga syok anafilaksis menjadi refrakter.</strong><br><br>Epinefrin bekerja lewat reseptor alfa (vasokonstriksi) dan beta (inotropik jantung & bronkodilatasi paru). Jika pasien minum beta-blocker, efek penyembuh (beta) dari epinefrin terblokade. Akibatnya pasien tampak tidak merespons pengobatan standar.<ul><li>Riwayat konsumsi obat antihipertensi wajib ditanyakan saat syok anafilaksis gagal membaik.</li><li>Antidote pilihan pada kasus anafilaksis dengan beta-blocker adalah <strong>Glukagon</strong> (bekerja via reseptor independen beta meningkatkan cAMP miokard).</li></ul><div class="trick-box"><strong>Workaround:</strong> Saat 2 dosis epinefrin IM gagal, pikirkan 2 hal: Cairannya kurang masif, ATAU pasien pakai Beta-Blocker. Segera persiapkan rujukan ICU.</div>`
            },
            {
                cat: "Neurogenic vs Hemorrhagic",
                q: "Pria 25 tahun jatuh dari pohon kepala duluan, mengeluh lengan dan tungkainya lumpuh. Terdapat jejas deformitas di leher (suspek cedera servikal). Pasien hipotensi (TD 85/50 mmHg). Anda ingin membedakan apakah ini Syok Neurogenik atau ada ko-eksistensi Syok Hemoragik dari perdarahan organ dalam.<br><br>Tanda vital dan fisik sederhana apa yang membedakan profil kedua syok ini?",
                a: `<strong>Suhu akral (kulit) dan respons denyut nadi (Heart Rate).</strong><br><br>Syok Neurogenik terjadi karena putusnya jaras simpatis servikal ke bawah. Akibatnya pembuluh darah vasodilatasi total (kulit teraba <strong>HANGAT</strong> dan kemerahan di bawah level lesi) dan hilangnya inervasi simpatis jantung menyebabkan <strong>BRADIKARDIA</strong> relatif meskipun tekanan darah rendah.<br>Syok Hemoragik memicu kompensasi simpatis masif: kulit menjadi <strong>DINGIN/PUCAT</strong> basah, dan nadi menjadi <strong>TAKIKARDIA</strong> hebat.<ul><li>Hati-hati: Pasien trauma multipel bisa mengalami <em>mixed shock</em> (Neurogenik + Hemoragik).</li><li>Cairan IV tetap lini pertama, tetapi neurogenik sering cepat butuh vasopresor.</li></ul><div class="trick-box"><strong>Workaround:</strong> Pegang kaki pasien hipotensi cedera servikal. Kalau dingin dan nadinya 130x/mnt, JANGAN asumsikan itu murni neurogenik! Cari sumber perdarahan.</div>`
            },
            {
                cat: "Cardiogenic Shock",
                q: "Pria 60 tahun dibawa karena nyeri dada kiri tembus punggung sejak 2 jam lalu. Di IGD, pasien tampak pucat, berkeringat dingin, oliguria. TD 80/50 mmHg, Nadi 110x/menit. JVP meningkat. <strong>Tidak ada riwayat muntah, diare, atau perdarahan.</strong><br><br>Meskipun volume darah intravaskularnya normal atau bahkan berlebih, mengapa perfusi organ pasien ini hancur (Syok Kardiogenik)?",
                a: `<strong>Karena mesin pompanya (jantung) gagal menghasilkan <em>Cardiac Output</em> (Curah Jantung) yang adekuat.</strong><br><br>Pada Syok Kardiogenik (paling sering akibat Infark Miokard Akut Luas), otot ventrikel kiri rusak parah sehingga tidak mampu memompa darah ke depan (<em>forward failure</em>). Darah mengantre di belakang jantung (kongesti paru/JVP naik) sementara organ distal kelaparan oksigen (hipoperfusi).<ul><li>Masalahnya bukan di 'tangki bensin' (cairan), melainkan di 'mesin pompa'.</li><li>Pemberian bolus cairan agresif di sini setara dengan menenggelamkan pasien ke dalam paru-parunya sendiri.</li><li>Identifikasi penyebab (EKG: STEMI?) dan dukung pompa (Inotropik) / atasi iskemik (Reperfusi).</li></ul><div class="trick-box"><strong>Workaround:</strong> Sebelum mengguyur pasien syok di IGD, dengarkan dulu bunyi jantung dan parunya, lihat lehernya. Pompa lemah dilarang diguyur!</div>`
            },
            {
                cat: "RV Infarct",
                q: "Pria 55 tahun datang dengan keluhan nyeri dada khas infark. EKG awal menunjukkan <strong>STEMI Inferior</strong> (Elevasi ST di II, III, aVF). Dokter bermaksud meredakan nyeri dada dan menurunkan preload dengan memberikan <strong>Nitrat (ISDN sublingual)</strong>. Sepuluh menit kemudian, TD pasien anjlok drastis menjadi 70/40 mmHg.<br><br>Jebakan patofisiologi mematikan apa yang baru saja terjadi akibat pemberian obat tersebut?",
                a: `<strong>Menghilangkan <em>preload</em> pada kasus Infark Ventrikel Kanan (RV Infarction).</strong><br><br>Sekitar sepertiga pasien STEMI inferior disertai infark ventrikel kanan (RV). RV yang iskemik/kaku sangat bergantung pada volume darah (<em>preload-dependent</em>) untuk mendorong darah ke sirkulasi paru dan jantung kiri. Nitrat mendilatasi vena, menurunkan venous return ke dada. Otomatis, RV yang rusak kehilangan daya dorongnya, dan curah jantung sistemik kolaps total.<ul><li>Jangan refleks memberi Nitrat/Morfin pada STEMI Inferior sebelum curiga/memastikan tidak ada pelibatan RV (EKG sadapan kanan: V4R).</li><li>Tanda RV Infarct: Hipotensi, Paru Bersih (Clear Lungs), JVP tinggi.</li><li>Terapi rescue: Resusitasi cairan kristaloid cepat untuk mengembalikan preload.</li></ul><div class="trick-box"><strong>Workaround:</strong> Tahan tangan Anda dari obat Nitrat/Furosemid jika melihat STEMI Inferior. Pastikan dulu paru bersih dan tensi kuat sebelum mempertimbangkannya.</div>`
            },
            {
                cat: "AF with Shock",
                q: "Wanita 70 tahun dibawa keluarga dengan keluhan pingsan sesaat dan dada berdebar kencang. Di IGD ia tampak pucat dan sesak (RR 26x/mnt). Tanda vital: <strong>TD 75/50 mmHg. EKG monitor menunjukkan Atrial Fibrilasi (AF) dengan laju ventrikel 160x/menit.</strong><br><br>Secara prioritas algoritma kegawatdaruratan, kondisi ini termasuk kategori tatalaksana apa, dan apa terapi utamanya?",
                a: `<strong>Kategori: Takikardia Tidak Stabil (Unstable Tachycardia). Terapi utama: Kardioversi Sinkron Elektrik segera.</strong><br><br>Pasien ini sedang mengalami Syok Kardiogenik akibat laju jantung yang kelewat cepat (AF RVR). Waktu diastolik memendek drastis sehingga pengisian koroner dan pengisian bilik jantung gagal, menyebabkan hipotensi dan hipoperfusi otak (pingsan).<ul><li>Keberadaan instabilitas hemodinamik (Hipotensi, syok, iskemik dada, gagal jantung akut, penurunan kesadaran) mengubah "AF biasa" menjadi kegawatan takikardia tak stabil.</li><li>Jangan membuang waktu dengan obat farmakologis kerja lambat (Amiodaron/Digoxin drip) di fase syok ini bila alat DC Shock tersedia.</li></ul><div class="trick-box"><strong>Workaround:</strong> Nadi >150x/mnt + Pasien jelek/tensi hancur = Siapkan bantalan listrik (Kardioversi). Lupakan sejenak obat-obatan ampul.</div>`
            },
            {
                cat: "Brady Shock",
                q: "Pria 65 tahun mengeluh pusing berputar hebat dan pandangan gelap saat bangun tidur. Di IGD ia tampak apatis, akral dingin berkeringat. Monitor vital menunjukkan <strong>Nadi 28x/menit dan TD 70/40 mmHg.</strong> Mesin EKG 12-lead sedang rusak dan teknisi butuh 15 menit untuk membawa cadangannya.<br><br>Apakah Anda harus menunggu rekaman EKG 12-lead untuk menentukan diagnosis ritme sebelum bertindak?",
                a: `<strong>TIDAK. Langsung tangani sebagai Bradikardia Simptomatik Tidak Stabil.</strong><br><br>Nadi sangat lambat (28x/mnt) yang sudah terbukti menyebabkan tanda hipoperfusi berat (syok, pusing, hipotensi) adalah indikasi intervensi farmakologis/elektrik emergensi. Menunggu kertas EKG rapi hanya akan memberikan pasien waktu untuk jatuh ke asistol.<ul><li>Gunakan ritme dari layar monitor bed (misal: Total AV Block) sebagai basis tindakan primer.</li><li>Suntikkan <strong>Sulfas Atropin 1 mg IV</strong> segera (bisa diulang).</li><li>Siapkan Pacing Transkutan (TCP) atau epinefrin/dopamin drip jika Atropin gagal.</li></ul><div class="trick-box"><strong>Workaround:</strong> Bila otak pasien sudah kekurangan darah akibat mesin jantung terlalu lambat, terapi butuh dimulai detik itu juga. Dokumentasi EKG 12-lead bisa menyusul.</div>`
            },
            {
                cat: "Hyperkalemia",
                q: "Pria 45 tahun penderita Gagal Ginjal Kronik yang mangkir hemodialisis selama 2 minggu dibawa ke IGD dalam kondisi lemas ekstrem dan pre-syok (TD 85/55 mmHg). Hasil laboratorium panel ginjal belum keluar. Pada monitor bedside, Anda melihat <strong>gelombang T sangat tinggi dan runcing (T-tall), disertai pelebaran kompleks QRS.</strong><br><br>Melihat gambaran EKG tersebut, terapi spesifik apa yang harus disiapkan tanpa perlu menunggu angka lab serum elektrolit?",
                a: `<strong>Terapi stabilisasi membran miokard untuk Hiperkalemia Berat (Kalsium Glukonas / Kalsium Klorida IV).</strong><br><br>Gambaran EKG T-tall plus QRS yang mulai melebar adalah fase kritis pre-henti jantung (menuju <em>sine wave</em> dan Ventrikel Fibrilasi/Asistol) akibat keracunan Kalium di sel otot jantung. Angka lab tidak mengubah fakta bahwa EKG pasien sudah menunjukkan toksisitas yang mengancam nyawa dalam hitungan menit.<ul><li>Pelebaran QRS pada hiperkalemia adalah red flag absolut.</li><li>Kalsium IV melindungi jantung secara instan (onset < 3 menit) meski tidak menurunkan kadar Kalium darah.</li><li>Susul dengan agen pemindah kalium (Insulin+Dextrose, Nebulisasi Salbutamol).</li></ul><div class="trick-box"><strong>Workaround:</strong> Di IGD, EKG adalah tes "kalium jaringan" tercepat. Pasien uremik + QRS lebar = Berikan Kalsium IV sekarang.</div>`
            },
            {
                cat: "DKA Shock",
                q: `Gadis 18 tahun dengan Diabetes Tipe 1 dibawa dengan penurunan kesadaran, napas Kussmaul berbau aseton, GDS "HI" (tak terhingga). TD 80/50 mmHg, Nadi 130x/menit, mukosa sangat kering, turgor menurun drastis. <strong>Syok pada pasien Ketoasidosis Diabetik (KAD) ini memiliki manifestasi campuran yang membingungkan.</strong><br><br>Komponen patofisiologis apa saja yang bercampur membuat tensi pasien ini jatuh?`,
                a: `<strong>Kombinasi Syok Hipovolemik (dominan), Vasodilatasi (relatif), dan kadang disfungsi kontraktilitas sekunder.</strong><br><br>KAD bukan sekadar "gula darah terlalu tinggi". Osmolaritas memicu diuresis osmotik hebat (kehilangan cairan masif lewat urin, muntah). Asidosis metabolik berat memicu dilatasi pembuluh darah (sehingga tampak seperti warm shock) sekaligus menekan pompa jantung. <ul><li>Komponen 1: Defisit volume intravaskular (bisa mencapai 5-8 Liter).</li><li>Komponen 2: Asidosis membuat vasopresor tubuh kurang efektif memvasokonstriksi pembuluh.</li><li>Seringkali infeksi (pneumonia/ISK) menjadi pemicu, menambah elemen Syok Sepsis.</li></ul><div class="trick-box"><strong>Workaround:</strong> Lihat KAD berat sebagai "Syok Hipovolemik Masif dengan Komplikasi Asam-Basa". Prioritas nol tetap sama: loading cairan isotonik segera!</div>`
            },
            {
                cat: "Burn Shock",
                q: "Pria 30 tahun menjadi korban ledakan tabung gas. Mengalami <strong>luka bakar derajat 2-3 seluas 50% TBSA (Total Body Surface Area).</strong> Tidak ada perdarahan eksternal atau trauma tembus yang tampak. Satu jam kemudian, ia mengalami takikardia 135x/menit dan TD turun perlahan menjadi 90/60 mmHg.<br><br>Mengingat tidak ada darah yang menetes ke lantai, mengapa pasien ini jatuh ke dalam syok?",
                a: `<strong>Karena kebocoran kapiler sistemik masif (Syok Hipovolemik non-hemoragik).</strong><br><br>Luka bakar luas memicu badai sitokin inflamasi. Endotel pembuluh darah seluruh tubuh kehilangan integritasnya (seperti saringan bocor). Plasma darah dan protein dalam jumlah sangat besar berpindah dari intravaskular ke ruang interstisial (ekstravaskular), menyebabkan edema masif dan menyusutnya volume sirkulasi efektif.<ul><li>Pasien kehilangan "volume sirkulasi", meski cairannya masih berada di dalam tubuhnya (di jaringan).</li><li>Syok luka bakar adalah syok hipovolemik terselubung.</li><li>Resusitasi cairan kristaloid dini (Formula Parkland/Modified Brooke) sangat krusial di 24 jam pertama.</li></ul><div class="trick-box"><strong>Workaround:</strong> Jangan menilai keamanan intravaskular luka bakar dari "bersihnya IGD dari darah". Gunakan TBSA untuk memprediksi hilangnya plasma tersembunyi.</div>`
            },
            {
                cat: "GI Bleeding",
                q: "Pria 50 tahun datang dengan keluhan muntah darah hitam (<em>coffee ground</em>) dua kali di rumah dan BAB hitam lengket (melena). Saat diperiksa di posisi berbaring: <strong>TD 110/80 mmHg, namun HR 115x/menit (takikardia), dan pasien merasa sangat melayang saat coba didudukkan (sinkop postural).</strong><br><br>Apa jebakan kognitif paling berbahaya jika dokter IGD membiarkan pasien ini dirawat inap di bangsal biasa karena melihat angka TD berbaring yang 110/80?",
                a: `<strong>Terlalu percaya pada Tekanan Darah Sistolik berbaring yang "masih normal" akibat kompensasi takikardia maksimal.</strong><br><br>Perdarahan Gastrointestinal Atas dapat menyembunyikan defisit volume hingga 30% sebelum tekanan darah sistolik benar-benar anjlok. Takikardia istirahat dan Hipotensi Ortostatik (tensi jatuh >20 mmHg atau pusing saat posisi diubah ke duduk/berdiri) adalah tanda bahwa *reserve* (cadangan kompensasi) tubuh sudah di ambang batas.<ul><li>Angka TD 110/80 hanyalah fatamorgana kompensasi simpatis.</li><li>Begitu kompensasi patah, tensi akan terjun bebas seketika.</li><li>Indikator sesungguhnya adalah keluhan postural, HR tinggi, dan pucat.</li></ul><div class="trick-box"><strong>Workaround:</strong> Bila pasien perdarahan GI takikardi >100x/mnt di ranjang, anggap tensinya akan segera jatuh. Siapkan transfusi silang dan akses IV ganda.</div>`
            },
            {
                cat: "Occult Bleeding",
                q: `Pemuda 20 tahun ditabrak mobil dari samping. Tiba di IGD mengerang kesakitan, kulitnya sangat pucat, dan GCS 13. TD 70/palpasi. Perawat membuka seluruh pakaian pasien: <strong>Kepala utuh, dada utuh, tidak tampak ada perdarahan di kulit, lantai bersih dari ceceran darah.</strong><br><br>Di mana tiga kompartemen anatomi "tersembunyi" utama tempat darah bervolume besar dapat hilang dari pandangan Anda pada kasus trauma tumpul energi tinggi?`,
                a: `<strong>1. Rongga Toraks (Dada), 2. Rongga Abdomen (Perut) & Retroperitoneal, 3. Pelvis & Tulang Panjang (Femur).</strong><br><br>Ketiga 'tong sampah' cairan ini bisa menampung literan darah tanpa harus menembus kulit. Masing-masing sisi toraks bisa menampung 2-3 L darah. Abdomen dapat menampung seluruh volume darah tubuh. Fraktur satu sisi paha (femur) bisa menyembunyikan perdarahan hingga 1-1.5 L.<ul><li>Syok pada trauma tumpul dengan kulit mulus = Cari internal bleeding!</li><li>Alat bantu: Rontgen Toraks, Rontgen Pelvis, dan USG FAST (Abdomen).</li><li>Lakukan palpasi dan manipulasi halus pada panggul dan paha.</li></ul><div class="trick-box"><strong>Workaround:</strong> Jadikan mantra di pikiran Anda: "Blood on the floor, plus four more (Chest, Abdomen, Pelvis, Thigh)".</div>`
            },
            {
                cat: "PE Shock",
                q: "Wanita 45 tahun yang baru tabrak lari dan imobilisasi patah kaki selama 2 minggu mendadak mengeluh sesak napas, nyeri dada tajam saat menarik napas, dan sinkop di rumah. Di IGD: TD 80/50 mmHg, HR 120x/menit, RR 30x/menit. Paru bersih, JVP distensi. Anda mencurigai Syok karena Emboli Paru Masif.<br><br>Mengapa gumpalan darah di paru ini bisa berujung pada tekanan darah sistemik (tensi) yang jatuh?",
                a: `<strong>Sumbatan mendadak arteri paru (Emboli) memicu Gagal Jantung Kanan Akut, sehingga Jantung Kiri kehilangan pasokan darah (Syok Obstruktif).</strong><br><br>Gumpalan bekuan darah (DVT) dari kaki lepas dan menyumbat pembuluh darah utama paru. Ventrikel kanan tiba-tiba menghadapi tembok tekanan (afterload raksasa) dan berdilatasi masif. Karena darah tak bisa melewati paru, atrium kiri kosong. Ventrikel kiri tak punya apa-apa untuk dipompa ke seluruh tubuh (Cardiac Output kolaps).<ul><li>Hipoksia terjadi karena ventilasi tak sejalan dengan perfusi (V/Q mismatch).</li><li>Hipotensi sistemik terjadi murni karena blokade aliran sentral.</li><li>Beban cairan IV berlebih bisa merusak ventrikel kanan lebih jauh (septum mendesak ke kiri).</li></ul><div class="trick-box"><strong>Workaround:</strong> Hipotensi + Sesak mendadak + Paru bersih + Riwayat imobilisasi = Pikirkan Emboli Paru. Hindari *over-hydration*.</div>`
            },
            {
                cat: "Tamponade Logic",
                q: "Korban luka tusuk dada kiri area prekordial dibawa dengan hipotensi 75/40 mmHg, JVP tinggi, bunyi jantung sangat menjauh. Anda mendiagnosis klinis Tamponade Jantung. Sambil menunggu persiapan alat *pericardiocentesis* (tindakan definitif), Anda memberikan <strong>guyuran cairan kristaloid 500 cc cepat.</strong> Tensi membaik sesaat menjadi 90/55 mmHg.<br><br>Apakah perbaikan parsial dan sesaat dengan cairan ini menyingkirkan diagnosis Tamponade Jantung?",
                a: `<strong>TIDAK SAMA SEKALI.</strong><br><br>Pada tamponade jantung akut, cairan perikard menekan jantung dari luar, membuat tekanan di dalam ruang perikard lebih tinggi dari tekanan atrium kanan (menghentikan pengisian/preload). Memberikan bolus cairan IV dengan cepat secara mekanis meningkatkan tekanan Vena Kava sehingga <em>sedikit mengalahkan</em> tekanan luar perikard itu secara temporer.<ul><li>Perbaikan tekanan darah sifatnya sangat sementara sebagai 'autotransfusi buatan'.</li><li>Cairan IV berfungsi sebagai terapi jembatan (*bridge therapy*), bukan solusi kausal.</li><li>Tindakan penyelamatan nyawa sesungguhnya tetaplah mendrainase cairan perikard.</li></ul><div class="trick-box"><strong>Workaround:</strong> Jangan batalkan kewaspadaan tindakan dekompresi jantung hanya karena tensi naik setelah bolus cairan pertama.</div>`
            },
            {
                cat: "Spinal Shock",
                q: "Pria 30 tahun jatuh dari motor dengan jejas di kepala-leher dan kelumpuhan 4 ekstremitas (tetraparesis). Tensi turun menjadi 80/40 mmHg. Akral teraba lumayan hangat, dan <strong>Nadi 72x/menit (tidak takikardia)</strong>. Perawat bingung membedakan ini Syok Spinal atau Syok Neurogenik.<br><br>Apa konsep penting hilangnya respons takikardia pada kasus syok trauma di atas (Neurogenik)?",
                a: `<strong>Hilangnya jalur desendens simpatis (Tonus Simpatis).</strong><br><br>Syok Neurogenik adalah gangguan otonom hemodinamik. Jaras simpatis dari batang otak yang mengatur konstriksi pembuluh darah dan akselerasi jantung (T1-T4) terputus akibat cedera medula spinalis servikal/torakal tinggi. Akibatnya: "rem vagal" parasimpatis mendominasi (Bradikardia) dan pipa darah melebar total (Hipotensi hangat).<br><br><em>Catatan: "Syok Spinal" adalah hilangnya refleks motorik flaksid sementara pasca trauma, bukan diagnosis hemodinamik.</em><ul><li>Ketidakmampuan memompa takikardi adalah kelemahan kardiovaskular bawaan pasien neurogenik.</li><li>Pemberian cairan IV hati-hati, vasopresor (Norepinefrin) sering cepat diperlukan.</li></ul><div class="trick-box"><strong>Workaround:</strong> Nadi lambat pada pasien trauma leher dengan syok adalah tanda bahaya hilangnya kontrol simpatis sentral.</div>`
            },
            {
                cat: "Adrenal Crisis",
                q: "Wanita 45 tahun dibawa dengan mual muntah hebat, lemas ekstrem, dan kolaps (TD 70/40 mmHg). Anda telah memberinya 2 liter cairan RL dan bahkan mulai drip Norepinefrin, namun <strong>tensinya sama sekali tidak bergerak naik (Syok Refrakter).</strong> Dari riwayat, ia menderita radang sendi kronis dan sering mengonsumsi <strong>obat steroid (Dexamethasone) beli sendiri bertahun-tahun</strong>, yang tiba-tiba habis 3 hari lalu.<br><br>Kondisi kegawatan endokrin apa yang bersembunyi di balik kegagalan resusitasi syok ini?",
                a: `<strong>Krisis Adrenal (Insufisiensi Adrenal Akut).</strong><br><br>Penggunaan steroid eksogen jangka panjang menekan sumbu HPA (Hipotalamus-Pituitari-Adrenal). Bila obat dihentikan mendadak, kelenjar adrenal pasien atrofi dan gagal memproduksi Kortisol. Tanpa kortisol, pembuluh darah menjadi kebal sama sekali terhadap katekolamin (vasopresor internal maupun eksternal/norepinefrin).<ul><li>Krisis adrenal menyamar sebagai syok sepsis, hipovolemik (karena muntah dehidrasi), atau kolaps idiopatik.</li><li>Tanda lain: Hiponatremia, Hiperkalemia, Hipoglikemia, hiperpigmentasi (bila primer).</li><li>Terapi mutlak: Injeksi Hidrokortison (atau Dexamethason bila tes kortisol direncanakan) 100 mg IV secepatnya!</li></ul><div class="trick-box"><strong>Workaround:</strong> Saat syok tak membaik padahal resusitasi sudah maksimal, periksa leher/wajah pasien (moon face?), tanya riwayat steroid/jamu pegal linu, dan curigai Krisis Adrenal!</div>`
            },
            {
                cat: "Medication History",
                q: "Kakek 70 tahun dibawa karena pingsan dan keringat dingin. TD 85/50 mmHg. Di IGD, <strong>nadi pasien bertahan stabil di angka 70x/menit meskipun ia jelas dalam fase hipoperfusi.</strong> Mengetahui bahwa lansia sering kehilangan kompensasi, dokter menganggap ini murni karena usianya. Padahal keluarga membawa sekantong obat rutin dari rumah.<br><br>Mengapa meremehkan interogasi riwayat obat dalam tas tersebut bisa membahayakan pembacaan klinis syok sang kakek?",
                a: `<strong>Obat-obatan kronis memanipulasi respons fisiologis protektif tubuh.</strong><br><br>Jika di dalam tas itu terdapat obat golongan *Beta-Blocker* (mis: Bisoprolol, Propranolol) atau *Calcium Channel Blocker* non-dihidropiridin (Verapamil, Diltiazem), obat-obat ini secara farmakologis menekan denyut jantung pasien. Kakek tersebut secara medis *tidak mampu* mengalami takikardia kompensatorik meski ia kehabisan darah atau sepsis.<ul><li>Obat menutupi tingkat keparahan syok sebenarnya.</li><li>Diuretik dosis tinggi memicu hipovolemia kronis sebelum infeksi datang.</li><li>Obat ACE-Inhibitor (Captopril) menumpulkan respons vasokonstriksi ginjal.</li></ul><div class="trick-box"><strong>Workaround:</strong> Di IGD, riwayat pengobatan (AMPLET - *Medications*) adalah sama pentingnya dengan stetoskop Anda. Periksa tas obat pasien!</div>`
            },
            {
                cat: "ISDN Trap",
                q: `Pria 60 tahun datang dengan keluhan nyeri dada seperti ditindih beban berat (suspek Sindrom Koroner Akut). Nyeri sangat tidak tertahankan. Tensi pasien saat datang masih normal: 120/80 mmHg. Anda berencana memberikan tablet <strong>Nitrat/ISDN 5 mg di bawah lidah</strong> untuk meredakan nyerinya secara cepat.<br><br>Satu pertanyaan "memalukan namun menyelamatkan nyawa" apa yang HARUS ditanyakan diam-diam sebelum nitrat itu diselipkan ke mulutnya?`,
                a: `<strong>"Bapak dalam 24-48 jam terakhir ada minum obat kuat untuk laki-laki (seperti Sildenafil/Viagra, Tadalafil, Vardenafil)?"</strong><br><br>Obat PDE-5 inhibitor (obat disfungsi ereksi) bekerja dengan menghambat pemecahan cGMP, memperpanjang vasodilatasi. Nitrat adalah donor Nitric Oxide (NO) yang memicu produksi cGMP masif. Menggabungkan keduanya akan menyebabkan relaksasi otot polos pembuluh darah sistemik yang eksplosif, asinergis, dan fatal.<ul><li>Hasil kombinasinya: Hipotensi refrakter (Syok Vasodilatori) yang sangat sulit dipulihkan walau dengan vasopresor dosis tinggi.</li><li>Tadalafil (Cialis) bisa bertahan di tubuh hingga 48 jam.</li><li>Kerahasiaan dokter-pasien membuat pertanyaan ini aman ditanyakan.</li></ul><div class="trick-box"><strong>Workaround:</strong> Gunakan bahasa halus namun tegas, "Pak, ini penting sekali untuk keselamatan jantungnya, Bapak sedang tidak memakai obat ereksi kan?"</div>`
            },
            {
                cat: "Vasopressor Route",
                q: "Pasien syok sepsis hipotensi berat direncakan mendapat infus <strong>Norepinefrin (Vascon)</strong> karena cairan tidak lagi merespons. IGD sangat sibuk, akses vena sentral (CVC) tidak tersedia. Perawat berinisiatif menancapkan IV line ukuran kecil (24G) di <strong>punggung tangan (vena superfisial sangat perifer)</strong> untuk menjalankan tetesan Norepinefrin ini.<br><br>Risiko komplikasi mematikan jaringan apa yang sangat rentan terjadi pada rute dan lokasi pilihan perawat tersebut?",
                a: `<strong>Ekstravasasi vasopresor yang memicu nekrosis iskemik jaringan sekitarnya.</strong><br><br>Norepinefrin adalah agen vasokonstriktor alfa-1 yang sangat sangat kuat. Jika jarum meleset atau bocor di pembuluh darah kecil yang rapuh di punggung tangan, obat akan menggenangi jaringan kulit sekitar. Obat ini akan mematikan aliran kapiler lokal, memicu kulit menghitam, iskemik, dan mati (nekrosis/amputasi).<ul><li>Vasopresor HARUS lewat vena sentral bila memungkinkan.</li><li>Jika terpaksa *perifer* (sementara di IGD), gunakan kateter besar (18G) di vena besar proksimal (misal: Fossa Antekubiti / lipat siku bagian dalam).</li><li>Pantau tetesan dan kulit sekitarnya setiap 15 menit! (Siapkan Phentolamine sbg antidot lokal jika bocor).</li></ul><div class="trick-box"><strong>Workaround:</strong> Buat SOP: Dilarang keras meneteskan obat penarik tensi pekat di vena halus punggung tangan atau pergelangan. Pilih vena seukuran pipa.</div>`
            },
            {
                cat: "Shock Index",
                q: "Seorang pemuda datang pasca jatuh dari tangga setinggi 3 meter. Ia tampak pucat namun mengeluh biasa saja. Tanda vital: <strong>Nadi 110x/menit, Tekanan Darah Sistolik 100 mmHg.</strong> Secara teknis, menurut buku ajar (sistolik >90), pasien belum masuk definisi 'hipotensi'.<br><br>Bagaimana rumus klinis sederhana *Shock Index* dapat membongkar bahwa pasien ini sebenarnya sedang berada di ambang dekompensasi dini?",
                a: `<strong>Shock Index (SI) = Heart Rate dibagi Tekanan Darah Sistolik.</strong><br><br>Nilai normal SI adalah 0.5 - 0.7. Jika SI mendekati atau melampaui angka <strong>1.0</strong> (di mana Nadi mulai lebih tinggi dari Sistolik), ini adalah bendera merah (Red Flag) adanya perdarahan internal terselubung dan dekompensasi ventrikel yang sedang terjadi, meski tensinya terlihat "normal".<ul><li>Pada pasien ini: 110 dibagi 100 = <strong>1.1 (Sangat Abnormal).</strong></li><li>SI > 1.0 pada trauma sering berasosiasi kuat dengan kebutuhan transfusi darah masif.</li><li>Indeks ini menangkap kerja keras jantung mempertahankan perfusi.</li></ul><div class="trick-box"><strong>Workaround:</strong> Saat melihat layar monitor, biasakan membagi mental Nadi terhadap Tensi Atas. Begitu Nadi mengalahkan Tensi Atas, kewaspadaan harus naik 200%.</div>`
            },
            {
                cat: "CRT",
                q: `Seorang nenek 75 tahun dibawa dengan keluhan diare berat. Di triase, seorang perawat muda menekan kuku jarinya dan melaporkan <strong>"Capillary Refill Time (CRT) memanjang jadi 4 detik! Pasien syok berat!"</strong> Namun saat diperhatikan, tangan nenek itu sedang berada di ruangan IGD ber-AC sentral yang sangat dingin (suhu ruangan 18°C), dan perawat menekannya hanya setengah detik ringan.<br><br>Mengapa pembacaan CRT ini sangat bias dan berpotensi memicu diagnosis syok berlebihan (over-resuscitation)?`,
                a: `<strong>CRT sangat dipengaruhi oleh Suhu Lingkungan (dingin memicu vasokonstriksi lokal), Usia (lansia kapilernya menua), dan Teknik penekanan yang salah.</strong><br><br>CRT adalah alat bantu perfusi kapiler yang hebat, namun bukan angka mutlak jika parameternya kotor. Suhu ruangan IGD yang beku otomatis memperlambat CRT pada orang sehat sekalipun. Tekanan ringan singkat gagal mengosongkan *nail bed* dengan sempurna.<ul><li>Teknik Standar: Tekan kuku (atau ujung jari/patella) selama 5-10 detik penuh sampai pucat, lalu lepaskan. Hitung detiknya di ruangan hangat terang.</li><li>CRT tidak bisa menjadi hakim tunggal syok hipovolemik; padukan dengan status mental, produksi urin, dan TD.</li><li>Gunakan metode <em>Mottling Score</em> sebagai penunjang bila jari bias.</li></ul><div class="trick-box"><strong>Workaround:</strong> Jangan baca CRT seperti dukun membaca telapak tangan. Tekan yang lama, hitung, dan korelasikan. "Lansia kedinginan" bukan selalu Syok.</div>`
            },
            {
                cat: "Urine Output",
                q: `Seorang pasien syok luka bakar derajat dua luas 40% telah diresusitasi cairan kristaloid 3 liter selama 8 jam pertama di puskesmas perawatan. TD naik menjadi 100/60 mmHg dan HR turun sedikit menjadi 105x/menit. Dokter residen jaga tampak tenang, namun perawat melapor: <strong>"Dok, di kateter urinnya cuma menetes urin pekat 15 cc selama 4 jam terakhir!"</strong><br><br>Mengapa data klinis *urine output* ini menghancurkan rasa aman dari tensi pasien di atas?`,
                a: `<strong>Karena ginjal (Urine Output / UO) adalah jendela paling jujur dari *End-Organ Perfusion* (Perfusi Organ Akhir).</strong><br><br>Tensi yang naik bisa jadi cuma hasil vasokonstriksi kuat atau cairan yang tertahan di pembuluh besar sementara. Tetapi jika ginjal menolak menyaring darah (oliguria), artinya darah tidak sampai ke korteks ginjal—mikrosirkulasi masih gagal total (Syok persisten).<ul><li>Target resusitasi umum (dewasa): UO 0.5 mL/kgBB/jam (Pengecualian: Trauma luka bakar, target bisa 0.5 - 1 mL/kg/jam untuk memastikan klirens mioglobin).</li><li>Oliguria adalah alarm bahaya under-resuscitation sekunder atau dekompensasi.</li><li>Jangan mencopot kateter terlalu dini pada pasien kritis.</li></ul><div class="trick-box"><strong>Workaround:</strong> Tekanan Darah bisa bohong lewat kompensasi. Kateter Foley tidak pernah bohong (kecuali selangnya terlipat). Patokan akhir kesuksesan resusitasi adalah kembalinya urin bening.</div>`
            },
            {
                cat: "Mental Status",
                q: "Pria 40 tahun datang dengan demam tinggi (39.5°C) 4 hari suspek Dengue Hemorrhagic Fever. Tensi di pergelangan tangan teraba tipis 90/70. Tiba-tiba pasien yang tadinya tenang, <strong>berubah jadi sangat gelisah, memaki-maki tanpa alasan, meronta ingin cabut infus, dan menendang selimut.</strong> Keluarga menangis mengira kerasukan makhluk halus RS.<br><br>Sebagai dokter IGD, perubahan perilaku psikiatrik mendadak ini harus Anda tafsirkan sebagai tanda fisiologis spesifik apa?",
                a: `<strong>Hipo-perfusi Serebral Akut (Otak kekurangan darah/oksigen) akibat Syok dekompensasi (DSS).</strong><br><br>Perubahan mental mendadak (gelisah/agitasi ekstrim, bingung, lalu ke apatis/koma) pada pasien demam berdarah/sepsis/trauma BUKAN masalah psikiatri atau klenik. Ini adalah indikator primer organ otak yang kekurangan oksigen karena curah jantung dan tekanan darah anjlok di bawah ambang batas autoregulasi serebral.<ul><li>Ini bukan "reaksi marah biasa"; otak sedang tercekik.</li><li>Kesadaran menurun/gelisah adalah tanda kegawatan syok Stadium III/IV.</li><li>Singkirkan hipoglikemia, lalu fokus gempur resusitasi cairan bolus secepatnya!</li></ul><div class="trick-box"><strong>Workaround:</strong> Bila keluarga mengeluh pasien "Suka ngoceh tidak jelas dan berontak" pasca kecelakaan/demam, anggap tensi pasien jatuh dan syok berat sedang terjadi di depan mata Anda.</div>`
            },
            {
                cat: "Cold vs Warm Shock",
                q: "Dua anak berbeda masuk IGD. Anak A (Diare masif): Letargi, akral teraba <strong>sangat dingin dan basah</strong> pucat, Nadi 160x/menit. Anak B (Demam tinggi urosepsis): Gelisah meracau, kulitnya kemerahan dan teraba <strong>sangat hangat dan kering</strong>, <em>bounding pulse</em>, Nadi 160x/menit. Keduanya sama-sama hipotensi (TD 70/40 mmHg).<br><br>Mengapa fenotipe perfusi kulit mereka bertolak belakang padahal sama-sama syok?",
                a: `<strong>Anak A mengalami *Cold Shock* (Vasokonstriksi), sedangkan Anak B dalam fase *Warm Shock* (Vasodilatasi).</strong><br><br>Pada Syok Hipovolemik (Anak A), tubuh memicu kompensasi pelepasan katekolamin ekstrim untuk memeras pembuluh darah kulit dan memusatkan darah sisa ke otak/jantung (kulit jadi dingin/pucat).<br>Pada Syok Sepsis awal (Anak B), mediator inflamasi (sitokin, nitric oxide) merusak tonus otot polos, melebarkan pembuluh darah secara pasif di seluruh tubuh (kulit hangat/kemerahan) meskipun aliran darah organ sebenarnya gagal.<ul><li>Monitor alat canggih sering buta terhadap beda profil ini.</li><li><em>Warm Shock</em> sering menjebak karena pasien tampak membaik warnanya.</li><li>Sepsis stadium lanjut (terlambat) akhirnya akan menjadi <em>Cold Shock</em> saat pompa jantung ikut kelelahan.</li></ul><div class="trick-box"><strong>Workaround:</strong> Sentuhan kulit (Raba) seringkali memberi informasi jenis syok yang tidak bisa diberikan oleh layar monitor pasien termahal sekalipun.</div>`
            },
            {
                cat: "Pediatric Shock",
                q: "Bocah 4 tahun datang pasca diare berdarah berhari-hari. Ia rewel, mata sangat cekung, takikardi 170x/menit, napas cepat dalam. Saat di tensi: <strong>Tekanan Darah masih di kisaran persentil normal untuk usianya (TD 95/60 mmHg).</strong> 30 menit kemudian tanpa intervensi, nadinya melemah, ia tidak sadar, dan TD anjlok seketika menjadi 50/palpasi.<br><br>Fisiologi spesifik apa pada anak-anak yang membuat jebakan klinis 'tensi normal lalu mendadak kolaps' ini sangat sering terjadi?",
                a: `<strong>Kapasitas Kompensasi Vaskular anak-anak sangat superior, lalu De-kompensasinya terjadi tiba-tiba.</strong><br><br>Anak memiliki pembuluh darah muda yang sangat elastis. Mereka mampu meningkatkan denyut jantung dan mengonstriksi pembuluh darah tepi (<em>vasoconstrict</em>) dengan kekuatan luar biasa untuk mempertahankan *Tekanan Darah (Tensi)* meskipun mereka sudah kehilangan hingga 30-40% volume darahnya (Syok Terkompensasi/Compensated).<ul><li>Hipotensi adalah indikator *sangat terlambat* (Late Sign) dari Syok Anak (sudah di fase Dekompensasi).</li><li>Bila tensi jatuh pada anak, berarti cadangan sirkulasinya sudah benar-benar terkuras habis dan henti jantung akan segera menyusul.</li><li>Parameter dini syok anak: Takikardi yang tidak wajar, CRT lambat, hilang kontak mata (letargi).</li></ul><div class="trick-box"><strong>Workaround:</strong> Jangan obati mesin tensimeter pada anak. Jika anaknya tampak mengerikan, mata kosong, ekstremitas berbintik dingin, ia syok!</div>`
            },
            {
                cat: "Pregnancy Shock",
                q: "Seorang perempuan 32 tahun, G3P2A0 hamil 34 minggu (Trimester 3), dibawa ke IGD pasca tergelincir dari tangga. Ia mengeluh nyeri perut bawah samar. Tanda vital posisi <strong>telentang (supinasi):</strong> Nadi 105x/menit, TD 100/60 mmHg (borderline), ia tampak pucat pucat dan mulai mengeluh kepala keliyengan. Denyut jantung janin via Doppler menurun lambat (bradikardi fetal).<br><br>Selain memikirkan risiko solusio plasenta, jebakan manuver posisi apa yang memperburuk hemodinamik ibu dan janin saat berbaring di bed IGD ini?",
                a: `<strong>Kompresi Aorto-Kaval (*Supine Hypotensive Syndrome*).</strong><br><br>Pada kehamilan tua (uterus besar), membiarkan ibu hamil berbaring telentang rata (supinasi) akan menyebabkan rahim gravidal seberat >5 kg menindih Vena Kava Inferior (IVC) dan sebagian Aorta Abdominalis di punggung belakang. Ini memblokir *venous return* darah dari kaki ke jantung kanan, menyebabkan Hipotensi maternal akut sekunder dan hipoksia fatal pada janin.<ul><li>Ini memperburuk Syok Hemoragik yang sesungguhnya (akibat trauma/perdarahan obstetri).</li><li>Ibu hamil juga memiliki volume darah 40% lebih banyak (Hipervolemia fisiologis), jadi ia bisa kehilangan 1.5 Liter darah sebelum tensi mulai jatuh!</li></ul><div class="trick-box"><strong>Workaround:</strong> Aturan emas IGD trauma hamil: Selalu posisikan ibu miring ke kiri (Left Lateral Decubitus) atau miringkan *board* 15-30 derajat untuk menyingkirkan rahim dari Vena Kava.</div>`
            },
            {
                cat: "Medication-induced Shock",
                q: "Pria 70 tahun rujukan klinik panti werda tiba dengan keluhan lemas berat, sinkop berulang saat berdiri, dan hipotensi membandel (TD 85/50). Tidak ada demam, tidak ada perdarahan/muntah berdarah, EKG normal tanpa iskemik. Perawat asik mencari infeksi yang tidak ada. Setelah menelusuri kotak obat pasien, Anda menemukan bahwa <strong>dosis harian Amlodipin dan Captoprilnya baru saja dinaikkan dua kali lipat minggu lalu oleh dokter jaga panti.</strong><br><br>Mengapa jebakan syok jenis ini paling sering terlewat dari diagnosis dokter di fase awal IGD?",
                a: `<strong>Karena fiksasi mental (<em>Anchoring Bias</em>) dokter terlanjur mengarah ke "Penyakit Besar Murni" (Sepsis/Trauma) sambil mengabaikan Syok Iatrogenik/Imbas Obat.</strong><br><br>Obat penurun tekanan darah (antihipertensi) dosis toksik/berlebihan, terapi multipel, dehidrasi ringan akibat diuretik tersembunyi (furosemid), adalah penyebab umum hipotensi dan presyok (Syok Vasodilator dan Hipovolemia relatif) pada lansia. Interaksi dan overdosis kronik sering tidak terlihat dramatis namun hemodinamiknya mengancam nyawa.<ul><li>Pada lansia hipotensi tanpa etiologi jelas, tinjau obat-obatan sebelum menuduh bakteremia.</li><li>Efek vasodilatasi Amlodipin dosis besar sering resisten terhadap resusitasi cairan biasa.</li><li>Penggantian vasopresor eksogen mungkin diperlukan sementara.</li></ul><div class="trick-box"><strong>Workaround:</strong> Saat misteri syok belum terpecahkan, jadilah detektif laci obat pasien. Tanyakan perubahan "warna dan jumlah" obat minggu ini.</div>`
            },
            {
                cat: "Hypoglycemia Mimic",
                q: `Seorang kuli bangunan 40 tahun mendadak tak sadar di proyek setelah bekerja keras. Tubuhnya basah kuyup oleh <strong>keringat dingin (diaforesis masif), takikardia 130x/menit, pernapasan dangkal cepat, dan TD pergelangan teraba 90/60 mmHg.</strong> Tim paramedik mencurigai Heat Stroke atau Syok Dehidrasi berat dan mulai mengguyur cairan masif. <br><br>Pemeriksaan *bedside* krusial apa yang dilupakan namun berpotensi membalikkan seluruh gambaran "syok" ini dalam 2 menit?`,
                a: `<strong>Pemeriksaan Gula Darah Sewaktu (GDS / Glukosa Kapiler).</strong><br><br>Hipoglikemia berat memicu lonjakan adrenalin (epinefrin) masif dari kelenjar adrenal tubuh sebagai respons *survival* untuk meningkatkan gula darah. Lonjakan adrenalin eksogen ini menciptakan fenotipe menyerupai Syok (Pucat, takikardia ekstrim, berkeringat basah dingin, penurunan kesadaran, kelemahan vaskular).<ul><li>Banyak pasien dengan Syok Hipoglikemia terbangun dramatis dengan Nadi kembali normal hanya setelah bolus Dextrose 40%.</li><li>Hipoglikemia juga bisa menjadi ko-morbid / penyebab sekunder dari pasien yang memang sedang Sepsis Parah.</li><li>Jangan biarkan otak mati saat cairan infus terus mengalir.</li></ul><div class="trick-box"><strong>Workaround:</strong> "Don't ever, EVER, evaluate a coma or shock patient without a fingerstick glucose." Jadikan GDS vital sign ke-5 di triase!</div>`
            },
            {
                cat: "Temperature Clue",
                q: "Dua pasien syok berada di ruang periksa sebelah. Pasien A: Hipotensi + Suhu terukur rektal <strong>32.5°C (Hipotermia Berat)</strong> pasca KLL dan perdarahan di jalan tol. Pasien B: Hipotensi + Suhu rektal <strong>35.0°C (Subfebris/Hipotermia ringan)</strong> dengan kateter urin penuh nanah tebal.<br><br>Bagaimana Suhu Tubuh membantu mempertajam membaca konteks tipe Syok mereka tanpa membuat Anda terjebak pada diagnosis tunggal?",
                a: `<strong>Suhu Ekstrim (panas/dingin) adalah petunjuk arah, namun maknanya 100% bergantung pada mekanisme trauma/infeksi yang menyertainya.</strong><br><br>Pada Pasien A (Trauma): Hipotermia 32.5°C adalah ujung mematikan dari <em>Lethal Triad of Trauma</em> (Hipotermia + Asidosis + Koagulopati). Suhu dingin merusak enzim pembekuan darah, membuat syok hemoragiknya mustahil dihentikan jika dia tidak dihangatkan.<br>Pada Pasien B (Urosepsis): Hipotermia 35.0°C adalah penanda prognosis buruk dari kegagalan kompensasi imun terhadap Syok Sepsis (bukan sekadar kedinginan ruangan).<ul><li>Demam tinggi mendukung infeksi, tapi Ketiadaan demam (hipotermia) pada lansia infeksi menandakan Sepsis Stadium Akhir.</li><li>Koreksi suhu di syok trauma sama pentingnya dengan koreksi darah (Fluid Warmer/Selimut hangat).</li></ul><div class="trick-box"><strong>Workaround:</strong> Suhu tubuh adalah konteks, bukan jawaban akhir. Lihat suhu untuk mencari tahu tingkat dekompensasi pasien.</div>`
            },
            {
                cat: "Temperature Clue",
                q: "Dua pasien syok berada di ruang periksa sebelah. Pasien A: Hipotensi + Suhu terukur rektal <strong>32.5°C (Hipotermia Berat)</strong> pasca KLL dan perdarahan di jalan tol. Pasien B: Hipotensi + Suhu rektal <strong>35.0°C (Subfebris/Hipotermia ringan)</strong> dengan kateter urin penuh nanah tebal.<br><br>Bagaimana Suhu Tubuh membantu mempertajam membaca konteks tipe Syok mereka tanpa membuat Anda terjebak pada diagnosis tunggal?",
                a: `<strong>Suhu Ekstrim (panas/dingin) adalah petunjuk arah, namun maknanya 100% bergantung pada mekanisme trauma/infeksi yang menyertainya.</strong><br><br>Pada Pasien A (Trauma): Hipotermia 32.5°C adalah ujung mematikan dari <em>Lethal Triad of Trauma</em> (Hipotermia + Asidosis + Koagulopati). Suhu dingin merusak enzim pembekuan darah, membuat syok hemoragiknya mustahil dihentikan jika dia tidak dihangatkan.<br>Pada Pasien B (Urosepsis): Hipotermia 35.0°C adalah penanda prognosis buruk dari kegagalan kompensasi imun terhadap Syok Sepsis (bukan sekadar kedinginan ruangan).<ul><li>Demam tinggi mendukung infeksi, tapi Ketiadaan demam (hipotermia) pada lansia infeksi menandakan Sepsis Stadium Akhir.</li><li>Koreksi suhu di syok trauma sama pentingnya dengan koreksi darah (Fluid Warmer/Selimut hangat).</li></ul><div class="trick-box"><strong>Workaround:</strong> Suhu tubuh adalah konteks, bukan jawaban akhir. Lihat suhu untuk mencari tahu tingkat dekompensasi pasien.</div>`
            },
            {
                cat: "Transfer Timing",
                q: `Pasien politrauma syok berat dengan fraktur pelvis terbuka di Puskesmas Terpencil. Dokter sudah memasang IV 2 jalur, memberikan 1 Liter cairan hangat, memasang pelvic binder sprei, namun Nadi tetap 130x/menit lemah dan pasien tampak pucat fasial. Ambulans tersedia, RS Pusat jaraknya 1 jam. Dokter masih ragu untuk memberangkatkan ambulans dan berkata, <strong>"Kita tunggu kasih 2 botol infus lagi sampai nadinya turun di bawah 100 baru kita rujuk."</strong><br><br>Jebakan mematikan *Delay Transfer* apa yang sedang dilakukan dokter ini?`,
                a: `<strong><em>"Stay and Play"</em> berlebihan; membiarkan stabilisasi awal menjadi alasan penundaan terapi definitif (Operasi *Source Control*).</strong><br><br>Fasilitas layanan primer (FKTP/Puskesmas) TIDAK memiliki alat menghentikan perdarahan internal. Tujuan resusitasi primer bukanlah menormalkan angka di monitor 100%, melainkan mempertahankan nyawa/perfusi esensial sementara pasien dipindahkan dengan cepat (<em>"Scoop and Run" / "Play along the way"</em>).<ul><li>Mengejar normotensi/normokardia dengan guyur cairan di Puskesmas pada perdarahan aktif adalah kesia-siaan (hemodilusi).</li><li>Transisi ambulans adalah bagian dari resusitasi berjalan (Cairan tetap masuk dalam ambulans).</li><li>Keputusan rujukan dipicu oleh identifikasi "fasilitas kita kurang", bukan "tunggu pasien sembuh dulu".</li></ul><div class="trick-box"><strong>Workaround:</strong> Begitu Anda identifikasi syok trauma butuh operasi, hitung mundur (<em>Golden Hour</em>). Stabilkan apa yang bisa distabilkan dalam 15-20 menit, lalu jalankan mobil ambulansnya.</div>`
            },
            {
                cat: "Hemorrhagic Priorities",
                q: "Wanita 35 tahun pasca persalinan di Bidan dirujuk karena lemas dan perdarahan jalan lahir (HPP suspek atonia uteri masif). Tiba di IGD, celananya direndam darah, tensi 70/50 mmHg. Suster 1 sibuk memasang IV Line, Suster 2 memompa cairan RL. Namun <strong>selama 10 menit pertama, tidak ada yang menyentuh atau mengevaluasi perut/rahim bawah pasien.</strong><br><br>Prioritas mutlak mana dari Syok Hemoragik yang dilupakan tim yang berorientasi hanya pada \"Cairan\" ini?",
                a: `<strong>Identifikasi Mekanis dan <em>Source Control</em> (Mengontrol Sumber Perdarahan aktif).</strong><br><br>Memasukkan berton-ton cairan pengganti ke sirkulasi sangat sia-sia jika "kerannya" belum ditutup. Air akan masuk dan terus mengalir keluar bersama dengan faktor pembekuan darah berharga pasien (memicu koagulopati dan kematian).<ul><li>Pada Perdarahan Post-Partum (HPP): Kompresi Bimanual, Masase Uterus, Uterotonika (Oksitosin/Misoprostol) adalah prioritas SETARA atau lebih penting dari jarum infus!</li><li>Pada Luka Terbuka Ekstremitas: Pasang Tourniquet (Torniket) tinggi di atas luka sebelum memikirkan jalur infus.</li><li>Cairan IV tidak pernah bisa menyembuhkan luka berdarah.</li></ul><div class="trick-box"><strong>Workaround:</strong> Konsep *Tap and Sink*: Jika wastafel bocor, jangan hanya menimba air ke dalamnya, namun matikan dulu keran utamanya (*Source control*).</div>`
            },
            {
                cat: "Communication Trap",
                q: `Dokter Puskesmas merujuk pasien Sepsis hipotensi (TD 80/50). Di telepon ke dokter IGD RS penerima ia hanya melapor singkat, <strong>"Dok, konsul rujukan pasien laki-laki 60 tahun dengan Syok Sepsis dan Tensi rendah, kesadaran menurun. Mohon siapkan tempat ya."</strong> Lima jam kemudian pasien tiba dan tim IGD RS panik karena harus memeriksa mulai dari mencari jalur IV yang kempes, mencari etiologi sepsisnya, dan memeriksa rekaman EKG yang tidak disertakan.<br><br>Mengapa format laporan komunikasi ini sangat buruk dan membunuh "Golden Hour" pasien?`,
                a: `<strong>Komunikasi itu hampa data (tanpa arah, terapi yang sudah masuk, dan respons intervensi). Tim penerima harus memulai segalanya dari titik nol.</strong><br><br>Rujukan syok bukan sekadar pesan kamar. RS Penerima harus tahu persis status resusitasi apa yang sudah dilakukan agar bisa menyiapkan senjata berikutnya (Vasopresor, Transfusi Darah, Ruang Operasi).<ul><li>Format ISBAR yang baik: Sampaikan Identitas, Kecurigaan Sumber Sepsis (misal: "suspek urosepsis keruh").</li><li>Laporkan: Terapi yang SUDAH masuk (misal: "sudah masuk RL 1000 cc, injeksi ceftriaxone").</li><li>Laporkan respons: ("tensi awal 70/palpasi, setelah cairan naik jadi 80/50, Nadi turun dari 140 ke 120").</li></ul><div class="trick-box"><strong>Workaround:</strong> Anggap Anda sedang menyerahkan tongkat estafet lari, bukan melempar karung beras. Sebutkan intervensinya, dan sebutkan di mana letak masalah buntunya.</div>`
            },
            {
                cat: "Reassessment",
                q: "Pria 40 tahun korban tawuran masuk IGD dengan luka tikam dada stabil. Tensi awal 110/70. Dokter memerintahkan foto toraks, pasang balut tekan, lalu pindah ke pasien sebelah. Empat puluh menit berlalu tanpa perawat memeriksa pria tadi. Saat petugas radiologi menjemputnya, <strong>pria tersebut ditemukan tak bernapas, pucat, tak teraba nadinya di atas brankar berdarah.</strong><br><br>Konsep utama penanganan syok trauma apa yang dilanggar secara fatal dalam skenario ruang tunggu ini?",
                a: `<strong>Kewajiban <em>Serial Reassessment</em> (Re-evaluasi Berulang Berkala) pada fase Dinamis Syok.</strong><br><br>Syok bukanlah penyakit statis, melainkan proses degradasi perfusi dinamis yang bergerak seperti bola salju. Pasien dengan "Tensi stabil dan baik-baik saja" di menit ke-10 bisa jatuh ke asidosis letal dan henti jantung di menit ke-35 akibat kompensasi yang menyerah tiba-tiba (misal dari perdarahan pelan rongga dada yang tak terpantau).<ul><li>Jangan pernah merasa aman hanya dari satu kali pengukuran Tanda Vital awal.</li><li>Setiap intervensi besar (bolus cairan, pemberian obat) WAJIB diikuti pengukuran ulang (Respons?).</li><li>Setiap 10-15 menit pada pasien trauma energi tinggi wajib evaluasi status mental (A-B-C ulang).</li></ul><div class="trick-box"><strong>Workaround:</strong> Tanamkan alarm mental: Pasien dengan energi kinetik trauma besar atau sepsis jelas, <strong>DILARANG ditelantarkan di sudut tanpa mata pengawasan</strong>.</div>`
            },
            {
                cat: "Single Data Trap",
                q: `Pria 28 tahun dibawa pasca KLL terlempar 5 meter. Ia merintih bingung (GCS 13), akral dingin basah, takikardia 120x/menit, dan CRT 3-4 detik. Ancak perutnya tegang (Defans Muscular). Namun, layar tensimeter digital canggih di lengan kanannya memunculkan angka <strong>Tekanan Darah: 115/85 mmHg.</strong> Perawat tersenyum dan berkata, "Aman Dok, tensinya bagus normal".<br><br>Jebakan kognitif paling purba apa di dunia kegawatdaruratan medis yang terjadi di IGD ini?`,
                a: `<strong>Terlalu mengagungkan/percaya pada SATU Angka Tunggal (Single Data Trap) di atas pola gambaran klinis komprehensif.</strong><br><br>Satu angka Tekanan Darah normal 115/85 mmHg HANCUR maknanya jika ditabrakkan dengan Akral Dingin, Takikardia 120, GCS turun, dan Mekanisme Cedera Ekstrem. Tensi itu mungkin artefak mesin, kompensasi detik-detik terakhir (vasokonstriksi pekat), atau alat yang tidak pas mansetnya. Mendiagnosis pasien syok tidak boleh dari satu piksel di layar, harus melihat seluruh mosaik.<ul><li>Data yang bertentangan (Tensi bagus VS Pasien jelek) = Percayai Tampilan Klinis Pasien (Treat the patient, not the monitor).</li><li>Konteks, profil akral perifer, urine, mental, adalah serangkaian sinyal yang jauh lebih jujur dari satu jepretan angka sistolik.</li></ul><div class="trick-box"><strong>Workaround:</strong> Jika pasien Anda tampak seperti mayat hidup tapi mesin bilang ia sehat, maka mesin itu yang rusak, bukan pasiennya. Segera cari tahu lebih dalam!</div>`
            },
            {
                cat: "Final Principle",
                q: `Pria 50 tahun tak sadar rujukan dari Puskesmas karena Syok Sepsis refrakter. Di lembar rujukan tertulis, <strong>"Diagnosis: Syok tak membaik. Tindakan: Rujukan lanjut."</strong> Setiba di IGD RS, dokter kebingungan mencari sumber: Apakah ini syok hemoragik internal? Kardiogenik diam-diam? Atau Distributif (Sepsis/Anafilaksis)? Waktu terbuang sia-sia hanya untuk mengulangi "Tebak Jenis Syok".<br><br>Kalimat pedoman fundamental 3 langkah apa yang harus menjadi mental model bagi setiap dokter FKTP saat menangani kasus kolaps akut sebelum dirujuk?`,
                a: `<strong>1. Kenali Fenotipenya Cepat, 2. Cari Tahu "Sumber/Kebocorannya" di Mana, 3. Resusitasi Paralel dan Evakuasi (Transfer) Tepat Waktu.</strong><br><br>Di FKTP (fasilitas terbatas), keberhasilan menyelamatkan pasien syok diukur bukan dari kecanggihan obat Anda, melainkan kemampuan berpikir struktural. Syok adalah *Sindrom* turunan, bukan *Penyakit Utama*. Seseorang kolaps bukan karena "penyakit syok", melainkan kolaps karena "Tusukan di Liver" atau "Infeksi Paru Berat".<ul><li>Pola Pikir 1: Apakah jantungnya yang macet? Pipa darahnya (vasodilatasi) yang terlalu longgar? Atau tangki airnya (volume) bocor?</li><li>Pola Pikir 2: Dimana kebocoran tangkinya? (Dada, perut, lantai?).</li><li>Pola Pikir 3: Cairan RL/Normal Saline tidak akan menyembuhkan sumbatan emboli maupun sepsis paru, segerakan evakuasi kausal.</li></ul><div class="trick-box"><strong>Workaround:</strong> Jangan rujuk dengan diagnosis "Syok" saja. Rujuklah dengan mental: "Syok suspek hipovolemik abdomen, sedang di-loading, ambulans gerak sekarang."</div>`
            }
        ];

        let cards = [...originalCards];
        let currentIndex = 0;
        let isFlipped = false;
        
        let touchStartX = 0;
        let touchEndX = 0;
        let touchStartY = 0;
        let isSwiping = false;
        let isScrolling = false;

        const flashcardEl = document.getElementById('flashcard');
        const questionEl = document.getElementById('question-text');
        const answerEl = document.getElementById('answer-text');
        const counterEl = document.getElementById('card-counter');
        const categoryEl = document.getElementById('card-category');

        function renderCard() {
            if (isFlipped) {
                flashcardEl.classList.remove('is-flipped');
                isFlipped = false;
                setTimeout(() => {
                    updateContent();
                }, 400); // Wait for flip animation
            } else {
                updateContent();
            }
        }

        function updateContent() {
            const currentCard = cards[currentIndex];
            questionEl.innerHTML = currentCard.q;
            answerEl.innerHTML = currentCard.a;
            categoryEl.textContent = currentCard.cat;
            counterEl.textContent = `${currentIndex + 1} / ${cards.length}`;
            
            // Reset scroll positions
            const answerContainer = document.querySelector('#answer-text').parentElement;
            const questionContainer = document.querySelector('#question-text').parentElement;
            if(answerContainer) answerContainer.scrollTop = 0;
            if(questionContainer) questionContainer.scrollTop = 0;
        }

        function toggleFlip(e) {
            if (isSwiping) return;
            const selection = window.getSelection();
            if (selection.toString().length > 0) return; // Allow text selection
            
            isFlipped = !isFlipped;
            flashcardEl.classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0;
            }
            renderCard();
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = cards.length - 1; 
            }
            renderCard();
        }

        function shuffleCards() {
            // Fisher-Yates Shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            renderCard();
        }

        flashcardEl.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            isSwiping = false;
            isScrolling = false;
        }, {passive: true});

        flashcardEl.addEventListener('touchmove', e => {
            if (isScrolling) return;

            const currentTouchX = e.changedTouches[0].screenX;
            const currentTouchY = e.changedTouches[0].screenY;
            
            const diffX = Math.abs(currentTouchX - touchStartX);
            const diffY = Math.abs(currentTouchY - touchStartY);

            // Cancel swipe if scrolling vertically mostly
            if (diffY > diffX && diffY > 15) {
                isScrolling = true;
                isSwiping = false;
                return;
            }

            if (diffX > 20) {
                isSwiping = true;
            }
        }, {passive: true});

        flashcardEl.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (isSwiping && !isScrolling) {
                handleSwipe();
            }
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 60; 
            if (touchEndX < touchStartX - swipeThreshold) {
                nextCard(); // Swipe left -> Next
            } else if (touchEndX > touchStartX + swipeThreshold) {
                prevCard(); // Swipe right -> Prev
            }
            setTimeout(() => { isSwiping = false; }, 150);
        }

        // Initialize first card
        window.onload = renderCard;

        // Keyboard accessibility
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault(); 
                toggleFlip();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            }
        });
    </script>
