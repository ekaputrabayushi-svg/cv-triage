<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#b91c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>STEMI Protocol App - Guideline Directed</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .animate-fadeIn { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
        .pt-safe { padding-top: max(12px, env(safe-area-inset-top)); }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Inline Icons ---
        const IconActivity = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconShieldAlert = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>;
        const IconClipboardList = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path></svg>;
        const IconSyringe = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 2 22 6"></polyline><path d="M18 6L14 2"></path><path d="M14 6L6 14c-.3.3-.4.6-.5 1l-.5 3 3-.5c.4-.1.7-.2 1-.5L22 10"></path><path d="M2 22L8 16"></path><path d="M10 10l4 4"></path></svg>;
        const IconHeartPulse = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"></path></svg>;
        const IconStethoscope = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"></path><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"></path><circle cx="20" cy="10" r="2"></circle></svg>;
        const IconAlertTriangle = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>;
        const IconCheckCircle = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconArrowLeft = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconArrowRight = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
        const IconInfo = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>;
        const IconClock = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconCopy = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
        const IconCheck = ({ className, size=24 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>;

        const StemiProtocolApp = () => {
            const [currentStep, setCurrentStep] = useState(1);
            
            // Clinical State
            const [clinicalState, setClinicalState] = useState({ stemiLocation: '', killip: '' });

            // Guideline Decision State
            const [decisionState, setDecisionState] = useState({ 
                facility: '', 
                timeToPCI: '',
                consent: ''
            });
            
            const isPrimaryPCI = decisionState.facility === 'pci_center' || (decisionState.facility === 'non_pci_center' && decisionState.timeToPCI === 'under_120' && decisionState.consent === 'accept');
            
            // Patient State
            const [patientAgeGroup, setPatientAgeGroup] = useState(''); // 'under_75' or 'over_75'

            // --- FIBRINOLYTIC STATE ---
            const [absoluteChecks, setAbsoluteChecks] = useState({});
            const [relativeChecks, setRelativeChecks] = useState({});
            const [hasAbsolute, setHasAbsolute] = useState(false);
            const [hasRelative, setHasRelative] = useState(false);
            const [prepChecks, setPrepChecks] = useState({ sit: false, ivLines: false, monitor: false, ecgPre: false });
            const [reperfusionChecks, setReperfusionChecks] = useState({});

            // --- PRIMARY PCI STATE ---
            const [pciScreenChecks, setPciScreenChecks] = useState({ consent: false, allergy: false, bleeding: false, renal: false });
            const [pciPrepChecks, setPciPrepChecks] = useState({ loading: false, ivLeft: false, shave: false, clothes: false });
            const [pciPostChecks, setPciPostChecks] = useState({});

            // Copy State
            const [isCopied, setIsCopied] = useState(false);

            // Lists
            const stemiLabels = {
                anterior: 'Anterior (V1-V4)',
                anterolateral: 'Anterolateral (V1-V6, I, aVL)',
                inferior: 'Inferior (II, III, aVF)',
                inferior_rv: 'Inferior + RV Infarction (V3R-V4R)',
                lateral: 'Lateral / High Lateral (I, aVL, V5-V6)',
                posterior: 'Posterior (V7-V9)'
            };

            const absoluteContraindications = [
                "Perdarahan aktif atau diatesis perdarahan (kecuali menstruasi)",
                "Dicurigai diseksi aorta",
                "Trauma kepala tertutup/wajah signifikan dlm 3 bulan",
                "Riwayat perdarahan intrakranial sebelumnya",
                "Stroke iskemik dalam 3 bulan terakhir",
                "Diketahui memiliki lesi vaskular serebral (AVM)",
                "Diketahui memiliki neoplasma intrakranial ganas"
            ];
            const relativeContraindications = [
                "Penggunaan antikoagulan oral saat ini (OAC/NOAC)",
                "Pungsi vaskular non-kompresibel",
                "Operasi besar baru-baru ini (<3 minggu)",
                "RJP traumatis atau berkepanjangan (>10 menit)",
                "Perdarahan internal dlm 4 minggu / Ulkus Peptikum aktif",
                "Hipertensi berat tidak terkontrol (S>180 atau D>110)"
            ];
            const reperfusionSigns = ["Resolusi nyeri dada > 50%", "Resolusi elevasi ST > 50%", "Aritmia reperfusi (AIVR)", "Kondisi stabil"];
            const pciPostSigns = ["TR Band/Sheath Femoral Aman, tidak ada hematoma", "EKG Post-PCI: Resolusi ST membaik", "Hemodinamik stabil di ICU/CVCU"];

            useEffect(() => {
                setHasAbsolute(Object.values(absoluteChecks).some(val => val === true));
            }, [absoluteChecks]);

            useEffect(() => {
                setHasRelative(Object.values(relativeChecks).some(val => val === true));
            }, [relativeChecks]);

            const getDecisionRecommendation = () => {
                if (decisionState.facility === 'pci_center') {
                    return { title: "PRIMARY PCI", text: "FMC ke Wire Crossing target < 60-90 menit. Siapkan Cath Lab segera.", color: "bg-blue-100 text-blue-900 border-blue-400", action: "Lanjut Persiapan Cath Lab" };
                }
                if (decisionState.facility === 'non_pci_center') {
                    if (decisionState.timeToPCI === 'under_120') {
                        if (decisionState.consent === 'refuse') return { title: "FIBRINOLITIK (Menolak Rujuk)", text: "Keluarga menolak transfer, segera lakukan Farmakoinvasif di tempat.", color: "bg-yellow-100 text-yellow-900 border-yellow-400", action: "Lanjut Skrining Lisis" };
                        return { title: "TRANSFER UNTUK PRIMARY PCI", text: "Target FMC ke Wire Crossing < 120 menit. Hubungi RS rujukan sekarang.", color: "bg-indigo-100 text-indigo-900 border-indigo-400", action: "Lanjut Persiapan Transfer PCI" };
                    } else if (decisionState.timeToPCI === 'over_120') {
                        return { title: "TERAPI FIBRINOLITIK", text: "Waktu transfer > 120 menit. Berikan Fibrinolitik segera. Door-to-Needle < 10 Menit.", color: "bg-red-100 text-red-900 border-red-400", action: "Lanjut Skrining Lisis" };
                    }
                }
                return null;
            };

            const generateReport = () => {
                const rec = getDecisionRecommendation();
                let report = `*LAPORAN PERSIAPAN ${isPrimaryPCI ? 'PRIMARY PCI' : 'FIBRINOLITIK'} STEMI*\n\n`;
                
                // 1. Status Klinis
                report += `*1. Status Klinis Awal:*\n`;
                report += `- Diagnosis: STEMI ${stemiLabels[clinicalState.stemiLocation] || 'Belum diisi'}\n`;
                
                let killipText = "Belum diisi";
                if (clinicalState.killip === 'I') killipText = "Killip I (Tidak ada ronkhi / S3)";
                if (clinicalState.killip === 'II') killipText = "Killip II (Ronkhi <50% / S3 Gallop)";
                if (clinicalState.killip === 'III') killipText = "Killip III (Edema Paru Akut, Ronkhi >50%)";
                if (clinicalState.killip === 'IV') killipText = "Killip IV (Syok Kardiogenik)";
                report += `- Killip Class: ${killipText}\n\n`;

                // 2. Triage & Keputusan
                report += `*2. Triage & Keputusan:*\n`;
                report += `- Fasilitas: ${decisionState.facility === 'pci_center' ? 'RS PCI' : 'RS Non-PCI'}\n`;
                if (decisionState.facility === 'non_pci_center') {
                    report += `- Est. Transfer: ${decisionState.timeToPCI === 'under_120' ? '< 120 Menit' : '> 120 Menit'}\n`;
                    if (decisionState.timeToPCI === 'under_120') report += `- Persetujuan Rujuk: ${decisionState.consent === 'accept' ? 'Bersedia' : 'Menolak'}\n`;
                }
                report += `- Keputusan: ${rec ? rec.title : '-'}\n\n`;

                // 3 & 4. Sesuai Jalur (PCI / Lisis)
                if (isPrimaryPCI) {
                    report += `*3. Skrining Cath Lab:*\n`;
                    report += `- Informed Consent PCI: ${pciScreenChecks.consent ? 'Selesai ✅' : 'Belum ❌'}\n`;
                    report += `- Alergi Kontras: ${pciScreenChecks.allergy ? 'ADA ⚠️' : 'Tidak Ada ✅'}\n`;
                    report += `- Fungsi Ginjal (CKD): ${pciScreenChecks.renal ? 'ADA ⚠️' : 'Tidak Ada ✅'}\n`;
                    report += `- Risiko Perdarahan Mayor: ${pciScreenChecks.bleeding ? 'ADA ⚠️' : 'Tidak Ada ✅'}\n\n`;

                    report += `*4. Checklist Persiapan PCI (IGD):*\n`;
                    report += `- Loading Dose Diberikan: ${pciPrepChecks.loading ? 'Selesai ✅' : 'Belum ❌'}\n`;
                    report += `- Akses Vena Kiri Besar: ${pciPrepChecks.ivLeft ? 'Selesai ✅' : 'Belum ❌'}\n`;
                    report += `- Cukur (Radialis & Femoralis): ${pciPrepChecks.shave ? 'Selesai ✅' : 'Belum ❌'}\n`;
                    report += `- Baju Operasi & Lepas Aksesoris: ${pciPrepChecks.clothes ? 'Selesai ✅' : 'Belum ❌'}\n\n`;

                    report += `*Kesimpulan:*\nPasien SIAP untuk ditransfer ke Cath Lab untuk Primary PCI.`;
                } else {
                    const absArr = Object.keys(absoluteChecks).filter(k => absoluteChecks[k]).map(k => absoluteContraindications[k]);
                    const relArr = Object.keys(relativeChecks).filter(k => relativeChecks[k]).map(k => relativeContraindications[k]);
                    
                    report += `*3. Skrining Kontraindikasi:*\n`;
                    report += `- Absolut: ${absArr.length === 0 ? 'TIDAK ADA (Aman)' : absArr.join(', ')}\n`;
                    report += `- Relatif: ${relArr.length === 0 ? 'TIDAK ADA (Aman)' : relArr.join(', ')}\n\n`;

                    report += `*4. Checklist Persiapan Lisis:*\n`;
                    report += `- Informed Consent & SIT: ${prepChecks.sit ? 'Selesai ✅' : 'Belum ❌'}\n`;
                    report += `- Akses Vena (2 Jalur): ${prepChecks.ivLines ? 'Selesai ✅' : 'Belum ❌'}\n`;
                    report += `- Monitor & Defib: ${prepChecks.monitor ? 'Selesai ✅' : 'Belum ❌'}\n`;
                    report += `- EKG Pre-Lisis (0 Mnt): ${prepChecks.ecgPre ? 'Selesai ✅' : 'Belum ❌'}\n\n`;

                    report += `*Kesimpulan:*\nPasien SIAP untuk dimulai Fibrinolitik. Mohon ACC DPJP untuk eksekusi.`;
                }
                
                return report;
            };

            const handleCopyReport = () => {
                const text = generateReport();
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                setIsCopied(true);
                setTimeout(() => setIsCopied(false), 2500);
            };

            const nextStep = () => setCurrentStep(prev => Math.min(prev + 1, 6));
            const prevStep = () => setCurrentStep(prev => Math.max(prev - 1, 1));

            const allPrepChecked = isPrimaryPCI 
                ? Object.values(pciPrepChecks).every(val => val === true)
                : Object.values(prepChecks).every(val => val === true);

            // Disable next if Step 1 is incomplete (Location, Killip, or Facility not selected)
            const isStep1Incomplete = currentStep === 1 && (!clinicalState.stemiLocation || !clinicalState.killip || !decisionState.facility);

            const isNextDisabled = currentStep === 6 
                || isStep1Incomplete
                || (currentStep === 2 && !isPrimaryPCI && hasAbsolute) 
                || (currentStep === 3 && !allPrepChecked);

            const steps = [
                { id: 1, name: "Klinis & Triage", icon: IconActivity },
                { id: 2, name: "Skrining", icon: IconShieldAlert },
                { id: 3, name: "Persiapan", icon: IconClipboardList },
                { id: 4, name: isPrimaryPCI ? "Cath Lab" : "Fibrinolitik", icon: IconSyringe },
                { id: 5, name: "Evaluasi", icon: IconHeartPulse },
                { id: 6, name: "Medikasi", icon: IconStethoscope },
            ];

            return (
                <div className="min-h-screen bg-slate-50 font-sans pb-24">
                    {/* Header */}
                    <header className="bg-red-700 text-white p-4 shadow-md sticky top-0 z-20 pt-safe">
                        <div className="max-w-md mx-auto">
                            <div className="flex justify-between items-start mb-1">
                                <div>
                                    <div className="text-red-200 text-[10px] font-bold tracking-wider uppercase mb-0.5">
                                        CardiologyVault Guideline App
                                    </div>
                                    <h1 className="text-xl font-bold flex items-center gap-1.5 leading-tight">
                                        <IconHeartPulse className="h-6 w-6" />
                                        STEMI Protocol
                                    </h1>
                                </div>
                                <div className="bg-white/20 text-white px-2 py-1 rounded text-xs font-bold border border-red-500">
                                    {currentStep} / 6
                                </div>
                            </div>
                            <p className="text-red-100 text-[11px] mt-1">Based on ESC/AHA Guidelines &bull; by Bayushi Eka Putra, MD</p>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto mt-4 px-3">
                        {/* Progress Bar */}
                        <div className="flex justify-between mb-6 overflow-x-auto pb-2 scrollbar-hide snap-x">
                            {steps.map((step) => {
                                const Icon = step.icon;
                                const isActive = currentStep === step.id;
                                const isPast = currentStep > step.id;
                                return (
                                    <div key={step.id} className="flex flex-col items-center min-w-[65px] cursor-pointer snap-center" onClick={() => setCurrentStep(step.id)}>
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center border-2 mb-1.5 transition-colors duration-300 ${isActive ? 'bg-red-600 border-red-600 text-white' : isPast ? 'bg-green-500 border-green-500 text-white' : 'bg-white border-slate-300 text-slate-400'}`}>
                                            <Icon size={16} />
                                        </div>
                                        <span className={`text-[10px] leading-tight text-center font-medium px-1 ${isActive ? 'text-red-700 font-bold' : 'text-slate-500'}`}>{step.name}</span>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Step 1: Clinical Status & Decision (120 min rule) */}
                        {currentStep === 1 && (
                            <div className="animate-fadeIn">
                                {/* STEMI Location */}
                                <div className="bg-white rounded-xl shadow-lg p-6 border-t-4 border-red-600 mb-6">
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><IconActivity className="text-red-600"/> Lokasi Infark (EKG)</h2>
                                    <p className="text-sm text-slate-600 mb-4 border-b pb-4">Tentukan lokasi elevasi segmen ST pada EKG pertama.</p>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        {[
                                            { id: 'anterior', label: 'Anterior', desc: 'V1-V4' },
                                            { id: 'anterolateral', label: 'Anterolateral', desc: 'V1-V6, I, aVL' },
                                            { id: 'inferior', label: 'Inferior', desc: 'II, III, aVF' },
                                            { id: 'inferior_rv', label: 'Inferior + RV', desc: 'II, III, aVF + V3R-V4R' },
                                            { id: 'lateral', label: 'Lateral / High Lat', desc: 'I, aVL, V5-V6' },
                                            { id: 'posterior', label: 'Posterior', desc: 'V7-V9' }
                                        ].map(loc => (
                                            <label key={loc.id} className={`flex flex-col p-3 border rounded-lg cursor-pointer transition-all ${clinicalState.stemiLocation === loc.id ? 'bg-red-50 border-red-500 ring-1 ring-red-500' : 'hover:bg-slate-50'}`}>
                                                <input type="radio" name="stemiLocation" className="hidden" checked={clinicalState.stemiLocation === loc.id} onChange={() => setClinicalState({...clinicalState, stemiLocation: loc.id})} />
                                                <span className={`font-bold text-sm leading-tight ${clinicalState.stemiLocation === loc.id ? 'text-red-700' : 'text-slate-800'}`}>{loc.label}</span>
                                                <span className="text-[10px] text-slate-500 mt-1">{loc.desc}</span>
                                            </label>
                                        ))}
                                    </div>

                                    {clinicalState.stemiLocation === 'inferior_rv' && (
                                        <div className="mt-4 bg-orange-50 border-l-4 border-orange-500 p-3 rounded-r-lg animate-fadeIn">
                                            <span className="text-xs text-orange-800 font-medium"><b>PERHATIAN (RV Infarct):</b> Hindari pemberian Nitrat (ISDN). Pasien sangat bergantung pada <i>preload</i>. Jika terjadi hipotensi, siapkan <i>loading</i> cairan (NaCl 0.9%).</span>
                                        </div>
                                    )}
                                </div>

                                {/* Clinical Status (Killip) */}
                                <div className="bg-white rounded-xl shadow-lg p-6 border-t-4 border-rose-600 mb-6">
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><IconStethoscope className="text-rose-600"/> Status Jantung Kanan/Kiri</h2>
                                    <p className="text-sm text-slate-600 mb-4 border-b pb-4">Tentukan Klasifikasi Killip (evaluasi ronkhi paru / tanda gagal jantung).</p>
                                    
                                    <div className="space-y-3">
                                        <label className={`flex items-start gap-3 p-3 border rounded-lg cursor-pointer transition-all ${clinicalState.killip === 'I' ? 'bg-rose-50 border-rose-400 ring-1 ring-rose-400' : 'hover:bg-slate-50'}`}>
                                            <input type="radio" name="killip" className="w-5 h-5 mt-0.5 accent-rose-600 shrink-0" checked={clinicalState.killip === 'I'} onChange={() => setClinicalState({ ...clinicalState, killip: 'I' })} />
                                            <div>
                                                <span className="font-bold block text-slate-800">Killip I (Normal)</span>
                                                <span className="text-xs text-slate-500">Tidak ada ronkhi maupun S3 gallop.</span>
                                            </div>
                                        </label>
                                        <label className={`flex items-start gap-3 p-3 border rounded-lg cursor-pointer transition-all ${clinicalState.killip === 'II' ? 'bg-rose-50 border-rose-400 ring-1 ring-rose-400' : 'hover:bg-slate-50'}`}>

                                                    <span className="bg-teal-600 text-white w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold shrink-0 mt-0.5">2</span>
                                                    <div>
                                                        <span className="font-bold text-slate-800 block">Monitor Selama Transport</span>
                                                        <p className="text-slate-600 text-xs mt-1">Bawa Monitor portabel & Defibrillator (sangat rawan VF/VT di jalan).</p>
                                                    </div>
                                                </li>
                                                <li className="flex items-start gap-3 bg-white p-3 rounded-lg border border-teal-100 shadow-sm">
                                                    <span className="bg-teal-600 text-white w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold shrink-0 mt-0.5">3</span>
                                                    <div>
                                                        <span className="font-bold text-slate-800 block">Bawa Rekam Medis (RM)</span>
                                                        <p className="text-slate-600 text-xs mt-1">Pastikan form persetujuan, form obat, & EKG pre-kateterisasi terbawa.</p>
                                                    </div>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                ) : (
                                    /* FIBRINOLYTIC TRACK - Step 4 */
                                    <div>
                                        <div className="bg-teal-50 border border-teal-200 rounded-xl p-4 mb-6">
                                            <h3 className="text-sm font-bold text-teal-800 mb-3 uppercase tracking-wide">Pilihan Agen (Pilih Salah Satu):</h3>
                                            <div className="space-y-3">
                                                <div className="bg-white p-3 rounded-lg border border-teal-100 shadow-sm relative overflow-hidden">
                                                    <div className="absolute left-0 top-0 bottom-0 w-1 bg-teal-500"></div>
                                                    <span className="font-bold text-slate-800 block">1. Tenecteplase (TNK-tPA) <span className="text-[10px] bg-teal-100 text-teal-700 px-1 py-0.5 rounded ml-1">PREFERRED</span></span>
                                                    <p className="text-slate-600 text-xs mt-1">Single bolus IV lambat (5-10 detik). Dosis sesuai berat badan (30-50 mg).</p>
                                                </div>
                                                <div className="bg-white p-3 rounded-lg border border-teal-100 shadow-sm relative overflow-hidden">
                                                    <div className="absolute left-0 top-0 bottom-0 w-1 bg-teal-400"></div>
                                                    <span className="font-bold text-slate-800 block">2. Alteplase (tPA)</span>
                                                    <p className="text-slate-600 text-xs mt-1">Bolus 15 mg IV, lanjut infus 0.75 mg/kg dlm 30 mnt, lanjut infus 0.5 mg/kg dlm 60 mnt.</p>
                                                </div>
                                                <div className="bg-white p-3 rounded-lg border border-teal-100 shadow-sm relative overflow-hidden">
                                                    <div className="absolute left-0 top-0 bottom-0 w-1 bg-slate-400"></div>
                                                    <span className="font-bold text-slate-800 block">3. Streptokinase (SK)</span>
                                                    <p className="text-slate-600 text-xs mt-1">1.5 Juta Unit dalam 100cc NaCl 0.9% / D5%. Drip perlahan selama <b>30 - 60 menit</b>.</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-xl shadow-sm">
                                            <h4 className="font-bold text-red-700 flex items-center gap-2 mb-1"><IconAlertTriangle size={16}/> WASPADA HIPOTENSI</h4>
                                            <p className="text-red-800 text-xs mb-2">Terutama saat pemberian Streptokinase akibat reaksi alergi/vasodilatasi.</p>
                                            <ul className="list-disc pl-5 text-red-700 text-xs space-y-1">
                                                <li>Bila Tensi turun mendadak, hentikan sementara / perlambat tetesan.</li>
                                                <li>Loading cairan NaCl 0.9% jika tidak ada tanda gagal jantung.</li>
                                                <li>Siap titrasi <b>Norepinefrin</b> bila tidak respon cairan.</li>
                                            </ul>
                                        </div>
                                    </div>
                                )}

                                {/* Report Copy Button (Dynamic) */}
                                <div className="bg-slate-100 border border-slate-200 rounded-xl p-4 mb-2 shadow-sm flex flex-col items-center text-center">
                                    <h4 className="font-bold text-slate-800 mb-2 text-sm">Lapor Persiapan ke DPJP</h4>
                                    <p className="text-xs text-slate-500 mb-3">Copy rangkuman hasil persiapan untuk dikirim via WA ke Tim Cath Lab / DPJP.</p>
                                    <button 
                                        onClick={handleCopyReport}
                                        className={`w-full py-2.5 rounded-lg font-bold flex items-center justify-center gap-2 transition-all text-sm ${isCopied ? 'bg-green-500 text-white border-green-600' : 'bg-white border border-slate-300 text-slate-700 hover:bg-slate-50'}`}
                                    >
                                        {isCopied ? <><IconCheck size={18} /> Laporan Tersalin!</> : <><IconCopy size={18} /> Copy Laporan {isPrimaryPCI ? 'PCI' : 'Lisis'}</>}
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Step 5: Evaluation (Dual Track) */}
                        {currentStep === 5 && (
                            <div className="bg-white rounded-xl shadow-lg p-6 border-t-4 border-green-500 animate-fadeIn">
                                <div className="flex justify-between items-start mb-4">
                                    <h2 className="text-xl font-bold flex items-center gap-2"><IconHeartPulse className="text-green-500"/> {isPrimaryPCI ? 'Handover Pasca-PCI' : 'Kriteria Reperfusi'}</h2>
                                </div>

                                {isPrimaryPCI ? (
                                    /* PRIMARY PCI TRACK - Step 5 */
                                    <div>
                                        <p className="text-sm text-slate-600 mb-4 border-b pb-4">Checklist serah terima pasien dari Cath Lab ke CVCU/ICU.</p>
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-5">
                                            <h3 className="font-bold text-slate-800 mb-3 text-sm">Evaluasi Klinis Pasca-Tindakan:</h3>
                                            <div className="space-y-2">
                                                {pciPostSigns.map((sign, idx) => (
                                                    <label key={`pciPost-${idx}`} className="flex items-start gap-3 p-2 hover:bg-slate-200 rounded-lg cursor-pointer transition-colors">
                                                        <input type="checkbox" className="w-5 h-5 mt-0.5 accent-green-600 shrink-0" checked={pciPostChecks[idx] || false} onChange={() => setPciPostChecks({...pciPostChecks, [idx]: !pciPostChecks[idx]})} />
                                                        <span className="text-slate-800 text-sm">{sign}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-xl">
                                            <h4 className="font-bold text-blue-800 flex items-center gap-2 mb-1"><IconInfo size={16}/> Catat Laporan Prosedur</h4>
                                            <p className="text-blue-900 text-xs">Pastikan mencatat: Jumlah stent yang dipasang, lokasi stenting (LAD/LCx/RCA), obat yang masuk selama di meja cath lab (seperti UFH, Tirofiban), dan TIMI Flow akhir.</p>
                                        </div>
                                    </div>
                                ) : (
                                    /* FIBRINOLYTIC TRACK - Step 5 */
                                    <div>
                                        <p className="text-sm text-slate-600 mb-4 border-b pb-4">Evaluasi keberhasilan terapi pada <b>60 - 90 menit</b> setelah lisis dimulai.</p>
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-5">
                                            <h3 className="font-bold text-slate-800 mb-3 text-sm">Tanda Keberhasilan Klinis & EKG:</h3>
                                            <div className="space-y-2">
                                                {reperfusionSigns.map((sign, idx) => (
                                                    <label key={`rep-${idx}`} className="flex items-start gap-3 p-2 hover:bg-slate-200 rounded-lg cursor-pointer transition-colors">
                                                        <input type="checkbox" className="w-5 h-5 mt-0.5 accent-green-600 shrink-0" checked={reperfusionChecks[idx] || false} onChange={() => handleReperfusionChange(idx)} />
                                                        <span className="text-slate-800 text-sm">{sign}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-blue-50 border border-blue-200 p-3 rounded-xl text-center">
                                                <div className="font-bold text-blue-800 text-sm mb-1 border-b border-blue-200 pb-1">BILA SUKSES</div>
                                                <p className="text-blue-900 text-[11px] leading-tight">Lanjutkan antikoagulan. Rencanakan <b>Routine Early Angiography</b> (transfer ke fasilitas PCI dlm 2-24 jam).</p>
                                            </div>
                                            <div className="bg-red-50 border border-red-200 p-3 rounded-xl text-center">
                                                <div className="font-bold text-red-800 text-sm mb-1 border-b border-red-200 pb-1">BILA GAGAL</div>
                                                <p className="text-red-900 text-[11px] leading-tight">(Resolusi ST &lt; 50%). Indikasi Kelas I untuk segera <b>RESCUE PCI</b>. Siapkan transfer darurat.</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Step 6: Medications */}
                        {currentStep === 6 && (
                            <div className="bg-white rounded-xl shadow-lg p-6 border-t-4 border-purple-500 animate-fadeIn">
                                <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><IconStethoscope className="text-purple-500"/> Medikamentosa Lanjutan</h2>

                                {/* Age Toggle */}
                                <div className="bg-purple-50 p-4 rounded-xl border border-purple-200 mb-5">
                                    <label className="block font-bold text-purple-900 mb-2">Usia Pasien (Penentu dosis antikoagulan):</label>
                                    <div className="flex gap-3">
                                        <label className={`flex-1 flex items-center justify-center gap-2 p-3 border rounded-lg bg-white cursor-pointer transition-colors ${patientAgeGroup === 'under_75' ? 'border-purple-500 ring-1 ring-purple-500 text-purple-700 font-bold' : 'border-slate-300 hover:bg-slate-50'}`}>
                                            <input type="radio" name="age" className="hidden" checked={patientAgeGroup === 'under_75'} onChange={() => setPatientAgeGroup('under_75')} />
                                            <span>&le; 75 Tahun</span>
                                        </label>
                                        <label className={`flex-1 flex items-center justify-center gap-2 p-3 border rounded-lg bg-white cursor-pointer transition-colors ${patientAgeGroup === 'over_75' ? 'border-purple-500 ring-1 ring-purple-500 text-purple-700 font-bold' : 'border-slate-300 hover:bg-slate-50'}`}>
                                            <input type="radio" name="age" className="hidden" checked={patientAgeGroup === 'over_75'} onChange={() => setPatientAgeGroup('over_75')} />
                                            <span>&gt; 75 Tahun</span>
                                        </label>
                                    </div>
                                    {!patientAgeGroup && <p className="text-xs text-red-500 mt-2 font-medium">Silakan pilih usia pasien untuk melihat panduan dosis.</p>}
                                </div>

                                {patientAgeGroup && (
                                    <div className="space-y-4 animate-fadeIn">
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                                            <h3 className="font-bold text-slate-800 mb-2 border-b pb-2 flex justify-between">
                                                <span>Loading Dose (Awal)</span>
                                                <span className={`text-[10px] px-2 py-1 rounded ${isPrimaryPCI ? 'bg-blue-100 text-blue-800' : 'bg-red-100 text-red-800'}`}>{isPrimaryPCI ? 'Primary PCI' : 'Fibrinolitik'}</span>
                                            </h3>
                                            <ul className="list-disc pl-5 space-y-1.5 text-slate-700 text-sm">
                                                <li><b>Aspirin:</b> 160-320 mg kunyah.</li>
                                                {isPrimaryPCI ? (
                                                    <li><b>P2Y12 Inhibitor:</b> <b>Ticagrelor 180 mg</b> (disukai) ATAU <b>Clopidogrel 600 mg</b>.</li>
                                                ) : (
                                                    <li><b>Clopidogrel:</b> {patientAgeGroup === 'over_75' ? "75 mg (TANPA loading dose)" : "300 mg (Loading dose)"}</li>
                                                )}
                                            </ul>
                                        </div>

                                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                            <h3 className="font-bold text-slate-800 mb-2 border-b pb-2">Antikoagulan {isPrimaryPCI ? '(Jika belum diberi di Cath Lab)' : '(Post-Lisis)'}</h3>
                                            <div className="space-y-3">
                                                {isPrimaryPCI ? (
                                                    /* UFH preferred generally around Cathlab but LMWH if returning to ward without UFH infusion */
                                                    <div className="text-sm">
                                                        <span className="text-slate-600 block mb-2">Biasanya antikoagulan (UFH) diberikan langsung oleh operator saat prosedur PCI. Jika instruksi maintenance:</span>
                                                        <ul className="list-disc pl-4 space-y-2">
                                                            <li><span className="font-bold text-blue-800">Unfractionated Heparin (UFH):</span> Titrasi kontinyu via Syringe Pump berdasarkan aPTT. Gunakan <b>HeparinCalc</b> di CardiologyVault.</li>
                                                            <li><span className="font-bold text-blue-800">Enoxaparin (LMWH):</span> 1 mg/kgBB SC tiap 12 jam.</li>
                                                        </ul>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <div className="text-sm">
                                                            <span className="font-bold text-blue-800 block mb-0.5">Opsi 1: Enoxaparin (LMWH)</span>
                                                            {patientAgeGroup === 'over_75' 
                                                                ? <span className="text-slate-600"><b>TANPA Bolus IV.</b> Langsung injeksi SC <b>0.75 mg/kgBB</b> tiap 12 jam (maksimal 75mg untuk 2 dosis awal).</span>
                                                                : <span className="text-slate-600">Bolus <b>30 mg IV</b>, diikuti 15 menit kemudian dengan <b>1 mg/kgBB SC</b> tiap 12 jam.</span>
                                                            }
                                                        </div>
                                                        <div className="border-t border-dashed pt-2 text-sm">
                                                            <span className="font-bold text-blue-800 block mb-0.5">Opsi 2: Fondaparinux</span>
                                                            <span className="text-slate-600">Bolus <b>2.5 mg IV</b>, dilanjutkan dosis <b>2.5 mg SC</b> tiap 24 jam. (Diutamakan jika lisis memakai Streptokinase).</span>
                                                        </div>
                                                        <div className="border-t border-dashed pt-2 text-sm">
                                                            <span className="font-bold text-blue-800 block mb-0.5">Opsi 3: Unfractionated Heparin (UFH)</span>
                                                            <span className="text-slate-600">Bolus IV dilanjutkan infus kontinyu. Gunakan kalkulator <b>HeparinCalc</b> di CardiologyVault untuk dosis & titrasi aPTT.</span>
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        </div>

                                        <div className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                                            <h3 className="font-bold text-slate-800 mb-2 border-b pb-2">Terapi Tambahan Harian</h3>
                                            <ul className="text-sm text-slate-600 grid grid-cols-2 gap-2">
                                                <li>&bull; Atorvastatin 40-80 mg</li>
                                                <li>&bull; Pantoprazole 40 mg IV</li>
                                                <li>&bull; ISDN 5mg SL (Bila TD stabil)</li>
                                                <li>&bull; ACEi mulai dlm 24j (bila SBP>100)</li>
                                                <li>&bull; Laktulosa 1xC</li>
                                                <li>&bull; Diazepam 2.5mg PO (malam)</li>
                                            </ul>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>
                    
                    {/* Footer Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-3 z-20 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] pb-safe">
                        <div className="max-w-md mx-auto flex justify-between items-center gap-3">
                            <button 
                                onClick={prevStep} 
                                disabled={currentStep === 1}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all text-sm ${currentStep === 1 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-100 text-slate-700 hover:bg-slate-200 active:bg-slate-300'}`}
                            >
                                <IconArrowLeft size={18} /> Kembali
                            </button>
                            
                            <button 
                                onClick={nextStep} 
                                disabled={isNextDisabled}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all text-sm ${isNextDisabled ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-red-600 text-white hover:bg-red-700 active:bg-red-800 shadow-md'}`}
                            >
                                {currentStep === 6 ? 'Selesai' : (currentStep === 2 && !isPrimaryPCI && hasAbsolute) ? 'Tindakan Batal' : (currentStep === 3 && !allPrepChecked) ? 'Lengkapi Checklist' : 'Lanjut'} <IconArrowRight size={18} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StemiProtocolApp />);
    </script>
</body>
</html>
