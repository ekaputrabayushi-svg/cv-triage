<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardiologyVault - AFib Decision Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Konfigurasi Tema Kustom Tailwind: Cath Lab Bioluminescence (Refined) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            900: '#0B1121', // Latar Belakang Utama Input
                            800: '#131B2F', // Panel/Kartu Input
                            700: '#1E293B', // Border Input
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B1121;
            color: #F8FAFC;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B1121; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        .glass-panel-input {
            background-color: #131B2F;
            border: 1px solid #1E293B;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        
        /* Panel output dibuat sedikit lebih cerah/high-contrast agar data pop-out */
        .glass-panel-output {
            background-color: #1E293B; 
            border: 1px solid #334155;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
    </style>

    <!-- Pemuatan React, ReactDOM, dan Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useReducer, useMemo, useState } = React;

        const Icons = {
            Heart: () => <svg className="w-6 h-6 inline mr-2 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>,
            User: () => <svg className="w-5 h-5 inline mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>,
            Alert: () => <svg className="w-4 h-4 inline mr-2 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            Pill: () => <svg className="w-5 h-5 inline mr-2 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>,
            Ban: () => <svg className="w-5 h-5 inline mr-2 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636" /></svg>,
            Copy: () => <svg className="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>,
            Gauge: () => <svg className="w-5 h-5 inline mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>,
            Shield: () => <svg className="w-5 h-5 inline mr-2 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
        };

        const riskStrokeMap = { 0: 0, 1: 1.3, 2: 2.2, 3: 3.2, 4: 4.0, 5: 6.7, 6: 9.8, 7: 9.6, 8: 6.7, 9: 15.2 };
        const riskBleedMap = { 0: 1.13, 1: 1.02, 2: 1.88, 3: 3.74, 4: 8.70, 5: 12.5, 6: 12.5, 7: 12.5, 8: 12.5, 9: 12.5 };

        // a11y Update: Aksesibilitas Keyboard di Toggle
        const Toggle = ({ checked, onChange, colorClass = "bg-teal-500", disabled = false }) => {
            const handleKeyDown = (e) => {
                if (disabled) return;
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault(); onChange();
                }
            };
            return (
                <div className={`relative inline-block w-11 mr-2 align-middle select-none transition-opacity ${disabled ? 'opacity-40 cursor-not-allowed' : ''}`}>
                    <div 
                        role="switch" aria-checked={checked} tabIndex={disabled ? -1 : 0}
                        onClick={disabled ? undefined : onChange} onKeyDown={handleKeyDown}
                        className={`block overflow-hidden h-6 rounded-full cursor-pointer transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-offset-navy-900 focus:ring-teal-400 ${checked ? colorClass : 'bg-slate-700'}`}
                    >
                        <div className={`w-5 h-5 bg-white rounded-full absolute top-0.5 shadow-sm transform transition-transform duration-300 ease-in-out ${checked ? 'translate-x-5' : 'translate-x-0.5'}`} />
                    </div>
                </div>
            );
        };

        const initialState = {
            age: 65, sex: 'M', weight: 70, height: 170, scr: 1.0,
            valvular: false, chf: false, htn: false, htn_uncontrolled: false,
            dm: false, stroke: false, vascular: false, renal: false,
            liver: false, bleeding: false, inr: false, drugs: false, alcohol: false,
            roundLowScr: true,
            cypInhibitors: false,
            antiplatelet: false,
            simulateOptimization: false
        };

        function dataReducer(state, action) {
            switch (action.type) {
                case 'SET_FIELD': {
                    const { name, value } = action.payload;
                    let newState = { ...state, [name]: value };
                    if (name === 'htn_uncontrolled' && value) newState.htn = true;
                    if (name === 'htn' && !value) newState.htn_uncontrolled = false;
                    if (name === 'scr' && value > 2.26) newState.renal = true;
                    return newState;
                }
                case 'TOGGLE_FIELD': {
                    const name = action.payload;
                    let newState = { ...state, [name]: !state[name] };
                    if (name === 'htn_uncontrolled' && newState[name]) newState.htn = true;
                    if (name === 'htn' && !newState[name]) newState.htn_uncontrolled = false;
                    return newState;
                }
                default: return state;
            }
        }

        // Optimasi React.memo untuk mencegah re-render visual matriks secara terus menerus
        const KineticMatrix = React.memo(({ chads, hasbled, status }) => {
            const plotX = Math.max(5, Math.min((hasbled / 9) * 100, 95));
            const plotY = Math.max(5, Math.min((chads / 9) * 100, 95));
            
            return (
                <div className="relative w-full aspect-square max-w-[240px] mx-auto border-l-2 border-b-2 border-slate-600 mb-12 mt-6">
                    <div className="absolute -left-10 top-1/2 transform -translate-y-1/2 -rotate-90 text-[10px] font-bold text-teal-400 tracking-widest uppercase">Risiko Stroke</div>
                    <div className="absolute -bottom-10 left-1/2 transform -translate-x-1/2 text-[10px] font-bold text-rose-400 tracking-widest uppercase w-max">Risiko Perdarahan</div>
                    
                    {/* Label Angka Sumbu */}
                    <div className="absolute -bottom-6 -left-2 text-[10px] text-slate-500 font-bold">0</div>
                    <div className="absolute -top-3 -left-5 text-[10px] text-slate-500 font-bold">9</div>
                    <div className="absolute -bottom-6 -right-2 text-[10px] text-slate-500 font-bold">9</div>

                    <div className="absolute inset-0 grid grid-cols-2 grid-rows-2">
                        <div className="bg-emerald-500/5 border-r border-b border-slate-700"></div>
                        <div className="bg-amber-500/5 border-b border-slate-700"></div>
                        <div className="bg-slate-700/20 border-r border-slate-700"></div>
                        <div className="bg-rose-500/5 border-slate-700"></div>
                    </div>

                    {/* Titik Dinamis */}
                    <div 
                        className={`absolute w-5 h-5 rounded-full shadow-[0_0_20px_rgba(255,255,255,0.4)] border-2 transform -translate-x-1/2 translate-y-1/2 z-10 flex items-center justify-center transition-all duration-700 ease-in-out bg-white ${
                            status === 'indicated' ? 'border-teal-500' : status === 'considered' ? 'border-amber-500' : 'border-slate-500'
                        }`}
                        style={{ left: `${plotX}%`, bottom: `${plotY}%` }}
                    >
                        <div className={`w-2 h-2 rounded-full animate-pulse ${
                            status === 'indicated' ? 'bg-teal-500' : status === 'considered' ? 'bg-amber-500' : 'bg-slate-500'
                        }`}></div>
                    </div>
                </div>
            );
        });

        function App() {
            const [data, dispatch] = useReducer(dataReducer, initialState);
            const [copied, setCopied] = useState(false);

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                const val = type === 'checkbox' ? checked : (value === '' ? '' : parseFloat(value));
                dispatch({ type: 'SET_FIELD', payload: { name, value: val } });
            };
            const toggleVal = (name) => dispatch({ type: 'TOGGLE_FIELD', payload: name });

            const scores = useMemo(() => {
                const { age, sex, weight, height, scr, chf, htn, htn_uncontrolled, dm, stroke, 
                        vascular, renal, liver, bleeding, inr, drugs, alcohol, roundLowScr, simulateOptimization } = data;
                
                const safeAge = Math.max(18, Math.min(Number(age) || 65, 120));
                const safeWeight = Math.max(30, Math.min(Number(weight) || 70, 300));
                const safeHeight = Math.max(100, Math.min(Number(height) || 170, 250));
                const safeScr = Math.max(0.1, Math.min(Number(scr) || 1.0, 20));

                let bmi = (safeHeight > 0 && safeWeight > 0) ? safeWeight / Math.pow(safeHeight / 100, 2) : 0;
                
                // Pedoman ISTH: Peringatan Obesitas Ekstrem
                const isExtremeObesity = bmi > 40 || safeWeight > 120;

                let ibw = 0;
                let finalDosingWeight = safeWeight;
                let weightMechanism = "Actual Weight";

                if (safeHeight > 0) {
                    const heightInches = (safeHeight / 2.54);
                    const inchesOver60 = Math.max(0, heightInches - 60);
                    ibw = (sex === 'M' ? 50 : 45.5) + (2.3 * inchesOver60);
                    if (bmi > 30) {
                        finalDosingWeight = ibw + 0.4 * (safeWeight - ibw);
                        weightMechanism = "Adjusted Weight (Obesity BMI > 30)";
                    }
                }

                let effectiveScr = safeScr;
                let scrMechanism = "Actual SCr";
                if (roundLowScr && safeAge >= 65 && safeScr < 0.8) {
                    effectiveScr = 0.8; scrMechanism = "Rounded to 0.8 mg/dL (Elderly Safety)";
                }

                // Kalkulasi CrCl dengan Hardcap 150 mL/min
                let crcl = 0;
                if (safeAge > 0 && finalDosingWeight > 0 && effectiveScr > 0) {
                    let rawCrcl = ((140 - safeAge) * finalDosingWeight) / (72 * effectiveScr);
                    if (sex === 'F') rawCrcl = rawCrcl * 0.85;
                    crcl = Math.min(Math.round(rawCrcl), 150); 
                }

                let chads = 0;
                if (chf) chads += 1;
                if (htn) chads += 1;
                if (safeAge >= 65 && safeAge <= 74) chads += 1;
                if (safeAge >= 75) chads += 2;
                if (dm) chads += 1;
                if (stroke) chads += 2;
                if (vascular) chads += 1;
                if (sex === 'F') chads += 1;

                let actual_hasbled = [htn_uncontrolled, renal, liver, stroke, bleeding, inr, safeAge > 65, drugs, alcohol].filter(Boolean).length;
                let simulated_hasbled = simulateOptimization 
                    ? [renal, liver, stroke, bleeding, inr, safeAge > 65].filter(Boolean).length 
                    : actual_hasbled;

                return { 
                    crcl, chads, hasbled: simulated_hasbled, baselineHasbled: actual_hasbled,
                    bmi: Math.round(bmi * 10) / 10, weightMechanism, scrMechanism, 
                    safeAge, safeWeight, safeScr, isExtremeObesity
                };
            }, [data]);

            const recommendation = useMemo(() => {
                const isOACIndicated = (data.sex === 'M' && scores.chads >= 2) || (data.sex === 'F' && scores.chads >= 3);
                const isOACConsidered = (data.sex === 'M' && scores.chads === 1) || (data.sex === 'F' && scores.chads === 2);

                if (isOACIndicated) return { primary: "OAC Sangat Direkomendasikan", secondary: "Risiko iskemik tinggi (Class I).", colorClass: "text-teal-400", showDoac: true, status: "indicated" };
                if (isOACConsidered) return { primary: "Pertimbangkan OAC", secondary: "Berdasarkan pendekatan klinis (Class IIa).", colorClass: "text-amber-400", showDoac: true, status: "considered" };
                return { primary: "Tidak Perlu Antikoagulan", secondary: "Risiko sangat rendah.", colorClass: "text-slate-400", showDoac: false, status: "none" };
            }, [scores.chads, data.sex]);

            const { crcl, safeAge, safeWeight, safeScr } = scores;
            const { valvular, cypInhibitors } = data;

            const doacDosing = useMemo(() => {
                if (valvular) return { type: 'valvular' };
                if (crcl > 0 && crcl < 15) return { type: 'esrd' };

                // 1. Apixaban (Pengecualian Ganda Aktif)
                let apixabanDose = "5 mg BID", apixabanNote = "Dosis standar", isApixContra = false;
                let apixCriteria = 0;
                if (safeAge >= 80) apixCriteria++;
                if (safeWeight <= 60) apixCriteria++;
                if (safeScr >= 1.5) apixCriteria++;
                
                if (apixCriteria >= 2 && cypInhibitors) {
                    apixabanDose = "HINDARI";
                    apixabanNote = "Kontraindikasi: ≥2 Kriteria ABC + Inhibitor CYP3A4/P-gp (Sesuai FDA Label)";
                    isApixContra = true;
                } else if (apixCriteria >= 2) {
                    apixabanDose = "2.5 mg BID"; apixabanNote = "Dosis reduksi (≥2 kriteria ABC)";
                } else if (cypInhibitors) {
                    apixabanDose = "2.5 mg BID"; apixabanNote = "Dosis reduksi (Interaksi inhibitor kuat)";
                }

                // 2. Rivaroxaban
                let rivaDose = (crcl > 0 && crcl <= 50) ? "15 mg QD" : "20 mg QD";
                let rivaNote = (crcl > 0 && crcl <= 50) ? "Reduksi ginjal (CrCl 15-50 mL/min)" : "Dosis standar (bersama makanan)";

                // 3. Dabigatran
                let dabiDose = "150 mg BID", dabiNote = "Dosis standar", isDabiReduced = false;
                if (safeAge >= 80 || cypInhibitors) {
                    dabiDose = "110 mg BID"; dabiNote = safeAge >= 80 ? "Reduksi usia (≥ 80 tahun)" : "Reduksi (Interaksi inhibitor P-gp)";
                    isDabiReduced = true;
                } else if (crcl >= 30 && crcl <= 50) {
                    dabiDose = "110 mg BID"; dabiNote = "Reduksi ginjal (CrCl 30-50 mL/min)"; isDabiReduced = true;
                }
                if (crcl > 0 && crcl < 30) { dabiDose = "KONTRA"; dabiNote = "CrCl < 30 mL/min tidak dianjurkan"; }

                // 4. Edoxaban
                let edoxDose = (safeWeight <= 60 || (crcl > 0 && crcl <= 50)) ? "30 mg QD" : "60 mg QD";
                let edoxNote = edoxDose === "30 mg QD" ? "Reduksi (BB \u2264 60kg atau CrCl 15-50)" : "Dosis standar";
                let isEdoxContra = false;

                // Modifikasi Logika Klinis Edoxaban (FDA Warning CrCl > 95)
                if (crcl > 95) {
                    edoxDose = "HINDARI";
                    edoxNote = "Efikasi menurun pada CrCl > 95 mL/min (FDA Warning)";
                    isEdoxContra = true;
                }

                return { 
                    type: 'doses', 
                    apixaban: { dose: apixabanDose, note: apixabanNote, isReduced: apixCriteria >= 2 || cypInhibitors, isContra: isApixContra },
                    rivaroxaban: { dose: rivaDose, note: rivaNote, isReduced: crcl > 0 && crcl <= 50 },
                    dabigatran: { dose: dabiDose, note: dabiNote, isReduced: isDabiReduced, isContra: dabiDose === "KONTRA" },
                    edoxaban: { dose: edoxDose, note: edoxNote, isReduced: edoxDose === "30 mg QD" && !isEdoxContra, isContra: isEdoxContra }
                };
            }, [crcl, safeAge, safeWeight, safeScr, valvular, cypInhibitors]);

            const handleCopyNote = async () => {
                const timestamp = new Date().toLocaleString('id-ID');
                let note = `AFIB ANTICOAGULATION (CardiologyVault) - ${timestamp}\n--------------------------------------------------\n`;
                note += `Pasien: ${data.sex}, ${data.age} thn, ${data.weight} kg, ${data.height} cm (BMI: ${scores.bmi})\n`;
                note += `Fungsi Ginjal: CrCl ~${scores.crcl} mL/min (SCr aktual: ${data.scr} mg/dL)\n\n`;
                note += `SKOR:\n- CHA₂DS₂-VASc: ${scores.chads} (${riskStrokeMap[Math.min(scores.chads, 9)]}% /thn)\n`;
                note += `- HAS-BLED: ${scores.baselineHasbled} (${riskBleedMap[Math.min(scores.baselineHasbled, 9)]}% /thn)\n\n`;
                note += `REKOMENDASI: ${recommendation.primary}.\n`;
                if (scores.isExtremeObesity) note += `PERINGATAN ISTH: Obesitas Ekstrem terdeteksi. Pertimbangkan cek kadar anti-Xa atau gunakan VKA.\n`;
                if (!data.valvular && scores.crcl >= 15) {
                    note += `\nDosis DOAC:\n- Apixaban: ${doacDosing.apixaban?.dose} (${doacDosing.apixaban?.note})\n`;
                    note += `- Rivaroxaban: ${doacDosing.rivaroxaban?.dose} (${doacDosing.rivaroxaban?.note})\n`;
                    note += `- Dabigatran: ${doacDosing.dabigatran?.dose} (${doacDosing.dabigatran?.note})\n`;
                    note += `- Edoxaban: ${doacDosing.edoxaban?.dose} (${doacDosing.edoxaban?.note})`;
                }
                note += `\n--------------------------------------------------\nBy Bayushi Eka Putra, MD`;

                const triggerSuccess = () => { setCopied(true); setTimeout(() => setCopied(false), 2000); };
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(note); triggerSuccess();
                    } else fallbackCopyTextToClipboard(note, triggerSuccess);
                } catch (err) { fallbackCopyTextToClipboard(note, triggerSuccess); }
            };

            const fallbackCopyTextToClipboard = (text, onSuccess) => {
                const ta = document.createElement("textarea");
                ta.value = text; ta.style.position = "fixed"; ta.style.opacity = 0;
                document.body.appendChild(ta); ta.select();
                try { if(document.execCommand('copy')) onSuccess(); } catch(e){}
                document.body.removeChild(ta);
            };

            return (
                <div className="min-h-screen p-4 md:p-6 lg:p-8 flex flex-col items-center">
                    
                    <header className="w-full max-w-6xl mb-6 glass-panel-input p-5 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="text-center md:text-left">
                            <div className="flex items-center justify-center md:justify-start gap-2">
                                <span className="text-xs font-bold tracking-widest text-teal-400 uppercase bg-teal-950/40 border border-teal-800 px-2.5 py-1 rounded-full shadow-inner">CardiologyVault</span>
                                <span className="text-xs font-medium text-slate-400 bg-navy-900 px-2.5 py-1 rounded-full border border-navy-700">Ver. 2.6.1</span>
                            </div>
                            <h1 className="text-3xl md:text-4xl font-extrabold text-white flex items-center justify-center md:justify-start mt-2">
                                <Icons.Heart /> AFib Decision Hub
                            </h1>
                            <p className="text-slate-400 text-sm mt-1">Smart-Linked Multi-Evaluator &amp; Pharmacokinetic Matrix</p>
                        </div>
                        
                        {/* Chief Investigator Tag (Dikembalikan) */}
                        <div className="bg-navy-900/90 border border-navy-700 p-4 rounded-xl flex flex-col items-center md:items-end shadow-md min-w-[240px]">
                            <div className="text-xs text-slate-500 font-bold tracking-wider">CHIEF DEVELOPER</div>
                            <div className="text-sm font-bold text-white tracking-wide mt-0.5">Bayushi Eka Putra, MD, FIHA</div>
                            <div className="text-[10px] text-teal-400 bg-teal-950/40 border border-teal-900 px-2 py-0.5 rounded-md mt-1.5 font-medium uppercase tracking-wider">
                                Interventional Cardiologist
                            </div>
                        </div>
                    </header>

                    <main className="w-full max-w-6xl grid grid-cols-1 xl:grid-cols-12 gap-6 md:gap-8">
                        
                        {/* Panel Kiri - Input (Gelap / Low-glare) */}
                        <section className="xl:col-span-7 space-y-6">
                            
                            <div className="glass-panel-input p-6 rounded-2xl">
                                <h2 className="text-lg font-semibold mb-5 text-white border-b border-navy-700 pb-2 flex items-center justify-between">
                                    <span className="flex items-center"><Icons.User /> 1. Profil Fisiologis Fisik</span>
                                    <span className="text-xs text-slate-500">Cockcroft-Gault Engine</span>
                                </h2>
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase tracking-wide">Usia</label>
                                        <input type="number" name="age" value={data.age} onChange={handleChange} className="w-full bg-navy-900 border border-navy-700 rounded-lg p-2.5 text-white focus:ring-1 focus:ring-teal-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase tracking-wide">Kelamin</label>
                                        <div className="flex gap-1 bg-navy-900 p-1 rounded-lg border border-navy-700">
                                            <button onClick={() => dispatch({ type: 'SET_FIELD', payload: {name: 'sex', value: 'M'} })} className={`flex-1 py-1.5 rounded-md text-xs font-bold transition ${data.sex === 'M' ? 'bg-teal-600 text-white shadow' : 'text-slate-500 hover:text-slate-300'}`}>M</button>
                                            <button onClick={() => dispatch({ type: 'SET_FIELD', payload: {name: 'sex', value: 'F'} })} className={`flex-1 py-1.5 rounded-md text-xs font-bold transition ${data.sex === 'F' ? 'bg-rose-600 text-white shadow' : 'text-slate-500 hover:text-slate-300'}`}>F</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase tracking-wide">Berat (kg)</label>
                                        <input type="number" inputMode="decimal" name="weight" value={data.weight} onChange={handleChange} className="w-full bg-navy-900 border border-navy-700 rounded-lg p-2.5 text-white focus:ring-1 focus:ring-teal-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase tracking-wide">Tinggi (cm)</label>
                                        <input type="number" inputMode="decimal" name="height" value={data.height} onChange={handleChange} className="w-full bg-navy-900 border border-navy-700 rounded-lg p-2.5 text-white focus:ring-1 focus:ring-teal-500 focus:outline-none" />
                                    </div>
                                    <div className="col-span-2 md:col-span-1">
                                        <label className="block text-[11px] font-bold text-slate-400 mb-1.5 uppercase tracking-wide">SCr (mg/dL)</label>
                                        <input type="number" inputMode="decimal" step="0.1" name="scr" value={data.scr} onChange={handleChange} className="w-full bg-navy-900 border border-navy-700 rounded-lg p-2.5 text-white focus:ring-1 focus:ring-teal-500 focus:outline-none" />
                                    </div>
                                </div>

                                <div className="mt-4 p-3 bg-navy-900/50 rounded-xl border border-navy-700/60 grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    <div className="flex items-center justify-between">
                                        <div className="flex flex-col">
                                            <span className="text-slate-200 text-sm font-medium">Bulatkan SCr Lansia</span>
                                            <span className="text-[10px] text-slate-500">Mencegah overestimasi CrCl pada SCr &lt; 0.8 (Sarkopenia)</span>
                                        </div>
                                        <Toggle checked={data.roundLowScr} onChange={() => toggleVal('roundLowScr')} colorClass="bg-indigo-500" />
                                    </div>
                                    <div className="text-xs flex flex-col justify-center border-t sm:border-t-0 sm:border-l border-navy-700 sm:pl-4">
                                        <div className="flex justify-between">
                                            <span className="text-slate-400">BMI:</span>
                                            <span className={`font-bold ${scores.isExtremeObesity ? 'text-rose-400' : 'text-slate-200'}`}>{scores.bmi} kg/m²</span>
                                        </div>
                                        <div className="flex justify-between mt-1 text-[11px]">
                                            <span className="text-slate-400">Model Berat:</span>
                                            <span className="font-semibold text-teal-400">{scores.weightMechanism.includes('Adjusted') ? 'AdjBW (Obesitas)' : 'Actual Weight'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="glass-panel-input p-6 rounded-2xl">
                                <h2 className="text-lg font-semibold mb-5 text-white border-b border-navy-700 pb-2 flex justify-between items-center">
                                    <span className="flex items-center"><Icons.Alert /> 2. Patologi & Komorbiditas Klinis</span>
                                </h2>
                                
                                {/* Teks Inline dikembalikan untuk menggantikan Tooltips */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-4">
                                    <div className="flex items-center justify-between md:col-span-2 bg-rose-950/20 p-3.5 rounded-xl border border-rose-900/50 mb-2">
                                        <div className="flex flex-col">
                                            <span className="text-rose-400 font-bold text-sm">Valvular AFib (Eksklusi DOAC)</span>
                                            <span className="text-[10px] text-slate-400">Katup Mekanik ATAU Stenosis Mitral Reumatik (Sedang-Berat)</span>
                                        </div>
                                        <Toggle checked={data.valvular} onChange={() => toggleVal('valvular')} colorClass="bg-rose-500" />
                                    </div>

                                    <div className="flex items-center justify-between">
                                        <div className="flex flex-col">
                                            <span className="text-slate-200 text-sm font-medium">Gagal Jantung / LV Disfungsi</span>
                                            <span className="text-[10px] text-slate-500">Riwayat CHF atau LVEF ≤ 40%</span>
                                        </div>
                                        <Toggle checked={data.chf} onChange={() => toggleVal('chf')} colorClass="bg-teal-500" />
                                    </div>
                                    <div className="flex items-center justify-between border-l-2 border-transparent hover:border-teal-500/30 pl-2 transition-all">
                                        <div className="flex flex-col">
                                            <span className="text-slate-200 text-sm font-medium">Hipertensi (Riwayat)</span>
                                            <span className="text-[10px] text-slate-500">Dalam pengobatan antihipertensi</span>
                                        </div>
                                        <Toggle checked={data.htn} onChange={() => toggleVal('htn')} colorClass="bg-teal-500" />
                                    </div>
                                    <div className="flex items-center justify-between border-l-2 border-transparent hover:border-rose-500/30 pl-2 transition-all">
                                        <div className="flex flex-col">
                                            <span className="text-rose-300 text-sm font-medium">Hipertensi Tidak Terkontrol</span>
                                            <span className="text-[10px] text-slate-500">Sistolik dominan &gt; 160 mmHg</span>
                                        </div>
                                        <Toggle checked={data.htn_uncontrolled} onChange={() => toggleVal('htn_uncontrolled')} colorClass="bg-rose-500" />
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <div className="flex flex-col">
                                            <span className="text-slate-200 text-sm font-medium">Diabetes Mellitus</span>
                                            <span className="text-[10px] text-slate-500">Obat oral atau insulin aktif</span>
                                        </div>
                                        <Toggle checked={data.dm} onChange={() => toggleVal('dm')} colorClass="bg-teal-500" />
                                    </div>
                                    <div className="flex items-center justify-between border-l-2 border-transparent hover:border-rose-500/30 pl-2 transition-all">
                                        <div className="flex flex-col">
                                            <span className="text-purple-300 text-sm font-medium">Riwayat Stroke / TIA</span>
                                            <span className="text-[10px] text-slate-500">Iskemik serebral masa lampau</span>
                                        </div>
                                        <Toggle checked={data.stroke} onChange={() => toggleVal('stroke')} colorClass="bg-purple-500" />
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <div className="flex flex-col">
                                            <span className="text-slate-200 text-sm font-medium">Penyakit Vaskular Kritis</span>
                                            <span className="text-[10px] text-slate-500">Post-MI, PAD, atau Plak Aorta</span>
                                        </div>
                                        <Toggle checked={data.vascular} onChange={() => toggleVal('vascular')} colorClass="bg-teal-500" />
                                    </div>
                                    <div className="flex items-center justify-between border-l-2 border-transparent hover:border-rose-500/30 pl-2 transition-all">
                                        <div className="flex flex-col">
                                            <span className="text-slate-200 text-sm font-medium">Disfungsi Ginjal Kronis</span>
                                            <span className="text-[10px] text-slate-500">Dialisis, Transplantasi, SCr &gt; 2.26</span>
                                        </div>
                                        <Toggle checked={data.renal} onChange={() => toggleVal('renal')} colorClass="bg-rose-500" />
                                    </div>
                                    <div className="flex items-center justify-between border-l-2 border-transparent hover:border-rose-500/30 pl-2 transition-all">
                                        <div className="flex flex-col">
                                            <span className="text-slate-200 text-sm font-medium">Disfungsi Hati Kronis</span>
                                            <span className="text-[10px] text-slate-500">Sirosis, AST/ALT &gt; 3x Normal</span>
                                        </div>
                                        <Toggle checked={data.liver} onChange={() => toggleVal('liver')} colorClass="bg-rose-500" />
                                    </div>
                                    <div className="flex items-center justify-between border-l-2 border-transparent hover:border-rose-500/30 pl-2 transition-all">
                                        <div className="flex flex-col">
                                            <span className="text-slate-200 text-sm font-medium">Perdarahan / Predisposisi</span>
                                            <span className="text-[10px] text-slate-500">Riwayat ICH, GI Bleed, Anemia berat</span>
                                        </div>
                                        <Toggle checked={data.bleeding} onChange={() => toggleVal('bleeding')} colorClass="bg-rose-500" />
                                    </div>
                                    <div className="flex items-center justify-between border-l-2 border-transparent hover:border-rose-500/30 pl-2 transition-all">
                                        <div className="flex flex-col">
                                            <span className="text-slate-200 text-sm font-medium">Labil INR (Jika Warfarin)</span>
                                            <span className="text-[10px] text-slate-500">TTR historis &lt; 60%</span>
                                        </div>
                                        <Toggle checked={data.inr} onChange={() => toggleVal('inr')} colorClass="bg-rose-500" />
                                    </div>
                                </div>

                                {/* Accordion Dihancurkan - Always Visible Visual Separator */}
                                <div className="mt-8 mb-4 border-b border-navy-700 pb-2">
                                    <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-widest flex items-center">
                                        <Icons.Shield /> Kriteria Lanjutan (Farmakologi &amp; Gaya Hidup)
                                    </h3>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="flex items-center justify-between p-2.5 bg-navy-900/60 rounded-lg border border-navy-700">
                                        <div className="flex flex-col">
                                            <span className="text-amber-300 text-sm font-medium">Obat Berisiko (NSAID)</span>
                                            <span className="text-[10px] text-slate-500">NSAID aktif/Aspirin rutin (Risiko GI)</span>
                                        </div>
                                        <Toggle checked={data.drugs} onChange={() => toggleVal('drugs')} colorClass="bg-amber-500" />
                                    </div>
                                    <div className="flex items-center justify-between p-2.5 bg-navy-900/60 rounded-lg border border-navy-700">
                                        <div className="flex flex-col">
                                            <span className="text-amber-300 text-sm font-medium">Alkohol Berat</span>
                                            <span className="text-[10px] text-slate-500">≥ 8 gelas/unit per minggu</span>
                                        </div>
                                        <Toggle checked={data.alcohol} onChange={() => toggleVal('alcohol')} colorClass="bg-amber-500" />
                                    </div>
                                    <div className="flex items-center justify-between p-2.5 bg-sky-950/30 rounded-lg border border-sky-900/50">
                                        <div className="flex flex-col">
                                            <span className="text-sky-400 text-sm font-medium">Terapi Antiplatelet</span>
                                            <span className="text-[10px] text-slate-400">Post-PCI/ACS (Waspada Terapi Triple)</span>
                                        </div>
                                        <Toggle checked={data.antiplatelet} onChange={() => toggleVal('antiplatelet')} colorClass="bg-sky-500" />
                                    </div>
                                    <div className="flex items-center justify-between p-2.5 bg-fuchsia-950/30 rounded-lg border border-fuchsia-900/50">
                                        <div className="flex flex-col">
                                            <span className="text-fuchsia-400 text-sm font-medium">Inhibitor CYP3A4 / P-gp</span>
                                            <span className="text-[10px] text-slate-400">Ketoconazole, Verapamil, Amiodarone, dll</span>
                                        </div>
                                        <Toggle checked={data.cypInhibitors} onChange={() => toggleVal('cypInhibitors')} colorClass="bg-fuchsia-500" />
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Panel Kanan - Hasil (High Contrast Slate) */}
                        <section className="xl:col-span-5 relative">
                            <div className="sticky top-6 space-y-6">
                                
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="glass-panel-output p-3 rounded-xl flex flex-col items-center justify-center text-center relative border-t-4 border-t-teal-500">
                                        <h3 className="text-[10px] font-bold text-slate-400 mb-1 tracking-wider uppercase">CHA₂DS₂-VASc</h3>
                                        <div className="text-3xl font-black text-teal-400 mb-1">{scores.chads}</div>
                                        <div className="text-[10px] text-teal-200 mt-auto bg-teal-900/40 px-2 py-0.5 rounded-full">{riskStrokeMap[Math.min(scores.chads, 9)]}% / Thn</div>
                                    </div>
                                    <div className="glass-panel-output p-3 rounded-xl flex flex-col items-center justify-center text-center relative border-t-4 border-t-rose-500">
                                        <h3 className="text-[10px] font-bold text-slate-400 mb-1 tracking-wider uppercase">HAS-BLED</h3>
                                        <div className="text-3xl font-black text-rose-500 mb-1">{scores.hasbled}</div>
                                        <div className="text-[10px] text-rose-200 mt-auto bg-rose-900/40 px-2 py-0.5 rounded-full">{riskBleedMap[Math.min(scores.hasbled, 9)]}% / Thn</div>
                                    </div>
                                    <div className="glass-panel-output p-3 rounded-xl flex flex-col items-center justify-center text-center relative border-t-4 border-t-emerald-400">
                                    <h3 className="text-[10px] font-bold text-slate-400 mb-1 tracking-wider uppercase">CrCl / eGFR</h3>
                                    <div className="text-3xl font-black text-emerald-400 mb-1">{scores.crcl > 0 ? scores.crcl : '-'}</div>
                                    <div className="text-[10px] text-emerald-200 mt-auto bg-emerald-900/40 px-2 py-0.5 rounded-full">mL/min</div>
                                </div>
                            </div>

                            <div className="glass-panel-output p-6 rounded-2xl relative">
                                <h2 className="text-sm font-semibold mb-2 text-white text-center">Matriks Toleransi Kinetik</h2>
                                
                                <KineticMatrix chads={scores.chads} hasbled={scores.hasbled} status={recommendation.status} />

                                {(data.htn_uncontrolled || data.drugs || data.alcohol) && (
                                    <div className="mt-2 p-4 rounded-xl border border-indigo-400/30 bg-indigo-900/30">
                                            <div className="flex items-start gap-3 mb-4">
                                                <div className="mt-0.5"><Icons.Gauge /></div>
                                                <div>
                                                    <h4 className="text-sm font-bold text-indigo-300">Simulasi "What-If" (Optimalisasi Klinis)</h4>
                                                    <p className="text-xs text-slate-300 mt-1.5 leading-relaxed">
                                                        Klik tombol di bawah untuk melihat proyeksi penurunan skor HAS-BLED jika faktor-faktor modifikasi (TD Tinggi, NSAID, atau Alkohol) diatasi.
                                                    </p>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => toggleVal('simulateOptimization')} 
                                                className={`w-full py-3 px-4 rounded-lg font-bold text-sm tracking-wide transition shadow-md border ${
                                                    data.simulateOptimization 
                                                        ? 'bg-teal-600 hover:bg-teal-500 text-white border-teal-400 shadow-teal-900/50' 
                                                        : 'bg-indigo-600 hover:bg-indigo-500 text-white border-indigo-400 shadow-indigo-900/50'
                                                }`}
                                            >
                                                {data.simulateOptimization ? 'Kembali ke Kondisi Aktual' : 'Mulai Simulasi Penurunan Risiko'}
                                            </button>
                                        </div>
                                    )}
                                </div>

                                <div className="glass-panel-output p-6 rounded-2xl">
                                    <div className="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                                        <h3 className="text-xs font-semibold text-slate-300 uppercase tracking-wide">Rekomendasi Farmakologi</h3>
                                        <button onClick={handleCopyNote} className="text-[10px] bg-slate-800 border border-slate-600 text-slate-200 font-bold px-3 py-1.5 rounded-lg hover:text-white hover:bg-slate-700 transition flex items-center gap-1 shadow-md">
                                            <Icons.Copy /> {copied ? 'Tersalin!' : 'Copy to EHR'}
                                        </button>
                                    </div>
                                    
                                    <div className={`text-base font-bold mb-1 ${recommendation.colorClass}`}>
                                        {recommendation.primary}
                                    </div>
                                    <p className="text-[11px] text-slate-400 mb-4">{recommendation.secondary}</p>

                                    {scores.isExtremeObesity && recommendation.showDoac && (
                                        <div className="mb-4 p-3 bg-amber-950/40 border border-amber-500/50 rounded-lg text-amber-200/90 text-xs flex items-start gap-2">
                                            <div className="mt-0.5"><Icons.Alert /></div>
                                            <div>
                                                <strong className="text-amber-400 block mb-0.5">Peringatan Pedoman ISTH (Obesitas Ekstrem)</strong>
                                                BMI &gt; 40 kg/m² atau Berat &gt; 120 kg. Gunakan DOAC dengan hati-hati. Pertimbangkan pemeriksaan kadar anti-Xa spesifik atau alihkan ke VKA.
                                            </div>
                                        </div>
                                    )}
                                    
                                    {recommendation.showDoac && (
                                        <div className="mt-2 space-y-3">
                                            <div className="flex items-center mb-1 font-semibold text-teal-400 text-[10px] uppercase tracking-widest">
                                                <Icons.Pill /> Algoritma Dosing DOAC
                                            </div>
                                            
                                            {doacDosing.type === 'valvular' ? (
                                                <div className="p-4 bg-rose-950/40 border border-rose-900 rounded-xl text-xs text-rose-300 leading-relaxed">
                                                    <strong className="text-rose-400 block mb-1 text-sm"><Icons.Ban /> KONTRAINDIKASI DOAC</strong>Valvular AFib wajib diobati dengan Warfarin (VKA).
                                                </div>
                                            ) : doacDosing.type === 'esrd' ? (
                                                <div className="p-4 bg-amber-950/40 border border-amber-900 rounded-xl text-xs text-amber-300 leading-relaxed">
                                                    <strong className="text-amber-400 block mb-1 text-sm flex items-center"><Icons.Alert /> Klirens Sangat Rendah</strong>CrCl &lt; 15 mL/min (ESRD). Konsultasi nefrologi disarankan.
                                                </div>
                                            ) : (
                                                <div className="space-y-2.5">
                                                    {/* Desain List Obat: Scan-Friendly &amp; High Contrast */}
                                                    {[
                                                        { name: 'Apixaban', data: doacDosing.apixaban },
                                                        { name: 'Rivaroxaban', data: doacDosing.rivaroxaban },
                                                        { name: 'Dabigatran', data: doacDosing.dabigatran },
                                                        { name: 'Edoxaban', data: doacDosing.edoxaban }
                                                    ].map(med => (
                                                        <div key={med.name} className={`p-3.5 rounded-xl border bg-slate-800 flex justify-between items-center shadow-sm ${med.data.isContra ? 'border-rose-500/50 bg-rose-950/20' : 'border-slate-600'}`}>
                                                            <div className="pr-2">
                                                                <div className={`text-xs font-bold uppercase tracking-wider ${med.data.isContra ? 'text-rose-400' : 'text-slate-300'}`}>{med.name}</div>
                                                                <div className={`text-[11px] mt-1 font-medium leading-snug ${med.data.isContra ? 'text-rose-300' : med.data.isReduced ? 'text-amber-400' : med.data.warn ? 'text-rose-300' : 'text-slate-400'}`}>{med.data.note}</div>
                                                            </div>
                                                            <div className={`font-black text-lg md:text-xl whitespace-nowrap ${med.data.isContra ? 'text-rose-500' : 'text-emerald-400'}`}>{med.data.dose}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {scores.baselineHasbled >= 3 && (
                                        <div className="mt-4 p-3 rounded-lg border border-rose-900/50 bg-rose-950/20 text-[10px] text-rose-300 leading-relaxed">
                                            <span className="font-bold text-rose-400 block mb-1"><Icons.Alert /> Modifikasi Risiko Perdarahan (HAS-BLED ≥ 3)</span>
                                            Skor HAS-BLED tinggi <strong>bukan alasan mutlak</strong> menolak OAC. Harap optimalkan modifikasi faktor risiko pasien secara aktif.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
