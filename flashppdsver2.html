    <script>
        // Data Flashcard Varian 2 (50 Soal untuk Persiapan PPDS)
        const originalCards = [
            // --- BAGIAN 1: EKG & Aritmia Dasar (10 Soal) ---
            { 
                cat: "EKG & Aritmia", 
                q: "Sebutkan kriteria diagnosis Left Ventricular Hypertrophy (LVH) berdasarkan metode Sokolow-Lyon dan Cornell Voltage!", 
                a: "<strong>1. Sokolow-Lyon:</strong><br>S wave di V1 + R wave di V5 atau V6 > 35 mm. (Atau R wave di aVL ≥ 11 mm).<br><br><strong>2. Cornell Voltage:</strong><br>S wave di V3 + R wave di aVL.<br>• Pria: > 28 mm<br>• Wanita: > 20 mm<br><em>Catatan Klinis:</em> Kriteria Cornell sering dianggap memiliki sensitivitas yang lebih baik karena memperhitungkan sumbu horizontal dan frontal jantung." 
            },
            { 
                cat: "EKG & Aritmia", 
                q: "Bagaimana evolusi gambaran EKG pada Hiperkalemia seiring dengan peningkatan kadar Kalium serum?", 
                a: "Evolusi progresif Hiperkalemia pada EKG:<br>1. <strong>Ringan (5.5 - 6.5 mEq/L):</strong> Gelombang T tinggi, lancip, dan simetris (Tall peaked T waves) dengan QT interval menyempit.<br>2. <strong>Sedang (6.5 - 8.0 mEq/L):</strong> Gelombang P memipih atau hilang (loss of P wave), interval PR memanjang, kompleks QRS mulai melebar.<br>3. <strong>Berat (> 8.0 mEq/L):</strong> Pelebaran QRS ekstrem menyatu dengan gelombang T membentuk gambaran <strong>Sine Wave (gelombang sinus)</strong>, yang dapat berujung pada VF atau Asistol." 
            },
            { 
                cat: "EKG & Aritmia", 
                q: "Pasien datang ke IGD dengan takikardia ireguler (HR 160x/menit), tekanan darah 80/50 mmHg, dan penurunan kesadaran. Apa diagnosis utama dan tatalaksana awalnya?", 
                a: "<strong>Diagnosis:</strong> Atrial Fibrilasi (AF) dengan Rapid Ventricular Response (RVR) yang tidak stabil secara hemodinamik.<br><br><strong>Tatalaksana:</strong> <em>Synchronized Electrical Cardioversion</em> (Kardioversi tersinkronisasi) segera.<br>Berdasarkan ACLS, energi yang direkomendasikan untuk AF ireguler sempit dimulai dari <strong>120-200 Joule</strong> (Bifasik) atau 200J (Monofasik). Sinkronisasi sangat penting agar syok jatuh pada gelombang R (menghindari R-on-T phenomomenon yang bisa memicu VF)." 
            },
            { 
                cat: "EKG & Aritmia", 
                q: "Apa perbedaan fundamental antara Atrioventricular (AV) Block Derajat 2 Tipe Mobitz I (Wenckebach) dan Mobitz II?", 
                a: "<strong>Mobitz I (Wenckebach):</strong><br>Interval PR memanjang secara progresif dari satu denyut ke denyut berikutnya sampai akhirnya terjadi 'drop beat' (gelombang P tidak diikuti QRS). Lokasi blok biasanya di Nodus AV. Umumnya jinak.<br><br><strong>Mobitz II:</strong><br>Interval PR konstan (bisa normal atau memanjang), namun tiba-tiba terjadi 'drop beat' (P tanpa QRS). Lokasi blok berada di bawah Nodus AV (Sistem His-Purkinje). Memiliki risiko tinggi berkembang menjadi Total AV Block, indikasi untuk pemasangan Pacemaker." 
            },
            { 
                cat: "EKG & Aritmia", 
                q: "Sebutkan trias gambaran EKG yang klasik pada Sindrom Wolff-Parkinson-White (WPW) akibat jalur aksesori!", 
                a: "Trias Klasik WPW (Pre-eksitasi):<br>1. <strong>Interval PR memendek</strong> (< 120 ms / 0.12 detik).<br>2. <strong>Gelombang Delta (Delta wave)</strong>, yaitu upsloping yang landai pada awal kompleks QRS.<br>3. <strong>Kompleks QRS melebar</strong> (> 120 ms).<br><em>Patofisiologi:</em> Terjadi konduksi prematur melalui jalur aksesori (mis. Bundle of Kent) yang memotong AV node, sehingga ventrikel terdepolarisasi lebih awal (pre-eksitasi)." 
            },
            { 
                cat: "EKG & Aritmia", 
                q: "Apa algoritma tatalaksana farmakologis lini pertama untuk Takikardia Supraventrikular (SVT) bergejala tanpa gangguan hemodinamik?", 
                a: "1. <strong>Manuver Vagal:</strong> (misalnya pijat karotis dengan syarat bruits negatif, atau manuver Valsava yang dimodifikasi).<br>2. <strong>Adenosin IV:</strong> Dosis awal 6 mg bolus cepat (diikuti flush NaCl), jika tidak berhasil dapat diulang dengan dosis 12 mg bolus cepat. Adenosin menyebabkan AV node block transien untuk memutus sirkuit re-entry.<br>3. Jika refrakter, dapat dipertimbangkan Beta-blocker atau Calcium Channel Blocker (CCB) non-dihidropiridin (Verapamil/Diltiazem) IV." 
            },
            { 
                cat: "EKG & Aritmia", 
                q: "Torsades de Pointes (TdP) adalah bentuk spesifik dari Takikardia Ventrikel Polimorfik. Apa pencetus utamanya dan apa terapi farmakologis spesifiknya?", 
                a: "<strong>Pencetus utama:</strong> Pemanjangan interval QT (Long QT Syndrome, baik kongenital maupun didapat akibat obat seperti makrolida, fluoroquinolon, haloperidol, amiodaron, atau gangguan elektrolit hipokalemia/hipomagnesemia).<br><br><strong>Terapi spesifik:</strong><br>• Hemodinamik tidak stabil: Defibrilasi.<br>• Hemodinamik stabil: <strong>Magnesium Sulfat (MgSO4) IV</strong> 1-2 gram dalam 15 menit, stop obat pemicu, dan koreksi elektrolit. (Amiodaron DILARANG karena akan memperpanjang QT)." 
            },
            { 
                cat: "EKG & Aritmia", 
                q: "Bagaimana membedakan secara cepat (rule of thumb) antara LBBB dan RBBB murni pada gambaran EKG dari sadapan V1 dan V6?", 
                a: "Lihat kompleks QRS di sadapan V1 dan V6 (ingat jembatan keledai WiLLiaM dan MaRRoW):<br><br>• <strong>LBBB (WiLLiaM):</strong> Dominan negatif di V1 (mirip huruf W atau QS/rS), dan dominan positif lebar takik (notched R) di V6 (mirip huruf M).<br>• <strong>RBBB (MaRRoW):</strong> Dominan positif lebar di V1 (rSR' / pola kuping kelinci / huruf M), dan gelombang S lebar/slurred di V6 (mirip huruf W)." 
            },
            { 
                cat: "EKG & Aritmia", 
                q: "Dalam algoritma henti jantung (Cardiac Arrest) ACLS, manakah irama yang tergolong 'Shockable' dan 'Unshockable'?", 
                a: "<strong>Shockable Rhythms (Indikasi Defibrilasi segera):</strong><br>1. Ventricular Fibrillation (VF)<br>2. Pulseless Ventricular Tachycardia (pVT).<br><br><strong>Unshockable Rhythms (Hanya kompresi dada + Epinefrin, JANGAN disyok):</strong><br>1. Asystole (Garis datar)<br>2. Pulseless Electrical Activity (PEA) -> Irama EKG ada (bahkan bisa sinus normal), tetapi pasien tidak memiliki denyut nadi." 
            },
            { 
                cat: "EKG & Aritmia", 
                q: "Pada kondisi pasien Bradikardia (HR < 50x/m) yang bergejala (hipotensi, akral dingin, penurunan kesadaran), apa dosis Atropin berdasarkan ACLS terbaru (2020)?", 
                a: "Berdasarkan pedoman AHA ACLS 2020:<br>Dosis <strong>Atropin Sulfat IV adalah 1 mg bolus</strong>. Dapat diulang setiap 3-5 menit hingga dosis maksimal tercapai (3 mg / 3 dosis).<br><em>Catatan:</em> Jika Atropin tidak memadai, siapkan Transcutaneous Pacing (TCP) atau drip inotropik (Dopamin / Epinefrin)." 
            },

            // --- BAGIAN 2: IHD & ACS (10 Soal) ---
            { 
                cat: "IHD & ACS", 
                q: "Jelaskan perbedaan mendasar patofisiologi aterotrombosis (plak ruptur vs plak erosi) pada pembentukan Infark Miokard Akut!", 
                a: "<strong>1. Plak Ruptur (~70% ACS):</strong> Terjadi robekan pada tutup fibrosa tipis (thin fibrous cap) yang melapisi inti kaya lipid (large lipid core). Ini memicu paparan faktor jaringan (tissue factor), menyebabkan trombus kaya fibrin (trombus merah). Sering memicu STEMI.<br><br><strong>2. Plak Erosi (~30% ACS):</strong> Endotel terkelupas tanpa ruptur makroskopik dari lipid core. Ini mengekspos kolagen subendotel yang memicu penumpukan keping darah ekstensif (trombus putih kaya platelet). Lebih sering memicu NSTEMI pada pasien muda/wanita." 
            },
            { 
                cat: "IHD & ACS", 
                q: "Berdasarkan pedoman Universal Definition of MI keempat, berapa nilai cut-off ST Elevasi yang diagnostik untuk STEMI di sadapan V2-V3 pada pria dan wanita?", 
                a: "Pada sadapan V2 dan V3, cut-off bergantung pada usia dan jenis kelamin:<br>• <strong>Pria ≥ 40 tahun:</strong> ST elevasi ≥ 2.0 mm (0.2 mV)<br>• <strong>Pria < 40 tahun:</strong> ST elevasi ≥ 2.5 mm (0.25 mV)<br>• <strong>Wanita (berapapun usianya):</strong> ST elevasi ≥ 1.5 mm (0.15 mV)<br><br><em>(Untuk seluruh sadapan lain selain V2-V3, batas universal adalah ≥ 1.0 mm).</em>" 
            },
            { 
                cat: "IHD & ACS", 
                q: "Sebutkan perbedaan profil waktu rilis enzim jantung (Troponin vs CK-MB) paska infark miokard akut! Mengapa CK-MB masih berguna?", 
                a: "<strong>High-Sensitivity Troponin (I atau T):</strong> Mulai meningkat dalam 3-4 jam, memuncak pada 24-48 jam, dan tetap bertahan tinggi di darah selama 7 hingga 14 hari.<br><br><strong>CK-MB:</strong> Mulai meningkat 4-6 jam, memuncak pada 24 jam, tetapi cepat kembali normal dalam 48-72 jam.<br><em>Kegunaan CK-MB saat ini:</em> Karena cepat turun, CK-MB sangat berguna untuk mendeteksi <strong>re-infark awal</strong> (infark berulang dalam hitungan hari) di mana nilai Troponin mungkin masih tinggi dari kejadian pertama." 
            },
            { 
                cat: "IHD & ACS", 
                q: "Bagaimana kriteria EKG dari Sindrom Wellens dan apa makna klinisnya?", 
                a: "<strong>Kriteria EKG (Saat pasien sedang BEBAS nyeri dada):</strong><br>Gelombang T inversi yang dalam dan simetris (Wellens Tipe B) atau T bifasik (Wellens Tipe A) pada sadapan V2-V3. Enzim kardiak biasanya normal atau hanya naik sedikit.<br><br><strong>Makna Klinis:</strong> Mengindikasikan stenosis proksimal arteri LAD yang kritis. Ini adalah keadaan pre-infark. Pasien dilarang keras dilakukan Treadmill Test karena risiko memicu STEMI anterior masif; indikasi untuk angiografi segera." 
            },
            { 
                cat: "IHD & ACS", 
                q: "Pasien suspek STEMI inferior (Elevasi ST di II, III, aVF). Mengapa kita wajib merekam EKG sisi kanan (V4R) sebelum memberikan Nitrat SL?", 
                a: "Infark inferior sering (sekitar 30-50%) disertai dengan <strong>Infark Ventrikel Kanan (Right Ventricular Infarction)</strong>. Bukti di EKG adalah ST elevasi ≥ 1 mm di sadapan V4R.<br><br>RV infark sangat bergantung pada <em>preload</em> untuk mempertahankan curah jantung. Pemberian Nitrat (vasodilator vena) dapat menurunkan preload secara drastis, memicu syok kardiogenik seketika. Tatalaksana utama RV infark adalah loading cairan (NaCl 0.9%)." 
            },
            { 
                cat: "IHD & ACS", 
                q: "Sebutkan 3 komplikasi mekanis utama pasca infark miokard akut yang fatal dan biasanya bermanifestasi sebagai perburukan hemodinamik tiba-tiba!", 
                a: "Komplikasi mekanis yang sering terjadi 3-7 hari post-infark:<br>1. <strong>Ruptur Septum Interventrikular (VSD didapat):</strong> Terdengar murmur pansistolik baru yang kasar di parasternal kiri, sering paska infark anterior.<br>2. <strong>Ruptur Muskulus Papilaris:</strong> Menyebabkan Regurgitasi Mitral akut masif dan edema paru fulminan (sering pada infark inferior yang melibatkan posteromedial papillary muscle).<br>3. <strong>Ruptur Dinding Bebas Ventrikel (Free Wall Rupture):</strong> Menyebabkan efusi perikardial akut, tamponade jantung, dan Pulseless Electrical Activity (PEA) fatal." 
            },
            { 
                cat: "IHD & ACS", 
                q: "Apa perbedaan definitif antara Angina Pektoris Tidak Stabil (Unstable Angina / UAP) dan NSTEMI?", 
                a: "Secara klinis dan EKG, keduanya mirip (nyeri dada akut iskemia dengan EKG ST depresi atau T inversi, tanpa ST elevasi).<br><br>Perbedaan definitifnya ada pada <strong>Biomarker Jantung (Troponin)</strong>:<br>• <strong>NSTEMI:</strong> Terdapat bukti nekrosis miokard, sehingga Troponin positif/meningkat.<br>• <strong>UAP:</strong> Iskemia berat tanpa kematian sel miokard, sehingga Troponin tetap negatif." 
            },
            { 
                cat: "IHD & ACS", 
                q: "Sebutkan kontraindikasi absolut untuk pemberian terapi fibrinolitik (trombolitik, mis. Streptokinase/Alteplase) pada STEMI!", 
                a: "Kontraindikasi absolut meliputi (terutama risiko perdarahan otak fatal):<br>1. Riwayat perdarahan intrakranial (ICH) <em>kapan saja</em>.<br>2. Lesi vaskuler struktural otak (mis. AVM) atau neoplasma otak maligna.<br>3. Stroke iskemik dalam 3 bulan terakhir (kecuali stroke iskemik akut < 4.5 jam).<br>4. Kecurigaan diseksi aorta.<br>5. Perdarahan internal aktif atau diastesis perdarahan (kecuali menstruasi).<br>6. Trauma kepala atau wajah yang signifikan/tertutup dalam 3 bulan terakhir." 
            },
            { 
                cat: "IHD & ACS", 
                q: "Apa gambaran EKG klasik dari Gelombang T de Winter, dan itu setara dengan kondisi apa?", 
                a: "<strong>Gambaran EKG:</strong> ST depresi upsloping (> 1 mm) pada titik J yang dilanjutkan secara langsung menjadi gelombang T yang tinggi, memuncak (peaked), dan simetris pada sadapan prekordial (V1-V6), TANPA adanya ST elevasi yang nyata.<br><br><strong>Kondisi:</strong> Merupakan <strong>ekuivalen STEMI anterior</strong> yang menandakan oklusi total akut proksimal LAD. Harus ditatalaksana sebagai STEMI (reperfusi segera)." 
            },
            { 
                cat: "IHD & ACS", 
                q: "Sebutkan regimen dosis 'loading' obat Antiplatelet Ganda (DAPT) yang diberikan di IGD untuk pasien STEMI yang akan menjalani IKP Primer (Primary PCI)!", 
                a: "Berdasarkan Guideline ESC:<br>1. <strong>Aspirin (ASA):</strong> Loading dose 150-300 mg (dikunyah/dihancurkan agar penyerapan cepat).<br>DITAMBAH dengan salah satu inhibitor P2Y12:<br>2. <strong>Ticagrelor:</strong> Loading dose 180 mg (pilihan utama), ATAU<br>3. <strong>Prasugrel:</strong> Loading dose 60 mg (pilihan utama jika koroner sudah dinilai), ATAU<br>4. <strong>Clopidogrel:</strong> Loading dose 600 mg (jika Ticagrelor/Prasugrel tidak tersedia atau kontraindikasi)." 
            },

            // --- BAGIAN 3: Gagal Jantung & Kardiomiopati (10 Soal) ---
            { 
                cat: "HF & Kardiomiopati", 
                q: "Dalam evaluasi ekokardiografi Gagal Jantung, jelaskan definisi HFrEF, HFmrEF, dan HFpEF berdasarkan klasifikasi LVEF!", 
                a: "Klasifikasi Gagal Jantung menurut LVEF (Fraksi Ejeksi Ventrikel Kiri):<br>1. <strong>HFrEF (HF with Reduced EF):</strong> LVEF ≤ 40%. (Disfungsi sistolik mayoritas).<br>2. <strong>HFmrEF (HF with Mildly Reduced EF):</strong> LVEF 41% - 49%. (Zona transisi, tatalaksana mulai mirip HFrEF).<br>3. <strong>HFpEF (HF with Preserved EF):</strong> LVEF ≥ 50%, dengan bukti adanya kelainan struktural (LVH/dilatasi LA) dan disfungsi diastolik (mis. E/e' tinggi) serta gejala gagal jantung." 
            },
            { 
                cat: "HF & Kardiomiopati", 
                q: "Berdasarkan Klasifikasi Forrester/Nohria untuk Gagal Jantung Akut, sebutkan 4 profil klinis berdasarkan perfusi dan kongesti!", 
                a: "Pasien dinilai berdasarkan 2 hal: Kongesti (Wet vs Dry) dan Perfusi perifer (Warm vs Cold).<br>1. <strong>Profil A (Warm & Dry):</strong> Normal terkompensasi.<br>2. <strong>Profil B (Warm & Wet):</strong> Edema paru / Kongesti, tapi perfusi perifer masih baik. (Paling sering terjadi).<br>3. <strong>Profil L (Cold & Dry):</strong> Hipoperfusi (syok tersembunyi/hipovolemia) tanpa kongesti nyata.<br>4. <strong>Profil C (Cold & Wet):</strong> Syok kardiogenik dengan edema paru berat. (Prognosis terburuk)." 
            },
            { 
                cat: "HF & Kardiomiopati", 
                q: "Apa mekanisme kerja utama obat golongan SGLT2 Inhibitor (misal: Dapagliflozin/Empagliflozin) yang membuatnya menjadi salah satu pilar utama gagal jantung?", 
                a: "SGLT2 Inhibitor awalnya adalah obat diabetes, bekerja memblokir reabsorpsi glukosa dan natrium di tubulus proksimal ginjal.<br>Mekanisme manfaat pada HF multi-faktorial:<br>1. <strong>Diuresis Osmotik:</strong> Mengurangi preload tanpa aktivasi sistem saraf simpatis berlebih.<br>2. <strong>Metabolisme Energi:</strong> Mendorong perubahan metabolisme miokardial dari utilisasi asam lemak bebas menjadi benda keton (beta-hidroksibutirat) yang lebih hemat oksigen (super-fuel).<br>3. Penurunan fibrosis miokard dan stress dinding ventrikel." 
            },
            { 
                cat: "HF & Kardiomiopati", 
                q: "Sebutkan tanda-tanda radiologis (X-ray Thorax) khas pada pasien dengan Edema Paru Kardiogenik akibat gagal jantung kiri!",

        let cards = [...originalCards];
        let currentIndex = 0;
        let isFlipped = false;
        
        // Touch Variables for Swipe (Mobile)
        let touchStartX = 0;
        let touchEndX = 0;
        let isSwiping = false;

        const flashcardEl = document.getElementById('flashcard');
        const questionEl = document.getElementById('question-text');
        const answerEl = document.getElementById('answer-text');
        const counterEl = document.getElementById('card-counter');
        const categoryEl = document.getElementById('card-category');

        function renderCard() {
            if (isFlipped) {
                flashcardEl.classList.remove('is-flipped');
                isFlipped = false;
                setTimeout(() => {
                    updateContent();
                }, 300);
            } else {
                updateContent();
            }
        }

        function updateContent() {
            const currentCard = cards[currentIndex];
            questionEl.innerHTML = currentCard.q;
            answerEl.innerHTML = currentCard.a;
            categoryEl.textContent = currentCard.cat;
            counterEl.textContent = `${currentIndex + 1} / ${cards.length}`;
            
            // Scroll answer to top whenever card changes
            document.querySelector('#answer-text').parentElement.scrollTop = 0;
        }

        function toggleFlip(e) {
            // Prevent flip if the user is swiping or selecting text
            if (isSwiping) return;
            const selection = window.getSelection();
            if (selection.toString().length > 0) return;
            
            isFlipped = !isFlipped;
            flashcardEl.classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                renderCard();
            } else {
                currentIndex = 0;
                renderCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard();
            } else {
                currentIndex = cards.length - 1; // loop to back
                renderCard();
            }
        }

        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            renderCard();
        }

        // --- Fitur Swipe untuk Mobile ---
        flashcardEl.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            isSwiping = false;
        }, {passive: true});

        flashcardEl.addEventListener('touchmove', e => {
            const currentTouchX = e.changedTouches[0].screenX;
            // Deteksi threshold geseran untuk membedakan tap vs swipe
            if (Math.abs(currentTouchX - touchStartX) > 15) {
                isSwiping = true;
            }
        }, {passive: true});

        flashcardEl.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 50; 
            if (touchEndX < touchStartX - swipeThreshold) {
                nextCard();
            } else if (touchEndX > touchStartX + swipeThreshold) {
                prevCard();
            }
            setTimeout(() => {
                isSwiping = false;
            }, 100);
        }

        window.onload = renderCard;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault(); // Mencegah scrolling bawah jika spasi ditekan
                toggleFlip();
            } else if (e.code === 'ArrowRight') {
                nextCard();
            } else if (e.code === 'ArrowLeft') {
                prevCard();
            }
        });
    </script>
</body>
</html>
